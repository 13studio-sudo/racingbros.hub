// 渲染：產品 / 編輯 / 場景
// ============================================================
function renderBrandTabs() {
  const brands = Object.keys(data.brands);
  const html = brands.map(key => {
    const b = data.brands[key];
    const isActive = key === data.currentBrand;
    const dupBtn = isActive
      ? `<button class="brand-dup-btn" onclick="event.stopPropagation(); duplicateBrand('${key}')" title="Duplicate this brand">⧉</button>`
      : '';
    const delBtn = isActive && brands.length > 1
      ? `<button class="brand-del-btn" onclick="event.stopPropagation(); deleteBrand('${key}')" title="Delete this brand">×</button>`
      : '';
    return `<span class="brand-tab-wrap ${isActive ? 'active' : ''}">
      <button class="brand-tab ${isActive ? 'active' : ''}"
              onclick="switchBrand('${key}')"
              ondblclick="renameBrand('${key}')"
              title="Click to switch · Double-click to rename">${escapeHTML(b.name)}</button>
      ${dupBtn}
      ${delBtn}
    </span>`;
  }).join('');
  const addBtn = `<button class="brand-add-btn" onclick="addBrand()" title="Add new brand">+ ADD BRAND</button>`;
  document.getElementById('brandBar').innerHTML = html + addBtn + '<div class="spacer"></div>';
}

function duplicateBrand(key) {
  const src = data.brands[key];
  if (!src) return;
  // deep clone
  const copy = JSON.parse(JSON.stringify(src));
  // 改名為「原名 COPY」
  copy.name = src.name + ' COPY';
  const newKey = 'brand_' + Date.now();
  data.brands[newKey] = copy;
  data.currentBrand = newKey;
  save();
}

function addBrand() {
  promptInput('New brand name', '', n => {
    const name = n.trim();
    if (!name) return;
    const key = 'brand_' + Date.now();
    data.brands[key] = makeEmptyBrandData(name);
    data.currentBrand = key;
    save();
  });
}

function deleteBrand(key) {
  const brands = Object.keys(data.brands);
  if (brands.length <= 1) {
    alert('At least one brand must remain');
    return;
  }
  if (!confirm(`Delete brand "${data.brands[key].name}"? This cannot be undone.`)) return;
  delete data.brands[key];
  // 切換到第一個剩下的品牌
  const remaining = Object.keys(data.brands);
  data.currentBrand = remaining[0];
  save();
}

function switchBrand(key) {
  if (data.brands[key]) {
    data.currentBrand = key;
    render();
  }
}

function renameBrand(key) {
  const brand = data.brands[key];
  if (!brand) return;
  promptInput('Brand name', brand.name, n => {
    const newName = n.trim();
    if (!newName) return;
    brand.name = newName;
    save();
  });
}

function renderProducts() {
  const brand = currentBrand();
  document.getElementById('productList').innerHTML = brand.products.map(p => `
    <div class="product-item">
      <input type="color" value="${p.color}" class="color-dot" onchange="updateProductColor('${p.id}', this.value)">
      <input type="text" value="${escapeHTML(p.name)}" onchange="updateProductName('${p.id}', this.value)">
      <button class="btn-icon" onclick="deleteProduct('${p.id}')" title="刪除">✕</button>
    </div>`).join('');

  document.getElementById('legendArea').innerHTML = brand.products.map(p =>
    `<span class="item"><span class="tag" style="background:${p.color}">${escapeHTML(p.name)}</span></span>`).join('');

  document.getElementById('previewBrandName').textContent = brand.name;
  document.getElementById('previewLegend').innerHTML = brand.products.map(p =>
    `<span class="preview-tag" style="background:${p.color}">${escapeHTML(p.name)}</span>`).join(' ');
}

function addProduct() {
  promptInput('New product name', '', n => {
    if (!n.trim()) return;
    const palette = ['#D8262F','#1B75BB','#2ea44f','#f59e0b','#8b5cf6','#ec4899','#0ea5e9','#dc2626'];
    const used = currentBrand().products.map(p => p.color);
    currentBrand().products.push({id:uid('p'), name:n.trim(), color: palette.find(c=>!used.includes(c)) || '#666'});
    save();
  });
}
function updateProductName(id, n) { const p = currentBrand().products.find(x=>x.id===id); if (p) { p.name = n; save(); } }
function updateProductColor(id, c) { const p = currentBrand().products.find(x=>x.id===id); if (p) { p.color = c; save(); } }
function deleteProduct(id) {
  if (currentBrand().products.length <= 1) return alert('At least one product must remain');
  if (!confirm('Delete this product?')) return;
  currentBrand().products = currentBrand().products.filter(p=>p.id!==id);
  currentBrand().cities.forEach(c=>c.stores.forEach(s=>{s.products=s.products.filter(pid=>pid!==id);}));
  save();
}

function renderEditor() {
  const brand = currentBrand();
  const editor = document.getElementById('editor');
  if (brand.cities.length === 0) { editor.innerHTML = '<div class="empty">No cities yet</div>'; return; }
  editor.innerHTML = brand.cities.map(city => {
    const visible = city.enabled && city.stores.length > 0;
    return `
    <div class="city-card ${city.enabled ? '' : 'disabled'}">
      <div class="city-header">
        <input type="checkbox" class="city-toggle" ${city.enabled ? 'checked' : ''}
               onchange="toggleCityEnabled('${city.id}')">
        <input class="city-name" value="${escapeHTML(city.name)}" onchange="updateCityName('${city.id}', this.value)">
        <select class="city-side" onchange="updateCitySide('${city.id}', this.value)" title="Auto-layout side">
          <option value="left" ${city.side==='left'?'selected':''}>← LEFT</option>
          <option value="right" ${city.side==='right'?'selected':''}>RIGHT →</option>
          <option value="top" ${city.side==='top'?'selected':''}>↑ TOP</option>
        </select>
        <div class="city-actions">
          <button class="btn-icon" onclick="moveCity('${city.id}', -1)" title="上移">▲</button>
          <button class="btn-icon" onclick="moveCity('${city.id}', 1)" title="下移">▼</button>
          ${city.pos ? `<button class="btn-icon" onclick="resetCityPosition('${city.id}')" title="重置位置" style="color:#e74c3c">↺</button>` : ''}
          <button class="btn-icon" onclick="deleteCity('${city.id}')" title="刪除">✕</button>
        </div>
      </div>
      <div class="stores-list">
        ${city.stores.map(s => renderStoreRow(city.id, s)).join('')}
        <button class="add-store" onclick="addStore('${city.id}')">+ ADD STORE</button>
      </div>
    </div>`;
  }).join('');
}

function renderStoreRow(cityId, store) {
  const products = currentBrand().products;
  const toggles = products.map(p => {
    const active = store.products.includes(p.id);
    return `<button class="toggle-btn"
      style="${active ? `background:${p.color};border-color:${p.color};color:#fff;` : ''}"
      onclick="toggleProduct('${cityId}','${store.id}','${p.id}')">${escapeHTML(p.name)}</button>`;
  }).join('');
  return `<div class="store-row" data-store-id="${store.id}">
    <div class="store-row-main">
      <input class="store-name" value="${escapeHTML(store.name)}" placeholder="店家名稱"
             onchange="updateStoreField('${cityId}','${store.id}','name', this.value)">
      <div class="product-toggles">${toggles}</div>
      <button class="btn-icon" onclick="deleteStore('${cityId}','${store.id}')" title="刪除">✕</button>
    </div>
    <div class="store-row-link">
      <span class="field-label-inline">🗺</span>
      <input type="text" value="${escapeHTML(store.link || '')}"
             placeholder="Google Maps 網址（留白以店名自動搜尋）"
             onchange="updateStoreField('${cityId}','${store.id}','link', this.value)">
    </div>
  </div>`;
}

function toggleCityEnabled(id) {
  const c = currentBrand().cities.find(x=>x.id===id);
  if (c) { c.enabled = !c.enabled; save(); }
}
function updateCityName(id, n) { const c = currentBrand().cities.find(x=>x.id===id); if (c) { c.name = n; save(); } }
function updateCitySide(id, s) {
  const c = currentBrand().cities.find(x=>x.id===id);
  if (c) {
    c.side = s;
    c.pos = null; // 切換側別時清除手動位置
    save();
  }
}
function deleteCity(id) {
  if (!confirm('Delete this city?')) return;
  currentBrand().cities = currentBrand().cities.filter(c=>c.id!==id);
  save();
}
function moveCity(id, d) {
  const cities = currentBrand().cities;
  const i = cities.findIndex(c=>c.id===id), n = i + d;
  if (n < 0 || n >= cities.length) return;
  [cities[i], cities[n]] = [cities[n], cities[i]];
  save();
}
function addCity() {
  promptInput('New city name', '', n => {
    if (!n.trim()) return;
    currentBrand().cities.push({
      id: uid('c'), name: n.trim(), enabled: true,
      side: 'left', pos: null, stores: []
    });
    save();
  });
}

function addStore(cid) {
  promptInput('New store name', '', n => {
    if (!n.trim()) return;
    const c = currentBrand().cities.find(x=>x.id===cid);
    if (c) {
      c.enabled = true;
      c.stores.push({id: uid('s'), name: n.trim(), link: '', products: []});
      save();
    }
  });
}
function updateStoreField(cid, sid, field, value) {
  const s = currentBrand().cities.find(x=>x.id===cid)?.stores.find(x=>x.id===sid);
  if (s) { s[field] = value; save(); }
}
function deleteStore(cid, sid) { const c = currentBrand().cities.find(x=>x.id===cid); if (c) { c.stores = c.stores.filter(s=>s.id!==sid); save(); } }
function toggleProduct(cid, sid, pid) {
  const s = currentBrand().cities.find(x=>x.id===cid)?.stores.find(x=>x.id===sid);
  if (!s) return;
  s.products = s.products.includes(pid) ? s.products.filter(p=>p!==pid) : [...s.products, pid];
  save();
}

function resetCityPosition(id) {
  const c = currentBrand().cities.find(x=>x.id===id);
  if (c) { c.pos = null; save(); }
}
function autoLayout() {
  if (!confirm('Reset all cities to auto layout? Manual positions will be cleared.')) return;
  resetPositions();
}
function resetPositions() {
  currentBrand().cities.forEach(c => {
    c.pos = null;
    c.anchorOverride = null;
  });
  currentBrand().mapOffset = { dx: 0, dy: 0 };
  save();
}

// ============================================================
// 場景渲染
// ============================================================
function renderScene() {
  const brand = currentBrand();
  // 整體偏移（拖曳地圖會更新此值）
  const offset = brand.mapOffset || { dx: 0, dy: 0 };
  
  // 地圖著深灰：所有 enabled 的縣市（即使尚未填店家）
  const activeNames = new Set(
    brand.cities.filter(c => c.enabled).map(c => c.name)
  );
  // 方框顯示：enabled 且至少一家店
  const visibleCities = brand.cities.filter(c => c.enabled && c.stores.length > 0);
  
  // 1. 地圖 SVG（含全部縣市路徑）
  // 為啟用的縣市加 .active class（即使無店家也深灰）
  // 若品牌有自訂上傳 SVG，則以 <image> 嵌入；保持原始 aspect ratio
  const customSvg = brand.customMapSvg;
  let mapInner;
  if (customSvg && customSvg.b64) {
    const href = 'data:image/svg+xml;base64,' + customSvg.b64;
    mapInner = `<image x="0" y="0" width="${MAP_VB_W}" height="${MAP_VB_H}" preserveAspectRatio="xMidYMid meet" href="${href}" xlink:href="${href}"></image>`;
  } else {
    mapInner = MAP_INNER;
    mapInner = mapInner.replace(/<path class="city" data-city="([^"]+)"/g, (m, cn) => {
      const isActive = activeNames.has(cn);
      return `<path class="city${isActive ? ' active' : ''}" data-city="${cn}"`;
    });
  }
  
  const sx = MAP_W / MAP_VB_W;
  const sy = MAP_H / MAP_VB_H;
  
  // 2. 計算自動排版位置
  const autoPos = computeAutoPositions(visibleCities);
  
  // 3. 連線（含 mapOffset 平移）+ 可拖曳錨點圓圈
  const connectors = visibleCities.map(c => {
    const basePos = c.pos || autoPos[c.id];
    if (!basePos) return '';
    const pos = { x: basePos.x + offset.dx, y: basePos.y + offset.dy, w: basePos.w };
    const estW = pos.w || 240;
    const estH = 50 + c.stores.length * 22;
    const anchorRaw = getCityAnchor(c);
    if (!anchorRaw) return '';
    const d = buildConnector(anchorRaw, pos.x, pos.y, estW, estH, offset);
    if (!d) return '';
    const a = mapToScene(anchorRaw.x, anchorRaw.y);
    const aOff = { x: a.x + offset.dx, y: a.y + offset.dy };
    return `<path class="connector" data-city-id="${c.id}" d="${d}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<circle class="anchor-handle" data-city-id="${c.id}" data-anchor cx="${aOff.x.toFixed(1)}" cy="${aOff.y.toFixed(1)}" r="6" fill="#666" stroke="#fff" stroke-width="2"/>`;
  }).join('\n');
  
  const sceneSVG = `<svg class="scene-svg" viewBox="0 0 ${SCENE_W} ${SCENE_H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<g transform="translate(${(MAP_X + offset.dx).toFixed(1)} ${(MAP_Y + offset.dy).toFixed(1)}) scale(${sx.toFixed(4)} ${sy.toFixed(4)})">
${mapInner}
</g>
<g class="connectors">${connectors}</g>
</svg>`;
  
  // 4. 標籤層（HTML，可拖曳；位置 = basePos + offset）
  const labels = visibleCities.map(c => {
    const basePos = c.pos || autoPos[c.id];
    if (!basePos) return '';
    const products = brand.products;
    const storesHTML = c.stores.map(store => {
      const badges = products.filter(p => store.products.includes(p.id))
        .map(p => `<span class="badge-p" style="background:${p.color}">${escapeHTML(p.name)}</span>`).join('');
      const url = buildMapURL(store);
      return `<div class="store-row-p">
        <div class="badges-p">${badges}</div>
        <a class="name-p" href="${escapeHTML(url)}" target="_blank" rel="noopener">${escapeHTML(store.name)}</a>
      </div>`;
    }).join('');
    
    // 套上 mapOffset
    const finalX = basePos.x + offset.dx;
    const finalY = basePos.y + offset.dy;
    const xPct = (finalX / SCENE_W * 100).toFixed(3);
    const yPct = (finalY / SCENE_H * 100).toFixed(3);
    
    // Pre-tag the connector entry side using the estimated box size, so
    // CSS padding is applied on first paint (avoids a flash before
    // updateConnectorsToActualBoxes re-tags from real measurements).
    let preSide = '';
    const anchorRaw = getCityAnchor(c);
    if (anchorRaw) {
      const a = mapToScene(anchorRaw.x, anchorRaw.y);
      const estW = basePos.w || 240;
      const estH = 50 + c.stores.length * 22;
      const bcx = finalX + estW / 2;
      const bcy = finalY + estH / 2;
      preSide = pickConnectorSide((a.x + offset.dx) - bcx, (a.y + offset.dy) - bcy, estW, estH);
    }
    
    return `<div class="city-box" data-city-id="${c.id}" ${preSide ? `data-conn-side="${preSide}"` : ''}
            style="left:${xPct}%;top:${yPct}%;">
      <div class="city-title-p">${escapeHTML(c.name)}</div>
      ${storesHTML}
    </div>`;
  }).join('');
  
  const scene = document.getElementById('scene');
  scene.innerHTML = sceneSVG + `<div class="label-layer">${labels}</div>`;
  
  // 渲染後重新計算連線（取得實際方框尺寸）
  setTimeout(() => updateConnectorsToActualBoxes(), 10);
  
  // 啟用拖曳：方框 + 地圖整體
  enableDragging(scene);
  enableMapDragging(scene);
}

// 渲染後依實際 box 尺寸更新連線
function updateConnectorsToActualBoxes() {
  const scene = document.getElementById('scene');
  if (!scene) return;
  const sceneRect = scene.getBoundingClientRect();
  const scaleX = SCENE_W / sceneRect.width;
  const scaleY = SCENE_H / sceneRect.height;
  const offset = currentBrand().mapOffset || { dx: 0, dy: 0 };
  
  const boxes = scene.querySelectorAll('.city-box');
  boxes.forEach(box => {
    const cityId = box.dataset.cityId;
    const city = currentBrand().cities.find(c => c.id === cityId);
    if (!city) return;
    
    const r = box.getBoundingClientRect();
    // box 在場景座標系中的位置（含 offset）
    const x = (r.left - sceneRect.left) * scaleX;
    const y = (r.top - sceneRect.top) * scaleY;
    const w = r.width * scaleX;
    const h = r.height * scaleY;
    
    const anchorRaw = getCityAnchor(city);
    const path = scene.querySelector(`path.connector[data-city-id="${cityId}"]`);
    if (path && anchorRaw) {
      // Tag the box with which side the connector enters from, so CSS can
      // apply the user-configurable inner padding on that side only.
      const apRaw = mapToScene(anchorRaw.x, anchorRaw.y);
      const apX = apRaw.x + offset.dx;
      const apY = apRaw.y + offset.dy;
      const dx = apX - (x + w / 2);
      const dy = apY - (y + h / 2);
      box.dataset.connSide = pickConnectorSide(dx, dy, w, h);
      
      const d = buildConnector(anchorRaw, x, y, w, h, offset);
      if (d) path.setAttribute('d', d);
    }
  });
}

// ============================================================
// 拖曳
// ============================================================
let dragState = null;

function enableDragging(scene) {
  const boxes = scene.querySelectorAll('.city-box');
  boxes.forEach(box => {
    box.addEventListener('mousedown', startDrag);
    box.addEventListener('touchstart', startDragTouch, { passive: false });
  });
}

function startDrag(e) {
  // 只有點到標題區或盒子空白處才開始拖曳，點到 a/input 不拖
  if (e.target.tagName === 'A') return;
  e.preventDefault();
  const box = e.currentTarget;
  beginDrag(box, e.clientX, e.clientY);
}

function startDragTouch(e) {
  if (e.target.tagName === 'A') return;
  e.preventDefault();
  const box = e.currentTarget;
  const t = e.touches[0];
  beginDrag(box, t.clientX, t.clientY);
}

function beginDrag(box, clientX, clientY) {
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();
  const boxRect = box.getBoundingClientRect();
  
  dragState = {
    box: box,
    cityId: box.dataset.cityId,
    sceneRect: sceneRect,
    offsetX: clientX - boxRect.left,
    offsetY: clientY - boxRect.top,
    boxW: boxRect.width,
    boxH: boxRect.height,
    scaleX: SCENE_W / sceneRect.width,
    scaleY: SCENE_H / sceneRect.height,
  };
  
  box.classList.add('dragging');
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDragTouch, { passive: false });
  document.addEventListener('touchend', endDrag);
}

function onDrag(e) {
  if (!dragState) return;
  doMove(e.clientX, e.clientY);
}
function onDragTouch(e) {
  if (!dragState) return;
  e.preventDefault();
  const t = e.touches[0];
  doMove(t.clientX, t.clientY);
}

function doMove(clientX, clientY) {
  const { box, sceneRect, offsetX, offsetY, scaleX, scaleY, boxW, boxH } = dragState;
  
  // 在場景內的座標（pixel）
  let pxLeft = clientX - sceneRect.left - offsetX;
  let pxTop = clientY - sceneRect.top - offsetY;
  
  // 取得 preview-block-body 邊界 — 讓方框可以放到地圖外但不超出 body
  const body = document.querySelector('#mapBlock .preview-block-body');
  let minLeft, maxLeft, minTop, maxTop;
  if (body) {
    const bodyRect = body.getBoundingClientRect();
    // 把 bodyRect 轉成相對 sceneRect 的 px
    minLeft = bodyRect.left - sceneRect.left + 4;          // body 左緣 + 留 4px buffer
    maxLeft = bodyRect.right - sceneRect.left - boxW - 4;  // body 右緣 - 方框寬 - buffer
    minTop  = bodyRect.top - sceneRect.top + 4;
    maxTop  = bodyRect.bottom - sceneRect.top - boxH - 4;
  } else {
    // fallback
    const overY = sceneRect.height * 0.3;
    const overX = sceneRect.width * 0.1;
    minLeft = -overX; maxLeft = sceneRect.width - boxW + overX;
    minTop = -overY; maxTop = sceneRect.height - boxH + overY;
  }
  pxLeft = Math.max(minLeft, Math.min(maxLeft, pxLeft));
  pxTop  = Math.max(minTop,  Math.min(maxTop,  pxTop));
  
  // 轉換為場景座標系
  const sceneX = pxLeft * scaleX;
  const sceneY = pxTop * scaleY;
  
  // 用 % 定位（讓 box 不變大小）
  const xPct = (sceneX / SCENE_W * 100).toFixed(3);
  const yPct = (sceneY / SCENE_H * 100).toFixed(3);
  box.style.left = xPct + '%';
  box.style.top = yPct + '%';
  
  // 即時更新連線（連線錨點要套上 mapOffset）
  const city = currentBrand().cities.find(c => c.id === dragState.cityId);
  if (city) {
    const w = boxW * scaleX;
    const h = boxH * scaleY;
    const offset = currentBrand().mapOffset || { dx: 0, dy: 0 };
    const anchorRaw = getCityAnchor(city);
    const path = document.querySelector(`path.connector[data-city-id="${city.id}"]`);
    if (path) {
      const d = buildConnector(anchorRaw, sceneX, sceneY, w, h, offset);
      if (d) path.setAttribute('d', d);
    }
  }
}

function endDrag() {
  if (!dragState) return;
  const { box, cityId, sceneRect, scaleX, scaleY } = dragState;
  
  // 寫回 city.pos（場景座標系）— 扣掉 mapOffset，存「無偏移版本的位置」
  const city = currentBrand().cities.find(c => c.id === cityId);
  if (city) {
    const r = box.getBoundingClientRect();
    const x = (r.left - sceneRect.left) * scaleX;
    const y = (r.top - sceneRect.top) * scaleY;
    const offset = currentBrand().mapOffset || { dx: 0, dy: 0 };
    city.pos = {
      x: Math.round((x - offset.dx) * 10) / 10,
      y: Math.round((y - offset.dy) * 10) / 10,
      w: Math.round(r.width * scaleX)
    };
  }
  
  box.classList.remove('dragging');
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchmove', onDragTouch);
  document.removeEventListener('touchend', endDrag);
  dragState = null;
  
  // 同步重新渲染編輯區（顯示「↺ 重置位置」按鈕）
  renderEditor();
}

// ============================================================
// 地圖整體拖曳（移動所有元素：地圖、連線、方框）
// ============================================================
let mapDragState = null;

function enableMapDragging(scene) {
  const svg = scene.querySelector('.scene-svg');
  if (!svg) return;
  svg.addEventListener('mousedown', startMapDrag);
  svg.addEventListener('touchstart', startMapDragTouch, { passive: false });
  
  // 啟用錨點拖曳
  const anchors = svg.querySelectorAll('circle.anchor-handle');
  anchors.forEach(a => {
    a.addEventListener('mousedown', startAnchorDrag);
    a.addEventListener('touchstart', startAnchorDragTouch, { passive: false });
  });
}

function startMapDrag(e) {
  // 點到方框或錨點時不要觸發地圖拖曳
  if (e.target.closest('.city-box')) return;
  if (e.target.classList && e.target.classList.contains('anchor-handle')) return;
  e.preventDefault();
  beginMapDrag(e.clientX, e.clientY);
}
function startMapDragTouch(e) {
  if (e.target.closest('.city-box')) return;
  if (e.target.classList && e.target.classList.contains('anchor-handle')) return;
  e.preventDefault();
  const t = e.touches[0];
  beginMapDrag(t.clientX, t.clientY);
}

function beginMapDrag(clientX, clientY) {
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();
  const brand = currentBrand();
  
  mapDragState = {
    startClientX: clientX,
    startClientY: clientY,
    startDx: brand.mapOffset?.dx || 0,
    startDy: brand.mapOffset?.dy || 0,
    sceneRect: sceneRect,
    scaleX: SCENE_W / sceneRect.width,
    scaleY: SCENE_H / sceneRect.height,
  };
  
  const svg = scene.querySelector('.scene-svg');
  if (svg) svg.classList.add('map-dragging');
  
  document.addEventListener('mousemove', onMapDrag);
  document.addEventListener('mouseup', endMapDrag);
  document.addEventListener('touchmove', onMapDragTouch, { passive: false });
  document.addEventListener('touchend', endMapDrag);
}

function onMapDrag(e) {
  if (!mapDragState) return;
  doMapMove(e.clientX, e.clientY);
}
function onMapDragTouch(e) {
  if (!mapDragState) return;
  e.preventDefault();
  const t = e.touches[0];
  doMapMove(t.clientX, t.clientY);
}

function doMapMove(clientX, clientY) {
  const { startClientX, startClientY, startDx, startDy, scaleX, scaleY } = mapDragState;
  // 從滑鼠位移計算場景座標的位移
  const dPxX = clientX - startClientX;
  const dPxY = clientY - startClientY;
  const dx = startDx + dPxX * scaleX;
  const dy = startDy + dPxY * scaleY;
  
  currentBrand().mapOffset = { dx, dy };
  
  // 直接操作 DOM 以避免每幀重新渲染整個場景
  applyMapOffsetToDOM(dx, dy);
}

function applyMapOffsetToDOM(dx, dy) {
  const brand = currentBrand();
  const scene = document.getElementById('scene');
  if (!scene) return;
  
  // 1. 地圖 <g> 的 transform
  const svg = scene.querySelector('.scene-svg');
  if (svg) {
    const sx = MAP_W / MAP_VB_W;
    const sy = MAP_H / MAP_VB_H;
    const mapG = svg.querySelector('g');
    if (mapG) {
      mapG.setAttribute('transform',
        `translate(${(MAP_X + dx).toFixed(1)} ${(MAP_Y + dy).toFixed(1)}) scale(${sx.toFixed(4)} ${sy.toFixed(4)})`);
    }
  }
  
  // 2. 每個方框的 left/top 重新算
  const visibleCities = brand.cities.filter(c => c.enabled && c.stores.length > 0);
  const autoPos = computeAutoPositions(visibleCities);
  
  visibleCities.forEach(c => {
    const box = scene.querySelector(`.city-box[data-city-id="${c.id}"]`);
    if (!box) return;
    const basePos = c.pos || autoPos[c.id];
    if (!basePos) return;
    const finalX = basePos.x + dx;
    const finalY = basePos.y + dy;
    box.style.left = (finalX / SCENE_W * 100).toFixed(3) + '%';
    box.style.top = (finalY / SCENE_H * 100).toFixed(3) + '%';
  });
  
  // 3. 連線錨點圓圈位置 + 連線路徑（呼叫 updateConnectorsToActualBoxes）
  visibleCities.forEach(c => {
    const a = getCityAnchor(c);
    if (!a) return;
    const ap = mapToScene(a.x, a.y);
    const circle = scene.querySelector(`circle[data-anchor][data-city-id="${c.id}"]`);
    if (circle) {
      circle.setAttribute('cx', (ap.x + dx).toFixed(1));
      circle.setAttribute('cy', (ap.y + dy).toFixed(1));
    }
  });
  
  // 重算連線路徑（讀 box 實際位置 + 套 offset 給錨點）
  updateConnectorsToActualBoxes();
}

function endMapDrag() {
  if (!mapDragState) return;
  const scene = document.getElementById('scene');
  const svg = scene?.querySelector('.scene-svg');
  if (svg) svg.classList.remove('map-dragging');
  
  document.removeEventListener('mousemove', onMapDrag);
  document.removeEventListener('mouseup', endMapDrag);
  document.removeEventListener('touchmove', onMapDragTouch);
  document.removeEventListener('touchend', endMapDrag);
  mapDragState = null;
}

// ============================================================
// 錨點拖曳（移動單一縣市的指示線錨點）
// ============================================================
let anchorDragState = null;

function startAnchorDrag(e) {
  e.preventDefault();
  e.stopPropagation();
  beginAnchorDrag(e.currentTarget, e.clientX, e.clientY);
}
function startAnchorDragTouch(e) {
  e.preventDefault();
  e.stopPropagation();
  const t = e.touches[0];
  beginAnchorDrag(e.currentTarget, t.clientX, t.clientY);
}

function beginAnchorDrag(circle, clientX, clientY) {
  const scene = document.getElementById('scene');
  const sceneRect = scene.getBoundingClientRect();
  
  anchorDragState = {
    circle: circle,
    cityId: circle.dataset.cityId,
    sceneRect: sceneRect,
    scaleX: SCENE_W / sceneRect.width,
    scaleY: SCENE_H / sceneRect.height,
  };
  
  // 加上拖曳視覺效果
  circle.setAttribute('r', 8);
  circle.setAttribute('fill', '#1a73e8');
  
  document.addEventListener('mousemove', onAnchorDrag);
  document.addEventListener('mouseup', endAnchorDrag);
  document.addEventListener('touchmove', onAnchorDragTouch, { passive: false });
  document.addEventListener('touchend', endAnchorDrag);
}

function onAnchorDrag(e) {
  if (!anchorDragState) return;
  doAnchorMove(e.clientX, e.clientY);
}
function onAnchorDragTouch(e) {
  if (!anchorDragState) return;
  e.preventDefault();
  const t = e.touches[0];
  doAnchorMove(t.clientX, t.clientY);
}

function doAnchorMove(clientX, clientY) {
  const { circle, cityId, sceneRect, scaleX, scaleY } = anchorDragState;
  const offset = currentBrand().mapOffset || { dx: 0, dy: 0 };
  
  // 滑鼠在場景座標系的位置（含 mapOffset）
  const sceneX = (clientX - sceneRect.left) * scaleX;
  const sceneY = (clientY - sceneRect.top) * scaleY;
  
  // 限制在場景內
  const clampedX = Math.max(0, Math.min(SCENE_W, sceneX));
  const clampedY = Math.max(0, Math.min(SCENE_H, sceneY));
  
  // 即時更新圓圈位置
  circle.setAttribute('cx', clampedX.toFixed(1));
  circle.setAttribute('cy', clampedY.toFixed(1));
  
  // 反推回地圖內座標（扣除 mapOffset 與地圖 transform）
  // sceneCoord = MAP_X + (mapCoord/MAP_VB_W) * MAP_W + offset.dx
  // mapCoord = (sceneCoord - offset.dx - MAP_X) / MAP_W * MAP_VB_W
  const mapX = (clampedX - offset.dx - MAP_X) / MAP_W * MAP_VB_W;
  const mapY = (clampedY - offset.dy - MAP_Y) / MAP_H * MAP_VB_H;
  
  // 更新該縣市的連線（即時）
  const city = currentBrand().cities.find(c => c.id === cityId);
  if (city) {
    city.anchorOverride = { x: mapX, y: mapY };
    
    // 重算這條連線
    const path = document.querySelector(`path.connector[data-city-id="${cityId}"]`);
    if (path) {
      const box = document.querySelector(`.city-box[data-city-id="${cityId}"]`);
      if (box) {
        const r = box.getBoundingClientRect();
        const bx = (r.left - sceneRect.left) * scaleX;
        const by = (r.top - sceneRect.top) * scaleY;
        const bw = r.width * scaleX;
        const bh = r.height * scaleY;
        const d = buildConnector({ x: mapX, y: mapY }, bx, by, bw, bh, offset);
        if (d) path.setAttribute('d', d);
      }
    }
  }
}

function endAnchorDrag() {
  if (!anchorDragState) return;
  const { circle } = anchorDragState;
  
  // 還原視覺
  circle.setAttribute('r', 6);
  circle.setAttribute('fill', '#666');
  
  document.removeEventListener('mousemove', onAnchorDrag);
  document.removeEventListener('mouseup', endAnchorDrag);
  document.removeEventListener('touchmove', onAnchorDragTouch);
  document.removeEventListener('touchend', endAnchorDrag);
  anchorDragState = null;
  
  // 重新渲染編輯區（顯示「重置錨點」按鈕）
  renderEditor();
}

// ============================================================
// MAP SVG (per-brand custom map upload) — added in 0.0.5
// ============================================================
const MAP_SVG_LS_KEY = 'gt-trm-custom-map-svg';

function _loadCustomMapSvgs() {
  try {
    const raw = localStorage.getItem(MAP_SVG_LS_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj && typeof obj === 'object') {
      Object.keys(obj).forEach(k => {
        if (data.brands[k]) data.brands[k].customMapSvg = obj[k];
      });
    }
  } catch (e) { /* ignore */ }
}
function _saveCustomMapSvgs() {
  const out = {};
  Object.keys(data.brands).forEach(k => {
    const v = data.brands[k].customMapSvg;
    if (v && v.data) out[k] = v;
  });
  try { localStorage.setItem(MAP_SVG_LS_KEY, JSON.stringify(out)); } catch (e) { /* ignore */ }
}

function _b64encodeUtf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function _extractSvgViewBox(svgText) {
  const m = svgText.match(/<svg[^>]*viewBox\s*=\s*["']([^"']+)["']/i);
  if (m) {
    const parts = m[1].trim().split(/[\s,]+/).map(Number);
    if (parts.length === 4 && parts.every(n => !isNaN(n))) {
      return { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
    }
  }
  const w = svgText.match(/<svg[^>]*\swidth\s*=\s*["']([\d.]+)/i);
  const h = svgText.match(/<svg[^>]*\sheight\s*=\s*["']([\d.]+)/i);
  if (w && h) return { x: 0, y: 0, w: parseFloat(w[1]), h: parseFloat(h[1]) };
  return null;
}

function uploadMapSvg(input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  if (!/\.svg$/i.test(file.name) && file.type !== 'image/svg+xml') {
    alert('Please upload an .svg file.');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    let text = String(e.target.result || '');
    if (!/<svg[\s\S]*<\/svg>/i.test(text)) {
      alert('That file does not look like a valid SVG.');
      input.value = '';
      return;
    }
    const vb = _extractSvgViewBox(text);
    const brand = currentBrand();
    brand.customMapSvg = {
      name: file.name,
      data: text,
      b64: _b64encodeUtf8(text),
      vb: vb || null,
      uploadedAt: Date.now()
    };
    _saveCustomMapSvgs();
    save();
    input.value = '';
  };
  reader.onerror = () => { alert('Failed to read file.'); input.value = ''; };
  reader.readAsText(file);
}
window.uploadMapSvg = uploadMapSvg;

function resetMapSvg() {
  const brand = currentBrand();
  if (!brand.customMapSvg) return;
  if (!confirm('Reset to default Taiwan map for this brand?')) return;
  delete brand.customMapSvg;
  _saveCustomMapSvgs();
  save();
}
window.resetMapSvg = resetMapSvg;


// ============================================================
// v0.0.6 — drag-to-resize wiring (column splitter + map-svg height)
// ============================================================
const LS_LEFT_COL = 'gt-trm-left-col-width';
const LS_MAP_SVG_H = 'gt-trm-map-svg-height';

function _setLeftColWidth(px) {
  const layout = document.querySelector('.tool-trm .layout');
  if (!layout) return;
  const rect = layout.getBoundingClientRect();
  const min = 200, max = Math.max(min + 100, rect.width - 280);
  const clamped = Math.max(min, Math.min(max, px));
  layout.style.setProperty('--left-col-width', clamped + 'px');
  try { localStorage.setItem(LS_LEFT_COL, String(clamped)); } catch (e) {}
}
function _setMapSvgHeight(px) {
  const frame = document.querySelector('.tool-trm .map-svg-frame');
  if (!frame) return;
  const clamped = Math.max(80, Math.min(900, px));
  frame.style.setProperty('--map-svg-height', clamped + 'px');
  frame.style.height = clamped + 'px';
  try { localStorage.setItem(LS_MAP_SVG_H, String(clamped)); } catch (e) {}
}

function wireResizers() {
  // column splitter
  const splitter = document.getElementById('colSplitter');
  if (splitter && !splitter.__wired) {
    splitter.__wired = true;
    splitter.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const layout = document.querySelector('.tool-trm .layout');
      if (!layout) return;
      const rect = layout.getBoundingClientRect();
      document.body.style.cursor = 'ew-resize';
      const onMove = (ev) => {
        const x = ev.clientX - rect.left;
        _setLeftColWidth(x);
      };
      const onUp = () => {
        document.body.style.cursor = '';
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  }
  // map-svg height handle
  const handle = document.getElementById('mapSvgResizeHandle');
  if (handle && !handle.__wired) {
    handle.__wired = true;
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const frame = document.querySelector('.tool-trm .map-svg-frame');
      if (!frame) return;
      const rect = frame.getBoundingClientRect();
      const startY = e.clientY;
      const startH = rect.height;
      document.body.style.cursor = 'ns-resize';
      const onMove = (ev) => {
        const dy = ev.clientY - startY;
        _setMapSvgHeight(startH + dy);
      };
      const onUp = () => {
        document.body.style.cursor = '';
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  }
  // restore persisted values
  try {
    const w = parseInt(localStorage.getItem(LS_LEFT_COL) || '', 10);
    if (!isNaN(w) && w > 0) _setLeftColWidth(w);
  } catch (e) {}
  try {
    const h = parseInt(localStorage.getItem(LS_MAP_SVG_H) || '', 10);
    if (!isNaN(h) && h > 0) _setMapSvgHeight(h);
  } catch (e) {}
}
window.wireResizers = wireResizers;

function renderMapSvgPanel() {
  const host = document.getElementById('mapSvgFrame');
  const fname = document.getElementById('mapSvgFilename');
  const resetBtn = document.getElementById('mapSvgResetBtn');
  if (!host) return;
  const brand = currentBrand();
  const custom = brand && brand.customMapSvg;
  if (custom && custom.data) {
    host.innerHTML = '<div class="map-svg-render">' + custom.data + '</div>' +
                     '<div class="map-svg-badge">CUSTOM</div>';
    if (fname) fname.textContent = custom.name || '';
    if (resetBtn) resetBtn.style.display = '';
  } else {
    host.innerHTML = '<div class="map-svg-render">' + (typeof MAP_SVG === 'string' ? MAP_SVG : '') + '</div>' +
                     '<div class="map-svg-badge">DEFAULT &middot; TAIWAN</div>';
    if (fname) fname.textContent = '';
    if (resetBtn) resetBtn.style.display = 'none';
  }
  try { wireResizers(); } catch (e) {}
}
window.renderMapSvgPanel = renderMapSvgPanel;

// Load persisted SVGs on boot
_loadCustomMapSvgs();

function render() {
  renderBrandTabs();
  renderProducts();
  renderEditor();
  renderMapSvgPanel();
  renderScene();
  renderListPreview();
}

// 渲染清單預覽
function renderListPreview() {
  const brand = currentBrand();
  const products = brand.products;
  const visibleCities = brand.cities.filter(c => c.enabled && c.stores.length > 0);
  const host = document.getElementById('listPreview');
  if (!host) return;

  if (visibleCities.length === 0) {
    host.innerHTML = '<div class="empty">Enable cities and add stores to see the list</div>';
    return;
  }

  const html = '<div class="list-grid">' + visibleCities.map(c => `
    <div class="list-city">
      <h3>${escapeHTML(c.name)}</h3>
      ${c.stores.map(s => {
        const badges = products.filter(p => s.products.includes(p.id))
          .map(p => `<span class="badge" style="background:${p.color}">${escapeHTML(p.name)}</span>`).join('');
        const url = buildMapURL(s);
        return `<div class="list-store">
          <span class="badges">${badges}</span>
          <a class="list-store-name" href="${escapeHTML(url)}" target="_blank" rel="noopener">${escapeHTML(s.name)}</a>
        </div>`;
      }).join('')}
    </div>
  `).join('') + '</div>';

  host.innerHTML = html;
}

// 區塊摺疊
function toggleBlock(name) {
  const el = document.getElementById(name === 'map' ? 'mapBlock' : 'listBlock');

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `test-ride-map-data.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.brands && d.currentBrand) {
        // 新格式
        // 補齊欄位
        Object.values(d.brands).forEach(brand => {
          if (!brand.mapOffset) brand.mapOffset = { dx: 0, dy: 0 };
          brand.cities.forEach(c => {
            if (c.enabled === undefined) c.enabled = c.stores.length > 0;
            if (!c.side) c.side = 'left';
            if (c.pos === undefined) c.pos = null;
            if (c.anchorOverride === undefined) c.anchorOverride = null;
            c.stores.forEach(s => {
              if (s.link === undefined) s.link = '';
            });
          });
        });
        data = d;
      } else if (d.products && d.cities) {
        // 舊格式（單品牌）→ 轉成 BAZOOKA
        data = JSON.parse(JSON.stringify(DEFAULT_DATA));
        const bz = data.brands['BAZOOKA'];
        bz.products = d.products;
        bz.mapOffset = { dx: 0, dy: 0 };
        bz.cities = d.cities.map(c => ({
          ...c,
          enabled: c.enabled !== undefined ? c.enabled : (c.stores.length > 0),
          pos: c.pos || null,
          anchorOverride: c.anchorOverride || null,
          side: c.side || 'left',
        }));
      } else {
        alert('Invalid format');
        return;
      }
      save();
      alert('Import successful');
    } catch (err) { alert('Parse failed: ' + err.message); }
  };
  r.readAsText(f);
  e.target.value = '';
}

function resetData() {
  if (!confirm('Reset ALL brand data? This cannot be undone.')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  save();
}

function trmTx(zhText) {
  if (typeof currentLang === 'undefined' || currentLang === 'zh') return zhText;
  // 移除前置的中點 · 與空格，再查表；翻譯後保留前綴
  const trimmed = zhText.trim();
  // 嘗試直接找
  let entry = TRM_STRINGS[trimmed];
  if (entry) return entry.en;
  // 嘗試去掉前置 · 或 · 加空格
  const m = trimmed.match(/^[·•・]\s*(.+)$/);
  if (m) {
    entry = TRM_STRINGS[m[1].trim()];
    if (entry) return '· ' + entry.en;
  }
  return zhText;
}

// 在 trm 渲染後執行：移除 emoji + 加 resize handle + 翻譯
function trmPostProcess() {
  const root = document.querySelector('.tool-trm');
  if (!root) return;

  // ----------------------------------------
  // 1. 替換所有 emoji 圖示為純文字
  // ----------------------------------------
  const emojiMap = {
    '📤': '↗',
    '🗺': '',
    '📋': '',
    '⚙': '',
    '🔄': '',
    '✏': '',
    '↺': '',
    '🔽': '',
    '▾': '',
    '↗': '',
    '➤': '→',
    '✕': '×',
    '💡': '·',
    '📞': '·',
    '📍': '·',
  };

  function stripEmojiInText(text) {
    if (!text) return text;
    let s = text;
    Object.entries(emojiMap).forEach(([e, r]) => {
      s = s.split(e).join(r);
    });
    return s.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}]/gu, '').trim();
  }

  // ----------------------------------------
  // 2. 翻譯：對 textNode 套用 emoji 移除 + i18n
  // ----------------------------------------
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const toReplace = [];
  let node;
  while (node = walker.nextNode()) {
    const original = node.nodeValue;
    let cleaned = stripEmojiInText(original);
    cleaned = trmTx(cleaned);
    if (cleaned !== original) toReplace.push({ node, cleaned });
  }
  toReplace.forEach(({ node, cleaned }) => { node.nodeValue = cleaned; });

  // 處理 input placeholder
  root.querySelectorAll('[placeholder]').forEach(el => {
    el.placeholder = trmTx(stripEmojiInText(el.placeholder));
  });
  root.querySelectorAll('[title]').forEach(el => {
    el.title = trmTx(stripEmojiInText(el.title));
  });

  // City side select options are now rendered in English directly (v0.0.8)
  // — no post-process patching needed.

  // ----------------------------------------
  // 3. 加上 resize handle 至預覽區塊
  // ----------------------------------------
  // 加上 resize handle 至 LIST PREVIEW（mapBlock 由 MAP SIZE slider 獨立控制）
  // ----------------------------------------
  ['mapBlock', 'listBlock'].forEach(blockId => {
    const block = root.querySelector('#' + blockId);
    if (!block || block.dataset.resizable === '1') return;
    block.dataset.resizable = '1';
    block.classList.add('resizable');

    const body = block.querySelector('.preview-block-body');
    if (!body) return;

    // mapBlock 不裝 resize handle — 改用 MAP SIZE slider 控制
    if (blockId === 'mapBlock') {
      // 清掉舊版可能留下的固定 height (避免影響 MAP SIZE slider)
      body.style.height = '';
      localStorage.removeItem('gt-block-h-mapBlock');
      return;
    }

    // listBlock：保留 resize handle
    const savedH = localStorage.getItem('gt-block-h-' + blockId);
    if (savedH) body.style.height = savedH + 'px';

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.title = 'Drag to resize';
    // v0.0.12 — handle lives OUTSIDE the listBlock panel, as a sibling
    // in .preview-col, so it sits in the gap below the panel border.
    block.after(handle);

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      const startY = e.clientY;
      const startH = body.getBoundingClientRect().height;
      const onMove = (ev) => {
        const newH = Math.max(120, startH + (ev.clientY - startY));
        body.style.height = newH + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        localStorage.setItem('gt-block-h-' + blockId, body.getBoundingClientRect().height);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      const startY = e.touches[0].clientY;
      const startH = body.getBoundingClientRect().height;
      const onMove = (ev) => {
        ev.preventDefault();
        const newH = Math.max(120, startH + (ev.touches[0].clientY - startY));
        body.style.height = newH + 'px';
      };
      const onUp = () => {
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
        localStorage.setItem('gt-block-h-' + blockId, body.getBoundingClientRect().height);
      };
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onUp);
    });
  });

  // 計算 MAP PREVIEW body padding，避免方框超出 scene 時被 crop
  requestAnimationFrame(() => {
    if (typeof adjustMapBodyPadding === 'function') adjustMapBodyPadding();
    if (typeof initMapZoom === 'function') initMapZoom();
  });

  // v0.0.8 — mount the hamburger + dev-panel (idempotent)
  if (typeof setupTrmDevPanel === 'function') setupTrmDevPanel();
}

// 將當前品牌的資料轉為 CSV 字串
function trmExportCSV() {
  // v6 的 data 與 currentBrand 是頂層 const，瀏覽器中可直接存取
  if (typeof currentBrand !== 'function' || typeof data === 'undefined') {
    alert('Data not ready');
    return;
  }
  const brand = currentBrand();
  const products = brand.products;
  const productMap = {};
  products.forEach(p => { productMap[p.id] = p.name; });

  // CSV 欄位
  const header = ['city', 'city_enabled', 'city_side', 'store_name', 'store_link', 'products'];
  const rows = [header];

  brand.cities.forEach(c => {
    if (c.stores.length === 0) {
      // 沒店家，但若 enabled 仍寫一行（讓使用者知道）
      if (c.enabled) {
        rows.push([c.name, '1', c.side || 'right', '', '', '']);
      }
      return;
    }
    c.stores.forEach(s => {
      const productNames = (s.products || []).map(pid => productMap[pid] || pid).join('|');
      rows.push([
        c.name,
        c.enabled ? '1' : '0',
        c.side || 'right',
        s.name,
        s.link || '',
        productNames,
      ]);
    });
  });

  // 編成 CSV (處理引號)
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell == null ? '' : cell);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }).join(',')).join('\r\n');

  // BOM 讓 Excel 正常讀中文
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${brand.name.toLowerCase().replace(/\s+/g, '-')}-stores.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// 解析 CSV
function parseCSV(text) {
  // 移除 BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let cur = [];
  let field = '';
  let inQuotes = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += ch; i++; continue;
    } else {
      if (ch === '"') { inQuotes = true; i++; continue; }
      if (ch === ',') { cur.push(field); field = ''; i++; continue; }
      if (ch === '\r') { i++; continue; }
      if (ch === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; i++; continue; }
      field += ch; i++; continue;
    }
  }
  // 最後一個欄位
  if (field !== '' || cur.length > 0) { cur.push(field); rows.push(cur); }
  return rows;
}

// 從 CSV 匯入到當前品牌
function trmImportCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const rows = parseCSV(text);
      if (rows.length < 2) {
        alert('CSV is empty or invalid');
        return;
      }

      const header = rows[0].map(h => h.trim().toLowerCase());
      const idx = {
        city: header.indexOf('city'),
        enabled: header.indexOf('city_enabled'),
        side: header.indexOf('city_side'),
        name: header.indexOf('store_name'),
        link: header.indexOf('store_link'),
        products: header.indexOf('products'),
      };
      if (idx.city < 0 || idx.name < 0) {
        alert('CSV must contain at least "city" and "store_name" columns');
        return;
      }

      const brand = currentBrand();
      // 建立 product 名稱 → id 對應
      const productNameToId = {};
      brand.products.forEach(p => { productNameToId[p.name] = p.id; });

      // 重置當前品牌的 cities (保留結構，清空 stores 與 enabled)
      brand.cities.forEach(c => {
        c.stores = [];
        c.enabled = false;
      });

      const cityMap = {};
      brand.cities.forEach(c => { cityMap[c.name] = c; });

      let added = 0, missing = 0, newCity = 0;
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        if (row.length === 0 || (row.length === 1 && row[0].trim() === '')) continue;
        const cityName = (row[idx.city] || '').trim();
        if (!cityName) continue;

        let city = cityMap[cityName];
        if (!city) {
          // 新增此縣市（如使用者 CSV 中有額外縣市）
          city = {
            id: 'c_csv_' + Date.now() + '_' + r,
            name: cityName,
            enabled: true,
            side: idx.side >= 0 ? (row[idx.side] || 'right') : 'right',
            pos: null,
            anchorOverride: null,
            stores: [],
          };
          brand.cities.push(city);
          cityMap[cityName] = city;
          newCity++;
        }

        // 套用 enabled / side
        if (idx.enabled >= 0) {
          city.enabled = ['1', 'true', 'yes', 'y', 't'].includes((row[idx.enabled] || '').trim().toLowerCase());
        }
        if (idx.side >= 0 && row[idx.side]) {
          city.side = row[idx.side].trim();
        }

        const storeName = (row[idx.name] || '').trim();
        if (!storeName) continue;  // 沒店名跳過（可能是只設 enabled 但無 store）

        // 啟用城市
        city.enabled = true;

        // 解析產品
        const productsCsv = idx.products >= 0 ? (row[idx.products] || '').trim() : '';
        const productIds = [];
        if (productsCsv) {
          productsCsv.split('|').forEach(pn => {
            const trimmed = pn.trim();
            if (productNameToId[trimmed]) {
              productIds.push(productNameToId[trimmed]);
            } else if (trimmed) {
              missing++;
            }
          });
        }

        city.stores.push({
          id: 's_csv_' + Date.now() + '_' + r,
          name: storeName,
          link: idx.link >= 0 ? (row[idx.link] || '').trim() : '',
          products: productIds,
        });
        added++;
      }

      // 重新渲染
      if (typeof window.render === 'function') window.render();

      let msg = `Imported ${added} stores`;
      if (newCity) msg += ` · added ${newCity} new cities`;
      if (missing) msg += ` · ${missing} unknown product names`;
      alert(msg);
    } catch (err) {
      alert('CSV parse error: ' + err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

// 暴露給 onclick 使用
window.trmExportCSV = trmExportCSV;
window.trmImportCSV = trmImportCSV;

  // 儲存
  localStorage.setItem('gt-map-zoom', percent);
  // 重算連線（scene 尺寸變了）+ 重算 padding
  setTimeout(() => {
    if (typeof window.updateConnectorsToActualBoxes === 'function') {
      window.updateConnectorsToActualBoxes();
    }
    if (typeof adjustMapBodyPadding === 'function') adjustMapBodyPadding();
  }, 50);
}
window.updateMapZoom = updateMapZoom;

// 初始化 slider 值
function initMapZoom() {
  const saved = localStorage.getItem('gt-map-zoom') || '70';
  const slider = document.getElementById('mapZoomSlider');
  if (slider) {
    slider.value = saved;
    updateMapZoom(saved);
  }
  // CANVAS SIZE
  const savedC = localStorage.getItem('gt-canvas-size') || '100';
  const canvasSlider = document.getElementById('canvasSizeSlider');
  if (canvasSlider) {
    canvasSlider.value = savedC;
    updateCanvasSize(savedC);
  }
  // PREVIEW HEIGHT
  const savedP = localStorage.getItem('gt-preview-height') || '100';
  const phSlider = document.getElementById('previewHeightSlider');
  if (phSlider) {
    phSlider.value = savedP;
    updatePreviewHeight(savedP);
  }
}
window.initMapZoom = initMapZoom;

// 控制 MAP PREVIEW 整個區塊高度（黑框隨之變高）
// 取得兩個 slider 對應的當前 px 值
function _canvasPxFromPercent(p) { return Math.round(700 * p / 100); }
function _previewPxFromPercent(p) { return Math.round(750 * p / 100); }
function _canvasPercentFromPx(px) { return Math.round(px * 100 / 700); }
function _previewPercentFromPx(px) { return Math.round(px * 100 / 750); }

function updatePreviewHeight(percent) {
  const root = document.querySelector('.tool-trm');
  if (!root) return;

  // 取得當前 CANVAS SIZE 對應 px，PREVIEW HEIGHT 不可小於它
  const canvasSlider = document.getElementById('canvasSizeSlider');
  const canvasPercent = canvasSlider ? parseInt(canvasSlider.value) : 100;
  const canvasPx = _canvasPxFromPercent(canvasPercent);
  const minPreviewPercent = _previewPercentFromPx(canvasPx);

  // 強制 PREVIEW HEIGHT ≥ CANVAS SIZE
  let p = parseInt(percent);
  if (p < minPreviewPercent) p = minPreviewPercent;
  // 同步 slider value (使用者可能拉太小，自動回彈)
  const phSlider = document.getElementById('previewHeightSlider');
  if (phSlider && parseInt(phSlider.value) !== p) {
    phSlider.value = p;
  }
  // 動態設定 min 屬性（拉桿視覺顯示也跟著限制）
  if (phSlider) phSlider.min = minPreviewPercent;

  const px = _previewPxFromPercent(p);
  root.style.setProperty('--preview-height', px + 'px');
  const label = document.getElementById('previewHeightValue');
  if (label) label.textContent = p + '%';
  localStorage.setItem('gt-preview-height', p);
  setTimeout(() => {
    if (typeof window.updateConnectorsToActualBoxes === 'function') {
      window.updateConnectorsToActualBoxes();
    }
  }, 50);
}
window.updatePreviewHeight = updatePreviewHeight;

// 控制 MAP PREVIEW 整體可用高度（畫布大小）
function updateCanvasSize(percent) {
  const root = document.querySelector('.tool-trm');
  if (!root) return;
  const p = parseInt(percent);
  const px = _canvasPxFromPercent(p);

  // 先同步 canvas slider value (確保後續讀取一致)
  const canvasSlider = document.getElementById('canvasSizeSlider');
  if (canvasSlider && parseInt(canvasSlider.value) !== p) {
    canvasSlider.value = p;
  }

  root.style.setProperty('--canvas-size', px + 'px');
  const label = document.getElementById('canvasSizeValue');
  if (label) label.textContent = p + '%';
  localStorage.setItem('gt-canvas-size', p);

  // CANVAS SIZE 變大可能超過 PREVIEW HEIGHT → 連動把 PREVIEW HEIGHT 撐大
  const phSlider = document.getElementById('previewHeightSlider');
  if (phSlider) {
    const currentPhPercent = parseInt(phSlider.value);
    const currentPhPx = _previewPxFromPercent(currentPhPercent);
    const minPhPercent = _previewPercentFromPx(px);
    if (currentPhPx < px) {
      // 強制把 PREVIEW HEIGHT 拉到至少等於 CANVAS SIZE
      phSlider.value = minPhPercent;
      updatePreviewHeight(minPhPercent);
    } else {
      // 只更新 min 屬性
      phSlider.min = minPhPercent;
    }
  }

  setTimeout(() => {
    if (typeof window.updateConnectorsToActualBoxes === 'function') {
      window.updateConnectorsToActualBoxes();
    }
  }, 50);
}
window.updateCanvasSize = updateCanvasSize;
