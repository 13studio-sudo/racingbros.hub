  if(initRot){ el.dataset.rotation=String(initRot); el.style.transform=`rotate(${initRot}deg)`; }

  const etb=document.createElement('div'); etb.className='etb';
  if(opts.type==='text'){
    etb.innerHTML=`<span style="font-size:9px;color:var(--text3);margin-right:1px">FS</span>
      <input class="fs-in" type="number" value="13" min="1">
      <button class="etbb" data-edit>EDIT</button>
      <button class="etbb xbtn" data-xdel>DEL</button>`;
  } else if(opts.type==='table'){
    etb.innerHTML=`<button class="etbb" data-tbl-zout title="Shrink table 5%">−</button>
      <span class="zoom-pct-wrap" title="Table scale (dbl-click to type)"><input class="cell-zpct" type="number" min="25" max="400" step="5" value="100" readonly>%</span>
      <button class="etbb" data-tbl-zin title="Enlarge table 5%">+</button>
      <button class="etbb" data-tbl-edit title="Edit CSV">EDIT</button>
      <button class="etbb xbtn" data-xdel>DEL</button>`;
  } else {
    /* IMAGE and VEC cels share the same toolbar (rotation + delete).
       v0.3.2: IMAGE cels additionally get a per-cel WHITE → TRANSPARENT
       toggle ("BG"). VEC cels skip it — SVG already supports
       transparency natively, and pixel-based punching would just
       rasterise a vector for no gain. */
    const bgBtn = opts.type==='image'
      ? `<button class="etbb bg-btn" data-bg-transp title="White → Transparent (per-cel)">BG</button>`
      : '';
    etb.innerHTML=`<span class="rot-deg" title="Rotation (degrees)">${Math.round(initRot)}°</span>
      <button class="etbb" data-rot-reset title="Reset rotation to 0°">↺</button>
      ${bgBtn}

    opts.type==='image'?'cel-img':
    opts.type==='vec'  ?'cel-vec':

      img.src=opts.src;

    /* EDIT opens a textarea in a modal-lite overlay so the CSV can be tweaked
       in place. Cheap and effective without inventing yet another UI panel. */
    etb.querySelector('[data-tbl-edit]')?.addEventListener('click',e=>{
      e.stopPropagation();
      const cur=el.dataset.csv||'';
      const next=prompt('Edit CSV data:',cur);
      if(next!=null){
        el.dataset.csv=next;
        inner.dataset.csv=next;
        inner.innerHTML=csvToTableHTML(next, el.dataset.colAlign||'', el.dataset.csvVariant);
        applyTblCelStyle(el);
        /* Table dimensions just changed — re-apply current scale so the
           outline tightens around the new content. RAF so the rebuilt
           DOM is laid out first. */
        requestAnimationFrame(()=>{
          const sbid=el.dataset.sourceBid;
          if(sbid && $('sb-'+sbid)) applyBoxTblScale(sbid);
          else syncTableCelToScale(el,parseFloat(el.dataset.cellScale)||1);
        });
      }
    });

    /* Per-cel zoom: +/- writes the new scale onto the cel's SOURCE BOX
       (sb-{sourceBid}.dataset.tblScale), then calls applyBoxTblScale so
       every sibling cel from that source AND the source box's display all
       reflect the same value — the "connected scale" UX shown in pic 2.
       For orphan cels (no sourceBid — e.g. after source deletion) we fall
       back to writing the scale directly via syncTableCelToScale. */
    function setCelScale(scale){
      scale=Math.min(4,Math.max(0.25,scale));
      const sbid=el.dataset.sourceBid;
      const box=sbid?$('sb-'+sbid):null;
      if(box){
        box.dataset.tblScale=String(scale);
        applyBoxTblScale(sbid);
      } else {
        /* Orphan cel — apply only to this cel */
        syncTableCelToScale(el,scale);
      }
    }
    function curCelScale(){
      const sbid=el.dataset.sourceBid;
      const box=sbid?$('sb-'+sbid):null;
      if(box){ return parseFloat(box.dataset.tblScale)||1; }
      return parseFloat(el.dataset.cellScale)||1;
    }
    etb.querySelector('[data-tbl-zin]')?.addEventListener('click',e=>{
      e.stopPropagation();
      setCelScale(Math.round((curCelScale()+0.05)*20)/20);
    });
    etb.querySelector('[data-tbl-zout]')?.addEventListener('click',e=>{
      e.stopPropagation();
      setCelScale(Math.round((curCelScale()-0.05)*20)/20);
    });
    /* Dbl-click the percent display to type a value (mirrors the CSV-box
       widget). Mousedown is stopped so the cel doesn't enter drag-move when
       the user clicks INSIDE the toolbar input. */
    const celPct=etb.querySelector('.cell-zpct');
    if(celPct){
      celPct.addEventListener('mousedown',ev=>ev.stopPropagation());
      const commitCellPct=()=>{
        let v=parseInt(celPct.value);
        if(isNaN(v)) v=Math.round(curCelScale()*100);
        v=Math.max(25,Math.min(400,v));
        celPct.value=v;
        celPct.setAttribute('readonly','');
        celPct.blur();
        setCelScale(v/100);
      };
      celPct.addEventListener('dblclick',ev=>{
        ev.stopPropagation();
        celPct.removeAttribute('readonly');
        celPct.focus(); celPct.select();
      });
      celPct.addEventListener('blur',()=>{ if(!celPct.hasAttribute('readonly')) commitCellPct(); });
      celPct.addEventListener('keydown',ev=>{
        if(ev.key==='Enter'){ ev.preventDefault(); commitCellPct(); }
        else if(ev.key==='Escape'){
          ev.preventDefault();
          celPct.value=Math.round(curCelScale()*100);
          celPct.setAttribute('readonly','');
          celPct.blur();
        }
      });
    }
    /* After the .pub-tbl is laid out, sync the cel's bounding-box to the
       current effective scale so the outline matches the visible content
       even on first paint (pre-existing source-box scale, e.g. dropped
       into a 300dpi tab where the box is pre-set to 320%). */
    requestAnimationFrame(()=>{
      const sbid=el.dataset.sourceBid;
      const box=sbid?$('sb-'+sbid):null;
      if(box) applyBoxTblScale(sbid);
      else    syncTableCelToScale(el,parseFloat(el.dataset.cellScale)||1);
    });
  } else {
    const inner=document.createElement('div'); inner.className='cel-text-inner';

    // LABEL badge
    const lbl=document.createElement('div'); lbl.className='cel-label-el';
    lbl.textContent=opts.label||'';
    lbl.style.background=opts.labelColor||'#C41E33';
    lbl.style.display=(opts.label&&opts.label.trim())?'inline-block':'none';
    inner.appendChild(lbl);

    const titleRow=document.createElement('div'); titleRow.className='cel-title-row';
    const t=document.createElement('div'); t.className='cel-title-el'; t.textContent=opts.title||'';
    const s=document.createElement('div'); s.className='cel-sub-el';   s.textContent=opts.sub||'';
    titleRow.appendChild(t); titleRow.appendChild(s);
    inner.appendChild(titleRow);
    const b=document.createElement('div'); b.className='cel-body-el';  b.textContent=opts.body||'';
    [t,s,b].forEach(e=>e.setAttribute('contenteditable','false'));
    inner.appendChild(b);
    el.appendChild(inner);

    const setEdit=v=>[lbl,t,s,b].forEach(e=>e.setAttribute('contenteditable',v?'true':'false'));
    /* Focus a row that can actually take focus. The label is display:none
       whenever it's empty (.cel-label-el:empty), so lbl.focus() silently
       fails on title/body-only cels — and the blur handler below then flips
       edit mode straight back off because document.activeElement never landed
       inside the cel. Pick the first VISIBLE row, preferring one with text,
       and drop the caret into it so typing works immediately. */
    function focusEditable(){
      const rows=[lbl,t,s,b].filter(e=>e.offsetParent!==null);
      const target=rows.find(e=>e.textContent.trim())||rows[0]||t;
      target.focus();
      const sel=window.getSelection&&window.getSelection();
      if(sel&&target.firstChild){
        const r=document.createRange();
        r.selectNodeContents(target); r.collapse(false);
        sel.removeAllRanges(); sel.addRange(r);
      }
    }
    // Auto-resize element on content change
    function autoResizeCel(){
      const inner=el.querySelector('.cel-text-inner');
      if(inner){
        el.style.height='auto';
        el.style.height=(inner.scrollHeight+12)+'px';
      }
    }
    [lbl,t,s,b].forEach(e=>e.addEventListener('input',autoResizeCel));
    el.addEventListener('dblclick',()=>{ setEdit(true); focusEditable(); });
    [lbl,t,s,b].forEach(e=>e.addEventListener('blur',()=>{
      setTimeout(()=>{
        if(!el.contains(document.activeElement)){
          setEdit(false);
          lbl.style.display=lbl.textContent.trim()?'inline-block':'none';
        }
      },80);
    }));
    const fsIn=etb.querySelector('.fs-in');
    if(fsIn) fsIn.addEventListener('input',()=>{
      const v=parseInt(fsIn.value)||13;
      lbl.style.fontSize=Math.max(9,v-4)+'px';
      t.style.fontSize=v+'px'; s.style.fontSize=Math.max(8,v-2)+'px'; b.style.fontSize=Math.max(7,v-3)+'px';
    });
    /* Apply opts.fontSize at creation time (used by 300dpi drop default and
       by ZIP import restoring a saved fontSize). dispatchInput triggers the
       handler above so all four text rows get sized in one shot. */
    if(opts.fontSize && fsIn){
      fsIn.value=opts.fontSize;
      fsIn.dispatchEvent(new Event('input'));
    }
    etb.querySelector('[data-edit]')?.addEventListener('click',()=>{ setEdit(true); focusEditable(); });
  }

  /* resize handles — four corners. Table cels have their box auto-sized
     from scaled content (see applyBoxTblScale), so we skip the handles
     there entirely. Each corner pins the OPPOSITE corner in place and
     adjusts width/height plus left/top as needed. */
  if(opts.type!=='table'){
    addCornerHandles(el,cv);
  }

  etb.querySelector('[data-xdel]').addEventListener('click',()=>el.remove());

  /* move (selection only — z-order is now controlled by SOURCES panel order;
     restackBySources() runs on reorder / drop / import / autoLayout)
     Snap: during drag, the cel's left/right/center is checked against the
     canvas centerline and every other visible cel's edges & centers. Within
     SNAP_PX it snaps and shows a magenta guide line. Hold Alt to bypass.
     Multi-select: Shift+click toggles this cel's selection without dropping
     the others. A plain click on a cel that is ALREADY in the selection
     leaves the selection intact (so the user can drag the whole group);
     a plain click on a non-selected cel deselects everything else first. */
  el.addEventListener('mousedown',e=>{
    if(e.target.closest('.etb')||e.target.closest('.rc')||e.target.closest('.rot-h')) return;
    /* Don't start a drag / preventDefault when the pointer is inside an
       editable region. closest() (not a direct getAttribute) so clicks that
       land on a nested node still match, and calling preventDefault here would
       otherwise suppress the browser's native text selection — including the
       double-click word-select and click-drag range-select gestures. */
    if(e.target.closest('[contenteditable="true"]')||(el.querySelector('[contenteditable="true"]')&&e.target.closest('.cel-text-inner'))) return;
    e.preventDefault();
    /* v0.3.9: group-aware selection. Done synchronously here (not via
       capture-phase microtask) because the selCels capture below runs
       in this same handler — a deferred expansion would happen AFTER
       selCels was already snapshotted and the drag would still only
       move the clicked cel. */
    const gid=el.dataset.groupId;
    if(e.shiftKey){
      if(gid){
        /* Toggle the entire group together. If any member is already
           selected, turning OFF turns them all off; if all are off,
           turning ON adds the whole group to the current selection. */
        const members=cv.querySelectorAll('.cel[data-group-id="'+gid+'"]');
        const turnOff=el.classList.contains('sel');
        members.forEach(m=>{
          if(turnOff) m.classList.remove('sel');
          else m.classList.add('sel');
        });
        if(turnOff) return;
      } else {
        el.classList.toggle('sel');
        if(!el.classList.contains('sel')) return;
      }
    } else {
      if(!el.classList.contains('sel')){
        deselectAll();
        el.classList.add('sel');
        /* Plain click on a grouped cel: pull every group member into
           the new selection so the drag moves the whole group. */
        if(gid){
          cv.querySelectorAll('.cel[data-group-id="'+gid+'"]').forEach(m=>m.classList.add('sel'));
        }
      } else if(gid){
        /* Cel was already selected (e.g. as part of a group from a
           previous click). Ensure every group sibling is selected too,
           in case the selection got out of sync. */
        cv.querySelectorAll('.cel[data-group-id="'+gid+'"]').forEach(m=>m.classList.add('sel'));
      }
    }
    /* Group drag: capture every selected cel's start position so we can
       translate them all by the same delta. The "primary" cel is the one
       under the cursor; snap-guide lookups still happen against it only. */
    const selCels=Array.from(cv.querySelectorAll('.cel.sel'));
    const startPos=selCels.map(c=>({c,ox:parseInt(c.style.left)||0,oy:parseInt(c.style.top)||0}));
    const sx=e.clientX,sy=e.clientY;
    /* Same visual→native conversion as the resize handle: the cursor delta
       is in visual px, the cel's left/top are in native px. */
    const _s=cvScale(cv);
    /* Pre-compute guide pools ONCE per drag — they don't change while a
       single cel is being dragged, and recomputing every mousemove was
       reading every other cel's geometry on every frame.
       Snap is disabled for multi-drag (would fight per-cel snapping
       and produce confusing jumps). */
    const isMulti=selCels.length>1;
    const guides=isMulti?null:collectSnapGuides(cv,el);
    /* v0.3.6: precompute the visual-vs-layout offsets for the primary
       cel. For an UNROTATED cel these are (0, 0) and the snap math
       reduces to the prior layout-edge snap exactly. For a rotated
       cel the visual AABB is narrower-and-taller (or vice versa)
       than the layout box, and the offsets carry the difference so
       snapAxis tests the VISIBLE edges against the (visible) guides. */
    const _vbox=isMulti?null:getVisualBBox(el);
    const _vOffX=_vbox?_vbox.vl-_vbox.l:0;
    const _vOffY=_vbox?_vbox.vt-_vbox.t:0;
    const _vw=_vbox?_vbox.vw:0;
    const _vh=_vbox?_vbox.vh:0;
    /* Shift = axis lock: once the user has moved a few px in one direction,
       lock onto that axis until they release Shift. Releasing Shift resets
       so a fresh re-press picks the new dominant direction.
       Conflict with shift-click selection toggle resolved by: shift-toggle
       only happens on mousedown (event landed above); subsequent shift
       during drag is interpreted as axis-lock as long as the mouse stayed
       down. */
    let lockedAxis=null;
    const mm=ev=>{
      let dx=(ev.clientX-sx)/_s, dy=(ev.clientY-sy)/_s;
      if(ev.shiftKey){
        if(!lockedAxis && (Math.abs(dx)>3 || Math.abs(dy)>3)){
          lockedAxis = Math.abs(dx)>Math.abs(dy) ? 'x' : 'y';
        }
        if(lockedAxis==='x') dy=0;
        else if(lockedAxis==='y') dx=0;
      } else {
        lockedAxis=null;
      }
      let snapX=null, snapY=null;
      if(!isMulti){
        /* Single-cel drag uses guides; do the snap math against the
           primary cel's VISUAL edges (v0.3.6 — was layout edges). */
        let nx=startPos[0].ox+dx, ny=startPos[0].oy+dy;
        if(!ev.altKey){
          const r=snapAxis(nx+_vOffX, _vw, guides.v);
          if(r){ nx=r.pos-_vOffX; snapX=r.guide; dx=nx-startPos[0].ox; }
          const r2=snapAxis(ny+_vOffY, _vh, guides.h);
          if(r2){ ny=r2.pos-_vOffY; snapY=r2.guide; dy=ny-startPos[0].oy; }
        }
      }
      /* Apply final delta to every selected cel */
      for(const p of startPos){
        p.c.style.left=(p.ox+dx)+'px';
        p.c.style.top =(p.oy+dy)+'px';
      }
      showSnapGuides(cv,snapX,snapY);
    };
    const mu=()=>{
      document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu);
      showSnapGuides(cv,null,null); // clear
    };
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });

  cv.appendChild(el);
  /* v0.3.7: if the cel was created with non-zero rotation (e.g. from
     an imported manifest), the etb needs a one-shot re-position once
     the browser has laid it out (offsetWidth/Height must be > 0).
     Schedule via requestAnimationFrame so we don't force a sync
     reflow during addCel itself. No-op for unrotated cels. */
  if(parseFloat(el.dataset.rotation)){
    requestAnimationFrame(()=>updateEtbForRotation(el));
  }
  /* Layer order: new cels always go to the FRONT (highest z) by default.
     Caller can override with opts.zIndex (used by ZIP import to restore
     exact saved order). The LAYERS panel can then re-arrange after the
     fact — SOURCES order no longer influences this. */
  if(opts.zIndex!=null){
    el.style.zIndex=String(opts.zIndex);
  } else {
    const others=Array.from(cv.querySelectorAll('.cel')).filter(c=>c!==el);
    const maxZ=others.reduce((m,c)=>{const z=parseInt(c.style.zIndex);return isNaN(z)?m:Math.max(m,z);},0);
    el.style.zIndex=String(maxZ+1);
  }
  // Auto-size text elements to fit content
  if(opts.type==='text'){
    requestAnimationFrame(()=>{
      const inner=el.querySelector('.cel-text-inner');
      if(inner){
        el.style.height='auto'; // let it expand
        el.style.height=(inner.scrollHeight+12)+'px';
      }
    });
  }
  return el;
}

function deselectAll(){
  document.querySelectorAll('.cel.sel').forEach(e=>e.classList.remove('sel'));
  /* v0.3.7: a deselect always hides the text-cel toolbar — there's no
     longer a selected TXT cel to act on. refreshTxtCtlToolbar reads the
     active tab's selection state and shows/hides accordingly.
     v0.3.9: same for the VEC-cel toolbar. */
  if(state.active){
    refreshTxtCtlToolbar(state.active);
    refreshVecCtlToolbar(state.active);
    refreshTblCtlToolbar(state.active);  // v0.4.0
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   ══ TEXT-CEL TOOLBAR (v0.3.7) ══
   Per-element FONT / FONT-SIZE / TRACKING controls in the layout topbar.

   Three pieces:
     1. State           — which TXT cel + which sub-element (label/title/
                          sub/body) the inputs currently target, plus a
                          stashed Range so character-level edits (tracking)
                          survive the focus shift to the toolbar inputs.
     2. Target tracking — focusin/click listeners on each sub-element
                          update the target. The TARGET pill (BODY etc.)
                          is also clickable to cycle through without
                          having to enter contenteditable mode first.
     3. Input handlers  — FONT-family / FONT-SIZE / TRACKING. Tracking
                          applies to the live text selection when one
                          exists, otherwise to the whole sub-element.

   The toolbar is per-tab (each .lt-topbar gets its own .txt-ctl) so
   tab-switching naturally swaps which controls are visible. State is
   global (one focused cel/sub at a time) because at most one cel can
   be selected for editing at any moment.
   ═══════════════════════════════════════════════════════════════════════ */

/* Last-saved text Range inside a contenteditable sub-element. Updated
   on every selectionchange that lands inside a TXT cel's editable sub-
   element. Used when applying TRACKING so that the user's character-
   level highlight isn't lost when focus moves to the toolbar number
   input. */
let _txtCtlSavedRange = null;
/* Which sub-element kind the toolbar inputs target. One of 'label' /
   'title' / 'sub' / 'body'. Default 'body' — most common edit target. */
let _txtCtlTarget = 'body';
const _txtCtlKinds = ['label','title','sub','body'];

function _txtCtlSubElForCel(cel, kind){
  if(!cel) return null;
  return cel.querySelector('.cel-'+kind+'-el');
}

/* True iff the currently-selected cel in `tabId` is a single TXT cel. */
function _txtCtlActiveCel(tabId){
  const cv=$('cv-'+tabId);
  if(!cv) return null;
  const sels=cv.querySelectorAll('.cel.sel');
  if(sels.length!==1) return null;          // 0 or multi-select → no toolbar
  const cel=sels[0];
  if(!cel.classList.contains('cel-txt')) return null;
  return cel;
}

function initTextCtlToolbar(tabId){
  const fontSel=$('txt-ctl-font-'+tabId);
  const fsIn   =$('txt-ctl-fs-'+tabId);
  const trIn   =$('txt-ctl-tr-'+tabId);
  const tgtBtn =$('txt-ctl-target-'+tabId);
  if(!fontSel||!fsIn||!trIn||!tgtBtn) return;

  /* Populate FONT dropdown from the PUBSYS_FONTS registry. */
  fontSel.innerHTML=PUBSYS_FONTS.map((f,i)=>
    `<option value="${i}" style="font-family:${f.stack}">${f.label}</option>`
  ).join('');

  /* TARGET pill — clicking cycles label→title→sub→body→label.
     Useful when the cel isn't in edit mode (sub-elements aren't
     contenteditable yet so focusin listeners can't fire on click). */
  tgtBtn.addEventListener('click',()=>{
    const i=_txtCtlKinds.indexOf(_txtCtlTarget);
    _txtCtlTarget=_txtCtlKinds[(i+1)%_txtCtlKinds.length];
    refreshTxtCtlToolbar(tabId);
  });

  /* FONT change — writes inline font-family on the targeted sub-element. */
  fontSel.addEventListener('change',()=>{
    const cel=_txtCtlActiveCel(tabId);
    const sub=_txtCtlSubElForCel(cel,_txtCtlTarget);
    if(!sub) return;
    const stack=PUBSYS_FONTS[parseInt(fontSel.value)||0]?.stack;
    if(stack) sub.style.fontFamily=stack;
  });

  /* v0.4.0: COLOR applies to the LABEL only — it sets the label pill's
     BACKGROUND. Title / Sub / Body text is always black and the label's own
     text is always white, so the swatch is inert for non-label targets. */
  const colorIn=$('txt-ctl-color-'+tabId);
  if(colorIn){
    const applyColor=()=>{
      if(_txtCtlTarget!=='label') return;
      const cel=_txtCtlActiveCel(tabId);
      const sub=_txtCtlSubElForCel(cel,'label');
      if(sub) sub.style.background=colorIn.value;
    };
    colorIn.addEventListener('input',applyColor);
    colorIn.addEventListener('change',applyColor);
  }

  /* FONT SIZE input — writes inline font-size on the targeted sub-
     element. Overrides the proportional formula the .etb FS input uses
     (where base FS = title size and label/sub/body are derived). The
     existing .etb FS still works on the cel as a whole; this input is
     per-sub-element. */
  fsIn.addEventListener('input',()=>{
    const cel=_txtCtlActiveCel(tabId);
    const sub=_txtCtlSubElForCel(cel,_txtCtlTarget);
    if(!sub) return;
    const v=parseInt(fsIn.value);
    if(!isNaN(v)&&v>0) sub.style.fontSize=v+'px';
  });

  /* TRACKING (letter-spacing) — applies to the currently-selected
     character range when one exists inside the targeted sub-element;
     otherwise applies to the whole sub-element.

     The saved Range mechanism (selectionchange handler below) is what
     makes per-character editing possible: when the user types into
     the TRK number input, focus leaves the contenteditable and the
     live Selection collapses, but _txtCtlSavedRange still points at
     the user's last highlight. We wrap the contents of that Range in
     a <span style="letter-spacing:..."> so only the highlighted
     characters get the new tracking.

     Units: input value is "per mille em" — 50 means 0.05em. This puts
     useful tracking values in friendly small-integer territory. */
  trIn.addEventListener('input',()=>{
    const cel=_txtCtlActiveCel(tabId);
    const sub=_txtCtlSubElForCel(cel,_txtCtlTarget);
    if(!sub) return;
    const v=parseFloat(trIn.value);
    if(isNaN(v)) return;
    const ls=(v/1000).toFixed(4)+'em';
    /* Use the saved Range if it's non-collapsed AND lies inside the
       same targeted sub-element. */
    const r=_txtCtlSavedRange;
    let rangeOk=false;
    if(r && !r.collapsed){
      const anc=r.commonAncestorContainer;
      const ancEl=anc.nodeType===1?anc:anc.parentElement;
      if(ancEl && sub.contains(ancEl)) rangeOk=true;
    }
    if(rangeOk){
      /* If the saved range exactly covers the contents of an existing
         tracking span (i.e. the user just wrapped on a previous
         keystroke and is now typing additional digits), update that
         span's letter-spacing in place instead of nesting another
         wrap. Without this, rapid keystrokes (e.g. typing "150" while
         the same selection is live) would produce <span><span><span>…
         all carrying their own letter-spacing — visually fine because
         CSS only honours the inner-most value, but it inflates the
         DOM. */
      if(r.startContainer===r.endContainer &&
         r.startContainer.nodeType===1 &&
         r.startContainer.classList?.contains('_txt-trk') &&
         r.startOffset===0 &&
         r.endOffset===r.startContainer.childNodes.length){
        r.startContainer.style.letterSpacing=ls;
        return;
      }
      try{
        const span=document.createElement('span');
        span.className='_txt-trk';
        span.style.letterSpacing=ls;
        const frag=r.extractContents();
        span.appendChild(frag);
        r.insertNode(span);
        /* Re-select the wrapped span so subsequent tracking changes
           stack predictably — without re-selecting, the next change
           wraps the previous wrap in ANOTHER span. */
        const nr=document.createRange();
        nr.selectNodeContents(span);
        const sel=window.getSelection();
        sel.removeAllRanges(); sel.addRange(nr);
        _txtCtlSavedRange=nr.cloneRange();
      }catch(err){ console.warn('TRK apply failed',err); }
    } else {
      sub.style.letterSpacing=ls;
    }
  });

  /* Suppress browser auto-step on Up/Down — we want explicit number
     typing only, since stepping while a Range is saved triggers many
     wraps in quick succession. */
  trIn.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='ArrowDown') e.preventDefault();
  });

  /* v0.3.8 — alignment trio. Writes inline text-align on the targeted
     sub-element, which the existing v0.3.8 export/copy path already
     captures via getAttribute('style'). The .act highlight is updated
     by refreshTxtCtlToolbar reading the computed text-align.

     EXCEPT for title/sub: those live inside a display:flex
     .cel-title-row, where flex items are content-width by default and
     text-align on them has NO visible effect. For those targets we
     write justify-content on the .cel-title-row instead (left→flex-
     start, center→center, right→flex-end). Both TITLE and SUB pills
     bind to the same row alignment — they're physically in the same
     flex container so independent values aren't possible anyway. */
  const _alignToJustify={left:'flex-start',center:'center',right:'flex-end'};
  ['al','ac','ar'].forEach(suf=>{
    const btn=$('txt-ctl-'+suf+'-'+tabId);
    if(!btn) return;
    btn.addEventListener('click',()=>{
      const cel=_txtCtlActiveCel(tabId);
      const sub=_txtCtlSubElForCel(cel,_txtCtlTarget);
      if(!sub) return;
      const align=btn.dataset.align;
      if(_txtCtlTarget==='title'||_txtCtlTarget==='sub'){
        const row=sub.closest('.cel-title-row');
        if(row) row.style.justifyContent=_alignToJustify[align]||'flex-start';
      } else {
        sub.style.textAlign=align;
      }
      refreshTxtCtlToolbar(tabId);
    });
  });
}

/* ── Global one-time setup for the text-cel toolbar ──
   Listens for:
     • selection changes (to keep _txtCtlSavedRange up to date)
     • clicks anywhere inside a TXT cel sub-element (to update the
       targeted sub-element so the toolbar inputs read its values).
   Mounts on script load; safe to call once. */
function setupTextCtlGlobal(){
  document.addEventListener('selectionchange',()=>{
    const sel=window.getSelection();
    if(!sel || sel.rangeCount===0) return;
    const r=sel.getRangeAt(0);
    const anc=r.commonAncestorContainer;
    const ancEl=anc.nodeType===1?anc:anc.parentElement;
    if(!ancEl) return;
    const sub=ancEl.closest('.cel-label-el,.cel-title-el,.cel-sub-el,.cel-body-el');
    if(!sub) return;
    /* Only save the Range when the sub-element is contenteditable —
       otherwise the user just happens to have a non-editing text
       selection somewhere on a cel surface, which isn't a "tracking
       target". */
    if(sub.getAttribute('contenteditable')!=='true') return;
    _txtCtlSavedRange=r.cloneRange();
    /* Update the target kind based on which sub-element the Range
       is in. */
    if(sub.classList.contains('cel-label-el')) _txtCtlTarget='label';
    else if(sub.classList.contains('cel-title-el')) _txtCtlTarget='title';
    else if(sub.classList.contains('cel-sub-el'))   _txtCtlTarget='sub';
    else if(sub.classList.contains('cel-body-el'))  _txtCtlTarget='body';
    if(state.active) refreshTxtCtlToolbar(state.active);
  });

  /* Click inside a TXT cel sub-element (even before entering edit
     mode) updates the toolbar target. focusin won't fire on non-
     editable elements, so a plain mousedown listener handles the
     pre-edit case. */
  document.addEventListener('mousedown',e=>{
    const sub=e.target.closest?.('.cel-label-el,.cel-title-el,.cel-sub-el,.cel-body-el');
    if(!sub) return;
    if(sub.classList.contains('cel-label-el')) _txtCtlTarget='label';
    else if(sub.classList.contains('cel-title-el')) _txtCtlTarget='title';
    else if(sub.classList.contains('cel-sub-el'))   _txtCtlTarget='sub';
    else if(sub.classList.contains('cel-body-el'))  _txtCtlTarget='body';
    if(state.active) requestAnimationFrame(()=>refreshTxtCtlToolbar(state.active));
  });
}
setupTextCtlGlobal();

/* Refresh the toolbar visibility + input values for `tabId`. Called on:
     • selection change (mousedown on cels via existing handlers)
     • deselectAll
     • TARGET pill cycle
     • after applying a change (so the inputs reflect the new state) */
function refreshTxtCtlToolbar(tabId){
  const wrap=$('txt-ctl-'+tabId);
  if(!wrap) return;
  const cel=_txtCtlActiveCel(tabId);
  if(!cel){ wrap.style.display='none'; return; }
  wrap.style.display='flex';

  const fontSel=$('txt-ctl-font-'+tabId);
  const fsIn   =$('txt-ctl-fs-'+tabId);
  const trIn   =$('txt-ctl-tr-'+tabId);
  const tgtBtn =$('txt-ctl-target-'+tabId);
  if(tgtBtn) tgtBtn.textContent=_txtCtlTarget.toUpperCase();

  const sub=_txtCtlSubElForCel(cel,_txtCtlTarget);
  if(!sub) return;

  const cs=getComputedStyle(sub);
  /* FONT — pick the registry entry whose stack starts with the same
     primary family name as the sub-element's current font-family. If
     no match, default to the first entry. */
  if(fontSel){
    const primary=(cs.fontFamily||'').split(',')[0].trim().replace(/^['"]|['"]$/g,'').toLowerCase();
    let idx=PUBSYS_FONTS.findIndex(f=>{
      const fp=f.stack.split(',')[0].trim().replace(/^['"]|['"]$/g,'').toLowerCase();
      return fp===primary;
    });
    if(idx<0) idx=0;
    fontSel.value=String(idx);
  }
  /* FONT SIZE — read computed value (the inline override OR the CSS
     default). parseInt strips the px suffix. */
  if(fsIn){
    const fs=parseInt(cs.fontSize)||0;
    fsIn.value=fs||'';
  }
  /* TRACKING — letter-spacing computed style is in px. Convert to
     per-mille em via the current font size. */
  if(trIn){
    const fs=parseFloat(cs.fontSize)||13;
    const lsPx=parseFloat(cs.letterSpacing);
    const em=isNaN(lsPx)?0:(lsPx/fs);
    trIn.value=Math.round(em*1000);
  }
  /* v0.3.8 — alignment trio. LABEL target: disable all three buttons
     and clear .act (label is an inline-block badge — alignment inside
     it has no visible effect). TITLE / SUB / BODY: enable, then mark
     the button whose data-align matches the EFFECTIVE alignment.
     "Effective" depends on which sub-element this is:
       - body  : text-align on the body element itself (block-level,
                 so text-align works directly).
       - title/sub : justify-content on the parent .cel-title-row,
                     because both are flex items inside a flex row
                     and text-align on a flex item that's content-
                     width has no visible effect. Reading from the
                     row's computed justify-content matches what was
                     actually written by the click handler.
     Browsers may report 'start'/'end' on logical-value resolution; PUBSYS
     is LTR-only so normalize to left/right respectively. */
  const isLabel=(_txtCtlTarget==='label');
  let alignVal='left';
  if(!isLabel){
    if(_txtCtlTarget==='title'||_txtCtlTarget==='sub'){
      const row=sub.closest('.cel-title-row');
      const rowCs=row?getComputedStyle(row):null;
      const jc=(rowCs?.justifyContent||'flex-start').toLowerCase();
      if(jc==='center') alignVal='center';
      else if(jc==='flex-end'||jc==='end'||jc==='right') alignVal='right';
      else alignVal='left';
    } else {
      let av=(cs.textAlign||'left').toLowerCase();
      if(av==='start') av='left';
      else if(av==='end') av='right';
      if(av==='center'||av==='right') alignVal=av;
      else alignVal='left';
    }
  }
  ['al','ac','ar'].forEach(suf=>{
    const btn=$('txt-ctl-'+suf+'-'+tabId);
    if(!btn) return;
    btn.disabled=isLabel;
    btn.classList.toggle('act', !isLabel && btn.dataset.align===alignVal);
  });
  /* v0.4.0: COLOR swatch is LABEL-only. Enabled + synced to the pill
     background for the label; disabled (dimmed) for title/sub/body. */
  const colorIn=$('txt-ctl-color-'+tabId);
  if(colorIn){
    colorIn.disabled=!isLabel;
    colorIn.style.opacity=isLabel?'1':'.4';
    if(isLabel) colorIn.value=_rgbToHex(cs.backgroundColor)||'#c41e33';
  }
}

/* v0.4.0: normalize a CSS colour (computed 'rgb(r, g, b)' / 'rgba(...)' or an
   existing '#rrggbb') to the '#rrggbb' an <input type="color"> requires.
   Returns '' if it can't (e.g. 'transparent'), so callers can fall back. */
function _rgbToHex(c){
  if(!c) return '';
  c=c.trim();
  if(/^#[0-9a-f]{6}$/i.test(c)) return c.toLowerCase();
  if(/^#[0-9a-f]{3}$/i.test(c)) return ('#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3]).toLowerCase();
  const m=c.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
  if(!m) return '';
  const h=n=>(+n).toString(16).padStart(2,'0');
  return ('#'+h(m[1])+h(m[2])+h(m[3])).toLowerCase();
}

/* ═══════════════════════════════════════════════════════════════════════
   ══ VEC-CEL TOOLBAR (v0.3.9) ══
   Per-cel COLOR / STROKE-WIDTH / FILL controls in the layout topbar.
   Appears when a single .cel-vec is selected. For "primitive" cels
   (line / rect / circle generated via the VEC source-box drag tiles),
   the SVG is regenerated from dataset.primType + dataset.primColor +
   dataset.primStroke + dataset.primFill on every change — so the cel
   redraws crisply at any scale. For uploaded SVGs the controls do a
   best-effort regex substitution on stroke / stroke-width / fill
   attributes in the original SVG text (saved on dataset.origSvg the
   first time the toolbar is invoked).

   The toolbar HTML lives in lt-topbar (created per tab inside the
   topbar markup); JS wiring is global since state.active determines
   which toolbar to refresh.
   ═══════════════════════════════════════════════════════════════════════ */
function buildPrimSVG(type,w,h,color,sw,fill){
  /* Generates a clean primitive SVG sized to w×h. preserveAspectRatio
     is "none" so the shape stretches to fit the cel exactly (matches
     the rest of PUBSYS's VEC handling). v0.3.9: SOLID and OUTLINED
     are mutually exclusive — solid uses fill only (no stroke);
     outlined uses stroke only (no fill). Line is always stroke. */
  const swN=parseFloat(sw)||0;
  const isSolid=(fill&&fill!=='none');
  if(type==='line'){
    /* Line: horizontal across the middle. Fill is meaningless. */
    const cy=h/2;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="${w}" height="${h}"><line x1="0" y1="${cy}" x2="${w}" y2="${cy}" stroke="${color}" stroke-width="${swN}" stroke-linecap="round"/></svg>`;
  }
  if(type==='circle'){
    /* Ellipse fills the whole cel (non-square cels render as ovals,
       per user spec). Solid mode: no stroke so user-set SW only shows
       in outlined mode. Outlined mode: inset by sw/2 so the stroke
       lands fully inside the cel. */
    if(isSolid){
      const cx=w/2, cy=h/2, rx=w/2, ry=h/2;
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="${w}" height="${h}"><ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${color}"/></svg>`;
    }
    const cx=w/2, cy=h/2, rx=Math.max(0,w/2-swN/2), ry=Math.max(0,h/2-swN/2);
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="${w}" height="${h}"><ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="none" stroke="${color}" stroke-width="${swN}"/></svg>`;
  }
  /* rect (default) */
  if(isSolid){
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="${w}" height="${h}"><rect x="0" y="0" width="${w}" height="${h}" fill="${color}"/></svg>`;
  }
  const inset=swN/2;
  const rw=Math.max(0,w-swN), rh=Math.max(0,h-swN);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="${w}" height="${h}"><rect x="${inset}" y="${inset}" width="${rw}" height="${rh}" fill="none" stroke="${color}" stroke-width="${swN}"/></svg>`;
}

function _vecCtlActiveCel(tabId){
  const cv=$('cv-'+tabId);
  if(!cv) return null;
  const sels=cv.querySelectorAll('.cel.sel');
  if(sels.length!==1) return null;
  const cel=sels[0];
  if(!cel.classList.contains('cel-vec')) return null;
  return cel;
}

/* Apply current dataset.* properties to the cel's underlying SVG.
   Primitives: regenerate from buildPrimSVG. Uploaded SVGs: regex-
   substitute stroke / stroke-width / fill in the original text. */
function _vecCtlApplyToCel(cel){
  const img=cel.querySelector('img');
  if(!img) return;
  const color=cel.dataset.primColor||'#000000';
  const sw=parseFloat(cel.dataset.primStroke);
  const fill=cel.dataset.primFill||'none';
  if(cel.dataset.primType){
    /* Primitive — regenerate from scratch, sized to the cel's current
       on-canvas dimensions so stroke insets land correctly. */
    const w=cel.offsetWidth||120, h=cel.offsetHeight||80;
    const svg=buildPrimSVG(cel.dataset.primType, w, h, color, isNaN(sw)?2:sw, fill);
    img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
  } else {
    /* Uploaded SVG — best-effort substitution. Lazily stash the
       original text on dataset.origSvg so repeated edits don't
       compound (each edit starts from the original). */
    (async()=>{
      try{
        if(!cel.dataset.origSvg){
          const r=await fetch(img.src);
          cel.dataset.origSvg=await r.text();
        }
        let svg=cel.dataset.origSvg;
        if(cel.dataset.primColor){
          /* Replace stroke="..." attributes that exist; if none, do
             nothing — uploaded SVGs may use CSS or no strokes at all,
             can't reliably retrofit. */
          svg=svg.replace(/stroke\s*=\s*"[^"]*"/gi, `stroke="${color}"`);
          if(fill!=='none'){
            svg=svg.replace(/fill\s*=\s*"(?!none)[^"]*"/gi, `fill="${color}"`);
          }
        }
        if(cel.dataset.primStroke){
          svg=svg.replace(/stroke-width\s*=\s*"[^"]*"/gi, `stroke-width="${sw}"`);
        }
        img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
      }catch(_){}
    })();
  }
}

function initVecCtlToolbar(tabId){
  const colorIn=$('vec-ctl-color-'+tabId);
  const swIn   =$('vec-ctl-sw-'+tabId);
  const fillBtn=$('vec-ctl-fill-'+tabId);
  if(!colorIn||!swIn||!fillBtn) return;

  colorIn.addEventListener('input',()=>{
    const cel=_vecCtlActiveCel(tabId); if(!cel) return;
    cel.dataset.primColor=colorIn.value;
    _vecCtlApplyToCel(cel);
  });
  swIn.addEventListener('input',()=>{
    const cel=_vecCtlActiveCel(tabId); if(!cel) return;
    const v=parseFloat(swIn.value);
    if(!isNaN(v)&&v>=0){ cel.dataset.primStroke=String(v); _vecCtlApplyToCel(cel); }
  });
  fillBtn.addEventListener('click',()=>{
    const cel=_vecCtlActiveCel(tabId); if(!cel) return;
    const curFill=cel.dataset.primFill||'none';
    cel.dataset.primFill=(curFill==='none')?'solid':'none';
    _vecCtlApplyToCel(cel);
    refreshVecCtlToolbar(tabId);
  });
}

function refreshVecCtlToolbar(tabId){
  const wrap=$('vec-ctl-'+tabId);
  if(!wrap) return;
  const cel=_vecCtlActiveCel(tabId);
  if(!cel){ wrap.style.display='none'; return; }
  wrap.style.display='flex';

  const colorIn=$('vec-ctl-color-'+tabId);
  const swIn   =$('vec-ctl-sw-'+tabId);
  const fillBtn=$('vec-ctl-fill-'+tabId);
  if(colorIn) colorIn.value=cel.dataset.primColor||'#000000';
  if(swIn)    swIn.value=cel.dataset.primStroke||'2';
  /* v0.3.9: FILL toggle is only meaningful for closed shapes (rect /
     circle / uploaded SVG). LINE primitives are stroke-only, so hide
     the button rather than show it inert — keeps the toolbar tidy. */
  if(fillBtn){
    const isLine=(cel.dataset.primType==='line');
    fillBtn.style.display=isLine?'none':'';
    if(!isLine) fillBtn.classList.toggle('act', (cel.dataset.primFill||'none')!=='none');
    else fillBtn.classList.remove('act');
  }
}

/* ══ TABLE-CEL TOOLBAR (v0.4.0) ══
   Per-column text alignment for table (CSV) cels. The COL pill targets a
   column (1..N from the cel's CSV); L/C/R write that column's code into
   cel.dataset.colAlign (a comma string keyed by raw column index) and
   re-render. Honoured by the live preview and every export path. */
let _tblCtlCol=0;  // 0-based target column, shared like _txtCtlTarget

function _tblCtlActiveCel(tabId){
  const cv=$('cv-'+tabId);
  if(!cv) return null;
  const sels=cv.querySelectorAll('.cel.sel');
  if(sels.length!==1) return null;
  return sels[0].classList.contains('cel-tbl')?sels[0]:null;
}
function _celColCount(cel){
  try{
    const rows=parseCSV(cel.dataset.csv||'');
    if(!rows.length) return 0;
    return Math.max(...rows.map(r=>r.length), 1);
  }catch(_){ return 0; }
}
function setCelColAlign(cel, ci, code){
  const arr=parseColAlign(cel.dataset.colAlign);
  while(arr.length<=ci) arr.push('');
  arr[ci]=code;
  let end=arr.length; while(end>0 && !arr[end-1]) end--;  // trim trailing empties
  cel.dataset.colAlign=arr.slice(0,end).join(',');
  const inner=cel.querySelector('.cel-tbl-inner');
  if(!inner) return;
  inner.innerHTML=csvToTableHTML(cel.dataset.csv||'', cel.dataset.colAlign, cel.dataset.csvVariant);
  applyTblCelStyle(cel);
  /* Re-apply scale exactly like the in-place CSV edit does — alignment can
     nudge column widths, so the cel outline should re-fit. */
  requestAnimationFrame(()=>{
    const sbid=cel.dataset.sourceBid;
    if(sbid && $('sb-'+sbid)) applyBoxTblScale(sbid);
    else syncTableCelToScale(cel, parseFloat(cel.dataset.cellScale)||1);
  });
}

/* v0.4.0: apply the table cel's font / title-size / cell-margin settings as
   INLINE styles on the rendered .pub-tbl. Re-run after every csvToTableHTML
   render (innerHTML replacement wipes inline styles). The live preview and the
   html2canvas PNG export honour these directly; the SVG painter re-reads them
   from the DOM (see buildTableSVGCore / buildTitledTableSVG). */
function applyTblCelStyle(cel){
  const inner=cel.querySelector('.cel-tbl-inner'); if(!inner) return;
  const tbl=inner.querySelector('.pub-tbl'); if(!tbl) return;
  if(cel.dataset.tblFont) tbl.style.fontFamily=cel.dataset.tblFont;
  if(cel.dataset.cellPad){
    const h=Math.max(1,parseFloat(cel.dataset.cellPad)||8);
    const v=Math.max(1,Math.round(h*0.5));  // keep the ~1:2 vertical:horizontal feel
    /* skip the rotated GC/SC index cells — uniform padding would distort them */
    tbl.querySelectorAll('td:not(.gc):not(.sc),th:not(.gc):not(.sc)').forEach(c=>{
      c.style.padding=v+'px '+h+'px';
    });
  }
  if(cel.dataset.titleFS){
    const t=tbl.querySelector('.ttl-row');
    if(t) t.style.fontSize=(parseFloat(cel.dataset.titleFS)||10)+'px';
  }
}

function initTblCtlToolbar(tabId){
  const colBtn=$('tbl-ctl-col-'+tabId);
  const lBtn=$('tbl-ctl-al-'+tabId), cBtn=$('tbl-ctl-ac-'+tabId), rBtn=$('tbl-ctl-ar-'+tabId);
  if(!colBtn||!lBtn||!cBtn||!rBtn) return;
  colBtn.addEventListener('click',()=>{
    const cel=_tblCtlActiveCel(tabId); if(!cel) return;
    const n=_celColCount(cel)||1;
    _tblCtlCol=(_tblCtlCol+1)%n;
    refreshTblCtlToolbar(tabId);
  });
  [['l',lBtn],['c',cBtn],['r',rBtn]].forEach(([code,btn])=>{
    btn.addEventListener('click',()=>{
      const cel=_tblCtlActiveCel(tabId); if(!cel) return;
      setCelColAlign(cel, _tblCtlCol, code);
      refreshTblCtlToolbar(tabId);
    });
  });

  /* v0.4.0: FONT — whole-table font family from the PUBSYS_FONTS registry. */
  const fontSel=$('tbl-ctl-font-'+tabId);
  if(fontSel){
    fontSel.innerHTML=PUBSYS_FONTS.map((f,i)=>
      `<option value="${i}" style="font-family:${f.stack}">${f.label}</option>`).join('');
    fontSel.addEventListener('change',()=>{
      const cel=_tblCtlActiveCel(tabId); if(!cel) return;
      const stack=PUBSYS_FONTS[parseInt(fontSel.value)||0]?.stack;
      if(stack){ cel.dataset.tblFont=stack; applyTblCelStyle(cel); _refitTblCel(cel); }
    });
  }
  /* v0.4.0: TITLE — font size of the first section (title row). */
  const fsIn=$('tbl-ctl-fs-'+tabId);
  if(fsIn){
    const commit=()=>{
      const cel=_tblCtlActiveCel(tabId); if(!cel) return;
      const v=parseInt(fsIn.value);
      if(!isNaN(v)&&v>=6){ cel.dataset.titleFS=String(v); applyTblCelStyle(cel); _refitTblCel(cel); }
    };
    fsIn.addEventListener('input',commit);
    fsIn.addEventListener('change',commit);
  }
  /* v0.4.0: MARGIN −/+ — cell padding (text-to-edge) for the whole object. */
  const decBtn=$('tbl-ctl-mdec-'+tabId), incBtn=$('tbl-ctl-minc-'+tabId);
  const bumpPad=(d)=>{
    const cel=_tblCtlActiveCel(tabId); if(!cel) return;
    const cur=parseFloat(cel.dataset.cellPad)||8;
    const next=Math.min(40,Math.max(1,cur+d));
    cel.dataset.cellPad=String(next);
    applyTblCelStyle(cel); _refitTblCel(cel);
  };
  if(decBtn) decBtn.addEventListener('click',()=>bumpPad(-2));
  if(incBtn) incBtn.addEventListener('click',()=>bumpPad(+2));
}

/* Re-fit a table cel's scale after a style change (font/title/margin can shift
   the rendered dimensions). Mirrors the CSV-edit re-fit. */
function _refitTblCel(cel){
  requestAnimationFrame(()=>{
    const sbid=cel.dataset.sourceBid;
    if(sbid && $('sb-'+sbid)) applyBoxTblScale(sbid);
    else syncTableCelToScale(cel, parseFloat(cel.dataset.cellScale)||1);
  });
}

function refreshTblCtlToolbar(tabId){
  const wrap=$('tbl-ctl-'+tabId);
  if(!wrap) return;
  const cel=_tblCtlActiveCel(tabId);
  if(!cel){ wrap.style.display='none'; return; }
  wrap.style.display='flex';
  const n=_celColCount(cel)||1;
  if(_tblCtlCol>=n) _tblCtlCol=0;
  const colBtn=$('tbl-ctl-col-'+tabId);
  if(colBtn) colBtn.textContent='COL '+(_tblCtlCol+1);
  const cur=(parseColAlign(cel.dataset.colAlign)[_tblCtlCol])||'';
  const map={l:'tbl-ctl-al-',c:'tbl-ctl-ac-',r:'tbl-ctl-ar-'};
  Object.entries(map).forEach(([code,pfx])=>{
    const b=$(pfx+tabId); if(b) b.classList.toggle('act', cur===code);
  });
  /* v0.4.0: sync FONT / TITLE controls to the cel's stored values. */
  const fontSel=$('tbl-ctl-font-'+tabId);
  if(fontSel){
    const stack=cel.dataset.tblFont;
    let idx=stack?PUBSYS_FONTS.findIndex(f=>f.stack===stack):0;
    if(idx<0) idx=0;
    fontSel.value=String(idx);
  }
  const fsIn=$('tbl-ctl-fs-'+tabId);
  if(fsIn){
    const hasTitle=!!cel.querySelector('.cel-tbl-inner .ttl-row');
    fsIn.disabled=!hasTitle;
    fsIn.style.opacity=hasTitle?'1':'.4';
    if(cel.dataset.titleFS) fsIn.value=cel.dataset.titleFS;
    else {
      const t=cel.querySelector('.cel-tbl-inner .ttl-row');
      fsIn.value=t?Math.round(parseFloat(getComputedStyle(t).fontSize))||10:10;
    }
  }
}

/* ══ FOUR-CORNER RESIZE ══
   Adds four small handles, one per corner, each anchoring the OPPOSITE
   corner in place. The math is the same for all four — we just pick
   which sign multiplies dx/dy and whether to also shift left/top.
   Canvas fit-scale handling matches the cel move handler (divide
   clientX/Y deltas by cvScale). */
function addCornerHandles(el,cv){
  const corners=[
    {cls:'rc-tl', anchorRight:true,  anchorBottom:true},
    {cls:'rc-tr', anchorRight:false, anchorBottom:true},
    {cls:'rc-bl', anchorRight:true,  anchorBottom:false},
    {cls:'rc-br', anchorRight:false, anchorBottom:false},
  ];
  for(const c of corners){
    const h=document.createElement('div');
    h.className='rc '+c.cls;
    el.appendChild(h);
    h.addEventListener('mousedown',e=>{
      e.preventDefault(); e.stopPropagation();
      const sx=e.clientX, sy=e.clientY;
      const sw=el.offsetWidth, sh=el.offsetHeight;
      const sl=parseInt(el.style.left)||0, st=parseInt(el.style.top)||0;
      const _s=cvScale(cv);
      const MIN_W=40, MIN_H=20;
      /* v0.3.6 — rotation support. The mouse delta arrives in SCREEN
         space; if the cel is rotated, the grabbed-corner handle is at a
         different VISUAL position than its layout corner, and applying
         dx/dy to layout dims directly produces the wrong direction.
         Two corrections needed:
           1. Inverse-rotate (dx, dy) into the cel's local frame to get
              the layout-axis delta the user "meant" to apply.
           2. Anchor the OPPOSITE LAYOUT corner in SCREEN space (not in
              layout space). Without (2), resizing a rotated cel makes
              it drift since changing w/h around layout-TL/BR keeps
              that layout point put but its SCREEN position changes.
              The math: new layout-TL = old anchor screen pos − R(θ)
              × X_anchor_rel_new − (nw/2, nh/2). Works for any θ.
         Side-effect: snap during resize is disabled for rotated cels —
         the snap math would need to test rotated visual edges against
         visual guides AND keep the visual anchor fixed simultaneously,
         which gets ugly. Move-snap on rotated cels still works; that's
         the common case anyway. */
      const rotDeg=parseFloat(el.dataset.rotation)||0;
      const isRot=Math.abs(rotDeg)>0.001;
      const rad=rotDeg*Math.PI/180;
      const cosR=Math.cos(rad), sinR=Math.sin(rad);
      /* sign_x = +1 if the grabbed corner is on the LAYOUT RIGHT side,
         −1 if on the LAYOUT LEFT side. Same for sign_y. The original
         code's anchorRight=true means "anchor stays on right" i.e.
         user is dragging the LEFT edge, so sign_x = −1. */
      const sign_x = c.anchorRight  ? -1 : +1;
      const sign_y = c.anchorBottom ? -1 : +1;
      /* Aspect lock for image cels — read once at drag start. The aspect
         is set by addCel on image load (h/w ratio). If absent (e.g. cel
         is mid-load and natural dims aren't known yet), fall back to the
         cel's current dimensions so resize still stays proportional. */
      const isImage=el.classList.contains('cel-img');
      /* v0.3.9b: circle primitives are aspect-locked to 1:1 — resize
         always produces a square cel, so the rendered shape stays a
         perfect circle (not an ellipse). The existing aspect-lock
         resize logic below handles the proportional constraint and
         the snap-recompute, just like it does for image cels. */
      const isCirclePrim=el.dataset.primType==='circle';
      const aspect=isImage
        ?(parseFloat(el.dataset.imgAspect) || (sw>0?sh/sw:1))
        :(isCirclePrim?1:0);
      /* Anchor screen position (the corner that must stay visually put). */
      const anchorRelX_old = -sign_x * sw/2;
      const anchorRelY_old = -sign_y * sh/2;
      const cxOld = sl + sw/2;
      const cyOld = st + sh/2;
      const anchorSX = cxOld + cosR*anchorRelX_old - sinR*anchorRelY_old;
      const anchorSY = cyOld + sinR*anchorRelX_old + cosR*anchorRelY_old;
      /* Collect snap guides ONCE at drag start. Pool includes every other
         cel's left/right/center (v) and top/bottom/center (h), plus the
         canvas centerlines. We snap the MOVING edges of the resized cel —
         which two edges those are depends on which corner was grabbed.
         This is what gives the "same width as the closer object" feel:
         the moving edge sticks to the nearest other cel's matching edge,
         and if the user has a left-aligned column, that produces equal
         widths automatically. Hold Alt to bypass like the move handler.
         Skipped entirely for rotated cels (see comment above). */
      const guides=isRot?null:collectSnapGuides(cv,el);
      const mm=ev=>{
        const dx=(ev.clientX-sx)/_s, dy=(ev.clientY-sy)/_s;
        /* Inverse-rotate the screen delta into the cel's local frame.
           At θ=0 this reduces to (dx, dy). */
        const localDx = isRot ? (cosR*dx + sinR*dy) : dx;
        const localDy = isRot ? (-sinR*dx + cosR*dy) : dy;
        let nw, nh, nl=sl, nt=st;
        if(c.anchorRight){ nw=Math.max(MIN_W,sw-localDx); nl=sl+(sw-nw); }
        else             { nw=Math.max(MIN_W,sw+localDx); }
        if(c.anchorBottom){ nh=Math.max(MIN_H,sh-localDy); nt=st+(sh-nh); }
        else              { nh=Math.max(MIN_H,sh+localDy); }
        /* Aspect lock (image cels only). Two independent dimensions just
           got computed from the raw cursor; we need to collapse them onto
           the locked ratio. Pick the dimension the cursor moved MORE in
           (proportional-wise) — that's the user's intent. Then re-derive
           the other axis and re-pin the matching edge so the opposite
           corner stays put. */
        if(aspect>0){
          /* Compare scale factors rather than raw px so the same gesture
             feels right whether the cel is wide or tall. */
          const sxF=nw/sw, syF=nh/sh;
          if(Math.abs(sxF-1)>=Math.abs(syF-1)){
            /* Width wins — derive height from width. */
            nh=Math.max(MIN_H, nw*aspect);
            if(c.anchorBottom){ nt=(st+sh)-nh; }
          } else {
            /* Height wins — derive width from height. */
            nw=Math.max(MIN_W, nh/aspect);
            if(c.anchorRight){ nl=(sl+sw)-nw; }
          }
        }
        /* Edge snap — only the edges that are MOVING (determined by which
           corner is being dragged) participate. The OPPOSITE edge is the
           pin; snapping must not move it. So when snapping the LEFT edge
           (anchorRight === true), we adjust nl AND nw so right stays at
           sl+sw. When snapping the RIGHT edge, only nw changes. Same
           logic mirrored vertically.
           For aspect-locked cels, EACH snap re-derives the other axis so
           the lock is preserved through the snap. The "winning" snap is
           whichever axis lands first; we then recompute the other side
           from the aspect and DON'T snap the recomputed axis (snapping
           both axes independently would break the ratio).
           v0.3.6: skipped entirely if cel is rotated (see header). */
        let snapX=null, snapY=null;
        if(!ev.altKey && !isRot){
          /* Horizontal axis snap (left or right edge) */
          if(c.anchorRight){
            const snap=snapEdgeToGuides(nl,guides.v);
            if(snap){
              const right=sl+sw;
              nl=snap.pos; nw=right-nl;
              if(nw<MIN_W){ nw=MIN_W; nl=right-MIN_W; }
              snapX=snap.pos;
            }
          } else {
            const snap=snapEdgeToGuides(nl+nw,guides.v);
            if(snap){
              nw=snap.pos-nl;
              if(nw<MIN_W) nw=MIN_W;
              snapX=snap.pos;
            }
          }
          /* For aspect-locked cels: if width changed via X snap, re-derive
             height now, BEFORE we try a vertical snap. This way the
             vertical-snap chance still gets to apply to the new height. */
          if(aspect>0 && snapX!=null){
            nh=Math.max(MIN_H, nw*aspect);
            if(c.anchorBottom){ nt=(st+sh)-nh; }
          }
          /* Vertical axis snap (top or bottom edge) */
          if(c.anchorBottom){
            const snap=snapEdgeToGuides(nt,guides.h);
            if(snap){
              const bottom=st+sh;
              nt=snap.pos; nh=bottom-nt;
              if(nh<MIN_H){ nh=MIN_H; nt=bottom-MIN_H; }
              snapY=snap.pos;
            }
          } else {
            const snap=snapEdgeToGuides(nt+nh,guides.h);
            if(snap){
              nh=snap.pos-nt;
              if(nh<MIN_H) nh=MIN_H;
              snapY=snap.pos;
            }
          }
          /* And the reverse: if the Y axis snapped, recompute X to maintain
             aspect. Last writer wins, which is fine — both endings honor
             the ratio. */
          if(aspect>0 && snapY!=null){
            nw=Math.max(MIN_W, nh/aspect);
            if(c.anchorRight){ nl=(sl+sw)-nw; }
          }
        }
        /* v0.3.6: for rotated cels, after computing nw/nh, override
           nl/nt so the visual anchor corner stays at the captured
           screen position. The center C_new lies at:
              C_new = anchor − R(θ) × (anchorRel_new)
           where anchorRel_new is the new sign-applied half-extents.
           Then nl = C_new_x − nw/2, nt = C_new_y − nh/2. */
        if(isRot){
          const anchorRelX_new = -sign_x * nw/2;
          const anchorRelY_new = -sign_y * nh/2;
          const cxNew = anchorSX - (cosR*anchorRelX_new - sinR*anchorRelY_new);
          const cyNew = anchorSY - (sinR*anchorRelX_new + cosR*anchorRelY_new);
          nl = cxNew - nw/2;
          nt = cyNew - nh/2;
        }
        el.style.width =nw+'px';
        el.style.height=nh+'px';
        el.style.left  =nl+'px';
        el.style.top   =nt+'px';
        showSnapGuides(cv,snapX,snapY);
        /* v0.3.7: rotated cel resize changes vw/vh, so the etb's
           position math has to re-run. updateEtbForRotation early-
           returns for unrotated cels so this is a no-op for them. */
        if(isRot) updateEtbForRotation(el);
      };
      const mu=()=>{
        document.removeEventListener('mousemove',mm);
        document.removeEventListener('mouseup',mu);
        showSnapGuides(cv,null,null); // clear
      };
      document.addEventListener('mousemove',mm);
      document.addEventListener('mouseup',mu);
    });
  }
}

/* Single-edge snap helper for the resize path. Returns {d, pos} where pos
   is the guide coordinate to snap the moving edge to, or null if nothing
   within SNAP_PX. Distinct from snapAxis (which tests three anchor points
   — leading/center/trailing — because the move handler doesn't know which
   anchor the user is gesturing toward). During resize we know exactly which
   edge is moving, so a single direct comparison is enough. */
function snapEdgeToGuides(edgePos, guides){
  let best=null;
  for(const g of guides){
    const d=Math.abs(edgePos-g);
    if(d<=SNAP_PX && (!best||d<best.d)){
      best={d, pos:g};
    }
  }
  return best;
}

/* ══ ALIGNMENT ══
   Wired from the LAYERS panel's alignment toolbar. Operates on every
   .cel.sel under this tab's canvas. With fewer than 2 cels selected,
   there is nothing to align TO, so we no-op (no error popup — quiet
   fail keeps the workflow snappy).
   v0.3.6: bounding box uses the VISUAL (rotated AABB) rect so rotated
   cels align by what the user sees. Each cel's layout position is then
   shifted by its own visual-vs-layout offset so the visual edge lands
   on the target; for unrotated cels this offset is (0,0) and the math
   reduces to the previous behavior exactly. */
function alignSelectedCels(tabId,op){
  const cv=$('cv-'+tabId);
  if(!cv) return;
  const cels=Array.from(cv.querySelectorAll('.cel.sel'));
  if(cels.length<2) return;
  const rects=cels.map(c=>{
    const b=getVisualBBox(c);
    return {
      el:c,
      l:b.l, t:b.t, w:b.w, h:b.h,        // layout box
      vl:b.vl, vt:b.vt, vw:b.vw, vh:b.vh, // visual AABB
      offX:b.vl-b.l, offY:b.vt-b.t,      // visual minus layout (invariant of position)
    };
  });
  /* Bounding box of the selection — VISUAL space */
  const bbL=Math.min(...rects.map(r=>r.vl));
  const bbT=Math.min(...rects.map(r=>r.vt));
  const bbR=Math.max(...rects.map(r=>r.vl+r.vw));
  const bbB=Math.max(...rects.map(r=>r.vt+r.vh));
  const bbCX=(bbL+bbR)/2, bbCY=(bbT+bbB)/2;
  for(const r of rects){
    /* Compute the new VISUAL left/top first, then convert back to
       layout left/top by subtracting the per-cel offset. */
    let nvl=r.vl, nvt=r.vt;
    switch(op){
      case 'left'   : nvl=bbL;                              break;
      case 'right'  : nvl=bbR-r.vw;                         break;
      case 'centerH': nvl=Math.round(bbCX-r.vw/2);          break;
      case 'top'    : nvt=bbT;                              break;
      case 'bottom' : nvt=bbB-r.vh;                         break;
      case 'centerV': nvt=Math.round(bbCY-r.vh/2);          break;
    }
    r.el.style.left=(nvl-r.offX)+'px';
    r.el.style.top =(nvt-r.offY)+'px';
  }
}

/* ══ SMART-GUIDE SNAP ══
   collectSnapGuides walks the canvas ONCE at drag start and builds two arrays
   of snap target positions: x positions (vertical guide lines) and y positions
   (horizontal guide lines). Each guide is the canvas centerline OR another
   cel's left edge / right edge / horizontal center (for vGuides; analogous for
   hGuides). snapAxis then tests the dragged cel's left, center and right
   against the array and returns the first match within SNAP_PX, along with
   the snapped position so the caller can write it back to el.style.left/top.
   Holding Alt during drag skips the call entirely. */
/* ══ ROTATED CEL — ETB COUNTER-ROTATION (v0.3.7) ══
   The .etb (control box: 0° badge / ↺ / BG / DEL) sits inside the cel
   as a child, so by default it inherits the cel's transform — at any
   rotation, the buttons end up upside-down or sideways and the etb
   position no longer matches the cel's VISUAL top-left. This helper
   counter-rotates and repositions the etb so it always reads
   horizontally at the visual top-left of the cel.

   Math: the etb is inside the cel's local frame; the cel applies a
   rotate(R) around its center to everything inside. If we set the
   etb's transform to rotate(-R) with origin at its top-left, the etb
   body's net orientation becomes 0°. For position, we want the etb's
   top-left to land at SCREEN coords (cel_center.x - vw/2,
   cel_center.y - vh/2 - etbH) — i.e. just above the visual TL of the
   cel's axis-aligned bounding box, with vw/vh being the rotated AABB.
   Working backwards through the cel's rotation gives the cel-local
   offsets to write to .etb.style.left/top.

   At R = 0 the math reduces to the CSS defaults exactly, but we
   short-circuit and clear inline overrides so the .cv .cel .etb
   scale-counter rule (transform-origin: bottom left) takes over
   again, preserving zoom-anchor behavior for unrotated cels. */
function updateEtbForRotation(cel){
  const etb=cel.querySelector(':scope > .etb');
  if(!etb) return;
  const rotDeg=parseFloat(cel.dataset.rotation)||0;
  if(!rotDeg){
    /* Restore CSS defaults — clear every property we may have written. */
    etb.style.left='';
    etb.style.top='';
    etb.style.transform='';
    etb.style.transformOrigin='';
    return;
  }
  const w=cel.offsetWidth, h=cel.offsetHeight;
  if(!w||!h) return; // not yet laid out; caller will re-run
  const rad=rotDeg*Math.PI/180;
  const cosR=Math.cos(rad), sinR=Math.sin(rad);
  const aCosR=Math.abs(cosR), aSinR=Math.abs(sinR);
  const vw=w*aCosR + h*aSinR;
  const vh=w*aSinR + h*aCosR;
  const etbH=etb.offsetHeight||23;
  /* Want: etb screen-TL at (cel_center.x - vw/2, cel_center.y - vh/2 - etbH).
     Relative-to-center: (-vw/2, -vh/2 - etbH).
     Cel applies R(local - center). So local - center = R^(-1) × relative.
     R for CSS rotate(R) = [[cosR,-sinR],[sinR,cosR]];
     R^(-1) = R^T = [[cosR, sinR], [-sinR, cosR]]. */
  const tx=-vw/2;
  const ty=-vh/2 - etbH;
  const dx= cosR*tx + sinR*ty;
  const dy=-sinR*tx + cosR*ty;
  etb.style.left=(w/2 + dx)+'px';
  etb.style.top =(h/2 + dy)+'px';
  /* Combine the counter-rotation with the existing zoom-counter scale
     so etb stays both upright AND right-sized at any canvas zoom.
     Origin 0 0 = top-left of etb, which is the point we just placed. */
  etb.style.transform=`rotate(${-rotDeg}deg) scale(var(--cv-inv-scale, 1))`;
  etb.style.transformOrigin='0 0';
}

/* ══ ROTATED CEL — VISUAL BBOX (v0.3.6) ══
   Snap/align/move-snap originally compared LAYOUT-frame edges
   (style.left, offsetWidth, etc.). For rotated cels the layout box no
   longer matches what the user sees: at 90°, visual width = layout
   height, and the visible left edge sits at center_x − height/2, not
   left. getVisualBBox returns the axis-aligned bounding rectangle of
   the rotated cel in canvas-local coords — what's actually visible.
   At rotation = 0 the visual rect equals the layout rect, so callers
   can use this unconditionally with no regression on unrotated cels. */
function getVisualBBox(el){
  const l = parseInt(el.style.left)||0;
  const t = parseInt(el.style.top)||0;
  const w = el.offsetWidth;
  const h = el.offsetHeight;
  const rotDeg = parseFloat(el.dataset.rotation)||0;
  if(!rotDeg){
    return {l, t, w, h, vl:l, vt:t, vw:w, vh:h, cx:l+w/2, cy:t+h/2};
  }
  const rad = rotDeg*Math.PI/180;
  const cosA = Math.abs(Math.cos(rad));
  const sinA = Math.abs(Math.sin(rad));
  const vw = w*cosA + h*sinA;
  const vh = w*sinA + h*cosA;
  const cx = l + w/2;
  const cy = t + h/2;
  return {l, t, w, h, vl: cx - vw/2, vt: cy - vh/2, vw, vh, cx, cy};
}

const SNAP_PX = 6;
function collectSnapGuides(cv, draggedEl){
  const W=cv.offsetWidth, H=cv.offsetHeight;
  /* Canvas edges (0, W, H) and centerlines (W/2, H/2) are first in the
     pool so they win ties against cel-edge guides. Edge snap means a cel
     resized toward a canvas corner clicks into the corner; move snap
     gives the same flush-to-edge alignment. */
  const v=[0, W/2, W], h=[0, H/2, H];
  cv.querySelectorAll('.cel').forEach(el=>{
    if(el===draggedEl) return;
    if(el.style.display==='none') return;
    /* v0.3.6: snap targets are the cel's VISUAL edges so that
       rotated cels participate at their visible bounding box, not
       their layout box. */
    const b=getVisualBBox(el);
    v.push(b.vl, b.vl+b.vw, b.vl+b.vw/2);
    h.push(b.vt, b.vt+b.vh, b.vt+b.vh/2);
  });
  return {v,h};
}
/* Returns {pos: newCoord, guide: guideLineCoord} or null. Tests the cel's
   leading edge, center and trailing edge against `guides`, picks the closest
   match within SNAP_PX. `pos` is the coordinate to assign to style.left/top
   (i.e. already corrected for which anchor matched). */
function snapAxis(coord, size, guides){
  const anchors=[
    {a:coord,         off:0},        // leading edge
    {a:coord+size/2,  off:size/2},   // center
    {a:coord+size,    off:size},     // trailing edge
  ];
  let best=null;
  for(const {a,off} of anchors){
    for(const g of guides){
      const d=Math.abs(a-g);
      if(d<=SNAP_PX && (!best||d<best.d)){
        best={d, pos:Math.round(g-off), guide:g};
      }
    }
  }
  return best;
}
function showSnapGuides(cv, x, y){
  const v=cv.querySelector('.snap-v');
  const h=cv.querySelector('.snap-h');
  if(v){ if(x!=null){v.style.left=x+'px'; v.classList.add('on');} else v.classList.remove('on'); }
  if(h){ if(y!=null){h.style.top =y+'px'; h.classList.add('on');} else h.classList.remove('on'); }
}

/* ══ AUTO LAYOUT — find-the-whitespace magazine spread ══
   Core idea from the reference screenshot:
   - Image stays in place (or is zone-placed)
   - For each image, scan it to build a "free space" map
     (cells that are near-white = available for text)
   - Find the largest rectangle of free cells using maximal-rectangle algorithm
   - Place the text box inside that free zone, centered
   - If no free zone is large enough, place text outside the image bounding box
*/

const MASK_RES = 6; // px per cell — balance accuracy vs speed

/* ── Rasterise image to free-space grid (true = white/empty) ── */
function buildFreeGrid(imgEl){
  const iw=imgEl.offsetWidth||200, ih=imgEl.offsetHeight||200;
  const cols=Math.ceil(iw/MASK_RES), rows=Math.ceil(ih/MASK_RES);
  const img=imgEl.querySelector('img');

  // Default: all free (no image loaded)
  const makeGrid=(val)=>Array.from({length:rows},()=>new Uint8Array(cols).fill(val));

  if(!img||!img.complete||!img.naturalWidth)
    return {free:makeGrid(0),cols,rows,iw,ih}; // treat as solid if not loaded

  /* Rotated images: the on-canvas appearance is a rotated rect whose pixels
     no longer line up with the source bitmap. Scanning the original image
     would put text where the rotated picture now visibly is. Safer to treat
     a rotated image as fully solid — auto-layout will then place text
     outside its (unrotated) bounding box. */
  const rot=parseFloat(imgEl.dataset.rotation)||0;
  if(rot) return {free:makeGrid(0),cols,rows,iw,ih};

  const c=document.createElement('canvas');
  c.width=cols; c.height=rows;
  const ctx=c.getContext('2d',{willReadFrequently:true});
  // White background first so semi-transparent areas read correctly
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,cols,rows);
  ctx.drawImage(img,0,0,cols,rows);

  let px;
  try{ px=ctx.getImageData(0,0,cols,rows).data; }
  catch(e){ return {free:makeGrid(0),cols,rows,iw,ih}; }

  const free=makeGrid(0);
  for(let r=0;r<rows;r++){
    for(let c2=0;c2<cols;c2++){
      const i=(r*cols+c2)*4;
      const R=px[i],G=px[i+1],B=px[i+2];
      // "Free" = near white (background)
      free[r][c2]=(R>230&&G>230&&B>230)?1:0;
    }
  }
  return {free,cols,rows,iw,ih};
}

/* ── Maximal rectangle in histogram (standard stack algorithm) ── */
function maxRectInHistogram(h){
  const n=h.length;
  const stack=[];
  let best={area:0,left:0,right:0,height:0};
  for(let i=0;i<=n;i++){
    const cur=i<n?h[i]:0;
    while(stack.length&&h[stack[stack.length-1]]>cur){
      const height=h[stack.pop()];
      const left=stack.length?stack[stack.length-1]+1:0;
      const area=height*(i-left);
      if(area>best.area) best={area,left,right:i-1,height};
    }
    stack.push(i);
  }
  return best;
}

/* ── Find largest free rectangle in free-space grid ──
   Returns {r0,c0,r1,c1} in grid cells, or null if none big enough */
function findLargestFreeRect(grid,cols,rows,minCols,minRows){
  // histogram method row by row
  const hist=new Int32Array(cols);
  let best=null;
  for(let r=0;r<rows;r++){
    // update histogram
    for(let c=0;c<cols;c++)
      hist[c]=grid[r][c]?hist[c]+1:0;
    // find best rect ending at this row
    const res=maxRectInHistogram(Array.from(hist));
    if(res.height>=minRows && (res.right-res.left+1)>=minCols){
      if(!best||res.area>best.area){
        best={r0:r-res.height+1, c0:res.left, r1:r, c1:res.right,
              area:res.area, height:res.height, width:res.right-res.left+1};
      }
    }
  }
  return best;
}

/* ── Erode free grid by margin (shrink free zones by margin cells) ── */
function erodeFreeGrid(grid,cols,rows,margin){
  const out=Array.from({length:rows},()=>new Uint8Array(cols));
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++){
      let ok=1;
      for(let dr=-margin;dr<=margin&&ok;dr++)
        for(let dc=-margin;dc<=margin&&ok;dc++){
          const nr=r+dr,nc=c+dc;
          if(nr<0||nr>=rows||nc<0||nc>=cols||!grid[nr][nc]) ok=0;
        }
      out[r][c]=ok;
    }
  return out;
}

/* ── Main auto layout ── */
function autoLayout(tabId){
  const cv=$('cv-'+tabId); if(!cv) return;
  /* VEC cels are treated as images for auto-layout purposes — they're
     spatial anchors that text wraps around, same as raster images. The
     algorithm only cares about a cel's bounding box and visible mask;
     vector vs raster makes no difference there. */
  const imgs=Array.from(cv.querySelectorAll('.cel-img, .cel-vec'));
  const txts=Array.from(cv.querySelectorAll('.cel-txt'));
  if(!imgs.length&&!txts.length) return;

  const W=cv.offsetWidth, H=cv.offsetHeight;
  const PAD=20, MGAP=16;
  const MARGIN_CELLS=Math.ceil(MGAP/MASK_RES);

  function clampPos(x,y,w,h){
    return {x:Math.max(PAD,Math.min(W-w-PAD,x)),
            y:Math.max(PAD,Math.min(H-h-PAD,y))};
  }
  function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh,m){
    m=m||0;
    return ax<bx+bw+m && ax+aw+m>bx && ay<by+bh+m && ay+ah+m>by;
  }

  /* ── Step 1: Place images in balanced zones ── */
  const n=imgs.length;
  const imgData=[];
  const zones=getZones(n,W,H,PAD);
  imgs.forEach((img,i)=>{
    const iw=img.offsetWidth||200, ih=img.offsetHeight||200;
    const z=zones[i]||{cx:W/2,cy:H/2};
    let x=Math.round(z.cx-iw/2), y=Math.round(z.cy-ih/2);
    // Avoid bbox overlap with placed images
    let att=0;
    while(att<80&&imgData.some(d=>rectsOverlap(x,y,iw,ih,d.x,d.y,d.w,d.h,MGAP))){
      x+=MGAP; if(x+iw+PAD>W){x=PAD;y+=MGAP;} att++;
    }
    const p=clampPos(x,y,iw,ih);
    img.style.left=p.x+'px'; img.style.top=p.y+'px';
    // (z-index assigned by restackBySources at the end)
    // Build free-space grid for this image
    const {free,cols,rows}=buildFreeGrid(img);
    imgData.push({el:img,x:p.x,y:p.y,w:iw,h:ih,free,cols,rows});
  });

  /* ── Step 2: Place each text box in the largest white space of paired image ── */
  const placedTxts=[];

  txts.forEach((txt,i)=>{
    const tw=txt.offsetWidth||220, th=txt.offsetHeight||90;
    const pairedIdx=i%Math.max(1,n);
    const pd=imgData[pairedIdx];

    let placed=false;

    if(pd){
      // Need at least this many cells
      const needCols=Math.ceil(tw/MASK_RES)+MARGIN_CELLS*2;
      const needRows=Math.ceil(th/MASK_RES)+MARGIN_CELLS*2;

      // Erode free grid by margin so text won't touch object
      const eroded=erodeFreeGrid(pd.free,pd.cols,pd.rows,MARGIN_CELLS);
      const rect=findLargestFreeRect(eroded,pd.cols,pd.rows,needCols,needRows);

      if(rect){
        // Convert grid rect centre back to canvas px
        const gcx=(rect.c0+rect.c1)/2*MASK_RES+pd.x;
        const gcy=(rect.r0+rect.r1)/2*MASK_RES+pd.y;
        // Place text centred in that zone
        let tx=Math.round(gcx-tw/2), ty=Math.round(gcy-th/2);
        // Clamp to canvas
        tx=Math.max(PAD,Math.min(W-tw-PAD,tx));
        ty=Math.max(PAD,Math.min(H-th-PAD,ty));
        // Verify it doesn't overlap other text boxes
        const clash=placedTxts.some(r=>rectsOverlap(tx,ty,tw,th,r.x,r.y,r.w,r.h,MGAP));
        if(!clash){
          txt.style.left=tx+'px'; txt.style.top=ty+'px';
          placedTxts.push({x:tx,y:ty,w:tw,h:th});
          placed=true;
        }
      }
    }

    if(!placed){
      // Fallback: place outside image bounding box, avoid other texts
      const targets=pd?[
        {x:pd.x+pd.w+MGAP,        y:pd.y},                    // right
        {x:pd.x-tw-MGAP,          y:pd.y},                    // left
        {x:pd.x,                  y:pd.y-th-MGAP},            // above
        {x:pd.x,                  y:pd.y+pd.h+MGAP},          // below
        {x:W-tw-PAD,              y:PAD},                      // top-right
        {x:PAD,                   y:PAD},                      // top-left
      ]:[{x:PAD+i*(tw+MGAP),y:PAD}];
      for(const t of targets){
        const p=clampPos(t.x,t.y,tw,th);
        const clash=placedTxts.some(r=>rectsOverlap(p.x,p.y,tw,th,r.x,r.y,r.w,r.h,MGAP));
        // Also check it doesn't land inside any image bbox
        const imgClash=imgData.some(d=>rectsOverlap(p.x,p.y,tw,th,d.x,d.y,d.w,d.h,0));
        if(!clash&&!imgClash){
          txt.style.left=p.x+'px'; txt.style.top=p.y+'px';
          placedTxts.push({x:p.x,y:p.y,w:tw,h:th});
          placed=true; break;
        }
      }
      if(!placed){
        const maxY=Math.max(...[...imgData,...placedTxts].map(r=>r.y+r.h),0);
        const p=clampPos(PAD,maxY+MGAP,tw,th);
        txt.style.left=p.x+'px'; txt.style.top=p.y+'px';
        placedTxts.push({x:p.x,y:p.y,w:tw,h:th});
      }
    }
  });
  /* autoLayout only re-positions; layer order is preserved (owned by LAYERS) */
}

/* Zone centres for balanced image placement */
function getZones(n,W,H,PAD){
  const presets=[
    [{cx:W*.50,cy:H*.50}],
    [{cx:W*.28,cy:H*.50},{cx:W*.72,cy:H*.50}],
    [{cx:W*.27,cy:H*.28},{cx:W*.73,cy:H*.28},{cx:W*.50,cy:H*.72}],
    [{cx:W*.27,cy:H*.28},{cx:W*.73,cy:H*.28},{cx:W*.27,cy:H*.72},{cx:W*.73,cy:H*.72}],
    [{cx:W*.27,cy:H*.28},{cx:W*.73,cy:H*.28},{cx:W*.50,cy:H*.50},{cx:W*.27,cy:H*.72},{cx:W*.73,cy:H*.72}],
    [{cx:W*.20,cy:H*.28},{cx:W*.50,cy:H*.28},{cx:W*.80,cy:H*.28},
     {cx:W*.20,cy:H*.72},{cx:W*.50,cy:H*.72},{cx:W*.80,cy:H*.72}],
  ];
  const base=presets[Math.min(n,6)-1]||presets[5];
  return Array.from({length:n},(_,i)=>base[i%base.length]);
}

/* ── Shared layout SVG builder ── */
async function buildLayoutSVG(tabId){
  const cv=$('cv-'+tabId); if(!cv) return null;
  const W=cv.offsetWidth, H=cv.offsetHeight;

  const imgCels=Array.from(cv.querySelectorAll('.cel-img'));
  const vecCels=Array.from(cv.querySelectorAll('.cel-vec'));
  const txtCels=Array.from(cv.querySelectorAll('.cel-txt'));
  const tblCels=Array.from(cv.querySelectorAll('.cel-tbl'));

  /* resolve all image b64 in parallel first */
  const imgParts=await Promise.all(imgCels.map(async cel=>{
    if(cel.style.display==='none') return ''; // hidden via LAYERS panel
    const x=parseInt(cel.style.left)||0, y=parseInt(cel.style.top)||0;
    const w=cel.offsetWidth, h=cel.offsetHeight;
    const rot=parseFloat(cel.dataset.rotation)||0;
    const op=parseFloat(cel.style.opacity);
    const opacity=isNaN(op)?1:op;
    const img=cel.querySelector('img');
    if(!img) return '';
    const b64=await imgToB64(img.src);
    let out=`<image x="${x}" y="${y}" width="${w}" height="${h}" preserveAspectRatio="xMidYMid meet" xlink:href="${b64}"/>`;
    if(rot){
      const cx=x+w/2, cy=y+h/2;
      out=`<g transform="rotate(${rot} ${cx} ${cy})">${out}</g>`;
    }
    if(opacity<1) out=`<g opacity="${opacity.toFixed(3)}">${out}</g>`;
    return out;
  }));

  /* ── VEC cel export ──
     Embed the SVG as a data URL via <image href>. The browser renders
     this as vector inside the parent SVG — no rasterization, crisp at
     any output dpi. preserveAspectRatio="none" because the cel outline
     is aspect-correct by construction, so we WANT the SVG to fill it
     exactly (matches the on-screen renderer that uses width/height:100%
     without object-fit). Falls back to imgToB64 if the source can't be
     fetched, but the fallback would defeat the whole point — log and
     return empty rather than silently rasterize. */
  const vecParts=await Promise.all(vecCels.map(async cel=>{
    if(cel.style.display==='none') return '';
    const x=parseInt(cel.style.left)||0, y=parseInt(cel.style.top)||0;
    const w=cel.offsetWidth, h=cel.offsetHeight;
    const rot=parseFloat(cel.dataset.rotation)||0;
    const op=parseFloat(cel.style.opacity);
    const opacity=isNaN(op)?1:op;
    const img=cel.querySelector('img');
    if(!img||!img.src) return '';
    /* Fetch the SVG content and re-embed as base64 data URL. Direct
       <image href="blob:..."> wouldn't survive serialization to a file
       (blob URLs are session-scoped). */
    let dataUrl='';
    try{
      const r=await fetch(img.src);
      const text=await r.text();
      dataUrl='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(text)));
    }catch(err){
      console.warn('VEC export: could not read SVG source',err);
      return '';
    }
    let out=`<image x="${x}" y="${y}" width="${w}" height="${h}" preserveAspectRatio="none" xlink:href="${dataUrl}"/>`;
    if(rot){
      const cx=x+w/2, cy=y+h/2;
