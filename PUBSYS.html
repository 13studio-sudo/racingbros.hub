            await applyImageToDZ(dz,bid,imageUrls[box.image]);
          }
        } else if(box.mode==='vec'){
          /* VEC source: createBox with 'vec' mode, populate the vec dz.
             No applyImageToDZ here — the white-punch path is IMG-only;
             VEC sources go straight through setDZ (same code path as
             the live VEC drop handler). */
          bid=createBox(tabId,'vec');
          const vdz=$('vdz-'+bid);
          if(box.image&&imageUrls[box.image]&&vdz){
            setDZ(vdz,imageUrls[box.image]);
            vdz.dataset.src=imageUrls[box.image];
            vdz.dataset.origSrc=imageUrls[box.image];
          }
        } else if(box.mode==='csv'){
          /* v0.3.8: CSV source box. Previously this case fell through
             to the text-mode branch and was re-created as a TEXT box —
             losing the mode AND any tblScale. createBox(tabId,'csv')
             builds the box with the CSV textarea visible; if box.csv
             exists, populate the textarea. Cels' .csv data lives on
             each cel's dataset.csv and is restored independently. */
          bid=createBox(tabId,'csv');
          if(box.csv){
            const csvEd=$('csv-'+bid);
            if(csvEd){
              csvEd.value=box.csv;
              /* Fire input so the "No data" indicator updates and any
                 auto-grow / info-line listeners (updateCSVBoxInfo) see
                 the new content. */
              csvEd.dispatchEvent(new Event('input'));
            }
          }
        } else {
          bid=createBox(tabId,'text',{
            label:box.label, labelColor:box.labelColor,
            title:box.title, sub:box.sub, body:box.body,
            /* v0.3.9 — include-checkbox states from manifest. */
            includeLabel:box.includeLabel,
            includeTitle:box.includeTitle,
            includeSub:box.includeSub,
            includeBody:box.includeBody
          });
        }
        newBidByIdx.push(bid);
        /* v0.3.8: restore the source box's tblScale (any mode — the
           field is generic, though only CSV mode currently uses it).
           Writing to box.dataset.tblScale is what makes subsequent +/-
           clicks (and applyBoxTblScale propagation to cels) continue
           from the saved value instead of resetting to 1. */
        if(box.tblScale && box.tblScale!==1){
          const sb=$('sb-'+bid);
          if(sb){
            sb.dataset.tblScale=String(box.tblScale);
            const pct=$('csvz-pct-'+bid);
            if(pct) pct.value=Math.round(box.tblScale*100);
          }
        }
      }
    }

    /* ─ restore canvas cels ─ */
    if(Array.isArray(manifest.cels)&&cv){
      /* Track which cels came in with a saved z — if any do, we don't run
         the legacy SOURCES-restack fallback. */
      let anyZ=false;
      for(const cel of manifest.cels){
        const opts={type:cel.type, x:(cel.x||0)+20, y:(cel.y||0)+20, w:cel.w||180, h:cel.h||130};
        if(cel.type==='image'){
          opts.src=cel.image?imageUrls[cel.image]:'';
        } else if(cel.type==='vec'){
          opts.src=cel.image?imageUrls[cel.image]:'';
        } else if(cel.type==='table'){
          opts.csv=cel.csv||'';
          opts.colAlign=cel.colAlign||'';  // v0.4.0
          opts.csvVariant=cel.csvVariant||'csv1'; // v0.4.0
          opts.tblFont=cel.tblFont||'';     // v0.4.0
          opts.titleFS=cel.titleFS||'';     // v0.4.0
          opts.cellPad=cel.cellPad||'';     // v0.4.0
        } else {
          opts.label=cel.label; opts.labelColor=cel.labelColor;
          opts.title=cel.title; opts.sub=cel.sub; opts.body=cel.body;
        }
        if(cel.rotation) opts.rotation=cel.rotation;
        if(cel.z!=null){ opts.zIndex=cel.z; anyZ=true; }
        /* Image AND vec cels: tell addCel to keep the saved height
           instead of snapping to natural aspect ratio. The user may
           have intentionally cropped or letterboxed in the original;
           round-trip should preserve. */
        if(cel.type==='image'||cel.type==='vec') opts.preserveSize=true;
        // Remap source-index → new bid
        if(cel.sourceIdx!=null&&newBidByIdx[cel.sourceIdx]!=null){
          opts.sourceBid=newBidByIdx[cel.sourceIdx];
        } else if(cel.sourceBid!=null){
          // Older manifests may have stored raw bids; keep for forward-compat
          opts.sourceBid=cel.sourceBid;
        }
        const el=addCel(cv,opts);
        /* Override addCel's positioning (which offsets by -20 for drop cursor) */
        el.style.left=(cel.x||0)+'px';
        el.style.top =(cel.y||0)+'px';
        el.style.width=(cel.w||180)+'px';
        if(cel.type==='table'&&cel.cellScale){
          el.dataset.cellScale=String(cel.cellScale);
          /* v0.3.8: writing dataset.cellScale alone was the bug — the
             .pub-tbl had no transform: scale() applied and the cel
             outline wasn't sized to the scaled content, so the table
             rendered at 100% even though the dataset said 220% (or
             whatever). syncTableCelToScale clears the transform, reads
             natural width/height, re-applies the scale, and sizes the
             cel box accordingly — exactly what the per-cel +/- buttons
             call. Deferred via double-RAF so the table HTML inside the
             cel has time to render and report real offsetWidth/Height
             before syncTableCelToScale measures it. */
          requestAnimationFrame(()=>requestAnimationFrame(()=>{
            syncTableCelToScale(el, parseFloat(cel.cellScale)||1);
          }));
        }
        if(cel.type==='image'||cel.type==='vec'||cel.type==='table'){
          el.style.height=(cel.h||130)+'px';
        } else {
          /* text cels auto-resize in a RAF — wait for it then force exact height */
          requestAnimationFrame(()=>requestAnimationFrame(()=>{
            el.style.height=(cel.h||100)+'px';
          }));
        }
        if(cel.type==='text'&&cel.fontSize){
          const fsIn=el.querySelector('.fs-in');
          if(fsIn){fsIn.value=cel.fontSize; fsIn.dispatchEvent(new Event('input'));}
        }
        /* v0.3.8: restore the per-sub-element innerHTML + inline-style
           overrides written by buildLayoutZipBlob. Same RAF-deferred
           pattern as pasteCelFromRecord — fires once now and once
           after the next frame so the auto-resize / .fs-in's input
           handler doesn't undo our overrides. Old manifests without
           these fields silently fall through to the plain-text path. */
        if(cel.type==='text'){
          const restoreTxtCustomization=()=>{
            const lbl=el.querySelector('.cel-label-el');
            const t  =el.querySelector('.cel-title-el');
            const s  =el.querySelector('.cel-sub-el');
            const b  =el.querySelector('.cel-body-el');
            if(cel.labelHtml!=null && lbl) lbl.innerHTML=cel.labelHtml;
            if(cel.titleHtml!=null && t  ) t.innerHTML  =cel.titleHtml;
            if(cel.subHtml!=null   && s  ) s.innerHTML  =cel.subHtml;
            if(cel.bodyHtml!=null  && b  ) b.innerHTML  =cel.bodyHtml;
            if(cel.labelStyle && lbl) lbl.setAttribute('style',cel.labelStyle);
            if(cel.titleStyle && t  ) t.setAttribute('style',cel.titleStyle);
            if(cel.subStyle   && s  ) s.setAttribute('style',cel.subStyle);
            if(cel.bodyStyle  && b  ) b.setAttribute('style',cel.bodyStyle);
            /* v0.3.8: restore .cel-title-row justify-content for
               TITLE / SUB alignment round-trip. */
            if(cel.titleRowStyle){
              const row=el.querySelector('.cel-title-row');
              if(row) row.setAttribute('style',cel.titleRowStyle);
            }
          };
          restoreTxtCustomization();
          requestAnimationFrame(restoreTxtCustomization);
        }
        // Restore LAYERS-panel state (hide + opacity) on top of everything else
        if(cel.hidden) el.style.display='none';
        if(cel.opacity!=null && cel.opacity<1) el.style.opacity=String(cel.opacity);
        /* v0.3.2: restore per-cel BG-transparent state and untouched
           origSrc reference so the user can toggle BG off and recover
           the original pixels. */
        if(cel.origImage && imageUrls[cel.origImage]){
          el.dataset.origSrc=imageUrls[cel.origImage];
        }
        if(cel.bgTransp){
          el.dataset.bgTransp='1';
          const _bgBtn=el.querySelector('[data-bg-transp]');
          if(_bgBtn) _bgBtn.classList.add('act');
        }
        /* Restore TEMPLATE tagging so the imported cel still reads
           "TEMPLATE" in LAYERS and keeps its dbl-click-to-replace gesture. */
        if(cel.isTemplate){
          el.dataset.isTemplate='1';
          el.dataset.layerName='TEMPLATE';
        }
        /* v0.3.6: restore lock state. The capture-phase blocker picks
           this up automatically next time the user mousedowns on the
           cel; the LAYERS row will reflect the lock when next refreshed. */
        if(cel.locked) el.dataset.locked='1';
        /* v0.3.9: restore group membership. */
        if(cel.groupId) el.dataset.groupId=cel.groupId;
        /* v0.3.9: restore VEC primitive metadata. The actual SVG was
           saved into the pack already so the img.src is correct on
           import; the dataset is what makes the VEC-cel toolbar work
           on the restored cel (color picker shows the right value,
           re-applying changes regenerates from the correct shape). */
        if(cel.primType)   el.dataset.primType  =cel.primType;
        if(cel.primColor)  el.dataset.primColor =cel.primColor;
        if(cel.primStroke) el.dataset.primStroke=cel.primStroke;
        if(cel.primFill)   el.dataset.primFill  =cel.primFill;
      }
      /* Legacy fallback: only restack from SOURCES if the manifest didn't
         carry any z values (very old packs). New packs round-trip exact z. */
      if(!anyZ) restackBySources(tabId);
    }
  }catch(e){
    alert('Import failed: '+e.message);
    console.error(e);
  }
  if(btn){btn.textContent='IMPORT';btn.disabled=false;}
}

/* v0.4.0: a dropped/picked .zip may be EITHER a single .pubsys.zip pack OR a
   BUNDLE containing several (e.g. 001.pubsys.zip, 002.pubsys.zip, …). Peek
   inside: if nested packs are present, import each into its own tab in numeric
   order, one by one; otherwise import the file as a single pack (unchanged).
   A real single pack has a root manifest.json, so it's never mis-detected. */
async function importPackOrBundle(file){
  try{
    if(typeof JSZip!=='undefined'){
      const zip=await JSZip.loadAsync(file);
      const names=Object.keys(zip.files).filter(n=>!zip.files[n].dir);
      const hasRootManifest=names.includes('manifest.json');
      let packs=names.filter(n=>/\.pubsys\.zip$/i.test(n));
      if(!packs.length && !hasRootManifest) packs=names.filter(n=>/\.zip$/i.test(n));
      if(packs.length){
        packs.sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));
        for(const name of packs){
          const blob=await zip.files[name].async('blob');
          const tab=addTab({name:'IMPORTING…',type:'layout',fmt:'a4',res:'digital'});
          await importLayoutZip(tab.id, blob);   // open on tabs one by one
        }
        return;
      }
    }
  }catch(e){ console.warn('Bundle peek failed; importing as a single pack:',e); }
  /* single .pubsys.zip pack */
  const tab=addTab({name:'IMPORTING…',type:'layout',fmt:'a4',res:'digital'});
  await importLayoutZip(tab.id, file);
}

/* ══ CSV PARSE + RENDER ══ */
function parseCSV(raw){
  const lines=raw.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  /* Auto-detect delimiter: if the input contains any tab, treat as TSV.
     TSV doesn't use " as a quote char, so descriptions with embedded `+2"`
     etc. round-trip correctly. */
  if(raw.includes('\t')){
    return lines.map(line=>line.split('\t').map(c=>c.trim()));
  }
  return lines.map(line=>{
    const cols=[]; let cur='',inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim()); return cols;
  });
}

function autoHeaders(rows){
  if(!rows.length) return {headers:[],data:[]};
  const first=rows[0];
  const nonNum=first.filter(c=>c.trim()!==''&&isNaN(parseFloat(c.replace(/[^0-9.\-]/g,''))));
  return nonNum.length>=Math.ceil(first.length*0.5)
    ?{headers:first,data:rows.slice(1)}
    :{headers:first.map((_,i)=>`COL ${i+1}`),data:rows};
}

function spanMap(vals){
  const map={},groups=[];
  let last=null,start=0;
  vals.forEach((v,i)=>{ if(v!==last){if(last!==null)groups.push({v:last,s:start,n:i-start});last=v;start=i;} });
  groups.push({v:last,s:start,n:vals.length-start});
  groups.forEach(g=>{map[g.s]={v:g.v,n:g.n};});
  return map;
}

function renderTable(tabId){
  const raw=$('t2e-'+tabId)?.value?.trim();
  if(!raw){alert('No CSV data.');return;}
  const rows=parseCSV(raw);
  if(!rows.length){alert('No CSV data.');return;}
  const tw=$('t2tw-'+tabId);
  const scheme=$('t2sc-'+tabId)?.value||'mono';
  applyTableScheme(tw,scheme);

  /* Title-row pattern: first row is one non-empty cell, no col headers */
  const firstRowNonEmpty=rows[0].filter(c=>c.trim()!=='').length;
  const isTitleRow=firstRowNonEmpty===1 && rows.length>1;
  tw.innerHTML=csvToTableHTML(raw);
  if(isTitleRow){
    const bodyData=rows.slice(1);
    const numCols=Math.max(...bodyData.map(r=>r.length), 1);
    $('t2i-'+tabId).textContent=`${bodyData.length} rows · titled (${numCols} col)`;
  } else {
    const {headers,data}=autoHeaders(rows);
    $('t2i-'+tabId).textContent=`${data.length} rows · ${headers.length} cols`;
  }
}

/* Apply a scheme to a .tbl-wrap element (or any container that hosts a .pub-tbl).
   The five legacy schemes ride on their sch-* class so the CSS cascade does the
   work; any custom or branded scheme writes CSS variables inline instead. */
function applyTableScheme(tw,scheme){
  const _CSS_SCHEMES=new Set(['mono','blue','red','warm','green']);
  if(_CSS_SCHEMES.has(scheme)&&!_customSchemes[scheme]){
    tw.style.cssText='';
    // preserve any non-sch-* classes (e.g. tbl-wrap, cel-tbl-inner)
    const keep=Array.from(tw.classList).filter(c=>!c.startsWith('sch-'));
    tw.className=[...keep,'sch-'+scheme].join(' ');
  } else {
    const cs=_customSchemes[scheme]||_builtinSchemes[scheme]||_builtinSchemes.mono;
    function _lum(h){const x=h.replace('#','');const r=parseInt(x.slice(0,2),16)/255,g=parseInt(x.slice(2,4),16)/255,b=parseInt(x.slice(4,6),16)/255;return 0.2126*r+0.7152*g+0.0722*b;}
    const _thTxt=_lum(cs.th||'#d8d8d8')<0.4?'#ffffff':'#333333';
    const keep=Array.from(tw.classList).filter(c=>!c.startsWith('sch-'));
    tw.className=keep.join(' ');
    tw.style.cssText=`--th:${cs.th};--alt:${cs.alt};--gc:${cs.gc};--gt:${cs.gt};--sc:${cs.sc};--st:${cs.st};--bd:${cs.bd};--th-txt:${_thTxt}`;
  }
}

/* CSV string → table HTML string. Pure. Used by both the Table-tab renderer
   and the hybrid-tab canvas cel (where the CSV source box's content is
   re-rendered any time the cel is created / its CSV is edited). Picks the
   titled layout when the first row is a single non-empty cell, else falls
   back to the column-headers + auto GC/SC detection used by Tables 1 and 2. */
/* v0.4.0: per-column alignment helpers. colAlign is an array of 'l'|'c'|'r'
   (or '' / undefined) by RAW csv column index. parseColAlign turns the stored
   comma-string back into that array. ALIGN_CLS maps a code to its CSS class. */
const ALIGN_CLS={l:'alnl',c:'alnc',r:'alnr'};
function parseColAlign(str){
  if(!str) return [];
  return String(str).split(',').map(s=>s.trim());
}
/* v0.4.0: read a rendered <td>'s final text-align (which already reflects
   any per-column override or legacy default) and return the SVG text x +
   text-anchor for it. Keeps PNG/SVG/PDF export in lockstep with the live
   HTML without re-deriving alignment rules. */
function _svgCellAnchor(td, cx, w, PAD){
  const ta=(getComputedStyle(td).textAlign||'').toLowerCase();
  if(ta==='right'||ta==='end')    return {tx:cx+w-PAD, anchor:'end'};
  if(ta==='center'||ta==='justify-center') return {tx:cx+w/2, anchor:'middle'};
  return {tx:cx+PAD, anchor:'start'};
}

function csvToTableHTML(csv, colAlign, variant){
  if(!csv||!csv.trim()) return '<div style="padding:8px;color:#999;font-size:12px;text-transform:none">Empty CSV</div>';
  const rows=parseCSV(csv);
  if(!rows.length) return '<div style="padding:8px;color:#999;font-size:12px;text-transform:none">No data</div>';
  const CA=Array.isArray(colAlign)?colAlign:parseColAlign(colAlign);
  /* Returns the alignment class for column ci: explicit override wins,
     otherwise the caller-supplied legacy default class (may be ''). */
  const alignCls=(ci,legacy)=>{
    const a=CA[ci];
    return (a==='l'||a==='c'||a==='r')?ALIGN_CLS[a]:legacy;
  };

  /* v0.4.0 CSV2: two stacked title bars (rows 0 and 1 both span all columns,
     centered), then data. Third column (index 2) defaults to CENTER. */
  if(variant==='csv2' && rows.length>2){
    const title1=rows[0].find(c=>c.trim()!=='')||rows[0].join(' ').trim()||'';
    const title2=(rows[1]||[]).find(c=>c.trim()!=='')||(rows[1]||[]).join(' ').trim()||'';
    const bodyData=rows.slice(2);
    const numCols=Math.max(...bodyData.map(r=>r.length), 1);
    let html=`<table class="pub-tbl ttl-mode"><thead>`;
    html+=`<tr><th class="ttl-row ttl-row-1" colspan="${numCols}">${escXML(title1)}</th></tr>`;
    html+=`<tr><th class="ttl-row ttl-row-2" colspan="${numCols}">${escXML(title2)}</th></tr>`;
    html+=`</thead><tbody>`;
    bodyData.forEach(row=>{
      html+=`<tr>`;
      for(let ci=0;ci<numCols;ci++){
        /* CSV2 default: 3rd column centered. Per-column override still wins. */
        const c=alignCls(ci, ci===2?'alnc':'');
        const cls=c?` class="${c}"`:'';
        html+=`<td${cls}>${escXML((row[ci]||'').trim())}</td>`;
      }
      html+=`</tr>`;
    });
    html+=`</tbody></table>`;
    return html;
  }

  /* v0.4.0 CSV3: one main title bar (row 0, dark like CSV2's first) then any
     number of SUB-TITLE bars interspersed with data. A row counts as a
     sub-title when it has exactly one non-empty cell; it's painted as a
     full-width centered bar (rendered as a <th> so it picks up the light title
     fill). Multi-cell rows are data; 3rd column centers by default. */
  if(variant==='csv3' && rows.length>1){
    const multi=rows.filter(r=>r.filter(c=>c.trim()!=='').length>1);
    const numCols=Math.max(1, ...((multi.length?multi:rows).map(r=>r.length)));
    const mainTitle=rows[0].find(c=>c.trim()!=='')||rows[0].join(' ').trim()||'';
    let html=`<table class="pub-tbl ttl-mode"><thead>`;
    html+=`<tr><th class="ttl-row ttl-row-1" colspan="${numCols}">${escXML(mainTitle)}</th></tr>`;
    html+=`</thead><tbody>`;
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const nonEmpty=row.filter(c=>c.trim()!=='').length;
      if(nonEmpty===1){
        const sub=row.find(c=>c.trim()!=='')||'';
        html+=`<tr><th class="ttl-row ttl-row-sub" colspan="${numCols}">${escXML(sub)}</th></tr>`;
      } else {
        html+=`<tr>`;
        for(let ci=0;ci<numCols;ci++){
          const c=alignCls(ci, ci===2?'alnc':'');
          const cls=c?` class="${c}"`:'';
          html+=`<td${cls}>${escXML((row[ci]||'').trim())}</td>`;
        }
        html+=`</tr>`;
      }
    }
    html+=`</tbody></table>`;
    return html;
  }

  /* Titled layout */
  const firstRowNonEmpty=rows[0].filter(c=>c.trim()!=='').length;
  if(firstRowNonEmpty===1 && rows.length>1){
    const title=rows[0].find(c=>c.trim()!=='')||'';
    const bodyData=rows.slice(1);
    const numCols=Math.max(...bodyData.map(r=>r.length), 1);
    let html=`<table class="pub-tbl ttl-mode"><thead>`;
    html+=`<tr><th class="ttl-row" colspan="${numCols}">${escXML(title)}</th></tr>`;
    html+=`</thead><tbody>`;
    bodyData.forEach(row=>{
      html+=`<tr>`;
      for(let ci=0;ci<numCols;ci++){
        /* Legacy default: 3rd column (index 2) flush-right (the v0.4.0
           price-list default). Any explicit per-column override replaces it. */
        const c=alignCls(ci, ci===2?'alnr':'');
        const cls=c?` class="${c}"`:'';
        html+=`<td${cls}>${escXML((row[ci]||'').trim())}</td>`;
      }
      html+=`</tr>`;
    });
    html+=`</tbody></table>`;
    return html;
  }

  /* Column-headers + auto GC/SC detection */
  const {headers,data}=autoHeaders(rows);
  if(!data.length) return '<div style="padding:8px;color:#999;font-size:12px;text-transform:none">No data rows</div>';
  const col0=data.map(r=>(r[0]||'').trim());
  const col1=data.map(r=>(r[1]||'').trim());
  const use0=[...new Set(col0)].some(v=>col0.filter(x=>x===v).length>1);
  const use1=use0&&[...new Set(col1)].some(v=>col1.filter(x=>x===v).length>1);
  const skip=use0?(use1?2:1):0;
  const sp0=use0?spanMap(col0):{};
  const sp1=use1?spanMap(data.map((r,i)=>col0[i]+'|'+col1[i])):{};
  const numC=headers.map((_,ci)=>{
    const s=data.find(r=>r[ci]&&r[ci].trim()!=='');
    return s?!isNaN(parseFloat(s[ci].replace(/[^0-9.\-±]/g,''))):false;
  });
  let html=`<table class="pub-tbl"><thead><tr>`;
  if(use0) html+=`<th class="gc" style="width:20px"></th>`;
  if(use1) html+=`<th class="sc" style="width:18px"></th>`;
  headers.forEach((h,ci)=>{ if(ci>=skip) html+=`<th>${escXML(h)}</th>`; });
  html+=`</tr></thead><tbody>`;
  data.forEach((row,ri)=>{
    html+=`<tr>`;
    if(use0&&sp0[ri]) html+=`<td class="gc" rowspan="${sp0[ri].n}">${escXML(sp0[ri].v)}</td>`;
    if(use1&&sp1[ri]){
      const scLabel=sp1[ri].v.includes('|')?sp1[ri].v.split('|').slice(1).join('|'):sp1[ri].v;
      html+=`<td class="sc" rowspan="${sp1[ri].n}">${escXML(scLabel)}</td>`;
    }
    row.forEach((cell,ci)=>{
      if(ci<skip) return;
      /* Legacy default: numeric columns centered (.nc). Explicit override wins. */
      const legacy=(numC[ci]&&cell.trim())?'nc':'';
      const c=alignCls(ci, legacy);
      html+=`<td class="${c}">${escXML(cell)}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  return html;
}

/* ══ TABLE SVG BUILDER — clean rewrite: correct grid lines, luminance-aware colours ══ */
function buildTableSVG(tabId){
  const tw=$('t2tw-'+tabId);
  const tbl=tw.querySelector('.pub-tbl');
  if(!tbl){alert('Render table first.');return null;}
  const sc=getSchemeCSS($('t2sc-'+tabId)?.value||'mono');
  return buildTableSVGCore(tbl,sc);
}

/* Pure-SVG table painter, callable with any rendered .pub-tbl element and a
   scheme object. Used by:
   - buildTableSVG (Table tabs) — passes the on-screen table + its scheme
   - buildTableCelParts (Layout/Hybrid export) — renders each table cel's CSV
     into a detached DOM node, then paints it as SVG into the layout export
   No more foreignObject anywhere — every PNG/SVG output is real SVG, so PNG
   exports never get tainted-canvas SecurityErrors from cross-origin styles. */
function buildTableSVGCore(tbl,sc){
  /* Title-row layout has its own much simpler painter */
  if(tbl.querySelector('th.ttl-row')) return buildTitledTableSVG(tbl,sc);

  /* When painting a table that lives inside a layout cel (.cel-tbl-inner),
     the live DOM renders text at 10px (per .cel-tbl-inner .pub-tbl td/th
     overrides). The SVG painter measures column widths from those 10px
     cells via getBoundingClientRect, so the SVG MUST render at 10px too —
     using 13px would overflow the columns and get clipped by the per-column
     clipPath. Table-tab renders stay at 13px (matches preview). */
  const inLayoutCel = !!tbl.closest('.cel-tbl-inner');
  /* v0.4.0: read font / padding / row heights from the live DOM (authoritative,
     same philosophy as the offsetWidth-based column widths) so the table-cel
     toolbar's FONT and MARGIN settings flow into SVG export. Fallback to the
     historical constants when a value isn't available. */
  const _cs=window.getComputedStyle;
  const _sTd=tbl.querySelector('tbody td:not(.gc):not(.sc)');
  const _sTh=tbl.querySelector('thead th:not(.gc):not(.sc)');
  const ROW_H = (_sTd&&_sTd.offsetHeight)?Math.round(_sTd.offsetHeight):(inLayoutCel?18:22);
  const TH_H  = (_sTh&&_sTh.offsetHeight)?Math.round(_sTh.offsetHeight):(inLayoutCel?20:26);
  const GC_W=24, SC_W=20;
  const FS_TH = inLayoutCel ? 10 : 13;
  const FS_TD = inLayoutCel ? 10 : 13;
  const FS_GC = 11;
  const PAD = _sTd?(Math.round(parseFloat(_cs(_sTd).paddingLeft))||8):8;
  const FK=(_cs(tbl).fontFamily)||"'Barlow Condensed','Arial Narrow',sans-serif";

  /* text width measurement */
  const _mc=(()=>{const c=document.createElement('canvas');return c.getContext('2d');})();
  const mTxt=(t,fs,fw)=>{ _mc.font=(fw||'400')+' '+fs+"px 'Barlow Condensed',Arial Narrow,Arial"; return _mc.measureText(String(t)).width; };

  /* table structure */
  const hdCells=Array.from(tbl.querySelectorAll('thead th'));
  const hasGC=hdCells.some(th=>th.classList.contains('gc'));
  const hasSC=hdCells.some(th=>th.classList.contains('sc'));
  const dataThs=hdCells.filter(th=>!th.classList.contains('gc')&&!th.classList.contains('sc'));
  const bodyRows=Array.from(tbl.querySelectorAll('tbody tr'));
  const gOff=(hasGC?GC_W:0)+(hasSC?SC_W:0);
  const scx=hasGC?GC_W:0;

  /* column widths — see buildTitledTableSVG for the layout-cel rationale.
     1.05× cushion for inLayoutCel: keeps SVG/PNG widths close to HTML now
     that @import handles the font; 1.15× for Table-tab stays unchanged.
     IMPORTANT: read offsetWidth, NOT getBoundingClientRect — when the
     canvas is fit-scaled (every res except 96dpi @ small zoom), the bounding
     rect returns the post-transform width, which shrinks columns and clips
     text in the exported PNG/SVG. offsetWidth ignores ancestor transforms. */
  /* column widths.
     The live DOM cell offsetWidth is the AUTHORITATIVE width — it's exactly
     what the preview renders. The text-metric path is only a floor for the
     rare case offsetWidth is unavailable (cell not laid out). Now that the
     real condensed font (Barlow) is EMBEDDED in the export, the old
     1.05×/1.15× cushion just inflates columns past the preview width — so
     the multiplier is 1.0 (no inflation). offsetWidth, NOT
     getBoundingClientRect: the latter returns post-transform width when the
     canvas is fit-scaled, which would shrink columns and clip text. */
  const colW=dataThs.map((th,ci)=>{
    const _mult=1.0;
    let w=Math.ceil(mTxt(th.textContent.trim().toUpperCase(),FS_TH,'600')*_mult)+PAD*2+8;
    bodyRows.forEach(tr=>{
      const dCells=Array.from(tr.querySelectorAll('td')).filter(td=>!td.classList.contains('gc')&&!td.classList.contains('sc'));
      const txt=(dCells[ci]?.textContent||'').trim();
      if(txt) w=Math.max(w,Math.ceil(mTxt(txt,FS_TD,'400')*_mult)+PAD*2+8);
      if(dCells[ci]){
        const domW=dCells[ci].offsetWidth;
        if(domW>10) w=Math.max(w,domW+PAD);
      }
    });
    const domW=th.offsetWidth;
    if(domW>10) w=Math.max(w,domW+PAD);
    return Math.max(40,w);
  });

  const dataW=colW.reduce((a,b)=>a+b,0);
  const totalW=gOff+dataW;
  const totalH=TH_H+bodyRows.length*ROW_H+1;

  /* collect spans */
  const gcSpans=[], scSpans=[];
  bodyRows.forEach((tr,ri)=>{
    const g=tr.querySelector('td.gc');
    if(g) gcSpans.push({ri,span:parseInt(g.getAttribute('rowspan')||1),label:g.textContent.trim()});
    const s=tr.querySelector('td.sc');
    if(s) scSpans.push({ri,span:parseInt(s.getAttribute('rowspan')||1),label:s.textContent.trim()});
  });

  /* row index sets where a new gc/sc span begins */
  const gcStarts=new Set(gcSpans.map(g=>g.ri));   // e.g. {0, 14, 22}
  const scStarts=new Set(scSpans.map(s=>s.ri));

  /* numeric columns */
  const numC=colW.map((_,ci)=>{
    const sample=bodyRows.map(tr=>{
      const d=Array.from(tr.querySelectorAll('td')).filter(td=>!td.classList.contains('gc')&&!td.classList.contains('sc'));
      return (d[ci]?.textContent||'').trim();
    }).find(v=>v!=='');
    return sample?!isNaN(parseFloat(sample.replace(/[^0-9.\-±]/g,''))):false;
  });

  /* header text colour from background luminance */
  function hexLum(hex){
    const h=(hex||'#d8d8d8').replace(/[^0-9a-fA-F]/g,'').slice(0,6).padStart(6,'0');
    const r=parseInt(h.slice(0,2),16)/255, g=parseInt(h.slice(2,4),16)/255, b=parseInt(h.slice(4,6),16)/255;
    return 0.2126*r+0.7152*g+0.0722*b;
  }
  const hdrTxtCol=hexLum(sc.th)<0.4?'#ffffff':'#333333';

  /* ════════════════════════════════════════════════
     DRAW ORDER — painter's algorithm
     1. White canvas
     2. Header background (full width)
     3. Alternating row fills — DATA AREA ONLY (x=gOff)
     4. GC column fills — full height (covers alt rows)
     5. SC column fills — full height (covers alt rows)
     6. Horizontal grid lines:
        - GC boundary row: full width (x1=0)  ← brand separator
        - SC boundary within GC: from GC right edge (x1=GC_W)
        - Normal row inside span: data area (x1=gOff)
     7. Header underline — full width
     8. Vertical data-column dividers
     9. GC/SC right-edge divider lines
    10. Outer border — 4 separate lines (top drawn first, then GC/SC paint over it)
    11. All text — always last
  ════════════════════════════════════════════════ */
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}">`;
  /* Webfont import — see buildLayoutSVG. Harmless when this fragment is embedded
     into a layout SVG (the outer SVG also has @import). Browsers dedupe. */
  svg+=`<defs><style type="text/css"><![CDATA[${BARLOW_FONT_CSS}]]></style></defs>`;

  /* 1. white canvas */
  svg+=`<rect width="${totalW}" height="${totalH}" fill="#fff"/>`;

  /* 2. header bg — full width */
  svg+=`<rect x="0" y="0" width="${totalW}" height="${TH_H}" fill="${sc.th}"/>`;

  /* 3. alt rows — data area only */
  bodyRows.forEach((_,ri)=>{
    if(ri%2===1)
      svg+=`<rect x="${gOff}" y="${TH_H+ri*ROW_H}" width="${dataW}" height="${ROW_H}" fill="${sc.alt}"/>`;
  });

  /* 4. GC fills — drawn before grid lines, GC blocks will later be redrawn on top after lines
     Actually we draw GC/SC AFTER lines (step 6→5→4 drawing order means lines come after GC):
     Correction: draw GC/SC fills HERE, then draw grid lines, then redraw GC/SC fills again.
     Simpler: draw fills first, then lines that don't cross them, then fills again.
     Cleanest approach: draw GC/SC fills AFTER all grid lines (steps reordered below). */

  /* ─── Grid lines first (steps 6,7,8) ─── */

  /* 6. Horizontal grid lines
     Rule (matches HTML border rendering):
     - SC boundary (outer brand/group changes): full-width, 1px — major separator
     - GC boundary within same SC (sub-group changes): from GC_W to end, 0.5px
     - Normal row within both spans: data area only (x=gOff), 0.5px
  */
  for(let ri=0;ri<bodyRows.length;ri++){
    const y=TH_H+(ri+1)*ROW_H;
    const nextRi=ri+1;
    if(scStarts.has(nextRi)){
      // SC boundary: full-width separator (outer group — brand or major category)
      svg+=`<line x1="0" y1="${y}" x2="${totalW}" y2="${y}" stroke="${sc.bd}" stroke-width="1"/>`;
    } else if(gcStarts.has(nextRi)){
      // GC boundary within same SC: partial line from GC right edge
      const fromX=hasGC?GC_W:0;
      svg+=`<line x1="${fromX}" y1="${y}" x2="${totalW}" y2="${y}" stroke="${sc.bd}" stroke-width="0.5"/>`;
    } else {
      // Normal row within span: data area only
      svg+=`<line x1="${gOff}" y1="${y}" x2="${totalW}" y2="${y}" stroke="${sc.bd}" stroke-width="0.5"/>`;
    }
  }

  /* 7. Header underline */
  svg+=`<line x1="0" y1="${TH_H}" x2="${totalW}" y2="${TH_H}" stroke="${sc.bd}" stroke-width="1"/>`;

  /* 8. Vertical col dividers (data area, from header down) */
  let vcx=gOff;
  colW.forEach((w,i)=>{
    vcx+=w;
    if(i<colW.length-1)
      svg+=`<line x1="${vcx}" y1="${TH_H}" x2="${vcx}" y2="${totalH}" stroke="${sc.bd}" stroke-width="0.5"/>`;
  });

  /* ─── GC/SC fills drawn AFTER grid lines so they cover crossing lines ─── */

  /* 4b. GC fills */
  gcSpans.forEach(({ri,span})=>{
    svg+=`<rect x="0" y="${TH_H+ri*ROW_H}" width="${GC_W}" height="${span*ROW_H}" fill="${sc.gc}"/>`;
  });
  if(hasGC) svg+=`<rect x="0" y="0" width="${GC_W}" height="${TH_H}" fill="${sc.gc}"/>`;

  /* 5b. SC fills */
  scSpans.forEach(({ri,span})=>{
    svg+=`<rect x="${scx}" y="${TH_H+ri*ROW_H}" width="${SC_W}" height="${span*ROW_H}" fill="${sc.sc}"/>`;
  });
  if(hasSC) svg+=`<rect x="${scx}" y="0" width="${SC_W}" height="${TH_H}" fill="${sc.sc}"/>`;

  /* 9. Group divider lines (drawn after fills, on top) */
  if(hasGC)
    svg+=`<line x1="${GC_W}" y1="0" x2="${GC_W}" y2="${totalH}" stroke="${sc.bd}" stroke-width="1.5"/>`;
  if(hasSC){
    const sx=scx+SC_W;
    svg+=`<line x1="${sx}" y1="0" x2="${sx}" y2="${totalH}" stroke="${sc.bd}" stroke-width="1"/>`;
  }

  /* 10. Outer border — 4 separate lines */
  svg+=`<line x1="0" y1="0" x2="${totalW}" y2="0" stroke="${sc.bd}" stroke-width="1"/>`;
  svg+=`<line x1="0" y1="${totalH-1}" x2="${totalW}" y2="${totalH-1}" stroke="${sc.bd}" stroke-width="1"/>`;
  svg+=`<line x1="0" y1="0" x2="0" y2="${totalH}" stroke="${sc.bd}" stroke-width="1"/>`;
  svg+=`<line x1="${totalW-1}" y1="0" x2="${totalW-1}" y2="${totalH}" stroke="${sc.bd}" stroke-width="1"/>`;

  /* 11. TEXT — always last */

  /* header labels */
  let hcx=gOff;
  dataThs.forEach((th,i)=>{
    const w=colW[i], label=th.textContent.trim().toUpperCase();
    const isNum=numC[i];
    const tx=isNum?hcx+w/2:hcx+PAD;
    const anchor=isNum?'middle':'start';
    svg+=`<text x="${tx}" y="${TH_H/2+FS_TH/2}" font-family="${FK}" font-size="${FS_TH}" font-weight="600" fill="${hdrTxtCol}" text-anchor="${anchor}" letter-spacing="0.5">${escXML(label)}</text>`;
    hcx+=w;
  });

  /* GC rotated labels */
  gcSpans.forEach(({ri,span,label})=>{
    const mx=GC_W/2, my=TH_H+ri*ROW_H+span*ROW_H/2;
    svg+=`<text transform="translate(${mx},${my}) rotate(-90)" text-anchor="middle" dominant-baseline="middle" font-family="${FK}" font-size="${FS_GC}" font-weight="700" fill="${sc.gt}" letter-spacing="1.5">${escXML(label.toUpperCase())}</text>`;
  });

  /* SC rotated labels */
  scSpans.forEach(({ri,span,label})=>{
    const mx=scx+SC_W/2, my=TH_H+ri*ROW_H+span*ROW_H/2;
    svg+=`<text transform="translate(${mx},${my}) rotate(-90)" text-anchor="middle" dominant-baseline="middle" font-family="${FK}" font-size="${FS_GC-1}" font-weight="600" fill="${sc.st}" letter-spacing="1">${escXML(label.toUpperCase())}</text>`;
  });

  /* data cell text */
  bodyRows.forEach((tr,ri)=>{
    const y=TH_H+ri*ROW_H;
    const dataCells=Array.from(tr.querySelectorAll('td')).filter(td=>!td.classList.contains('gc')&&!td.classList.contains('sc'));
    let cx=gOff;
    dataCells.forEach((td,ci)=>{
      const w=colW[ci]||60, txt=td.textContent.trim();
      if(txt){
        const {tx,anchor}=_svgCellAnchor(td, cx, w, PAD);
        svg+=`<text x="${tx}" y="${y+ROW_H/2+FS_TD/2-1}" font-family="${FK}" font-size="${FS_TD}" fill="#111" text-anchor="${anchor}">${escXML(txt)}</text>`;
      }
      cx+=w;
    });
  });

  svg+=`</svg>`;
  return {svg,w:totalW,h:totalH};
}




function saveTableSVG(tabId){
  const res=buildTableSVG(tabId);
  if(!res){alert('Render table first.');return;}
  dl(res.svg,'pubsys-table.svg','image/svg+xml');
}

/* ══ TITLED TABLE SVG BUILDER — title band + data rows, no GC/SC ══
   Used when the rendered table contains a <th class="ttl-row" colspan=N>
   header — i.e. the table built from a CSV whose first row is a single
   non-empty cell. Body text preserves case (matches the HTML preview that
   uses .ttl-mode to disable the global td uppercase). */
function buildTitledTableSVG(tbl,sc){
  /* See buildTableSVGCore: inside a layout cel the live DOM renders at 10px,
     so the SVG must too — otherwise 13px text overflows DOM-measured columns
     and gets sliced by the per-column clipPath. Table-tab stays at 13px. */
  const inLayoutCel = !!tbl.closest('.cel-tbl-inner');
  /* v0.4.0: derive from the live DOM so the table-cel toolbar's FONT,
     TITLE-size and MARGIN settings carry into SVG export; fall back to the
     historical constants otherwise. */
  const _cs=window.getComputedStyle;
  const _ttl=tbl.querySelector('th.ttl-row');
  const _sTd=tbl.querySelector('tbody td');
  const ROW_H = (_sTd&&_sTd.offsetHeight)?Math.round(_sTd.offsetHeight):(inLayoutCel?18:22);
  const TH_H  = (_ttl&&_ttl.offsetHeight)?Math.round(_ttl.offsetHeight):(inLayoutCel?20:26);
  const FS_TTL = _ttl?(Math.round(parseFloat(_cs(_ttl).fontSize))||(inLayoutCel?10:13)):(inLayoutCel?10:13);
  const FS_TD  = inLayoutCel ? 10 : 13;
  const PAD = _sTd?(Math.round(parseFloat(_cs(_sTd).paddingLeft))||10):10;
  const FK=(_cs(tbl).fontFamily)||"'Barlow Condensed','Arial Narrow',sans-serif";

  const titleThs=Array.from(tbl.querySelectorAll('thead th.ttl-row'));
  const titles=titleThs.map(t=>t.textContent.trim());
  const numTitles=Math.max(1,titleThs.length);
  const titleTh=titleThs[0];
  const title=titles[0]||'';
  /* v0.4.0: each title bar carries its own rendered style (CSV2's first bar is
     larger / white-on-grey), so read height, font-size, colour and fill per
     bar from the DOM — export then mirrors the on-screen CSS automatically. */
  const _barInfo=th=>{
    const c=_cs(th);
    const bg=c.backgroundColor;
    const transparent=(!bg||bg==='transparent'||/rgba?\([^)]*,\s*0\s*\)$/.test(bg));
    return {
      text: th.textContent.trim(),
      h: th.offsetHeight?Math.round(th.offsetHeight):TH_H,
      fs: Math.round(parseFloat(c.fontSize))||FS_TTL,
      color: (c.color&&c.color!=='rgba(0, 0, 0, 0)')?c.color:null,
      bg: transparent?null:bg
    };
  };
  const titleInfo=titleThs.map(_barInfo);
  const bodyRows=Array.from(tbl.querySelectorAll('tbody tr'));
  /* v0.4.0 CSV3: a body row whose single cell is a .ttl-row is a sub-title bar. */
  const isSubBar=tr=>!!tr.querySelector('th.ttl-row, td.ttl-row');
  const dataRows=bodyRows.filter(tr=>!isSubBar(tr));
  const numCols=parseInt(titleTh.getAttribute('colspan'))||
    Math.max(1,...dataRows.map(tr=>tr.querySelectorAll('td').length));

  /* text width measurement */
  const _mc=document.createElement('canvas').getContext('2d');
  const mTxt=(t,fs,fw)=>{ _mc.font=(fw||'400')+' '+fs+"px 'Barlow Condensed',Arial Narrow,Arial"; return _mc.measureText(String(t)).width; };

  /* column widths from data — also respect DOM width of every row in the column
     (the longest text isn't necessarily in row 0; checking only row 0 caused the
     PNG export to clip a few pixels off the right edge of the widest description).

     Always run the text-measure safety net (formerly skipped for inLayoutCel):
     the SVG renders standalone WITHOUT the page's Barlow Condensed webfont
     and falls back to wider sans-serif. The DOM measurement is correct for
     Barlow Condensed but underestimates the fallback width that the standalone
     SVG / rasterised PNG will actually paint. A small 1.05× cushion for
     inLayoutCel absorbs sub-pixel/rendering drift while keeping column widths
     close to the HTML export (the embedded @import in the SVG loads Barlow
     Condensed in most viewers, so the larger cushions we tried earlier just
     made layout-cel tables look unnecessarily puffy compared to HTML). */
  const colW=[];
  for(let ci=0;ci<numCols;ci++){
    let w=60;
    dataRows.forEach(tr=>{
      const tds=tr.querySelectorAll('td');
      const txt=(tds[ci]?.textContent||'').trim();
      if(txt){
        /* No cushion (1.0): Barlow Condensed is embedded in the export now,
           so the DOM offsetWidth below is the authoritative width and any
           multiplier just over-widens vs the preview. */
        w=Math.max(w,Math.ceil(mTxt(txt,FS_TD,'400'))+PAD*2+8);
      }
      if(tds[ci]){
        /* offsetWidth, not getBoundingClientRect — same reason as in
           buildTableSVGCore: fit-scaled canvas would otherwise feed us a
           shrunk width and the PNG would clip the right edge of long cells. */
        const domW=tds[ci].offsetWidth;
        if(domW>10) w=Math.max(w,domW+PAD);
      }
    });
    colW.push(Math.max(40,w));
  }
  const totalW=colW.reduce((a,b)=>a+b,0);
  const titleYs=[]; let _ty=0;
  titleInfo.forEach(ti=>{ titleYs.push(_ty); _ty+=ti.h; });
  const TH_OFF=_ty||TH_H;                  /* v0.4.0: stack of title bars */
  /* v0.4.0: per-body-row heights so CSV3 sub-title bars (which can differ in
     height from data rows) sit correctly; data rows keep their measured height. */
  const bodyH=bodyRows.map(tr=>tr.offsetHeight?Math.round(tr.offsetHeight):(isSubBar(tr)?TH_H:ROW_H));
  const bodyY=[]; let _by=TH_OFF; bodyRows.forEach((_,i)=>{ bodyY.push(_by); _by+=bodyH[i]; });
  const totalH=_by+1;

  /* header text colour from luminance */
  function hexLum(hex){
    const h=(hex||'#d8d8d8').replace(/[^0-9a-fA-F]/g,'').slice(0,6).padStart(6,'0');
    const r=parseInt(h.slice(0,2),16)/255, g=parseInt(h.slice(2,4),16)/255, b=parseInt(h.slice(4,6),16)/255;
    return 0.2126*r+0.7152*g+0.0722*b;
  }
  const hdrTxtCol=hexLum(sc.th)<0.4?'#ffffff':'#333333';

  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}">`;
  svg+=`<defs><style type="text/css"><![CDATA[${BARLOW_FONT_CSS}]]></style></defs>`;
  svg+=`<rect width="${totalW}" height="${totalH}" fill="#fff"/>`;
  /* main title band(s) — each painted with its own height + fill */
  titleInfo.forEach((ti,i)=>{
    svg+=`<rect x="0" y="${titleYs[i]}" width="${totalW}" height="${ti.h}" fill="${ti.bg||sc.th}"/>`;
  });
  /* alt rows — data rows only, alternating by data-row index */
  let _di=0;
  bodyRows.forEach((tr,ri)=>{
    if(isSubBar(tr)) return;
    if(_di%2===1) svg+=`<rect x="0" y="${bodyY[ri]}" width="${totalW}" height="${bodyH[ri]}" fill="${sc.alt}"/>`;
    _di++;
  });
  /* vertical col dividers across the body (drawn first; sub-title bars below
     are painted over them so spanning bars read full-width) */
  let vx=0;
  for(let i=0;i<colW.length-1;i++){
    vx+=colW[i];
    svg+=`<line x1="${vx}" y1="${TH_OFF}" x2="${vx}" y2="${totalH}" stroke="${sc.bd}" stroke-width="0.5"/>`;
  }
  /* CSV3 sub-title bars — fill spans full width, covering the verticals */
  const subBars=[];
  bodyRows.forEach((tr,ri)=>{
    if(!isSubBar(tr)) return;
    const cell=tr.querySelector('th.ttl-row, td.ttl-row');
    const info=_barInfo(cell); info.y=bodyY[ri]; info.h=bodyH[ri];
    subBars.push(info);
    svg+=`<rect x="0" y="${info.y}" width="${totalW}" height="${info.h}" fill="${info.bg||sc.th}"/>`;
  });
  /* horizontal row dividers (after fills/bars so they stay visible) */
  for(let ri=0;ri<bodyRows.length;ri++){
    const y=bodyY[ri]+bodyH[ri];
    svg+=`<line x1="0" y1="${y}" x2="${totalW}" y2="${y}" stroke="${sc.bd}" stroke-width="0.5"/>`;
  }
  /* divider under each main title bar (incl. the title↔body split) */
  titleInfo.forEach((ti,i)=>{
    const y=titleYs[i]+ti.h;
    svg+=`<line x1="0" y1="${y}" x2="${totalW}" y2="${y}" stroke="${sc.bd}" stroke-width="${i===titleInfo.length-1?1:0.5}"/>`;
  });
  /* outer border */
  svg+=`<line x1="0" y1="0" x2="${totalW}" y2="0" stroke="${sc.bd}" stroke-width="1"/>`;
  svg+=`<line x1="0" y1="${totalH-1}" x2="${totalW}" y2="${totalH-1}" stroke="${sc.bd}" stroke-width="1"/>`;
  svg+=`<line x1="0" y1="0" x2="0" y2="${totalH}" stroke="${sc.bd}" stroke-width="1"/>`;
  svg+=`<line x1="${totalW-1}" y1="0" x2="${totalW-1}" y2="${totalH}" stroke="${sc.bd}" stroke-width="1"/>`;
  /* main title text — centered, uppercase, own size + colour per bar */
  titleInfo.forEach((ti,i)=>{
    const cy=titleYs[i]+ti.h/2+ti.fs/2-1;
    svg+=`<text x="${totalW/2}" y="${cy}" font-family="${FK}" font-size="${ti.fs}" font-weight="600" fill="${ti.color||hdrTxtCol}" text-anchor="middle" letter-spacing="0.7">${escXML((ti.text||'').toUpperCase())}</text>`;
  });
  /* CSV3 sub-title text — centered, case preserved (often mixed-case spec text) */
  subBars.forEach(info=>{
    const cy=info.y+info.h/2+info.fs/2-1;
    svg+=`<text x="${totalW/2}" y="${cy}" font-family="${FK}" font-size="${info.fs}" font-weight="600" fill="${info.color||hdrTxtCol}" text-anchor="middle" letter-spacing="0.5">${escXML(info.text||'')}</text>`;
  });
  /* data text — preserve case. Each cell's text is wrapped in a clipPath so
     anything wider than its column gets clipped at the cell boundary (matches
     preview's overflow-clipping behaviour for narrow cels). */
  const clipId='cp-ttl-'+Math.random().toString(36).slice(2,8);
  let clips='<defs>';
  let cx=0;
  for(let ci=0;ci<numCols;ci++){
    const w=colW[ci]||60;
    clips+=`<clipPath id="${clipId}-${ci}"><rect x="${cx}" y="0" width="${w}" height="${totalH}"/></clipPath>`;
    cx+=w;
  }
  clips+='</defs>';
  svg+=clips;
  bodyRows.forEach((tr,ri)=>{
    if(isSubBar(tr)) return;
    const y=bodyY[ri];
    const tds=Array.from(tr.querySelectorAll('td'));
    let cx=0;
    tds.forEach((td,ci)=>{
      const w=colW[ci]||60;
      const txt=td.textContent.trim();
      if(txt){
        /* v0.4.0: read the cell's rendered alignment (per-column override or
           the legacy col-3-right default) so export matches the live preview. */
        const {tx,anchor}=_svgCellAnchor(td, cx, w, PAD);
        svg+=`<text x="${tx}" y="${y+bodyH[ri]/2+FS_TD/2-1}" font-family="${FK}" font-size="${FS_TD}" fill="#111" text-anchor="${anchor}" clip-path="url(#${clipId}-${ci})">${escXML(txt)}</text>`;
      }
      cx+=w;
    });
  });
  svg+=`</svg>`;
  return {svg,w:totalW,h:totalH};
}

   Strategy: inject table + scheme CSS into hidden print frame,
   show it, then trigger window.print() — browser generates PDF.
   User selects "Save as PDF" in the print dialog.
   This gives pixel-perfect output matching the HTML export.
*/
function saveTablePDF(tabId){
  const tw=$('t2tw-'+tabId);
  const tbl=tw.querySelector('.pub-tbl');
  if(!tbl){alert('Render table first.');return;}
  const scheme=$('t2sc-'+tabId)?.value||'mono';
  const sc=getSchemeCSS(scheme);
  const frame=$('print-frame');
  const content=$('print-frame-content');

  // Apply scheme vars to print frame
  frame.style.cssText=`display:block;position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto;padding:20px;--th:${sc.th};--alt:${sc.alt};--gc:${sc.gc};--gt:${sc.gt};--sc:${sc.sc};--st:${sc.st};--bd:${sc.bd}`;

  // Header text colour from luminance
  function _lum(h){const x=(h||'#d8d8d8').replace('#','');const r=parseInt(x.slice(0,2),16)/255,g=parseInt(x.slice(2,4),16)/255,b=parseInt(x.slice(4,6),16)/255;return 0.2126*r+0.7152*g+0.0722*b;}
  frame.style.setProperty('--th-txt',_lum(sc.th)<0.4?'#ffffff':'#333333');

  // Clone the rendered table
  content.innerHTML=tw.innerHTML;

  // Print
  setTimeout(()=>{
    window.print();
    // After print dialog closes, hide frame
    setTimeout(()=>{ frame.style.display='none'; },500);
  },150);
}

function imgToB64(src){
  return new Promise(res=>{
    if(src.startsWith('data:')){res(src);return;}
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0); res(c.toDataURL()); };
    img.onerror=()=>res(src); img.src=src;
  });
}

/* Rasterize an SVG string to a PNG blob at 2× the requested logical size.
   The 2× upsampling matches what svgToPNG (the download path) does, so
   the two outputs are interchangeable. Used by EXPORT ALL to bake PNGs
   into the bundle without spawning N file downloads. */
function svgToPNGBlob(svgStr,w,h){
  return new Promise((res,rej)=>{
    const blob=new Blob([svgStr],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    const draw=()=>{
      try{
        const cvs=document.createElement('canvas');
        cvs.width=w*2; cvs.height=h*2;
        const ctx=cvs.getContext('2d');
        ctx.scale(2,2); ctx.drawImage(img,0,0);
        URL.revokeObjectURL(url);
        cvs.toBlob(b=>{
          if(!b) rej(new Error('toBlob returned null'));
          else   res(b);
        },'image/png');
      }catch(e){
        URL.revokeObjectURL(url);
        rej(new Error('PNG render failed: '+e.message));
      }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('SVG render failed')); };
    img.src=url;
    if(typeof img.decode==='function'){
      img.decode().then(draw).catch(()=>{ img.onload=draw; });
    } else {
      img.onload=draw;
    }
  });
}

function svgToPNG(svgStr,w,h,filename){
  /* Download-and-discard wrapper around svgToPNGBlob. Kept as a thin
     adapter so the existing call sites (SAVE PNG buttons) don't change. */
  return svgToPNGBlob(svgStr,w,h).then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  });
}

/* ══ SAVE DROPDOWN HELPER (v0.3.2) ══
   Each layout/hybrid tab and each table tab carries a single SAVE button
   with a flyout menu of format choices. wireSaveDropdown installs the
   open/close and dispatch behaviour for one such menu, routing the
   chosen format to the right save fn for the tab kind.

   Layout kind: PNG, SVG, HTML, ZIP (ZIP = exportLayoutZip = the old
                EXPORT button, same .pubsys.zip pack format).
   Table  kind: PNG, SVG, HTML, PDF.

   Outside-click closes any open menu; clicking the SAVE button toggles.
   Click-and-hold also works (mousedown opens; releasing on an item
   triggers it) — that's the same code path: mousedown bubbles to the
   button's click handler if released over it. */
function wireSaveDropdown(menuEl, tabId, isLayout){
  if(!menuEl) return;
  const btn=menuEl.querySelector('.save-btn');
  const items=menuEl.querySelectorAll('.save-dd-item');
  if(!btn) return;
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    /* Close every other open SAVE menu before opening this one. */
    document.querySelectorAll('.save-menu.open').forEach(m=>{
      if(m!==menuEl) m.classList.remove('open');
    });
    const willOpen=!menuEl.classList.contains('open');
    menuEl.classList.toggle('open');
    /* v0.3.4: the flyout is position:fixed, so anchor it under the button
       on open (escapes the toolbar's overflow clip). */
    if(willOpen){
      const dd=menuEl.querySelector('.save-dd');
      if(dd){
        const r=btn.getBoundingClientRect();
        dd.style.left=r.left+'px';
        dd.style.top=(r.bottom+2)+'px';
        dd.style.minWidth=Math.max(94,Math.round(r.width))+'px';
      }
    }
  });
  items.forEach(item=>{
    item.addEventListener('click',e=>{
      e.stopPropagation();
      menuEl.classList.remove('open');
      const fmt=item.dataset.fmt;
      try{
        if(isLayout){
          if(fmt==='png')       saveLayoutPNG(tabId);
          else if(fmt==='svg')  saveLayoutSVG(tabId);
          else if(fmt==='html') saveLayoutHTML(tabId);
          else if(fmt==='zip')  exportLayoutZip(tabId);
        } else {
          if(fmt==='png')       saveTablePNG(tabId);
          else if(fmt==='svg')  saveTableSVG(tabId);
          else if(fmt==='html') saveTableHTML(tabId);
          else if(fmt==='pdf')  saveTablePDF(tabId);
        }
      }catch(err){ alert('SAVE failed: '+err.message); console.error(err); }
    });
  });
}
/* Document-level outside-click closer for SAVE menus. Bound once. */
(function bindSaveOutsideClose(){

/* ══ GLOBAL IMPORT / EXPORT (v0.3.2) ══
   IMPORT (#btn-import) loads a .pubsys.zip into a NEW tab (always — it
   never overwrites the current tab). Works regardless of which tab type
   is active. EXPORT (#btn-export) packs the CURRENT tab as a .pubsys.zip
   — only valid for layout / hybrid tabs; alerts otherwise. */
$('btn-import').addEventListener('click',()=>$('s1-impf').click());
$('s1-impf').addEventListener('change',e=>{
  /* v0.3.6: handle multi-select. Each selected zip lands in its own
     fresh tab via importLayoutZip; the manifest then overwrites that
     tab's metadata. Tabs are created up-front in input order so they
     appear in the tab bar in the order the user picked them; the
     async importLayoutZip calls then run in parallel against their
     respective tabs. */
  const files=Array.from(e.target.files||[]);
  /* v0.4.0: a picked .svg → editable-object import via the NEW modal. */
  const svg=files.find(f=>/\.svg$/i.test(f.name)||/svg/i.test(f.type));
  if(svg){
    const rd=new FileReader();
    rd.onload=()=>openSvgImportModal(String(rd.result||''));
    rd.onerror=()=>alert('Could not read the SVG file.');
    rd.readAsText(svg);
    e.target.value='';
    return;
  }
  for(const f of files){ importPackOrBundle(f); }
  e.target.value='';
});
/* v0.3.7: IMPORT button is also a drop target. Drop one or many
   .pubsys.zip / .zip files onto it — each gets its own fresh tab and
   imports in parallel, mirroring the multi-select file-picker path.
   The dragenter/over events must `preventDefault()` to opt this
   element into being a drop target; without that the OS shows the
   "not allowed" cursor. The .drag-over class gives a visible cue
   the button is willing to accept the drop. */
(function bindImportDrop(){
  const btn=$('btn-import');
  if(!btn) return;
  const ack=e=>{ e.preventDefault(); e.stopPropagation(); btn.classList.add('drag-over'); };
  btn.addEventListener('dragenter',ack);
  btn.addEventListener('dragover', ack);
  btn.addEventListener('dragleave',e=>{
    e.preventDefault(); e.stopPropagation();
    /* dragleave fires for child elements too; only clear when the
       cursor really leaves the button (relatedTarget outside btn). */
    if(e.relatedTarget && btn.contains(e.relatedTarget)) return;
    btn.classList.remove('drag-over');
  });
  btn.addEventListener('drop',e=>{
    e.preventDefault(); e.stopPropagation();
    btn.classList.remove('drag-over');
    const all=Array.from(e.dataTransfer?.files||[]);
    /* v0.4.0: a dropped .svg opens the NEW modal then imports as editable objects. */
    const svg=all.find(f=>/\.svg$/i.test(f.name)||/svg/i.test(f.type));
    if(svg){
      const rd=new FileReader();
      rd.onload=()=>openSvgImportModal(String(rd.result||''));
      rd.onerror=()=>alert('Could not read the SVG file.');
      rd.readAsText(svg);
      return;
    }
    const files=all.filter(f=>/\.(zip|pubsys)$/i.test(f.name));
    if(!files.length){
      alert('Drop a .svg to import as editable objects, or .pubsys.zip to load a saved layout.');
      return;
    }
    for(const f of files){ importPackOrBundle(f); }
  });
})();

/* Reusable template placer — full-page VEC cel at z-index 0, locked,
   tagged as TEMPLATE for the LAYERS panel. Originally letter-only (extracted
   from the PAGE 6 setup); v0.4.0 generalized it to accept any inlined base64
   SVG so the social/square templates share one code path with ONE PAGER.
   The cel is sized to the tab's current canvas (native px × DPI), and since
   each template's viewBox matches its size's aspect, ensureSvgSized's
   xMidYMid-meet fill lands pixel-true. */
function placeTemplateOnTab(tab, b64, fallbackFmt='letter'){
  try{
    const cv=$('cv-'+tab.id);
    if(!cv) return;
    const url=decodeTemplateUrl(b64);
    let W=parseInt(cv.style.width)||0;
    let H=parseInt(cv.style.height)||0;
    if(!W||!H){
      const base=SIZES[tab.fmt]||SIZES[fallbackFmt]||SIZES.letter;
      const s=DPI[tab.res]||1;
      W=Math.round(base.w*s);
      H=Math.round(base.h*s);
    }
    const cel=addCel(cv,{type:'vec',src:url,x:20,y:20,w:W,h:H,preserveSize:true});
    cel.dataset.isTemplate='1';
    cel.dataset.layerName='TEMPLATE';
    /* v0.3.8: the TEMPLATE is locked by default. It's the full-page
       frame and the user almost never wants to drag/resize it
       accidentally. Unlock from the LAYERS panel if you actually do
       need to move it. dataset.locked='1' is the same flag the lock
       button toggles and what buildLayoutZipBlob round-trips, so
       re-imports preserve the locked state. */
    cel.dataset.locked='1';
    cel.style.left='0px';
    cel.style.top='0px';
    cel.style.width=W+'px';
    cel.style.height=H+'px';
    cel.style.zIndex='0';
  }catch(e){ console.warn('Template placement failed:',e); }
}
/* Back-compat wrapper — all existing call sites (init + ONE PAGER) still work. */
function placeLetterTemplateOnTab(tab){ placeTemplateOnTab(tab, LETTER_TEMPLATE_SVG_B64, 'letter'); }

/* v0.4.0: knock out an image's white background → transparent PNG data URL.
   Near-pure-white pixels (min channel ≥ HI) go fully transparent; a feather
   band (LO..HI) scales alpha so anti-aliased edges don't leave a white halo.
   Operates on a canvas; data: sources never taint it, so getImageData is safe.
   Falls back to the original src on any failure (e.g. a tainted external img). */
function _whiteToTransparent(src){
  return new Promise(res=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(!w||!h){ res(src); return; }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0);
        const id=ctx.getImageData(0,0,w,h), d=id.data;
        const HI=245, LO=224;
        for(let i=0;i<d.length;i+=4){
          if(d[i+3]===0) continue;
          const mn=Math.min(d[i],d[i+1],d[i+2]);
          if(mn>=HI) d[i+3]=0;
          else if(mn>=LO) d[i+3]=Math.round(d[i+3]*(1-(mn-LO)/(HI-LO)));
        }
        ctx.putImageData(id,0,0);
        res(c.toDataURL('image/png'));
      }catch(_){ res(src); }
    };
    img.onerror=()=>res(src);
    img.src=src;
  });
}

/* Convert an SVG document into editable PUBSYS cels in `tab`:
   • all vector shapes (path/rect/circle/…) → ONE full-page VEC cel (the
     artwork layer, behind everything), preserving their exact positions in
     the original coordinate system;
   • each <image> → an IMAGE cel (editable / swappable);
   • each <text> → a TEXT cel (editable copy), with font size + colour matched.
   Geometry comes from getBoundingClientRect of a hidden 1:1 render, mapped to
   the chosen canvas — so transforms/matrices are handled by the browser. */
/* v0.4.0: split a content extent into page regions by detecting large
   whitespace gutters on each axis, then keep the split only if the resulting
   tiles match the chosen page aspect (so a single page never false-splits and
   internal gaps don't either). Returns axis ranges. */
function _svgSplitAxis(intervals,total){
  if(!intervals.length) return [[0,total]];
  intervals=intervals.slice().sort((a,b)=>a[0]-b[0]);
  const merged=[]; let cs=intervals[0][0], ce=intervals[0][1];
  for(let k=1;k<intervals.length;k++){
    const s2=intervals[k][0], e2=intervals[k][1];
    if(s2<=ce+0.5){ ce=Math.max(ce,e2); } else { merged.push([cs,ce]); cs=s2; ce=e2; }
  }
  merged.push([cs,ce]);
  if(merged.length===1) return [[0,total]];
  const GUT=Math.max(18,total*0.04);
  const bounds=[0];
  for(let k=0;k<merged.length-1;k++){
    const gap=merged[k+1][0]-merged[k][1];
    if(gap>GUT) bounds.push((merged[k][1]+merged[k+1][0])/2);
  }
  bounds.push(total);
  const ranges=[];
  for(let k=0;k<bounds.length-1;k++) ranges.push([bounds[k],bounds[k+1]]);
  return ranges;
}
/* boxes: [{x,y,w,h}] in svg units. pageAspect = chosen canvas W/H. */
function _svgDetectRegions(boxes,vbW,vbH,pageAspect){
  const whole=[{x:0,y:0,w:vbW,h:vbH}];
  if(!boxes.length) return whole;
  const cols=_svgSplitAxis(boxes.map(b=>[b.x,b.x+b.w]),vbW);
  const rows=_svgSplitAxis(boxes.map(b=>[b.y,b.y+b.h]),vbH);
  if(cols.length*rows.length<=1) return whole;
  const cells=[];
  rows.forEach(([ry,ry2])=>cols.forEach(([rx,rx2])=>{
    const w=rx2-rx, h=ry2-ry;
    const has=boxes.some(b=>{const cx=b.x+b.w/2, cy=b.y+b.h/2; return cx>=rx&&cx<rx2&&cy>=ry&&cy<ry2;});
    if(has && w>4 && h>4) cells.push({x:rx,y:ry,w,h});
  }));
  if(cells.length<=1) return whole;
  /* validate: most cells must look like the chosen page (aspect within 18%) */
  const match=cells.filter(c=>Math.abs((c.w/c.h)-pageAspect)/pageAspect<0.18).length;
  if(match/cells.length>=0.6) return cells;
  return whole;
}

/* Convert an SVG document into editable PUBSYS cels. If the SVG holds several
   page-sized canvases (detected by whitespace gutters), each becomes its own
   tab in the SAME format the user picked — all imported in one go. The first
   region fills the tab nm-create already made; extras get fresh sibling tabs. */
async function importSvgAsObjects(firstTab, svgText){
  const cv0=$('cv-'+firstTab.id);
  if(!cv0){ alert('Import failed: canvas not ready.'); return; }
  const canvasW=parseInt(cv0.style.width)||794, canvasH=parseInt(cv0.style.height)||1123;
  const pageAspect=canvasW/canvasH;
  const XLINK='http://www.w3.org/1999/xlink';

  let doc;
  try{ doc=new DOMParser().parseFromString(svgText,'image/svg+xml'); }
  catch(e){ alert('SVG parse failed: '+e.message); return; }
  const svg=doc.querySelector('svg');
  if(!svg || doc.querySelector('parsererror')){ alert('That file is not a valid SVG.'); return; }

  let vbW,vbH;
  const vb=(svg.getAttribute('viewBox')||'').trim().split(/[\s,]+/).map(Number);
  if(vb.length===4 && vb[2]>0 && vb[3]>0){ vbW=vb[2]; vbH=vb[3]; }
  else { vbW=parseFloat(svg.getAttribute('width'))||canvasW; vbH=parseFloat(svg.getAttribute('height'))||canvasH; }

  /* hidden 1:1 render for geometry (image hrefs stripped to save memory) */
  const meas=document.createElement('div');
  meas.style.cssText='position:absolute;left:-99999px;top:0;pointer-events:none;opacity:0;'
    +'width:'+vbW+'px;height:'+vbH+'px;overflow:hidden';
  const liveSvg=document.importNode(svg,true);
  liveSvg.setAttribute('width',vbW); liveSvg.setAttribute('height',vbH);
  liveSvg.style.width=vbW+'px'; liveSvg.style.height=vbH+'px';
  liveSvg.querySelectorAll('image').forEach(im=>{ im.removeAttribute('href'); im.removeAttributeNS(XLINK,'href'); });
  meas.appendChild(liveSvg);
  document.body.appendChild(meas);
  await new Promise(r=>requestAnimationFrame(()=>r()));

  try{
    const svgRect=liveSvg.getBoundingClientRect();
    const u2x=l=>(l-svgRect.left)/svgRect.width*vbW;   // screen px -> svg units
    const u2y=t=>(t-svgRect.top)/svgRect.height*vbH;

    /* collect content boxes (svg units) for region detection */
    const boxes=[];
    liveSvg.querySelectorAll('path,rect,circle,ellipse,polygon,polyline,line,text,image').forEach(el=>{
      const r=el.getBoundingClientRect();
      if(r.width<0.5 && r.height<0.5) return;
      boxes.push({x:u2x(r.left), y:u2y(r.top), w:r.width/svgRect.width*vbW, h:r.height/svgRect.height*vbH});
    });
    const regions=_svgDetectRegions(boxes,vbW,vbH,pageAspect);

    /* create sibling tabs for extra regions (same format) up front */
    const tabs=[firstTab];
    for(let i=1;i<regions.length;i++){
      tabs.push(addTab({name:firstTab.name+' '+(i+1), type:firstTab.type,
        fmt:firstTab.fmt, res:firstTab.res, cw:firstTab.cw, ch:firstTab.ch, cunit:firstTab.cunit}));
    }
    if(regions.length>1){ await new Promise(r=>requestAnimationFrame(()=>r())); await new Promise(r=>requestAnimationFrame(()=>r())); }

    const liveImgs=Array.from(liveSvg.querySelectorAll('image'));
    const origImgs=Array.from(svg.querySelectorAll('image'));
    const liveTexts=Array.from(liveSvg.querySelectorAll('text'));

    for(let ri=0; ri<regions.length; ri++){
      const reg=regions[ri], tab=tabs[ri];
      const cv=$('cv-'+tab.id); if(!cv) continue;
      /* region rect in screen px + region->canvas scale */
      const regL=svgRect.left+(reg.x/vbW)*svgRect.width;
      const regT=svgRect.top +(reg.y/vbH)*svgRect.height;
      const regW=(reg.w/vbW)*svgRect.width, regH=(reg.h/vbH)*svgRect.height;
      const sx=canvasW/regW, sy=canvasH/regH;
      const inReg=r=>{ const cx=r.left+r.width/2, cy=r.top+r.height/2;
        return cx>=regL-0.5 && cx<=regL+regW+0.5 && cy>=regT-0.5 && cy<=regT+regH+0.5; };
      const mX=l=>(l-regL)*sx, mY=t=>(t-regT)*sy;
      let z=1;

      /* 1) ARTWORK vec layer cropped to the region's viewBox */
      const art=svg.cloneNode(true);
      art.querySelectorAll('text,image').forEach(n=>n.remove());
      if(!art.getAttribute('xmlns')) art.setAttribute('xmlns','http://www.w3.org/2000/svg');
      art.setAttribute('viewBox', reg.x+' '+reg.y+' '+reg.w+' '+reg.h);
      art.removeAttribute('width'); art.removeAttribute('height');
      if(art.querySelector('path,rect,circle,ellipse,polygon,polyline,line')){
        const url=svgTextToSizedBlobUrl(new XMLSerializer().serializeToString(art));
        const vcel=addCel(cv,{type:'vec',src:url,x:0,y:0,w:canvasW,h:canvasH,preserveSize:true});
        vcel.style.left='0px'; vcel.style.top='0px';
        vcel.style.width=canvasW+'px'; vcel.style.height=canvasH+'px'; vcel.style.zIndex='0';
        vcel.dataset.layerName='SVG ARTWORK';
      }
      /* 2) IMAGES in this region (white bg -> transparent by default) */
      for(let i=0;i<liveImgs.length;i++){
        const im=liveImgs[i];
        const href=origImgs[i] && (origImgs[i].getAttribute('href')||origImgs[i].getAttributeNS(XLINK,'href'));
        if(!href) continue;
        const r=im.getBoundingClientRect();
        if(!inReg(r)) continue;
        const x=mX(r.left), y=mY(r.top), w=Math.max(8,r.width*sx), h=Math.max(8,r.height*sy);
        const finalSrc=await _whiteToTransparent(href);
        const cel=addCel(cv,{type:'image',src:finalSrc,x,y,w,h});
        cel.style.left=x+'px'; cel.style.top=y+'px';
        cel.style.width=w+'px'; cel.style.height=h+'px'; cel.style.zIndex=String(z++);
      }
      /* 3) TEXT in this region */
      liveTexts.forEach(tx=>{
        const r=tx.getBoundingClientRect();
        if((r.width<0.5 && r.height<0.5) || !inReg(r)) return;
        let txt='', lastY=null;
        const spans=tx.querySelectorAll('tspan');
        if(spans.length){
          spans.forEach(sp=>{ const y=sp.getAttribute('y');
            if(lastY!==null && y!==null && y!==lastY) txt+='\n';
            txt+=sp.textContent; if(y!==null) lastY=y; });
        } else { txt=tx.textContent||''; }
        txt=txt.replace(/[ \t]+\n/g,'\n').trim();
        if(!txt) return;
        const cs=getComputedStyle(tx);
        const fontPx=Math.max(6,(parseFloat(cs.fontSize)||12)*sx);
        const color=(cs.fill && cs.fill!=='none' && cs.fill!=='rgb(0, 0, 0)')?cs.fill:'#111';
        const x=mX(r.left), y=mY(r.top), w=Math.max(40, r.width*sx+10);
        const cel=addCel(cv,{type:'text', body:txt, x, y, w, h:Math.max(18,r.height*sy+8)});
        cel.style.left=x+'px'; cel.style.top=y+'px'; cel.style.width=w+'px'; cel.style.zIndex=String(z++);
        const be=cel.querySelector('.cel-body-el');
        if(be){ be.style.fontSize=fontPx.toFixed(1)+'px'; be.style.color=color; be.style.lineHeight='1.1'; }
      });
    }

    if(regions.length>1 && tabs[0]) activateTab(tabs[0].id);
    deselectAll();
  }catch(e){
    console.error('SVG import error:',e);
    alert('SVG import hit an error: '+e.message);
  }finally{
    meas.remove();
  }
}

     uses this to ship with an empty SOURCES panel). */
  const tplOpts=nmTemplate&&TEMPLATES[nmTemplate]?TEMPLATES[nmTemplate]:{};

     freshly created tab (the new tab is already active from addTab). */
  if(nmTemplate && TEMPLATES[nmTemplate]){

  // Built-in schemes
  Object.entries(_builtinSchemes).forEach(([key,sc])=>{
    list.appendChild(makeSchemeRow(key,sc,true));
  });
  // Custom schemes
  Object.entries(_customSchemes).forEach(([key,sc])=>{
    list.appendChild(makeSchemeRow(key,sc,false));
  });
}

function makeSchemeRow(key,sc,builtin){
  const row=document.createElement('div');
  row.className='cs-row';
  const swatches=['th','alt','gc','gt','sc','st','bd'].map(k=>`<div class="cs-swatch" style="background:${sc[k]||'#ccc'};"></div>`).join('');
  row.innerHTML=`
    <div class="cs-row-name">${sc.name||key}</div>
    <div class="cs-row-swatches">${swatches}</div>
    ${builtin?'<span class="cs-row-built">BUILT-IN</span>':''}
    <button class="sbb" data-edit-key="${key}" style="margin-left:4px">EDIT</button>
    ${!builtin?`<button class="sbb" data-del-key="${key}" style="border-color:#b00;color:#b00">✕</button>`:''}`;
  row.querySelector('[data-edit-key]').addEventListener('click',()=>openSchemeEditor(key));
  row.querySelector('[data-del-key]')?.addEventListener('click',()=>{
    if(confirm('Delete "'+sc.name+'"?')){ delete _customSchemes[key]; syncAllSelects(); renderSchemeList(); }
  });
  return row;
}

function openSchemeEditor(key){
  _csEditKey=key;
  const sc=_customSchemes[key]||_builtinSchemes[key];
  $('cs-name').value=sc.name||key;
  ['th','alt','gc','gt','sc','st','bd'].forEach(k=>{
    $('cs-'+k).value=sc[k]||'#000000';
    $('cs-'+k+'-hex').value=sc[k]||'#000000';
  });
  // disable name if builtin
  $('cs-name').disabled=!!sc.builtin;
  $('cs-editor').style.display='';
  updateCSPreview();
}

// sync color<->hex pairs
['th','alt','gc','gt','sc','st','bd'].forEach(k=>{
  const col=$('cs-'+k), hex=$('cs-'+k+'-hex');
  col.addEventListener('input',()=>{ hex.value=col.value; updateCSPreview(); });
  hex.addEventListener('input',()=>{
    if(/^#[0-9a-fA-F]{6}$/.test(hex.value.trim())){ col.value=hex.value.trim(); updateCSPreview(); }
  });
});

function updateCSPreview(){
  const th=$('cs-th').value, alt=$('cs-alt').value;
  const gc=$('cs-gc').value, gt=$('cs-gt').value, bd=$('cs-bd').value;
  $('cs-prev-hd').style.cssText=`padding:2px 5px;font-weight:600;letter-spacing:.07em;background:${th};border-bottom:1px solid ${bd}`;
  $('cs-prev-r1').style.cssText=`padding:1px 5px;background:#fff`;
  $('cs-prev-r2').style.cssText=`padding:1px 5px;background:${alt}`;
}

$('cs-new-btn').addEventListener('click',()=>{
  const key='custom-'+Date.now();
  _customSchemes[key]={name:'New Scheme',th:'#d8d8d8',alt:'#f4f4f4',gc:'#444444',gt:'#ffffff',sc:'#888888',st:'#ffffff',bd:'#cccccc'};
  syncAllSelects();
  renderSchemeList();
  openSchemeEditor(key);
});

$('cs-save-edit').addEventListener('click',()=>{
  const key=_csEditKey; if(!key) return;
  const name=($('cs-name').value.trim()||'Custom').slice(0,24);
  const vals={th:$('cs-th').value,alt:$('cs-alt').value,gc:$('cs-gc').value,
    gt:$('cs-gt').value,sc:$('cs-sc').value,st:$('cs-st').value,bd:$('cs-bd').value};
  if(_builtinSchemes[key]){
    // editing a builtin: save as custom override with new key
    const nk='custom-'+Date.now();
    _customSchemes[nk]={...vals,name};
    syncAllSelects();
    renderSchemeList();
  } else {
    _customSchemes[key]={..._customSchemes[key],...vals,name};
    syncAllSelects();
    renderSchemeList();
    // re-apply if currently selected
    document.querySelectorAll('[id^="t2sc-"]').forEach(sel=>{
      if(!sel.id.startsWith('t2sc-add-')&&sel.value===key){
        sel.dispatchEvent(new Event('change'));
      }
    });
  }
  $('cs-editor').style.display='none';
  _csEditKey=null;
});

$('cs-discard').addEventListener('click',()=>{ $('cs-editor').style.display='none'; _csEditKey=null; });

function syncAllSelects(){
  document.querySelectorAll('[id^="t2sc-"]').forEach(sel=>{
    if(sel.id.startsWith('t2sc-add-')) return;
    // remove old custom options
    Array.from(sel.options).forEach(o=>{ if(o.value.startsWith('custom-')) o.remove(); });
    // add current custom schemes
    Object.entries(_customSchemes).forEach(([key,sc])=>{
      const opt=document.createElement('option');
      opt.value=key; opt.textContent=(sc.name||key)+' ✦';
      sel.appendChild(opt);
    });
  });
}

$('cs-close').addEventListener('click',()=>$('cs-modal').classList.remove('open'));
$('cs-cancel').addEventListener('click',()=>$('cs-modal').classList.remove('open'));
$('cs-modal').addEventListener('click',e=>{ if(e.target===$('cs-modal'))$('cs-modal').classList.remove('open'); });

/* Ensure an SVG has an intrinsic size so it renders inside an <img>.
   Many SVGs (incl. the bundled LETTER_TEMP-01) declare only a viewBox and
   omit width/height. An <img> displaying such an SVG reports naturalWidth/
   Height of 0 and — depending on the browser/layout context — collapses to
   a zero-size box, showing nothing on the canvas even though the markup is
   valid. We inject width="100%" height="100%" on the root <svg> so it fills
   whatever box it's dropped into, plus a preserveAspectRatio if absent so
   it scales proportionally within that box. viewBox is left intact, so the
   internal coordinate system is unchanged. Idempotent: SVGs that already
   declare width/height are returned untouched. */
function ensureSvgSized(svgText){
  const m=svgText.match(/<svg\b[^>]*>/i);
  if(!m) return svgText;
  let tag=m[0];
  const hasW=/\bwidth\s*=/.test(tag);
  const hasH=/\bheight\s*=/.test(tag);
  if(hasW && hasH) return svgText;   // already sized — leave alone
  let inject='';
  if(!hasW) inject+=' width="100%"';
  if(!hasH) inject+=' height="100%"';
  if(!/\bpreserveAspectRatio\s*=/.test(tag)) inject+=' preserveAspectRatio="xMidYMid meet"';
  /* insert the attributes right after "<svg" */
  const newTag=tag.replace(/^<svg\b/i,'<svg'+inject);
  return svgText.replace(tag,newTag);
}

/* Turn SVG text into a Blob URL, sizing it first so it always renders. */
function svgTextToSizedBlobUrl(svgText){
  const sized=ensureSvgSized(svgText);
  return URL.createObjectURL(new Blob([sized],{type:'image/svg+xml'}));
}

/* Decode an inlined base64 SVG to a Blob URL. Same shape any other VEC source
   uses, so all downstream code (cel render, exports, LAYERS thumb) treats it
   as a normal vector — no special-case branching anywhere. v0.4.0: parametrized
   so the six social/square templates share this path with the letter template. */
function decodeTemplateUrl(b64){
  const bin = atob(b64);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for (let i=0; i<len; i++) bytes[i] = bin.charCodeAt(i);
  /* Decode to text and run through ensureSvgSized — the bundled templates
     are viewBox-only, so without this they render blank on the canvas. */
  const svgText=new TextDecoder('utf-8').decode(bytes);
  return svgTextToSizedBlobUrl(svgText);
}
function decodeLetterTemplateUrl(){ return decodeTemplateUrl(LETTER_TEMPLATE_SVG_B64); }
