      out=`<g transform="rotate(${rot} ${cx} ${cy})">${out}</g>`;
    }
    if(opacity<1) out=`<g opacity="${opacity.toFixed(3)}">${out}</g>`;
    return out;
  }));

  /* build text SVG elements */
  const txtParts=txtCels.map(cel=>{
    if(cel.style.display==='none') return ''; // hidden via LAYERS panel
    const x=parseInt(cel.style.left)||0, y=parseInt(cel.style.top)||0;
    const w=cel.offsetWidth||240, h=cel.offsetHeight||120;
    const op=parseFloat(cel.style.opacity);
    const opacity=isNaN(op)?1:op;
    const lbl=cel.querySelector('.cel-label-el');
    const t  =cel.querySelector('.cel-title-el');
    const s  =cel.querySelector('.cel-sub-el');
    const b  =cel.querySelector('.cel-body-el');
    let g='', cy=y+6; // current y cursor

    /* LABEL badge */
    if(lbl?.innerText.trim()&&lbl.style.display!=='none'){
      const lfs=parseInt(lbl.style.fontSize)||12;
      const lbg=lbl.style.background||'#C41E33';
      const ltxt=lbl.innerText.trim();
      const lw=Math.ceil(ltxt.length*lfs*0.68)+20;
      g+=`<rect x="${x+5}" y="${cy}" width="${lw}" height="${lfs+8}" fill="${lbg}"/>`;
      g+=`<text x="${x+13}" y="${cy+lfs+2}" font-family="${FONT_LBL}" font-size="${lfs}" font-weight="700" fill="#fff" letter-spacing="1">${escXML(ltxt.toUpperCase())}</text>`;
      cy+=lfs+16;
    }

    /* TITLE + SUB — same baseline */
    const tfs=parseInt(t?.style.fontSize)||18;
    const sfs=parseInt(s?.style.fontSize)||14;
    if(t?.innerText.trim()||s?.innerText.trim()){
      let lx=x+5;
      if(t?.innerText.trim()){
        g+=`<text x="${lx}" y="${cy+tfs}" font-family="${FONT_TITL}" font-size="${tfs}" font-weight="700" fill="#111">${escXML(t.innerText.trim())}</text>`;
        const _tmc=document.createElement('canvas').getContext('2d');
        _tmc.font=`700 ${tfs}px 'Gotham HTF',Gotham,Montserrat,Arial`;
        lx+=Math.ceil(_tmc.measureText(t.innerText.trim()).width)+12;
      }
      if(s?.innerText.trim()){
        // SUB aligned to title baseline, slightly smaller
        g+=`<text x="${lx}" y="${cy+tfs}" font-family="${FONT_SUBF}" font-size="${sfs}" font-weight="400" fill="#555">${escXML(s.innerText.trim())}</text>`;
      }
      cy+=tfs+8;
    }

    /* BODY — word-wrap each line to element width.
       v0.3.7: innerText (not textContent) so contenteditable's <div>
       separators turn into proper \n that .split('\n') below can use. */
    if(b?.innerText.trim()){
      const bfs=parseInt(b?.style.fontSize)||13;
      const lh=bfs+5;
      const maxW=w-12;
      const _bmc=document.createElement('canvas').getContext('2d');
      /* Measure with Roboto Condensed FIRST — it's the font actually embedded
         in the exported SVG, so wrap positions computed here match what the
         rasteriser paints. Measuring with Bahnschrift (preview-only, absent
         from the export context) would compute wraps that don't match the
         painted Arial/Roboto width and the text would reflow. */
      _bmc.font=`400 ${bfs}px 'Roboto Condensed',Bahnschrift,'DIN Alternate',Arial`;
      function svgWrap(text){
        if(!text.trim()) return [];
        const out=[]; let cur='';
        for(const word of text.split(' ')){
          const test=cur?cur+' '+word:word;
          if(_bmc.measureText(test).width<=maxW) cur=test;
          else{if(cur)out.push(cur);cur=word;}
        }
        if(cur)out.push(cur);
        return out.length?out:[text];
      }
      b.innerText.split('\n').forEach(line=>{
        if(!line.trim()){cy+=lh*0.4;return;}
        svgWrap(line).forEach(wl=>{
          g+=`<text x="${x+5}" y="${cy+bfs}" font-family="${FONT_BODY_EXPORT}" font-size="${bfs}" fill="#555">${escXML(wl)}</text>`;
          cy+=lh;
        });
      });
    }

    const opAttr=opacity<1?` opacity="${opacity.toFixed(3)}"`:'';
    return `<g${opAttr}>${g}</g>`;
  });

  /* All cel SVG fragments are interleaved by z-index so the export's
     stacking order matches the preview exactly. Previously the SVG was
     emitted image-first → text → table regardless of z, which meant any
     image with a higher z than a table still drew BELOW it in the export
     (and vice versa) — opposite of what the user saw in the editor. */
  const imgFrag=imgCels.map((cel,i)=>({z:parseInt(cel.style.zIndex)||0,svg:imgParts[i]||''}));
  const vecFrag=vecCels.map((cel,i)=>({z:parseInt(cel.style.zIndex)||0,svg:vecParts[i]||''}));
  const txtFrag=txtCels.map((cel,i)=>({z:parseInt(cel.style.zIndex)||0,svg:txtParts[i]||''}));
  const tblFrag=tblCels.map(cel=>({z:parseInt(cel.style.zIndex)||0,svg:buildOneTableCelPart(cel)}));
  const ordered=[...imgFrag,...vecFrag,...txtFrag,...tblFrag].sort((a,b)=>a.z-b.z);
  const svgContent=ordered.map(f=>f.svg).join('');
  /* Embed an @import for the page's webfonts inside the SVG itself so the
     standalone .svg file (opened in a browser) renders with the same fonts
     as the live preview, not the system fallback. Without this, browsers
     fall back to a wider sans-serif and table text spills past the columns
     we sized for Barlow Condensed. PNG rasterisation goes through <img>,
     where @import font loading is unreliable across browsers — that's why
     we ALSO cushion the column widths in buildTableSVGCore / buildTitledTableSVG. */
  /* Barlow Condensed is EMBEDDED as base64 (BARLOW_FONT_CSS) so the table
     text rasterises with the real condensed font even though <img>-loaded
     SVGs can't fetch external webfonts. Montserrat/Roboto are still pulled
     via @import — they're only used by text cels (titles/body) whose font
     stacks fall back to local Gotham/Arial gracefully, and they're less
     metric-sensitive than the column-fitted table text. */
  const _fontImport=`<defs><style type="text/css"><![CDATA[${BARLOW_FONT_CSS}${ROBOTO_COND_FONT_CSS}@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');]]></style></defs>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${_fontImport}<rect width="${W}" height="${H}" fill="#fff"/>${svgContent}</svg>`;
}

/* Paint a single table cel — extracted so the layered builder above can
   call it per-cel for proper z-order interleaving with image/text cels. */
function buildOneTableCelPart(cel){
  if(cel.style.display==='none') return '';
  const x=parseInt(cel.style.left)||0, y=parseInt(cel.style.top)||0;
  const op=parseFloat(cel.style.opacity);
  const opAttr=(!isNaN(op)&&op<1)?` opacity="${op.toFixed(3)}"`:'';
  const tbl=cel.querySelector('.pub-tbl');
  if(!tbl) return '';
  /* Determine the cel's effective table scale. Two sources, checked in
     priority order:
       1) style.transform = scale(s)  ← canonical, set by applyBoxTblScale
       2) dataset.cellScale (number)  ← orphan/pasted/imported cels whose
          source box was never seen by applyBoxTblScale
     Without the fallback, an orphan cel exports at 100% even though the
     preview shows it scaled — exactly the picture's "table too small"
     symptom. */
  let scale=1;
  const tr=tbl.style.transform||'';
  const m=tr.match(/scale\(([0-9.]+)\)/);
  if(m) scale=parseFloat(m[1])||1;
  else if(cel.dataset.cellScale){
    const ds=parseFloat(cel.dataset.cellScale);
    if(!isNaN(ds)&&ds>0) scale=ds;
  }
  /* Temporarily clear the transform so the painter measures unscaled widths */
  const prevTransform=tbl.style.transform;
  tbl.style.transform='';
  const monoSc=getSchemeCSS('mono');
  const painted=buildTableSVGCore(tbl,monoSc);
  tbl.style.transform=prevTransform;
  if(!painted) return '';
  const inner=painted.svg.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'');
  const transform=scale===1?`translate(${x},${y})`:`translate(${x},${y}) scale(${scale})`;
  return `<g transform="${transform}"${opAttr}>${inner}</g>`;
}

/* ══ TABLE CEL SVG RENDERER ══
   Each table cel becomes pure SVG inside the layout SVG — no foreignObject,
   no inline HTML, no external stylesheet dependencies. That means:
   - PNG export works (no tainted-canvas SecurityError from foreignObject)
   - SVG export is fully self-contained and renders identically standalone
   The CSV is re-rendered into a detached .pub-tbl using csvToTableHTML, then
   painted by the same buildTableSVGCore the Table tabs use, then placed at the
   cel's (x,y) via a <g transform="translate(...)">. The scheme defaults to the
   built-in mono palette; per-cel schemes could be wired up later if needed. */
function buildTableCelParts(tblCels){
  if(!tblCels.length) return '';
  const monoSc=getSchemeCSS('mono');
  const parts=tblCels.map(cel=>{
    if(cel.style.display==='none') return '';
    const x=parseInt(cel.style.left)||0, y=parseInt(cel.style.top)||0;
    const op=parseFloat(cel.style.opacity);
    const opAttr=(!isNaN(op)&&op<1)?` opacity="${op.toFixed(3)}"`:'';
    /* Paint the cel's OWN table — already laid out at the user-visible width.
       The painter's column-width logic uses each td's getBoundingClientRect,
       so the SVG ends up with exactly the same column widths as the preview.
       (Previous approach used an off-screen stage at 1200px which let the
       table spread to its natural width — making the SVG/PNG ~50% wider
       than the cel and causing exported tables to overlap each other.) */
    const tbl=cel.querySelector('.pub-tbl');
    if(!tbl) return '';
    const painted=buildTableSVGCore(tbl,monoSc);
    if(!painted) return '';
    const inner=painted.svg.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'');
    return `<g transform="translate(${x},${y})"${opAttr}>${inner}</g>`;
  });
  return parts.join('');
}

/* ══ LAYOUT EXPORTS ══ */
async function saveLayoutSVG(tabId){
  const svg=await buildLayoutSVG(tabId);
  if(!svg) return;
  dl(svg,'pubsys-layout.svg','image/svg+xml');
}

async function saveLayoutPNG(tabId){
  /* v0.3.7: SAVE → PNG now uses the html2canvas pipeline (via
     captureLayoutAsPng) instead of the buildLayoutSVG → svgToPNG path,
     so the per-tab download is pixel-identical to what SCREEN SHOTS
     would put in the zip for that tab. */
  const btn=$('lt-png-'+tabId);
  if(btn){ btn.textContent='WAIT…'; btn.disabled=true; }
  const tab=state.tabs.find(t=>t.id===tabId);
  const origTheme=document.body.dataset.theme;
  if(origTheme==='dark') document.body.dataset.theme='light';
  try{
    if(!tab) throw new Error('No tab');
    /* SAVE → PNG is normally invoked on the active tab — activate as a
       no-op safety guard if not. Two rAFs let fitCanvas / ResizeObserver
       and the theme switch settle before the capture reads geometry. */
    if(state.active !== tabId){
      activateTab(tabId);
      await new Promise(r=>requestAnimationFrame(()=>r()));
    }
    await new Promise(r=>requestAnimationFrame(()=>r()));
    if(document.fonts && document.fonts.ready){
      try{ await document.fonts.ready; }catch(_){}
    }
    const blob=await captureLayoutAsPng(tabId);
    const fname=(tab.name||'pubsys-layout').replace(/[^A-Za-z0-9_-]+/g,'_').slice(0,60)+'.png';
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(err){ alert('PNG error: '+err.message); }
  if(origTheme) document.body.dataset.theme=origTheme;
  else delete document.body.dataset.theme;
  if(btn){ btn.textContent='SAVE PNG'; btn.disabled=false; }
}

async function saveLayoutHTML(tabId,opts={}){
  const cv=$('cv-'+tabId); if(!cv){ if(!opts.returnString) alert('No canvas.'); return null; }
  const btn=opts.returnString?null:$('lt-html-'+tabId);
  if(btn){btn.textContent='WAIT…';btn.disabled=true;}
  try{
    const W=cv.offsetWidth, H=cv.offsetHeight;
    // Render images first (lower layer), then text (higher layer)
    const imgCels=Array.from(cv.querySelectorAll('.cel-img'));
    const txtCels=Array.from(cv.querySelectorAll('.cel-txt'));
    const vecCels=Array.from(cv.querySelectorAll('.cel-vec'));

    /* Inline every image as a base64 data URL.
       The live editor uses URL.createObjectURL(...) blob URLs, which are
       scoped to the originating document — they die the moment the
       exported .html is opened as a standalone file, leaving Chrome to
       draw its broken-image outline where the picture should be. */
    const imgB64=new Map();
    await Promise.all(imgCels.map(async cel=>{
      if(cel.style.display==='none') return; // skip hidden — not in output
      const img=cel.querySelector('img');
      if(img&&img.src) imgB64.set(cel, await imgToB64(img.src));
    }));
    /* Inline every VEC source as a base64 SVG data URL — kept as
       data:image/svg+xml so the browser renders it as VECTOR in the
       exported HTML. Going through imgToB64 would rasterize the SVG to
       PNG (defeating the whole reason VEC exists). */
    const vecData=new Map();
    await Promise.all(vecCels.map(async cel=>{
      if(cel.style.display==='none') return;
      const img=cel.querySelector('img');
      if(!img||!img.src) return;
      try{
        const r=await fetch(img.src);
        const text=await r.text();
        vecData.set(cel,'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(text))));
      }catch(e){
        console.warn('VEC HTML export: could not read SVG',e);
      }
    }));

    let body='';
    const tblCels=Array.from(cv.querySelectorAll('.cel-tbl'));
    [...imgCels,...vecCels,...txtCels,...tblCels].forEach(cel=>{
      if(cel.style.display==='none') return; // hidden via LAYERS panel
      const x=parseInt(cel.style.left)||0,y=parseInt(cel.style.top)||0;
      const w=cel.offsetWidth,h=cel.offsetHeight;
      const z=parseInt(cel.style.zIndex)||0;
      const rot=parseFloat(cel.dataset.rotation)||0;
      const op=parseFloat(cel.style.opacity);
      const opacity=isNaN(op)?1:op;
      const zStyle=z?`z-index:${z};`:'';
      const opStyle=opacity<1?`opacity:${opacity.toFixed(3)};`:'';
      const rotStyle=rot?`transform:rotate(${rot}deg);`:'';
      if(cel.classList.contains('cel-img')){
        const src=imgB64.get(cel)||'';
        body+=`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;overflow:hidden;${zStyle}${rotStyle}${opStyle}"><img src="${src}" style="width:100%;height:100%;object-fit:contain"></div>\n`;
      } else if(cel.classList.contains('cel-vec')){
        const src=vecData.get(cel)||'';
        /* No object-fit — cel is aspect-correct so width/height:100% fills it. */
        body+=`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;overflow:hidden;${zStyle}${rotStyle}${opStyle}"><img src="${src}" style="width:100%;height:100%;display:block"></div>\n`;
      } else if(cel.classList.contains('cel-tbl')){
        const csv=cel.dataset.csv||'';
        /* Capture effective table scale. style.transform is canonical
           (set by applyBoxTblScale); dataset.cellScale is the fallback
           for orphan/pasted cels whose source box was never seen by
           applyBoxTblScale. Mirrors the same fallback used in
           buildOneTableCelPart for SVG export. */
        const liveTbl=cel.querySelector('.pub-tbl');
        const tr=liveTbl?.style.transform||'';
        const sm=tr.match(/scale\(([0-9.]+)\)/);
        let scale=sm?parseFloat(sm[1])||1:1;
        if(scale===1 && cel.dataset.cellScale){
          const ds=parseFloat(cel.dataset.cellScale);
          if(!isNaN(ds)&&ds>0) scale=ds;
        }
        const scaleStyle=scale!==1?`transform:scale(${scale});transform-origin:top left;`:'';
        /* No background-fill on the table cel itself — only the table rows
           paint, the surrounding area stays transparent (matches preview).
           Table renders at natural width; the cel's w/h are just a
           positioning anchor, not a clip. */
        const html=csvToTableHTML(csv, cel.dataset.colAlign||'', cel.dataset.csvVariant);
        body+=`<div style="position:absolute;left:${x}px;top:${y}px;${zStyle}${rotStyle}${opStyle}"><div style="${scaleStyle}display:inline-block">${html}</div></div>\n`;
      } else {
        const lbl=cel.querySelector('.cel-label-el');
        const t  =cel.querySelector('.cel-title-el');
        const s  =cel.querySelector('.cel-sub-el');
        const b  =cel.querySelector('.cel-body-el');
        const tfs=parseInt(t?.style.fontSize)||18;
        const sfs=parseInt(s?.style.fontSize)||14;
        const bfs=parseInt(b?.style.fontSize)||13;
        const lfs=Math.max(9,tfs-4);
        // Label badge
        // v0.3.7: innerText preserves multi-line content from contenteditable.
        const lblHtml=(lbl?.innerText.trim()&&lbl.style.display!=='none')
          ?`<div style="display:inline-block;padding:2px 8px;font-size:${lfs}px;font-weight:700;letter-spacing:1px;color:#fff;background:${lbl.style.background||'#C41E33'};margin-bottom:6px;font-family:${FONT_LBL}">${escXML(lbl.innerText.trim())}</div><br>`:'';
        // Title + Sub same line
        const titleHtml=`<span style="font-weight:700;font-size:${tfs}px;font-family:${FONT_TITL}">${escXML(t?.innerText||'')}</span>`
          +(s?.innerText.trim()?` <span style="font-weight:400;font-size:${sfs}px;color:#555;font-family:${FONT_SUBF}">${escXML(s.innerText.trim())}</span>`:'');
        // Body — preserve newlines as <br>
        const bodyLines=(b?.innerText||'').split('\n')
          .map(l=>l.trim()?`<span style="display:block;font-size:${bfs}px;color:#555;font-family:${FONT_BODY};white-space:pre-wrap;word-break:break-word">${escXML(l)}</span>`:'')
          .join('');
        body+=`<div style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;padding:6px;box-sizing:border-box;word-break:break-word;${zStyle}${rotStyle}${opStyle}">
  ${lblHtml}<div style="margin-bottom:4px">${titleHtml}</div>
  ${bodyLines}
</div>\n`;
      }
    });
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PUBSYS Layout</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap');
body{margin:0;background:#f0f0f0;display:flex;align-items:flex-start;justify-content:center;padding:24px}
#pg{position:relative;background:#fff;width:${W}px;height:${H}px}
.pub-tbl{border-collapse:collapse;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:11px;background:#fff}
.pub-tbl th,.pub-tbl td{border:1px solid #d8d8d8;padding:3px 8px;text-align:left;text-transform:uppercase;white-space:nowrap}
.pub-tbl.ttl-mode td{text-transform:none}
.pub-tbl th{background:#d8d8d8;color:#333;font-weight:700;letter-spacing:.05em;padding:4px 8px;font-size:10px}
.pub-tbl tr:nth-child(even) td{background:#f4f4f4}
.pub-tbl .gc{background:#a0a0a0;color:#fff;font-weight:700;letter-spacing:.1em;writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:9px;padding:6px 2px}
.pub-tbl .sc{background:#bcbcbc;color:#fff;font-weight:600;writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:9px;padding:6px 2px}
.pub-tbl .nc{text-align:center;font-size:10px}
.pub-tbl .ttl-row{text-align:center;font-size:10px;letter-spacing:.1em;padding:4px 8px;font-weight:600}
</style></head>
<body><div id="pg">${body}</div></body></html>`;
    if(opts.returnString){ if(btn){btn.textContent='SAVE HTML';btn.disabled=false;} return html; }
    dl(html,'pubsys-layout.html','text/html');
  }catch(err){
    if(opts.returnString) throw err;
    alert('HTML export failed: '+err.message);
  }
  if(btn){btn.textContent='SAVE HTML';btn.disabled=false;}
  return null;
}

/* ══ BG-TRANSPARENT IMAGE PROCESSOR ══
   "White → Alpha" via color-to-alpha (the algorithm GIMP / Figma's "Darken"
   against a white base use). For each pixel:
     alpha = 255 - min(R,G,B)             — lighter pixels → more transparent
     new_c = (c - 255) * 255 / alpha + 255 — unmultiply white from each channel
   so anti-aliased edges fade smoothly, off-white backgrounds (245,245,245
   etc.) disappear, and coloured pixels keep their hue without a white halo. */
async function makeBgTransparent(srcUrl){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const c=document.createElement('canvas');
        c.width=img.naturalWidth||img.width;
        c.height=img.naturalHeight||img.height;
        const ctx=c.getContext('2d',{willReadFrequently:true});
        ctx.drawImage(img,0,0);
        let data;
        try{ data=ctx.getImageData(0,0,c.width,c.height); }
        catch(e){ reject(new Error('Cannot read pixel data (CORS)')); return; }
        const px=data.data;
        for(let i=0;i<px.length;i+=4){
          const r=px[i], g=px[i+1], b=px[i+2], origA=px[i+3];
          const m=r<g?(r<b?r:b):(g<b?g:b);   // min(R,G,B)
          const a=255-m;                       // new alpha contribution
          if(a===0){
            px[i+3]=0;                         // pure white → gone
          } else {
            const inv=255/a;
            px[i]   = ((r-255)*inv+255)|0;
            px[i+1] = ((g-255)*inv+255)|0;
            px[i+2] = ((b-255)*inv+255)|0;
            // clamp (negative on coloured pixels possible before clamp)
            if(px[i]  <0)px[i]  =0; else if(px[i]  >255)px[i]  =255;
            if(px[i+1]<0)px[i+1]=0; else if(px[i+1]>255)px[i+1]=255;
            if(px[i+2]<0)px[i+2]=0; else if(px[i+2]>255)px[i+2]=255;
            // combine with any existing alpha in the source PNG
            px[i+3] = (origA*a/255)|0;
          }
        }
        ctx.putImageData(data,0,0);
        c.toBlob(b=>{
          if(!b){reject(new Error('Canvas toBlob failed'));return;}
          resolve(URL.createObjectURL(b));
        },'image/png');
      }catch(e){reject(e);}
    };
    img.onerror=()=>reject(new Error('Image load failed'));
    img.src=srcUrl;
  });
}

/* Detect SVG sources so the white-punch processor can be skipped. SVGs
   are vector — running them through the pixel processor would rasterize
   the image into a tiny PNG (whatever intrinsic dims the SVG declares,
   often a few hundred px), then re-encode it. When that small PNG is
   displayed inside a much larger cel, the result is the blurry/garbled
   logo seen in the export comparison shots. Vector should stay vector.
   Two detection paths:
   • Cheap URL sniff first — `.svg` extension or `data:image/svg+xml,...`
     covers OS file drops and ZIP-import-restored blobs whose source path
     ends in `.svg`.
   • If the URL is opaque (a blob: URL from createObjectURL with no
     extension), fall back to a HEAD-equivalent fetch + Content-Type
     check. Cached on the dz dataset so we don't re-fetch every time the
     checkbox toggles. */
function isSvgUrl(url){
  if(!url) return false;
  if(/^data:image\/svg\+xml/i.test(url)) return true;
  if(/\.svg(\?|$|#)/i.test(url)) return true;
  return false;
}
async function isSvgSource(url){
  if(isSvgUrl(url)) return true;
  /* blob: URLs have no extension hint — fetch and read the MIME from
     the response. fetch on a blob: URL is local and synchronous-fast. */
  if(/^blob:/i.test(url)){
    try{
      const r=await fetch(url);
      const ct=(r.headers.get('content-type')||'').toLowerCase();
      if(ct.includes('image/svg')) return true;
      /* Some browsers serve blob URLs without a content-type header.
         Last-ditch: read the first few bytes and look for "<svg". */
      if(!ct||ct==='application/octet-stream'){
        const blob=await r.blob();
        const head=await blob.slice(0,256).text();
        return /<svg\b/i.test(head);
      }
    }catch{}
  }
  return false;
}

/* Apply (or re-apply) an image to a source-box dropzone, honouring the
   "WHITE → TRANSPARENT" checkbox. Always keeps the unprocessed URL on
   dz.dataset.origSrc so toggling the checkbox can revert / re-process.
   Also pushes the resulting URL into every canvas cel spawned from this
   source, so toggling the checkbox (or replacing the image) updates the
   live canvas without forcing the user to re-drag. Position / scale /
   rotation are stored on the cel itself and are preserved.
   SVG inputs short-circuit the processor: the checkbox is force-cleared
   and disabled with a tooltip explaining why. SVGs natively support
   transparency through their own markup — there's nothing for a pixel-
   based white-punch to do, and rasterizing them just degrades the asset. */
async function applyImageToDZ(dz,bid,origUrl){
  if(!dz||!origUrl) return;
  dz.dataset.origSrc=origUrl;
  const cb=$('bgt-'+bid);
  const row=$('bgtrow-'+bid);

  /* SVG detection: cache on the dz so we don't refetch on every toggle. */
  let isSvg=dz.dataset.isSvg==='1';
  if(!isSvg && dz.dataset.isSvg!=='0'){
    isSvg=await isSvgSource(origUrl);
    dz.dataset.isSvg=isSvg?'1':'0';
  }
  if(isSvg && cb){
    /* Force the box back to the un-processed path and lock the control. */
    if(cb.checked) cb.checked=false;
    cb.disabled=true;
    if(row){
      row.classList.add('disabled');
      row.title='SVGs are vector — they already support transparency natively';
    }
  } else if(cb){
    cb.disabled=false;
    if(row){
      row.classList.remove('disabled');
      row.title='Convert near-white background to transparent';
    }
  }

  let finalUrl;
  if(cb&&cb.checked&&!isSvg){
    row?.classList.add('busy');
    try{
      const processed=await makeBgTransparent(origUrl);
      setDZ(dz,processed);
      dz.dataset.src=processed;
      dz.dataset.bgTransp='1';
      finalUrl=processed;
    }catch(e){
      console.warn('BG-transparent failed:',e);
      setDZ(dz,origUrl);
      dz.dataset.src=origUrl;
      dz.dataset.bgTransp='0';
      finalUrl=origUrl;
    }
    row?.classList.remove('busy');
  } else {
    setDZ(dz,origUrl);
    dz.dataset.src=origUrl;
    dz.dataset.bgTransp='0';
    finalUrl=origUrl;
  }
  refreshCelsForSource(bid,finalUrl);
}

/* Push a new image src into every canvas cel that points at this source
   box (data-source-bid match). The cel's own left/top/width/height and
   dataset.rotation are untouched — only the inner <img>.src changes, so
   position, scale and rotation all stay put. object-fit:contain on the
   img handles any aspect-ratio difference between the original and the
   processed (transparent-bg) image without distortion. */
function refreshCelsForSource(bid,newSrc){
  if(!newSrc) return;
  const sbid=String(bid);
  document.querySelectorAll('.cel-img').forEach(cel=>{
    if(cel.dataset.sourceBid===sbid){
      const img=cel.querySelector('img');
      if(img) img.src=newSrc;
    }
  });
}

/* ══ PUBSYS PROJECT PACK — EXPORT / IMPORT (.zip) ══
   Pack format (manifest.json + images/ folder):
   {
     pubsysFormat:1, version:'0.4.0',
     tab:{ name, type, fmt, res, cw, ch },
     sources:[ { mode:'image'|'text', image?:filename, bgTransp?, label?, ... } ],
     cels:[ { type:'image'|'text', x,y,w,h,z, image?:filename, label?, ... } ]
   }
*/
/* Build a .pubsys.zip for one tab and return it as a Blob.
   Pulled out of exportLayoutZip so EXPORT ALL can reuse the same builder
   without going through a file download. Throws on errors so the caller
   can decide whether to abort the whole bundle or skip the tab. */
async function buildLayoutZipBlob(tabId){
  if(typeof JSZip==='undefined') throw new Error('ZIP library not loaded');
  const tab=state.tabs.find(t=>t.id===tabId); if(!tab) throw new Error('No tab');
  const cv=$('cv-'+tabId); if(!cv) throw new Error('No canvas');

  const zip=new JSZip();
  const imgFolder=zip.folder('images');
  const seen=new Map();   // url -> filename (dedupe identical sources)
  let counter=0;

  async function registerImage(url){
    if(!url) return null;
    if(seen.has(url)) return seen.get(url);
    try{
      const r=await fetch(url);
      const blob=await r.blob();
      /* blob.type is unreliable: blob: URLs created without an explicit type
         (or via some canvas/fetch paths) report '' or 'text/plain', which
         used to produce filenames like img_002.plain. Sniff the leading
         bytes to identify the real format, falling back to blob.type only
         when the magic numbers don't match anything known. */
      const buf=new Uint8Array(await blob.slice(0,16).arrayBuffer());
      let ext=null, mime=null;
      const isPng = buf[0]===0x89&&buf[1]===0x50&&buf[2]===0x4E&&buf[3]===0x47;
      const isJpg = buf[0]===0xFF&&buf[1]===0xD8&&buf[2]===0xFF;
      const isGif = buf[0]===0x47&&buf[1]===0x49&&buf[2]===0x46;
      // WEBP: "RIFF"...."WEBP"
      const isWebp= buf[0]===0x52&&buf[1]===0x49&&buf[2]===0x46&&buf[3]===0x46&&
                    buf[8]===0x57&&buf[9]===0x45&&buf[10]===0x42&&buf[11]===0x50;
      // SVG: starts with "<?xml" or "<svg" (after optional BOM/whitespace)
      const head=new TextDecoder('utf-8').decode(buf).replace(/^\uFEFF/,'').trimStart().toLowerCase();
      const isSvg = head.startsWith('<?xml')||head.startsWith('<svg');
      if(isPng){ ext='png'; mime='image/png'; }
      else if(isJpg){ ext='jpg'; mime='image/jpeg'; }
      else if(isGif){ ext='gif'; mime='image/gif'; }
      else if(isWebp){ ext='webp'; mime='image/webp'; }
      else if(isSvg){ ext='svg'; mime='image/svg+xml'; }
      else {
        // fall back to blob.type, sanitising the known-bad values
        let t=(blob.type||'').toLowerCase();
        if(!t||t==='text/plain'||t==='application/octet-stream') t='image/png';
        ext=(t.split('/')[1]||'png');
        if(ext==='jpeg') ext='jpg';
        if(ext==='svg+xml') ext='svg';
        mime=t;
      }
      const fname=`img_${String(++counter).padStart(3,'0')}.${ext}`;
      /* Re-wrap with the correct MIME so the stored blob is well-typed too. */
      const typed=(blob.type===mime)?blob:new Blob([blob],{type:mime});
      imgFolder.file(fname,typed);
      seen.set(url,fname);
      return fname;
    }catch(e){console.warn('Could not fetch image',url,e);return null;}
  }

  const sources=[];
  const oldBidToIdx={};
  const bw=$('bw-'+tabId);
  if(bw){
    for(const box of Array.from(bw.querySelectorAll('.sb'))){
      const bid=box.id.replace('sb-','');
      oldBidToIdx[bid]=sources.length;
      const mode=box.dataset.mode||'image';
      const rec={mode};
      const _bs=parseFloat(box.dataset.tblScale);
      if(!isNaN(_bs)&&_bs!==1) rec.tblScale=_bs;
      if(mode==='image'){
        const dz=box.querySelector('.dz:not(.vec-dz)');
        const origSrc=dz?.dataset.origSrc||dz?.dataset.src;
        if(origSrc) rec.image=await registerImage(origSrc);
        rec.bgTransp=$('bgt-'+bid)?.checked?1:0;
      } else if(mode==='vec'){
        const vdz=$('vdz-'+bid);
        const origSrc=vdz?.dataset.origSrc||vdz?.dataset.src;
        if(origSrc) rec.image=await registerImage(origSrc);
      } else if(mode==='csv'){
        /* v0.3.8: CSV-mode source boxes have a <textarea id="csv-{bid}">
           holding the source CSV. Previously this branch didn't exist —
           CSV-mode boxes silently fell through to the text branch, which
           reads tl-/tt-/ts-/tb- inputs that don't exist on a CSV box. So
           rec.csv came out empty and re-imports lost the source CSV.
           (Per-cel CSV data still lived on each table cel's dataset.csv,
           so existing table cels rendered; but the SOURCE box couldn't
           re-broadcast edits and the tblScale anchor was missing.) */
        const csvEd=$('csv-'+bid);
        rec.csv=csvEd?.value||'';
      } else {
        rec.label     =$('tl-'+bid)?.value||'';
        rec.labelColor=$('tlc-'+bid)?.value||'#C41E33';
        rec.title     =$('tt-'+bid)?.value||'';
        rec.sub       =$('ts-'+bid)?.value||'';
        rec.body      =$('tb-'+bid)?.value||'';
        /* v0.3.9: include-checkbox states. Save false explicitly when
           unchecked; omit the field when checked so older packs (no
           value) keep round-tripping as "all included". */
        if($('tlcb-'+bid)?.checked===false) rec.includeLabel=false;
        if($('ttcb-'+bid)?.checked===false) rec.includeTitle=false;
        if($('tscb-'+bid)?.checked===false) rec.includeSub=false;
        if($('tbcb-'+bid)?.checked===false) rec.includeBody=false;
      }
      sources.push(rec);
    }
  }

  const cels=[];
  for(const cel of Array.from(cv.querySelectorAll('.cel'))){
    const sbid=cel.dataset.sourceBid;
    const rec={
      x:parseInt(cel.style.left)||0, y:parseInt(cel.style.top)||0,
      w:cel.offsetWidth, h:cel.offsetHeight,
      z:parseInt(cel.style.zIndex)||0,
      rotation:parseFloat(cel.dataset.rotation)||0,
      sourceIdx:(sbid&&sbid in oldBidToIdx)?oldBidToIdx[sbid]:null,
      hidden:cel.style.display==='none'?1:0,
      opacity:(()=>{const o=parseFloat(cel.style.opacity);return isNaN(o)?1:o;})(),
      /* v0.3.6: lock state round-trips through .pubsys.zip so a locked
         cel stays locked on re-import. Stored as 1/absent (compact). */
      locked:cel.dataset.locked==='1'?1:0,
      /* v0.3.9: round-trip group membership through the pack. */
      groupId:cel.dataset.groupId||undefined,
      /* v0.3.9: VEC primitive shape state (type + color + stroke + fill).
         Only present on primitive cels — omitted (undefined → JSON
         strips it) for uploaded-SVG cels. */
      primType:cel.dataset.primType||undefined,
      primColor:cel.dataset.primColor||undefined,
      primStroke:cel.dataset.primStroke||undefined,
      primFill:cel.dataset.primFill||undefined,
    };
    if(cel.classList.contains('cel-img')){
      rec.type='image';
      const img=cel.querySelector('img');
      if(img?.src) rec.image=await registerImage(img.src);
      /* v0.3.2: per-cel BG-transparent state. If the cel's BG toggle is
         on, also save the unprocessed origSrc so re-imports can flip it
         back off and restore the original pixels. */
      if(cel.dataset.bgTransp==='1') rec.bgTransp=1;
      if(cel.dataset.origSrc) rec.origImage=await registerImage(cel.dataset.origSrc);
    } else if(cel.classList.contains('cel-vec')){
      rec.type='vec';
      const img=cel.querySelector('img');
      if(img?.src) rec.image=await registerImage(img.src);
      /* Preserve "TEMPLATE" tagging on vec cels so re-imports still
         recognize them as the page-wide template. */
      if(cel.dataset.isTemplate==='1') rec.isTemplate=1;
    } else if(cel.classList.contains('cel-tbl')){
      rec.type='table';
      rec.csv=cel.dataset.csv||'';
      rec.colAlign=cel.dataset.colAlign||'';
      rec.csvVariant=cel.dataset.csvVariant||'csv1';
      rec.tblFont=cel.dataset.tblFont||'';
      rec.titleFS=cel.dataset.titleFS||'';
      rec.cellPad=cel.dataset.cellPad||'';
      rec.cellScale=parseFloat(cel.dataset.cellScale)||1;
    } else {
      rec.type='text';
      const lbl=cel.querySelector('.cel-label-el');
      const t  =cel.querySelector('.cel-title-el');
      const s  =cel.querySelector('.cel-sub-el');
      const b  =cel.querySelector('.cel-body-el');
      /* v0.3.7: see the matching note in serializeCel. innerText
         preserves the newlines that contenteditable produces from
         Enter-key edits; textContent flattens them. This was the
         source of "edited text-box on canvas doesn't make it into
         the .pubsys pack inside EXPORT ALL" — the cels' multi-line
         bodies were being saved as one concatenated line. */
      rec.label     =lbl?.innerText||'';
      rec.labelColor=lbl?.style.background||'#C41E33';
      rec.title     =t?.innerText||'';
      rec.sub       =s?.innerText||'';
      rec.body      =b?.innerText||'';
      const fsIn=cel.querySelector('.fs-in');
      rec.fontSize=parseInt(fsIn?.value)||13;
      /* v0.3.8: full per-sub-element fidelity. Same rationale as
         serializeCel — the v0.3.7 FONT / FS / TRK toolbar writes
         inline font-family / font-size / letter-spacing, and the
         per-character tracking inserts <span class="_txt-trk"> wraps
         inside the contenteditable. None of that lives in the plain-
         text fields above, so without these the round-trip through
         EXPORT or EXPORT ALL silently dropped every custom font and
         every character-level letter-spacing. */
      if(lbl){
        rec.labelHtml =lbl.innerHTML;
        const ls=lbl.getAttribute('style'); if(ls) rec.labelStyle=ls;
      }
      if(t){
        rec.titleHtml =t.innerHTML;
        const ts=t.getAttribute('style'); if(ts) rec.titleStyle=ts;
      }
      if(s){
        rec.subHtml   =s.innerHTML;
        const ss=s.getAttribute('style'); if(ss) rec.subStyle=ss;
      }
      if(b){
        rec.bodyHtml  =b.innerHTML;
        const bs=b.getAttribute('style'); if(bs) rec.bodyStyle=bs;
      }
      /* v0.3.8: .cel-title-row justify-content carries TITLE/SUB
         alignment — flex items don't honor text-align so the visible
         alignment lives on the row parent. See serializeCel for the
         matching save. */
      const titleRow=cel.querySelector('.cel-title-row');
      if(titleRow){
        const trs=titleRow.getAttribute('style');
        if(trs) rec.titleRowStyle=trs;
      }
    }
    cels.push(rec);
  }

  const manifest={
    pubsysFormat:1, version:'0.4.0',
    tab:{ name:tab.name, type:tab.type, fmt:tab.fmt, res:tab.res, cw:tab.cw, ch:tab.ch, cunit:tab.cunit },
    sources, cels
  };
  zip.file('manifest.json',JSON.stringify(manifest,null,2));
  return await zip.generateAsync({type:'blob'});
}

async function exportLayoutZip(tabId){
  if(typeof JSZip==='undefined'){alert('ZIP library failed to load (check internet).');return;}
  const tab=state.tabs.find(t=>t.id===tabId); if(!tab) return;
  const btn=$('lt-exp-'+tabId);
  if(btn){btn.textContent='WAIT…';btn.disabled=true;}
  try{
    const blob=await buildLayoutZipBlob(tabId);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=(tab.name||'pubsys').replace(/[^\w\-]+/g,'_')+'.pubsys.zip';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){
    alert('Export failed: '+e.message);
    console.error(e);
  }
  if(btn){btn.textContent='EXPORT';btn.disabled=false;}
}

/* ══ EXPORT ALL ══
   Roll every tab into one big .zip:
     • pubsys-packs/<name>.pubsys.zip   ← editable pack per layout/hybrid
     • svg/<name>.svg                   ← rendered SVG per layout/hybrid
     • png/<name>.png                   ← html2canvas PNG per layout/hybrid
                                          (identical to SCREEN SHOTS output)
     • html/<name>.html                 ← standalone HTML per layout/hybrid
     • tables/<name>.svg + .png + .html ← table tabs get the same trio
   Each tab is processed under its own try/catch so one failure doesn't
   bring down the whole bundle.

   v0.3.7 — significant rework:
     • PNG generation switched from the buildLayoutSVG → svgToPNGBlob
       path to captureLayoutAsPng (the html2canvas pipeline shared with
       SCREEN SHOTS and SAVE → PNG). The png/ folder is now pixel-
       identical to what SCREEN SHOTS would produce for the same tabs.
     • Replaced the v0.3.5 "hoist inactive .tc off-screen" trick with
       per-tab activateTab cycling. The hoist trick made inactive tabs
       measurable but didn't run the full layout pipeline (ResizeObserver
       → fitCanvas, --cv-inv-scale propagation, image-aspect callbacks);
       captureLayoutAsPng's html2canvas needs every layout pass to be
       settled before it reads geometry, so we genuinely activate each
       tab in turn. Visible flicker is hidden behind a modal overlay,
       same approach SCREEN SHOTS uses. The originally-active tab is
       restored in finally. */
async function exportAll(){
  if(typeof JSZip==='undefined'){alert('ZIP library failed to load.');return;}
  if(typeof html2canvas==='undefined'){alert('html2canvas library failed to load (check internet).');return;}
  if(!state.tabs.length){ alert('No tabs to export.'); return; }
  const btn=$('btn-export-all');
  const origLabel=btn?.textContent;
  if(btn){btn.textContent='WORKING…';btn.disabled=true;}
  const errors=[];
  const origActive=state.active;

  /* Force light theme for the run so dark CSS variables don't leak
     into html2canvas-rendered PNGs. Restored in finally. */
  const origTheme=document.body.dataset.theme;
  if(origTheme==='dark') document.body.dataset.theme='light';

  /* Modal overlay covers the tab-cycling flicker. */
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);'
    +'z-index:99999;display:flex;flex-direction:column;'
    +'align-items:center;justify-content:center;gap:14px;'
    +'color:#fff;font-family:monospace;font-size:13px;letter-spacing:.12em;'
    +'text-transform:uppercase;user-select:none';
  const olbl=document.createElement('div');
  olbl.textContent='EXPORTING ALL…';
  const osub=document.createElement('div');
  osub.style.cssText='font-size:11px;letter-spacing:.05em;color:#9aa;text-transform:none';
  overlay.appendChild(olbl);
  overlay.appendChild(osub);
  document.body.appendChild(overlay);

  /* Wait for fonts so any html2canvas text painting picks up the right
     family — same belt-and-braces SCREEN SHOTS does. */
  if(document.fonts && document.fonts.ready){
    try{ await document.fonts.ready; }catch(_){}
  }

  try{
    const big=new JSZip();
    const sanitize=(s)=>(s||'tab').replace(/[^\w\-]+/g,'_');
    /* v0.3.8: uniqueness map. Two tabs whose names sanitize to the
       same string (e.g. "Tab 1" + "Tab_1", or two empty-named tabs
       that both fall back to 'tab') used to overwrite each other in
       the bundle — second write replaced the first, the user opened
       the zip and one of the tabs was simply gone. The same problem
       existed for tabs whose SOURCES were empty if they shared a
       sanitized name with a populated tab. Track used names and
       append _2, _3, ... on collision. Same pattern SCREEN SHOTS
       already uses for its zip. */
    const usedNames=new Set();
    for(let i=0;i<state.tabs.length;i++){
      const tab=state.tabs[i];
      const baseRaw=sanitize(tab.name);
      let base=baseRaw; let _bn=2;
      while(usedNames.has(base)){ base=`${baseRaw}_${_bn++}`; }
      usedNames.add(base);
      osub.textContent=`(${i+1}/${state.tabs.length}) ${tab.name||'tab'}`;

      /* Activate so every read (offsetWidth, captureLayoutAsPng's
         html2canvas, buildLayoutSVG, saveLayoutHTML, buildLayoutZipBlob)
         sees the tab in its real on-screen state. Two rAFs let layout
         settle (fitCanvas via ResizeObserver, etc.). */
      if(state.active !== tab.id){
        activateTab(tab.id);
        await new Promise(r=>requestAnimationFrame(()=>r()));
        await new Promise(r=>requestAnimationFrame(()=>r()));
      }

      try{
        if(tab.type==='layout'||tab.type==='hybrid'){
          /* 1) pubsys pack */
          try{
            const packBlob=await buildLayoutZipBlob(tab.id);
            big.file(`pubsys-packs/${base}.pubsys.zip`,packBlob);
          }catch(e){ errors.push(`${tab.name} (pack): ${e.message}`); }
          /* 2) SVG */
          let svgStr=null;
          try{ svgStr=await buildLayoutSVG(tab.id); }
          catch(e){ errors.push(`${tab.name} (svg): ${e.message}`); }
          if(svgStr) big.file(`svg/${base}.svg`,svgStr);
          /* 3) PNG via the SCREEN-SHOTS pipeline — pixel-identical to
             what SCREEN SHOTS or SAVE → PNG would produce for this tab. */
          try{
            const pngBlob=await captureLayoutAsPng(tab.id);
            big.file(`png/${base}.png`,pngBlob);
          }catch(e){ errors.push(`${tab.name} (png): ${e.message}`); }
          /* 4) HTML */
          try{
            const html=await saveLayoutHTML(tab.id,{returnString:true});
            if(html) big.file(`html/${base}.html`,html);
          }catch(e){ errors.push(`${tab.name} (html): ${e.message}`); }
        } else if(tab.type==='table'){
          /* Table tabs: emit just the rendered formats. buildTableSVG
             returns {svg,w,h} or null if the table hasn't been rendered
             yet (no data). Skip silently when null — empty tables are
             not an error. PNG also goes through captureLayoutAsPng so
             table-tab PNGs match SCREEN SHOTS. */
          let res=null;
          try{ res=buildTableSVG(tab.id); }catch(e){ errors.push(`${tab.name} (table svg): ${e.message}`); }
          if(res && res.svg){
            big.file(`tables/${base}.svg`,res.svg);
            try{
              const pngBlob=await captureLayoutAsPng(tab.id);
              big.file(`tables/${base}.png`,pngBlob);
            }catch(e){ errors.push(`${tab.name} (table png): ${e.message}`); }
            /* Table HTML — buildTableSVG doesn't produce HTML, but the
               table-tab's saveTableHTML uses live DOM. We rebuild the
               same string inline rather than refactoring saveTableHTML
               for a returnString flag — it's a short template. */
            try{
              const tw=$('t2tw-'+tab.id);
              if(tw){
                const scName=$('t2sc-'+tab.id)?.value||'mono';
                const sc=getSchemeCSS(scName);
                const lum=(()=>{const x=(sc.th||'#d8d8d8').replace('#','');const r=parseInt(x.slice(0,2),16)/255,g=parseInt(x.slice(2,4),16)/255,b=parseInt(x.slice(4,6),16)/255;return 0.2126*r+0.7152*g+0.0722*b<0.4?'#fff':'#333';})();
                const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escXML(tab.name)}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap');
body{margin:20px;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:12px;background:#fff;color:#111}
table{border-collapse:collapse;font-size:11px;border:1px solid ${sc.bd}}
th{background:${sc.th};border:1px solid ${sc.bd};padding:4px 8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:10px;text-align:left;white-space:nowrap;color:${lum}}
td{border:1px solid ${sc.bd};padding:3px 8px;vertical-align:middle}
tr:nth-child(even) td{background:${sc.alt}}
.ttl-row{text-align:center;font-size:10px;letter-spacing:.1em;padding:4px 8px;font-weight:600;text-transform:uppercase}
.pub-tbl.ttl-mode td{text-transform:none}
.gc{background:${sc.gc}!important;color:${sc.gt};font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:10px;writing-mode:vertical-lr;transform:rotate(180deg);text-align:center;width:20px;padding:6px 3px;border-right:2px solid ${sc.bd}}
.sc{background:${sc.sc}!important;color:${sc.st};font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;writing-mode:vertical-lr;transform:rotate(180deg);text-align:center;width:18px;padding:4px 3px}
.nc{text-align:center;font-size:10px}
.alnr{text-align:right}
.alnl{text-align:left}
.alnc{text-align:center}
</style></head><body>${tw.innerHTML}</body></html>`;
                big.file(`tables/${base}.html`,html);
              }
            }catch(e){ errors.push(`${tab.name} (table html): ${e.message}`); }
          }
        }
      }catch(e){ errors.push(`${tab.name}: ${e.message}`); }
    }
    /* Include a small README so the user knows what's what when they
       unzip — saves a support question later. */
    big.file('README.txt',
`PUBSYS — EXPORT ALL
Generated ${new Date().toISOString()}

Contents:
  pubsys-packs/  — editable .pubsys.zip per layout tab (re-importable in PUBSYS)
  svg/           — rendered SVG per layout tab
  png/           — rasterised PNG per layout tab (2x)
  html/          — standalone HTML per layout tab
  tables/        — SVG + PNG + HTML per table tab

Tabs in this bundle:
${state.tabs.map(t=>`  - ${t.name} (${t.type}, ${t.fmt} ${t.res})`).join('\n')}
${errors.length?'\nWARNINGS:\n'+errors.map(e=>'  - '+e).join('\n'):''}
`);
    const blob=await big.generateAsync({type:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='pubsys-export-all.zip';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    if(errors.length) console.warn('EXPORT ALL completed with warnings:',errors);
  }catch(e){
    alert('EXPORT ALL failed: '+e.message);
    console.error(e);
  }finally{
    /* v0.3.7: restore active tab + theme + overlay. The un-hide-trick
       inline-style restore that used to live here is gone — we no
       longer mutate inactive tabs' .tc styles. */
    if(origActive && state.active!==origActive){
      const stillExists=state.tabs.some(t=>t.id===origActive);
      if(stillExists) activateTab(origActive);
    }
    if(origTheme) document.body.dataset.theme=origTheme;
    else delete document.body.dataset.theme;
    overlay.remove();
  }
  if(btn){btn.textContent=origLabel||'EXPORT ALL';btn.disabled=false;}
}

/* ══ EXPORT ODF (v0.4.0) — editable OpenDocument export ══
   Exports every tab as ONE editable .odt (OpenDocument Text). Unlike a flat
   image dump, text becomes real paragraphs and tables become real ODF tables —
   both fully editable in LibreOffice / Word. Images (photo + vector cels) are
   embedded as pictures. Because tabs are absolute-positioned page layouts and
   ODF text flows, content is emitted top-to-bottom (sorted by cel position),
   one tab per page; exact x/y positioning is traded for editability, which is
   the whole point of this export. Each tab is briefly activated so innerText /
   offsetWidth read correctly (same approach as EXPORT ALL). */
function _blobToB64(blob){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result).split(',')[1]||'');
    fr.onerror=()=>rej(new Error('read failed'));
    fr.readAsDataURL(blob);
  });
}
/* Fit a pixel w×h into a page box (cm), preserving aspect. */
function _fitCm(w,h,maxW,maxH){
  let cw=maxW, ch=maxW*(h/w);
  if(ch>maxH){ ch=maxH; cw=maxH*(w/h); }
  return {w:+cw.toFixed(2), h:+ch.toFixed(2)};
}
/* CSV → editable ODF table. Titled tables → spanned title row + data rows;
   columned tables → first row treated as a (bold) header. Per-column alignment
   honours the cel's colAlign override, else the titled col-3-right default. */
function _csvToOdf(csv, colAlignStr, idx, variant){
  if(!csv||!csv.trim()) return '';
  const rows=parseCSV(csv);
  if(!rows.length) return '';
  const CA=parseColAlign(colAlignStr);
  const twoTitle=(variant==='csv2' && rows.length>2);
  const csv3=(variant==='csv3' && rows.length>1);
  const titled=twoTitle || csv3 || (rows[0].filter(c=>c.trim()!=='').length===1 && rows.length>1);
  const numCols=csv3
    ? Math.max(1, ...(rows.filter(r=>r.filter(c=>c.trim()!=='').length>1).map(r=>r.length)), 1)
    : Math.max(...rows.map(r=>r.length),1);
  const alignPara=(ci)=>{
    const a=CA[ci];
    if(a==='c') return 'AlC'; if(a==='r') return 'AlR'; if(a==='l') return 'AlL';
    /* CSV2/CSV3 default: 3rd col centered; CSV1 titled default: 3rd col right. */
    if(ci===2) return (twoTitle||csv3)?'AlC':(titled?'AlR':'AlL');
    return 'AlL';
  };
  const titleRow=(txt,cellSty,paraSty)=>{
    let r='<table:table-row><table:table-cell table:style-name="'+(cellSty||'CelTtl')+'" table:number-columns-spanned="'+numCols+'" '
      +'office:value-type="string"><text:p text:style-name="'+(paraSty||'TblTtl')+'">'+escXML(txt)+'</text:p></table:table-cell>';
    for(let k=1;k<numCols;k++) r+='<table:covered-table-cell/>';
    return r+'</table:table-row>';
  };
  const dataRow=(row)=>{
    let r='<table:table-row>';
    for(let ci=0;ci<numCols;ci++){
      const cell=(row[ci]||'').trim();
      r+='<table:table-cell table:style-name="Cel" office:value-type="string">'
        +'<text:p text:style-name="'+alignPara(ci)+'">'+escXML(cell)+'</text:p></table:table-cell>';
    }
    return r+'</table:table-row>';
  };
  let x='<table:table table:name="Tbl'+idx+'" table:style-name="TblS">'
       +'<table:table-column table:style-name="ColS" table:number-columns-repeated="'+numCols+'"/>';
  /* v0.4.0 CSV3: main title + sub-title bars interspersed with data. */
  if(csv3){
    x+=titleRow(rows[0].find(c=>c.trim()!=='')||rows[0].join(' ').trim()||'','CelTtl1','TblTtl1');
    for(let i=1;i<rows.length;i++){
      const nonEmpty=rows[i].filter(c=>c.trim()!=='').length;
      if(nonEmpty===1) x+=titleRow(rows[i].find(c=>c.trim()!=='')||'');
      else x+=dataRow(rows[i]);
    }
    return x+'</table:table>';
  }
  let dataRows=rows;
  if(twoTitle){
    x+=titleRow(rows[0].find(c=>c.trim()!=='')||rows[0].join(' ').trim()||'','CelTtl1','TblTtl1');
    x+=titleRow((rows[1]||[]).find(c=>c.trim()!=='')||(rows[1]||[]).join(' ').trim()||'');
    dataRows=rows.slice(2);
  } else if(titled){
    x+=titleRow(rows[0].find(c=>c.trim()!=='')||'');
    dataRows=rows.slice(1);
  }
  dataRows.forEach((row,ri)=>{
    const isHeader=(!titled && ri===0);
    x+='<table:table-row>';
    for(let ci=0;ci<numCols;ci++){
      const cell=(row[ci]||'').trim();
      const cs=isHeader?'CelHdr':'Cel';
      const ps=isHeader?'HdC':alignPara(ci);
      x+='<table:table-cell table:style-name="'+cs+'" office:value-type="string">'
        +'<text:p text:style-name="'+ps+'">'+escXML(cell)+'</text:p></table:table-cell>';
    }
    x+='</table:table-row>';
  });
  return x+'</table:table>';
}
/* Text cel → editable ODF paragraphs (label / title / sub / body). */
function _textCelToOdf(cel){
  const get=s=>{const e=cel.querySelector(s);return e?(e.innerText||e.textContent||'').trim():'';};
  const label=get('.cel-label-el'), title=get('.cel-title-el'),
        sub=get('.cel-sub-el'), body=get('.cel-body-el');
  let x='';
  if(label) x+='<text:p text:style-name="Lbl">'+escXML(label)+'</text:p>';
  if(title) x+='<text:p text:style-name="Ttl">'+escXML(title)+'</text:p>';
  if(sub)   x+='<text:p text:style-name="Sub">'+escXML(sub)+'</text:p>';
  if(body)  body.split('\n').forEach(line=>{ x+='<text:p text:style-name="Body">'+escXML(line)+'</text:p>'; });
  return x;
}
/* Resolve an <img> src (data: or blob:) to {b64, mime} for ODF embedding. */
async function _srcToPic(src){
  try{
    if(src.startsWith('data:')){
      const mm=src.match(/^data:([^;]+);base64,([\s\S]*)$/);
      if(mm) return {b64:mm[2], mime:mm[1]};
    }
    const blob=await (await fetch(src)).blob();
    return {b64:await _blobToB64(blob), mime:blob.type||'image/png'};
  }catch(_){ return null; }
}
function _picExt(mime){
  if(/svg/i.test(mime)) return 'svg';
  if(/jpe?g/i.test(mime)) return 'jpg';
  if(/gif/i.test(mime)) return 'gif';
  return 'png';
}

async function exportEditableOdf(){
  if(typeof JSZip==='undefined'){alert('ZIP library failed to load.');return;}
  if(!state.tabs.length){ alert('No tabs to export.'); return; }
  const btn=$('btn-export-odf');
  const origLabel=btn?.textContent;
  if(btn){btn.textContent='WORKING…';btn.disabled=true;}
  const origActive=state.active;
  const errors=[];

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;'
    +'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;'
    +'color:#fff;font-family:monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;user-select:none';
  const olbl=document.createElement('div'); olbl.textContent='EXPORTING ODF…';
  const osub=document.createElement('div');
  osub.style.cssText='font-size:11px;letter-spacing:.05em;color:#9aa;text-transform:none';
  overlay.appendChild(olbl); overlay.appendChild(osub); document.body.appendChild(overlay);
  if(document.fonts&&document.fonts.ready){ try{ await document.fonts.ready; }catch(_){} }

  try{
    const pics=[];          // {name, b64, mime}
    let bodyXml='', tblIdx=0, picIdx=0, emitted=0;

    for(let i=0;i<state.tabs.length;i++){
      const tab=state.tabs[i];
      osub.textContent='('+(i+1)+'/'+state.tabs.length+') '+(tab.name||'tab');
      /* Activate so innerText / offsetWidth read correctly on hidden tabs. */
      if(state.active!==tab.id){
        activateTab(tab.id);
        await new Promise(r=>requestAnimationFrame(()=>r()));
        await new Promise(r=>requestAnimationFrame(()=>r()));
      }
      try{
        bodyXml+='<text:p text:style-name="'+(i>0?'HdPb':'Hd')+'">'+escXML(tab.name||('Tab '+(i+1)))+'</text:p>';
        if(tab.type==='table'){
          const csv=$('t2e-'+tab.id)?.value||'';
          const t=_csvToOdf(csv,'',tblIdx++); if(t){ bodyXml+=t; emitted++; }
        } else {
          const cv=$('cv-'+tab.id);
          if(cv){
            const cels=Array.from(cv.querySelectorAll('.cel'))
              .filter(c=>c.style.display!=='none')
              .sort((a,b)=>((parseInt(a.style.top)||0)-(parseInt(b.style.top)||0))
                         ||((parseInt(a.style.left)||0)-(parseInt(b.style.left)||0)));
            for(const cel of cels){
              if(cel.classList.contains('cel-tbl')){
                const t=_csvToOdf(cel.dataset.csv||'', cel.dataset.colAlign||'', tblIdx++, cel.dataset.csvVariant);
                if(t){ bodyXml+=t; emitted++; }
              } else if(cel.classList.contains('cel-img')||cel.classList.contains('cel-vec')){
                const img=cel.querySelector('img');
                if(img&&img.src){
                  const pic=await _srcToPic(img.src);
                  if(pic){
                    picIdx++;
                    const name='Pictures/p'+picIdx+'.'+_picExt(pic.mime);
                    pics.push({name, b64:pic.b64, mime:pic.mime});
                    const w=parseInt(cel.style.width)||cel.offsetWidth||200;
                    const h=parseInt(cel.style.height)||cel.offsetHeight||150;
                    /* v0.4.0: all images at 40% of page-fit (i.e. −60% size). */
                    const IMG_SCALE=0.4;
                    const fit=_fitCm(w,h,17,25.7);
                    const iw=+(fit.w*IMG_SCALE).toFixed(2), ih=+(fit.h*IMG_SCALE).toFixed(2);
                    bodyXml+='<text:p text:style-name="ImgP"><draw:frame draw:name="g'+picIdx+'" '
                      +'text:anchor-type="as-char" svg:width="'+iw+'cm" svg:height="'+ih+'cm" '
                      +'draw:z-index="'+picIdx+'"><draw:image xlink:href="'+name+'" xlink:type="simple" '
                      +'xlink:show="embed" xlink:actuate="onLoad"/></draw:frame></text:p>';
                    emitted++;
                  }
                }
              } else {
                const t=_textCelToOdf(cel); if(t){ bodyXml+=t; emitted++; }
              }
            }
          }
        }
      }catch(e){ errors.push((tab.name||'tab')+': '+e.message); }
    }

    if(!emitted){ alert('No editable content found to export.'); }
    else{
      const odt=new JSZip();
      odt.file('mimetype','application/vnd.oasis.opendocument.text',{compression:'STORE'});
      pics.forEach(p=>odt.file(p.name, p.b64, {base64:true}));

      const NS='xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0" '
        +'xmlns:style="urn:oasis:names:tc:opendocument:xmlns:style:1.0" '
        +'xmlns:text="urn:oasis:names:tc:opendocument:xmlns:text:1.0" '
        +'xmlns:table="urn:oasis:names:tc:opendocument:xmlns:table:1.0" '
        +'xmlns:draw="urn:oasis:names:tc:opendocument:xmlns:drawing:1.0" '
        +'xmlns:fo="urn:oasis:names:tc:opendocument:xmlns:xsl-fo-compatible:1.0" '
        +'xmlns:svg="urn:oasis:names:tc:opendocument:xmlns:svg-compatible:1.0" '
        +'xmlns:xlink="http://www.w3.org/1999/xlink"';
      const STYLES=
         '<style:style style:name="Hd" style:family="paragraph"><style:paragraph-properties fo:margin-top="0.5cm" fo:margin-bottom="0.25cm"/><style:text-properties fo:font-size="15pt" fo:font-weight="bold"/></style:style>'
        +'<style:style style:name="HdPb" style:family="paragraph"><style:paragraph-properties fo:break-before="page" fo:margin-bottom="0.25cm"/><style:text-properties fo:font-size="15pt" fo:font-weight="bold"/></style:style>'
        +'<style:style style:name="Lbl" style:family="paragraph"><style:paragraph-properties fo:margin-top="0.3cm" fo:margin-bottom="0.05cm"/><style:text-properties fo:font-weight="bold" fo:text-transform="uppercase"/></style:style>'
        +'<style:style style:name="Ttl" style:family="paragraph"><style:paragraph-properties fo:margin-top="0.1cm" fo:margin-bottom="0.05cm"/><style:text-properties fo:font-size="13pt" fo:font-weight="bold"/></style:style>'
        +'<style:style style:name="Sub" style:family="paragraph"><style:paragraph-properties fo:margin-bottom="0.05cm"/><style:text-properties fo:font-size="11pt"/></style:style>'
        +'<style:style style:name="Body" style:family="paragraph"><style:paragraph-properties fo:margin-bottom="0.12cm"/><style:text-properties fo:font-size="10pt"/></style:style>'
        +'<style:style style:name="AlL" style:family="paragraph"><style:paragraph-properties fo:text-align="start"/></style:style>'
        +'<style:style style:name="AlC" style:family="paragraph"><style:paragraph-properties fo:text-align="center"/></style:style>'
        +'<style:style style:name="AlR" style:family="paragraph"><style:paragraph-properties fo:text-align="end"/></style:style>'
        +'<style:style style:name="HdC" style:family="paragraph"><style:paragraph-properties fo:text-align="start"/><style:text-properties fo:font-weight="bold"/></style:style>'
        +'<style:style style:name="TblTtl" style:family="paragraph"><style:paragraph-properties fo:text-align="center"/><style:text-properties fo:font-weight="bold"/></style:style>'
        +'<style:style style:name="TblTtl1" style:family="paragraph"><style:paragraph-properties fo:text-align="center"/><style:text-properties fo:font-weight="bold" fo:font-size="13pt" fo:color="#FFFFFF"/></style:style>'
        +'<style:style style:name="ImgP" style:family="paragraph"><style:paragraph-properties fo:text-align="center" fo:margin-top="0.3cm" fo:margin-bottom="0.3cm"/></style:style>'
        +'<style:style style:name="TblS" style:family="table"><style:table-properties style:width="17cm" table:align="left" fo:margin-top="0.35cm" fo:margin-bottom="0.45cm"/></style:style>'
        +'<style:style style:name="ColS" style:family="table-column"><style:table-column-properties style:use-optimal-column-width="true"/></style:style>'
        +'<style:style style:name="Cel" style:family="table-cell"><style:table-cell-properties fo:border="0.018cm solid #cccccc" fo:padding="0.08cm"/></style:style>'
        +'<style:style style:name="CelHdr" style:family="table-cell"><style:table-cell-properties fo:border="0.018cm solid #cccccc" fo:padding="0.08cm" fo:background-color="#e8e8e8"/></style:style>'
        +'<style:style style:name="CelTtl" style:family="table-cell"><style:table-cell-properties fo:border="0.018cm solid #cccccc" fo:padding="0.1cm" fo:background-color="#d8d8d8"/></style:style>'
        +'<style:style style:name="CelTtl1" style:family="table-cell"><style:table-cell-properties fo:border="0.018cm solid #6a6a6a" fo:padding="0.12cm" fo:background-color="#6a6a6a"/></style:style>';
      const contentXml='<?xml version="1.0" encoding="UTF-8"?>'
        +'<office:document-content '+NS+' office:version="1.2"><office:automatic-styles>'+STYLES+'</office:automatic-styles>'
        +'<office:body><office:text>'+bodyXml+'</office:text></office:body></office:document-content>';
      odt.file('content.xml',contentXml);
      odt.file('styles.xml','<?xml version="1.0" encoding="UTF-8"?>'
        +'<office:document-styles xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0" '
        +'xmlns:style="urn:oasis:names:tc:opendocument:xmlns:style:1.0" '
        +'xmlns:fo="urn:oasis:names:tc:opendocument:xmlns:xsl-fo-compatible:1.0" office:version="1.2">'
        +'<office:styles/><office:automatic-styles>'
        +'<style:page-layout style:name="pm1"><style:page-layout-properties fo:page-width="21cm" fo:page-height="29.7cm" fo:margin="2cm"/></style:page-layout>'
        +'</office:automatic-styles><office:master-styles>'
        +'<style:master-page style:name="Standard" style:page-layout-name="pm1"/></office:master-styles></office:document-styles>');
      const manEntries=['<manifest:file-entry manifest:full-path="/" manifest:media-type="application/vnd.oasis.opendocument.text"/>',
        '<manifest:file-entry manifest:full-path="content.xml" manifest:media-type="text/xml"/>',
        '<manifest:file-entry manifest:full-path="styles.xml" manifest:media-type="text/xml"/>']
        .concat(pics.map(p=>'<manifest:file-entry manifest:full-path="'+p.name+'" manifest:media-type="'+p.mime+'"/>'));
      odt.file('META-INF/manifest.xml','<?xml version="1.0" encoding="UTF-8"?>'
        +'<manifest:manifest xmlns:manifest="urn:oasis:names:tc:opendocument:xmlns:manifest:1.0" manifest:version="1.2">'
        +manEntries.join('')+'</manifest:manifest>');
      const blob=await odt.generateAsync({type:'blob',mimeType:'application/vnd.oasis.opendocument.text'});
      dl(blob,'pubsys-export.odt','application/vnd.oasis.opendocument.text');
    }
    if(errors.length) console.warn('EXPORT ODF completed with warnings:',errors);
  }catch(e){
    alert('EXPORT ODF failed: '+e.message); console.error(e);
  }finally{
    if(origActive && state.active!==origActive && state.tabs.some(t=>t.id===origActive)) activateTab(origActive);
    overlay.remove();
    if(btn){btn.textContent=origLabel||'EXPORT ODF';btn.disabled=false;}
  }
}

/* ══ captureLayoutAsPng(tabId) — the html2canvas capture pipeline ══
   (v0.3.7)
   Single source of truth for "tab → PNG via html2canvas". Returns a
   PNG Blob sized to the canvas's native pixel dimensions. Used by:
     • SCREEN SHOTS button (exportScreenshots)     — zip of every tab
     • SAVE → PNG dropdown (saveLayoutPNG)         — current tab only
     • EXPORT ALL's png/ folder (exportAll)        — every tab
   so all three paths produce pixel-identical output for any given tab.

   The tab must already be properly laid out before this is called
   (e.g. activateTab + two rAFs). Callers handle activation; this helper
   reads offsetWidth/Height from the live DOM and assumes they're real.

   Pipeline:
     1. Resolve captureNode: .cv for layout/hybrid, .tbl-wrap for table.
     2. VEC pre-process: every .cel-vec img has a blob:-URL SVG src and
        html2canvas can't render blob-URL SVGs reliably. Fetch each
        SVG, rewrite its root <svg> tag to have explicit width/height
        matching the cel + preserveAspectRatio="none", then rasterize
        via canvas+drawImage into a PNG data URL. The img.src is
        temporarily swapped to the PNG; original is restored in finally.
     3. html2canvas with onclone hooks:
          - position:fixed at (0,0) on the cloned target — escapes the
            .cv-sizer's inline width and .pw's overflow:auto clipping
            that would otherwise chop off the right/bottom of native-
            size canvases.
          - transform:none — undoes fitCanvas's visual-fit scale.
          - data-theme="light" on cloned body — CSS variables resolve
            to printable palette regardless of the user's UI theme.
          - injected <style> hiding cel chrome (.etb, .rc, .rot-h, ...)
        Output is scale:1, width/height = captureNode.offsetWidth/Height.
     4. canvas.toBlob → PNG blob, return.

   Three earlier attempts that did NOT work (documented so we don't
   re-discover them):
     A. Clear transform on the LIVE element pre-capture, restore post-
        capture. The .pw ResizeObserver immediately re-applies the
        transform (clearing scale grows .cv, grows .pw scroll content,
        observer fires, fitCanvas runs, transform comes back) BEFORE
        html2canvas finishes reading geometry — so it captured the
        re-scaled state anyway.
     B. Use `scale: 1/fit` math to render-while-scaled at native
        density. Output canvas was the right size but content tucked
        into the upper-left fraction.
     C. Pre-process VEC SVGs by simply loading them as `new Image()`
        and drawing to canvas. The bundled SVGs have only a viewBox
        (no explicit width/height), so when loaded into a new Image
        their natural size defaulted to 300×150 (the CSS replaced-
        element default) and preserveAspectRatio="xMidYMid meet"
        letterboxed the viewBox content INSIDE that 300×150 surface.
        The whole letterboxed surface then scaled up to fill the
        canvas, dropping the right edge of the page frame.
   The current step (2)'s explicit fetch-rewrite-rasterize is what
   actually works. */
async function captureLayoutAsPng(tabId){
  if(typeof html2canvas==='undefined') throw new Error('html2canvas not loaded');
  const tab=state.tabs.find(t=>t.id===tabId);
  if(!tab) throw new Error('Tab not found: '+tabId);

  let captureNode=null;
  if(tab.type==='layout'||tab.type==='hybrid'){
    captureNode=$('cv-'+tabId);
  } else if(tab.type==='table'){
    captureNode=$('t2tw-'+tabId);
  }
  if(!captureNode) throw new Error('No capture target for tab '+tabId);

  const W=captureNode.offsetWidth;
  const H=captureNode.offsetHeight;
  if(!W||!H) throw new Error('Zero-size capture target');

  /* VEC pre-processing — see step (2) in the doc above. */
  const vecImgs=Array.from(captureNode.querySelectorAll('.cel-vec img'));
  const restoreSrcs=[];
  for(const img of vecImgs){
    if(!img.src || img.src.startsWith('data:')) continue;
    const cel=img.closest('.cel');
    if(!cel) continue;
    const cw=cel.offsetWidth, ch=cel.offsetHeight;
    if(!cw||!ch) continue;

    let pngUrl=null;
    let sizedSvgUrl=null;
    try{
      const r=await fetch(img.src);
      let svgText=await r.text();
      svgText=svgText.replace(/<svg\b([^>]*)>/i,(_,attrs)=>{
        const cleaned=attrs
          .replace(/\swidth\s*=\s*["'][^"']*["']/i,'')
          .replace(/\sheight\s*=\s*["'][^"']*["']/i,'')
          .replace(/\spreserveAspectRatio\s*=\s*["'][^"']*["']/i,'');
        return `<svg${cleaned} width="${cw}" height="${ch}" preserveAspectRatio="none">`;
      });
      sizedSvgUrl=URL.createObjectURL(new Blob([svgText],{type:'image/svg+xml'}));
      pngUrl=await new Promise(res=>{
        const c=document.createElement('canvas');
        c.width=cw; c.height=ch;
        const ctx=c.getContext('2d');
        const tmp=new Image(); tmp.crossOrigin='anonymous';
        tmp.onload=()=>{
          try{ ctx.drawImage(tmp,0,0,cw,ch); res(c.toDataURL('image/png')); }
          catch(_){ res(null); }
        };
        tmp.onerror=()=>res(null);
        tmp.src=sizedSvgUrl;
      });
    }catch(_){ /* leave img untouched if fetch / parse fails */ }
    finally{
      if(sizedSvgUrl) URL.revokeObjectURL(sizedSvgUrl);
    }
    if(pngUrl){
      restoreSrcs.push({img, src: img.src});
      img.src=pngUrl;
    }
  }
  if(restoreSrcs.length){
    await new Promise(r=>requestAnimationFrame(()=>r()));
  }

  try{
    const out=await html2canvas(captureNode,{
      scale: 1,
      width: W,
      height: H,
      backgroundColor: '#fff',
      useCORS: true,
      allowTaint: true,
      logging: false,
      windowWidth: W,
      windowHeight: H,
      onclone: (clonedDoc, clonedEl)=>{
        if(clonedDoc.body) clonedDoc.body.dataset.theme='light';
        clonedEl.style.transform='none';
        clonedEl.style.transformOrigin='0 0';
        clonedEl.style.position='fixed';
        clonedEl.style.left='0';
        clonedEl.style.top='0';
        const styleEl=clonedDoc.createElement('style');
        styleEl.textContent=
          '.etb,.rc,.rot-h,.cv-grid,.cv-hint{display:none!important}';
        clonedDoc.head.appendChild(styleEl);
      }
    });
    return await new Promise((res,rej)=>{
      out.toBlob(b=>b?res(b):rej(new Error('toBlob returned null')),'image/png');
    });
  }finally{
    for(const r of restoreSrcs) r.img.src=r.src;
  }
}

/* ══ SCREEN SHOTS (v0.3.7) ══
   "PNG every tab into a zip" — the multi-tab driver. Each tab is
   activated in turn so its canvas is in real on-screen state, then
   captureLayoutAsPng does the actual rasterization. */
async function exportScreenshots(){
  if(typeof JSZip==='undefined'){alert('ZIP library failed to load.');return;}
  if(typeof html2canvas==='undefined'){alert('html2canvas library failed to load (check internet).');return;}
  if(!state.tabs.length){ alert('No tabs to screenshot.'); return; }
  const btn=$('btn-screenshots');
  const origLabel=btn?.textContent;
  if(btn){btn.textContent='WORKING…';btn.disabled=true;}
  const errors=[];
  const origActive=state.active;

  /* Force light theme for the capture run so dark CSS variables don't
     leak into any element's computed background. Restored in finally. */
  const origTheme=document.body.dataset.theme;
  if(origTheme==='dark') document.body.dataset.theme='light';

  /* Modal overlay covers the rapid tab-cycling AND the brief theme
     flash. */
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);'
    +'z-index:99999;display:flex;flex-direction:column;'
    +'align-items:center;justify-content:center;gap:14px;'
    +'color:#fff;font-family:monospace;font-size:13px;letter-spacing:.12em;'
    +'text-transform:uppercase;user-select:none';
  const lbl=document.createElement('div');
  lbl.textContent='CAPTURING SCREENSHOTS…';
  const sub=document.createElement('div');
  sub.style.cssText='font-size:11px;letter-spacing:.05em;color:#9aa;text-transform:none';
  overlay.appendChild(lbl);
  overlay.appendChild(sub);
  document.body.appendChild(overlay);

  /* Let fonts settle so Barlow Condensed et al. paint correctly. */
  if(document.fonts && document.fonts.ready){
    try{ await document.fonts.ready; }catch(_){}
  }

  try{
    const big=new JSZip();
    const used=new Set();
    let rendered=0;

    for(let i=0;i<state.tabs.length;i++){
      const tab=state.tabs[i];
      let base=(tab.name||'tab').replace(/[^A-Za-z0-9_-]+/g,'_').slice(0,60)||'tab';
      let unique=base; let n=1;
      while(used.has(unique)){ unique=`${base}_${n++}`; }
      used.add(unique);
      sub.textContent=`(${i+1}/${state.tabs.length}) ${tab.name||'tab'}`;

      /* Activate so the tab's canvas is fully laid out. */
      if(state.active !== tab.id){
        activateTab(tab.id);
        await new Promise(r=>requestAnimationFrame(()=>r()));
        await new Promise(r=>requestAnimationFrame(()=>r()));
      }

      try{
        const blob=await captureLayoutAsPng(tab.id);
        big.file(`${unique}.png`,blob);
        rendered++;
      }catch(e){
        errors.push(`${tab.name}: ${e.message}`);
      }
    }

    if(!rendered){
      alert('Nothing captured.'+(errors.length?'\n\nErrors:\n'+errors.join('\n'):''));
      return;
    }

    sub.textContent='Packing zip…';
    const zipBlob=await big.generateAsync({type:'blob'});
    const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    const url=URL.createObjectURL(zipBlob);
    const a=document.createElement('a');
    a.href=url; a.download=`pubsys_screenshots_${ts}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    if(errors.length) console.warn('SCREEN SHOTS completed with warnings:',errors);
  }catch(e){
    alert('SCREEN SHOTS failed: '+e.message);
    console.error(e);
  }finally{
    /* Restore theme. */
    if(origTheme) document.body.dataset.theme=origTheme;
    else delete document.body.dataset.theme;
    /* Restore originally-active tab. */
    if(origActive && state.active!==origActive){
      const stillExists=state.tabs.some(t=>t.id===origActive);
      if(stillExists) activateTab(origActive);
    }
    overlay.remove();
  }
  if(btn){btn.textContent=origLabel||'SCREEN SHOTS';btn.disabled=false;}
}

async function importLayoutZip(tabId,file){
  if(typeof JSZip==='undefined'){alert('ZIP library failed to load (check internet).');return;}
  const tab=state.tabs.find(t=>t.id===tabId); if(!tab) return;
  const cv=$('cv-'+tabId);
  const bw=$('bw-'+tabId);

  /* v0.3: IMPORT lands in a freshly-created tab (see lt-impf wireup), so
     "destructive" overwrite of an existing tab can no longer happen — the
     confirm() previously here was always a no-op pop-up. Removed. */

  const btn=$('lt-imp-'+tabId);
  if(btn){btn.textContent='WAIT…';btn.disabled=true;}

  try{
    const zip=await JSZip.loadAsync(file);
    const mf=zip.file('manifest.json');
    if(!mf) throw new Error('Missing manifest.json');
    const manifest=JSON.parse(await mf.async('string'));
    if(!manifest.pubsysFormat) throw new Error('Not a PUBSYS pack');

    /* ─ load all images into object URLs ─
       JSZip's async('blob') returns a TYPELESS blob (empty MIME). An <img>
       can usually sniff a typeless PNG/JPG, but it will NOT render a
       typeless SVG — blob: SVG sources require an explicit image/svg+xml
       type. So we assign a MIME from the file extension, with a byte-sniff
       fallback for the legacy ".plain" files older exports produced (those
       are really PNG/JPG/SVG that got mis-extensioned). */
    const extMime={png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',
                   gif:'image/gif',webp:'image/webp',svg:'image/svg+xml'};
    async function sniffMime(blob){
      try{
        const buf=new Uint8Array(await blob.slice(0,16).arrayBuffer());
        if(buf[0]===0x89&&buf[1]===0x50&&buf[2]===0x4E&&buf[3]===0x47) return 'image/png';
        if(buf[0]===0xFF&&buf[1]===0xD8&&buf[2]===0xFF) return 'image/jpeg';
        if(buf[0]===0x47&&buf[1]===0x49&&buf[2]===0x46) return 'image/gif';
        if(buf[0]===0x52&&buf[1]===0x49&&buf[2]===0x46&&buf[3]===0x46&&
           buf[8]===0x57&&buf[9]===0x45&&buf[10]===0x42&&buf[11]===0x50) return 'image/webp';
        const head=new TextDecoder('utf-8').decode(buf).replace(/^\uFEFF/,'').trimStart().toLowerCase();
        if(head.startsWith('<?xml')||head.startsWith('<svg')) return 'image/svg+xml';
      }catch{}
      return 'image/png'; // safe default
    }
    const imageUrls={};
    for(const [path,f] of Object.entries(zip.files)){
      if(path.startsWith('images/')&&!f.dir){
        let blob=await f.async('blob');
        const fname=path.replace('images/','');
        const ext=(fname.split('.').pop()||'').toLowerCase();
        let mime=extMime[ext];
        if(!mime) mime=await sniffMime(blob);          // .plain or unknown ext
        blob=new Blob([blob],{type:mime});             // re-type so <img> renders
        imageUrls[fname]=URL.createObjectURL(blob);
      }
    }

    /* ─ tab metadata ─ */
    if(manifest.tab){
      tab.name=manifest.tab.name||tab.name;
      tab.fmt =manifest.tab.fmt ||tab.fmt;
      tab.res =manifest.tab.res ||tab.res;
      tab.cw  =manifest.tab.cw  ||tab.cw;
      tab.ch  =manifest.tab.ch  ||tab.ch;
      tab.cunit=manifest.tab.cunit||tab.cunit||'mm';  // v0.4.0
      applyCV('cv-'+tabId,tab);
      syncRes(tab.res); updateSizeLbl(tab); renderTabBar(); updateDevInfo();
    }

    /* ─ wipe current contents ─ */
    if(bw) bw.innerHTML='';
    if(cv) Array.from(cv.querySelectorAll('.cel')).forEach(c=>c.remove());

    /* ─ restore source boxes (track new bid per source-index for cel remap) ─ */
    const newBidByIdx=[];
    if(Array.isArray(manifest.sources)){
      for(const box of manifest.sources){
        let bid;
        if(box.mode==='image'){
          bid=createBox(tabId,'image');
          const dz=$('dz-'+bid);
          if(box.image&&imageUrls[box.image]&&dz){
            const cb=$('bgt-'+bid);
            if(cb&&box.bgTransp) cb.checked=true;
