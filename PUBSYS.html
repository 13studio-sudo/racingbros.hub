        /* Cascade-offset each image so they don't perfectly overlap. 12px
           per file feels noticeable but doesn't push later files off the
           drop point. */
        let i=0;
        for(const f of imgs){
          const ox=x+i*12, oy=y+i*12;
          const isSvg=/svg/i.test(f.type)||/\.svg$/i.test(f.name);
          if(isSvg){
            /* Read + size the SVG (viewBox-only SVGs would render blank).
               Async, so we create the box/cel inside the reader callback. */
            const rdr=new FileReader();
            rdr.onload=ev=>{
              const url=svgTextToSizedBlobUrl(String(ev.target.result||''));
              const newBid=createBoxFromFile(tab.id,f,url,'vec');
              addCel(cv,{type:'vec',src:url,x:ox,y:oy,w:180,h:130,sourceBid:newBid});
            };
            rdr.onerror=()=>{
              const url=URL.createObjectURL(f);
              const newBid=createBoxFromFile(tab.id,f,url,'vec');
              addCel(cv,{type:'vec',src:url,x:ox,y:oy,w:180,h:130,sourceBid:newBid});
            };
            rdr.readAsText(f);
          } else {
            const url=URL.createObjectURL(f);
            const newBid=createBoxFromFile(tab.id,f,url);
            addCel(cv,{type:'image',src:url,x:ox,y:oy,w:180,h:130,sourceBid:newBid});
          }
          i++;
        }
        return;
      }
    }
    const sbid=e.dataTransfer.getData('cel-sourcebid');
    const ctype=e.dataTransfer.getData('cel-type');
    /* v0.3.9: built-in primitive shapes from VEC source box. The
       drag transfers a 'cel-prim' key (line/rect/circle); we generate
       the SVG inline, encode as a data URL, and add a VEC cel that
       remembers its shape type on dataset.primType so the per-cel
       VEC toolbar can re-render it on color/stroke-width changes. */
    if(ctype==='vec-prim'){
      const prim=e.dataTransfer.getData('cel-prim')||'rect';
      /* v0.3.9: rect/circle default to SOLID fill (per user request);
         line stays stroke-only since fill is meaningless for it.
         Circle defaults to a square cel (perfect circle); user can
         resize non-uniformly afterward to get an oval. */
      const sw=2, color='#000000';
      const fill=(prim==='line')?'none':'solid';
      const w0=(prim==='circle'?100:120);
      const h0=(prim==='line'?6:(prim==='circle'?100:80));
      const svg=buildPrimSVG(prim,w0,h0,color,sw,fill);
      const url='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
      const cel=addCel(cv,{type:'vec',src:url,x,y,w:w0,h:h0,preserveSize:true});
      cel.dataset.primType=prim;
      cel.dataset.primColor=color;
      cel.dataset.primStroke=String(sw);
      cel.dataset.primFill=fill;
      return;
    }
    if(ctype==='image'){
      addCel(cv,{type:'image',src:e.dataTransfer.getData('cel-src'),x,y,w:180,h:130,sourceBid:sbid});
    } else if(ctype==='vec'){
      addCel(cv,{type:'vec',src:e.dataTransfer.getData('cel-src'),x,y,w:180,h:130,sourceBid:sbid});
    } else if(ctype==='text'){
      addCel(cv,{type:'text',
        label:      e.dataTransfer.getData('cel-label'),
        labelColor: e.dataTransfer.getData('cel-labelcolor')||'#C41E33',
        title:      e.dataTransfer.getData('cel-title'),
        sub:        e.dataTransfer.getData('cel-sub'),
        body:       e.dataTransfer.getData('cel-body'),
        fontSize:   defaultFs,
        x,y,w:240,h:160,sourceBid:sbid});
    } else if(ctype==='table'){
      /* Seed the source box's scale to the print default — but only if the
         box hasn't been touched yet. Existing user-set scales win. */
      if(sbid){
        const box=$('sb-'+sbid);
        if(box && !box.dataset.tblScale){
          box.dataset.tblScale=String(defaultScale);
        }
      }
      addCel(cv,{type:'table',
        csv:        e.dataTransfer.getData('cel-csv'),
        csvVariant: e.dataTransfer.getData('cel-csvvariant')||'csv1',
        x,y,w:480,h:200,sourceBid:sbid});
      /* New table cel inherits its source box's current scale — picks up
         whatever +/- value the user already set in that CSV box. */
      if(sbid) applyBoxTblScale(sbid);
    }
  });
  /* Empty-canvas / empty-work-area click deselects everything — UNLESS
     Shift is held. With Shift the user is mid-multi-select; an
     accidental miss between cels shouldn't wipe what they've already
     gathered. v0.3.7: extended from "click .cv outside cels" to "click
     anywhere in .pw outside a cel". Previously the light-grey gutter
     around the canvas (the .pw area visible between the canvas and the
     SOURCES panel / right edge) silently swallowed clicks — selection
     stayed live and the X/Y readout kept showing the previously-selected
     cel's coordinates. closest('.cel') is the inclusive test: clicks on
     .pw, .cv-sizer, .cv, .cv-hint, or any direct descendant that is
     NOT inside a cel all deselect. Cel-internal clicks (including the
     .etb toolbar that lives inside the cel) bubble through the cel
     element first and are excluded by the closest test. */
  const _pwEl4Click=$('pw-'+tab.id);
  if(_pwEl4Click){
    _pwEl4Click.addEventListener('mousedown',e=>{
      if(!e.target.closest('.cel') && !e.shiftKey) deselectAll();
    });
  }
  /* Initialize the v0.3.7 text-cel toolbar for this tab. */
  initTextCtlToolbar(tab.id);
  /* Initialize the v0.3.9 VEC-cel toolbar for this tab. */
  initVecCtlToolbar(tab.id);
  initTblCtlToolbar(tab.id);  // v0.4.0

  /* buttons (v0.3.2: per-format SAVE buttons collapsed into a dropdown;
     IMPORT/EXPORT moved to the global #s1 toolbar) */
  wireSaveDropdown(tc.querySelector('.save-menu'), tab.id, /*isLayout=*/true);
  $('lb-add-'+tab.id).addEventListener('click',()=>createBox(tab.id));

  /* Live fit-to-area: refit whenever .pw changes size (window resize,
     left-panel resize handle, sidebar toggles). Idempotent so multiple
     triggers in the same frame are harmless. */
  if(window.ResizeObserver){
    const _pwEl=$('pw-'+tab.id);
    if(_pwEl){
      const _ro=new ResizeObserver(()=>{ const _cv=$('cv-'+tab.id); if(_cv) fitCanvas(_cv); });
      _ro.observe(_pwEl);
    }
  }

  /* LAYERS popup — restored in v0.3.2. Open/close, refresh, outside-click
     dismiss. populateLayersPanel / enableLayersReorder / restackBySources
     were never removed from the codebase. */
  const lyrBtn=$('lt-lyr-'+tab.id);
  const lyrPanel=$('lyr-panel-'+tab.id);
  if(lyrBtn&&lyrPanel){
    lyrBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const isOpen=lyrPanel.classList.contains('open');
      if(isOpen){ lyrPanel.classList.remove('open'); }
      else { populateLayersPanel(tab.id); lyrPanel.classList.add('open'); }
    });
    lyrPanel.querySelector('[data-close]').addEventListener('click',()=>lyrPanel.classList.remove('open'));
    lyrPanel.querySelector('[data-refresh]').addEventListener('click',()=>populateLayersPanel(tab.id));
    /* swallow clicks inside the panel so the document-level dismiss handler
       doesn't close it whenever the user interacts with a row */
    lyrPanel.addEventListener('mousedown',e=>e.stopPropagation());
    enableLayersReorder(tab.id);
  }

  /* Alignment toolbar wiring — buttons live in the topbar (next to LAYERS),
     not inside the popup, so this is wired separately from the popup
     open/close logic. Single delegated click handler; the button's
     data-align attribute names one of six operations performed against
     the bounding box of all currently-selected cels in this tab's canvas. */
  tc.querySelector('.lt-topbar .lyr-align')?.addEventListener('click',e=>{
    const btn=e.target.closest('[data-align]');
    if(!btn) return;
    alignSelectedCels(tab.id,btn.dataset.align);
  });

  /* Position widget — live X/Y readout for the current selection, with
     dbl-click-to-edit. Strategy:
     • Display: a MutationObserver on the canvas watches style/class
       changes on any descendant. Any cel selection toggle, drag, resize,
       nudge or alignment triggers a refresh. Cheap because the only
       reaction is writing two number inputs.
     • Editing: same readonly→edit→commit pattern as the zoom-pct
       widgets. Commit calculates a delta against the bounding-box
       top-left (so multi-selections shift as a group, single selection
       moves outright). Skipped while inputs are mid-edit so the user's
       keystrokes aren't clobbered by their own dragging. */
  const _cvForPos=$('cv-'+tab.id);
  const _posX=$('pos-x-'+tab.id), _posY=$('pos-y-'+tab.id);
  function refreshPos(){
    if(!_cvForPos||!_posX||!_posY) return;
    if(!_posX.hasAttribute('readonly') || !_posY.hasAttribute('readonly')) return;
    const sels=_cvForPos.querySelectorAll('.cel.sel');
    if(!sels.length){ _posX.value=''; _posY.value=''; return; }
    const left=Math.min(...Array.from(sels).map(c=>parseInt(c.style.left)||0));
    const top =Math.min(...Array.from(sels).map(c=>parseInt(c.style.top) ||0));
    _posX.value=Math.round(left);
    _posY.value=Math.round(top);
  }
  if(_cvForPos && window.MutationObserver){
    /* v0.3.7: piggyback the text-cel toolbar refresh on the same
       observer. Any selection toggle (.sel class change on any cel),
       any cel removal/insertion (childList), and any style change on
       a cel (drag/resize/nudge) bubbles through to here — so the
       toolbar appears the moment a TXT cel becomes singularly selected
       and disappears the moment selection changes to non-TXT/multi/
       none. Cheap: the txt-ctl refresh only writes a few inputs. */
    const _obs=new MutationObserver(()=>{
      refreshPos();
      refreshTxtCtlToolbar(tab.id);
      /* v0.3.9: VEC-cel toolbar refresh is independent — refreshTxt
         early-returns when the selected cel isn't a TXT cel, so it
         can't carry the VEC refresh as a tail call. */
      refreshVecCtlToolbar(tab.id);
      refreshTblCtlToolbar(tab.id);  // v0.4.0
    });
    _obs.observe(_cvForPos,{attributes:true,subtree:true,childList:true,attributeFilter:['style','class']});
  }
  function commitPos(axis){
    const inp=axis==='x'?_posX:_posY;
    const v=parseInt(inp.value);
    inp.setAttribute('readonly','');
    inp.blur();
    if(isNaN(v)){ refreshPos(); return; }
    const sels=Array.from(_cvForPos.querySelectorAll('.cel.sel'));
    if(!sels.length) return;
    const cur=axis==='x'
      ?Math.min(...sels.map(c=>parseInt(c.style.left)||0))
      :Math.min(...sels.map(c=>parseInt(c.style.top) ||0));
    const delta=v-cur;
    sels.forEach(c=>{
      if(axis==='x') c.style.left=((parseInt(c.style.left)||0)+delta)+'px';
      else           c.style.top =((parseInt(c.style.top) ||0)+delta)+'px';
    });
  }
  [['x',_posX],['y',_posY]].forEach(([axis,inp])=>{
    if(!inp) return;
    inp.addEventListener('dblclick',()=>{ inp.removeAttribute('readonly'); inp.focus(); inp.select(); });
    inp.addEventListener('blur',()=>{ if(!inp.hasAttribute('readonly')) commitPos(axis); });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ e.preventDefault(); commitPos(axis); }
      else if(e.key==='Escape'){ e.preventDefault(); inp.setAttribute('readonly',''); inp.blur(); refreshPos(); }
    });
  });
  /* Initial paint — refresh once now to clear placeholders if anything
     happens to already be selected (rare on a fresh tab). */
  refreshPos();

  /* enable drag-to-reorder for source boxes in this tab's panel */
  enableBoxReorder(tab.id);

  /* v0.3.4: NEW layout & hybrid tabs now ship with an EMPTY SOURCES panel
     (per request). Previously buildLayoutTC seeded one IMG box + two TXT
     boxes (one pre-filled with sample copy); that seeding is removed. The
     user adds sources via "+ ADD" (or by dropping files on the canvas).
     The noDefaultSources flag (used by templates) is now redundant but left
     intact so existing template definitions keep working. Imported tabs are
     unaffected — importLayoutZip still rebuilds their boxes from the manifest. */
}

function applyCV(cvId,tab){
  const cv=$(cvId); if(!cv) return;
  const base=tab.fmt==='custom'
    ?{w:Math.round(tab.cw*(CUNITS[tab.cunit]||CUNITS.mm)),
       h:Math.round(tab.ch*(CUNITS[tab.cunit]||CUNITS.mm))}
    :(SIZES[tab.fmt]||SIZES.a4);
  const s=DPI[tab.res]||1;
  cv.style.width=Math.round(base.w*s)+'px';
  cv.style.height=Math.round(base.h*s)+'px';
  fitCanvas(cv);
}

/* ══ FIT-TO-AREA ══
   Canvas always fits inside the operation area (.pw) regardless of the
   selected resolution. The .cv keeps its NATIVE pixel dimensions (so cels'
   style.left/top stay in real coords and exports stay full-resolution),
   while a CSS scale transform shrinks it visually. The .cv-sizer wrapper
   takes the SCALED dimensions so flex centering still works.
   cvScale() returns the current visual factor — used by mouse handlers
   to convert visual deltas back to native coords. */
function fitCanvas(cv){
  if(!cv) return;
  const sizer=cv.parentElement;
  if(!sizer||!sizer.classList.contains('cv-sizer')) return;
  const pw=sizer.parentElement;
  if(!pw||pw.offsetWidth===0) return; // tab not visible yet
  const padCSS=parseFloat(getComputedStyle(pw).paddingLeft)||29;
  const availW=Math.max(50,pw.clientWidth-padCSS*2);
  const availH=Math.max(50,pw.clientHeight-padCSS*2);
  const nativeW=parseFloat(cv.style.width)||cv.offsetWidth;
  const nativeH=parseFloat(cv.style.height)||cv.offsetHeight;
  if(!nativeW||!nativeH) return;
  const fit=Math.min(1,availW/nativeW,availH/nativeH);
  cv.style.transform=fit<1?`scale(${fit})`:'';
  cv.dataset.fitScale=String(fit);
  /* Inverse of fit, exposed as a CSS variable so cel controls can counter-
     scale and stay at constant on-screen size regardless of canvas zoom. */
  cv.style.setProperty('--cv-inv-scale',fit<1?String(1/fit):'1');
  sizer.style.width=Math.round(nativeW*fit)+'px';
  sizer.style.height=Math.round(nativeH*fit)+'px';
}
function cvScale(cv){
  return parseFloat(cv?.dataset?.fitScale)||1;
}

/* ══ SOURCE BOX ══
   mode: 'image' | 'text'  — togglable via header buttons
*/
function createBox(tabId, initMode='image', prefill={}){
  state.boxSeq++;
  const bid=state.boxSeq;
  const bw=$('bw-'+tabId); if(!bw) return;
  /* v0.3.4: the CSV source-box mode is now available on LAYOUT tabs too
     (previously hybrid-only). A NEW layout tab's source boxes therefore
     offer all four format objects — IMG / VEC / TXT / CSV — and the CSV
     zone + its drag-to-canvas table pipeline (shared with hybrid) is wired
     by the same null-guarded code below. Table tabs don't use createBox. */
  const tab=state.tabs.find(t=>t.id===tabId);
  const allowCSV=tab?.type==='layout'||tab?.type==='hybrid';
  const div=document.createElement('div');
  div.className='sb'; div.id='sb-'+bid;
  div.dataset.mode=initMode;
  div.innerHTML=`
    <div class="sb-hd">
      <span class="sb-handle" draggable="true" title="Drag to reorder">⠿</span>
      <span class="sb-hd-title">BOX ${bid}</span>
      <select class="sb-type-sel" id="sb-sel-${bid}" title="Source type">
        <option value="image"${initMode==='image'?' selected':''}>IMG</option>
        <option value="vec"${initMode==='vec'?' selected':''}>VEC</option>
        <option value="text"${initMode==='text'?' selected':''}>TXT</option>
        ${allowCSV?`<option value="csv"${initMode==='csv'?' selected':''}>CSV1</option>
        <option value="csv2"${initMode==='csv2'?' selected':''}>CSV2</option>
        <option value="csv3"${initMode==='csv3'?' selected':''}>CSV3</option>`:''}
      </select>
      <div class="sb-acts">
        <button class="sbb" data-del>✕</button>
      </div>
    </div>
    <div class="sb-body" id="sbb-${bid}">
      <!-- image zone (raster: png/jpg/webp/gif).
           v0.3.2: WHITE → TRANSPARENT moved from source-box to each
           image cel's edit toolbar (per-cel toggle now). -->
      <div id="img-zone-${bid}" style="${initMode!=='image'?'display:none':''}">
        <div class="dz" id="dz-${bid}" draggable="true">
          <span class="dz-lbl">CLICK / DROP IMAGE</span>
          <div class="dz-drag" id="dzdrag-${bid}" draggable="true">⠿ DRAG TO CANVAS</div>
          <input type="file" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none" id="fi-${bid}">
        </div>
      </div>
      <!-- vec zone (SVG only — never rasterized, no white-punch, fills cel) -->
      <div id="vec-zone-${bid}" style="${initMode!=='vec'?'display:none':''}">
        <!-- v0.3.9: built-in primitive shapes — LINE, RECT, CIRCLE.
             Each is a draggable mini-preview that drops as a VEC cel
             with a generated SVG. The cel's dataset.primType records
             which shape it is so the per-cel VEC toolbar (color +
             stroke width) knows how to re-render the SVG when those
             properties change. -->
        <div class="vec-prims">
          <div class="vec-prim" draggable="true" data-prim="line"   title="Drag onto canvas to add a line">
            <svg viewBox="0 0 24 24" width="24" height="24"><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <div class="vec-prim" draggable="true" data-prim="rect"   title="Drag onto canvas to add a rectangle (solid)">
            <svg viewBox="0 0 24 24" width="24" height="24"><rect x="4" y="4" width="16" height="16" fill="currentColor"/></svg>
          </div>
          <div class="vec-prim" draggable="true" data-prim="circle" title="Drag onto canvas to add a circle (solid)">
            <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="9" fill="currentColor"/></svg>
          </div>
        </div>
        <div class="dz vec-dz" id="vdz-${bid}" draggable="true">
          <span class="dz-lbl">CLICK / DROP SVG</span>
          <div class="dz-drag" id="vdzdrag-${bid}" draggable="true">⠿ DRAG TO CANVAS</div>
          <input type="file" accept=".svg,image/svg+xml" style="display:none" id="vfi-${bid}">
        </div>
        <div class="vec-note">VECTOR — RENDERS CRISP AT ANY SIZE</div>
      </div>
      <!-- text zone -->
      <div id="txt-zone-${bid}" style="${initMode!=='text'?'display:none':''}">
        <div class="txt-sections">
          <!-- v0.3.9: per-row INCLUDE checkboxes. Each toggles whether
               the corresponding sub-element (label/title/sub/body) is
               actually rendered in cels spawned from this box. Default
               state for all four is CHECKED so the existing behavior is
               unchanged for users who don't touch the boxes. Unchecking
               grays the input (visual cue) and on drag→canvas that
               field is omitted from the spawned cel — the sub-element
               div is created with display:none. -->
          <div class="txt-row">
            <input type="checkbox" class="txt-cb" id="tlcb-${bid}" checked title="Include LABEL in spawned cels">
            <span class="txt-lbl">LABEL</span>
            <div class="lbl-color-wrap">
              <input type="color" id="tlc-${bid}" value="#C41E33" class="lbl-color-pick" title="Label colour">
              <input class="txt-in" id="tl-${bid}" type="text" placeholder="Label text…" style="flex:1">
            </div>
          </div>
          <div class="txt-row">
            <input type="checkbox" class="txt-cb" id="ttcb-${bid}" checked title="Include TITLE in spawned cels">
            <span class="txt-lbl">TITLE</span>
            <input class="txt-in" id="tt-${bid}" type="text" placeholder="Title…">
          </div>
          <div class="txt-row">
            <input type="checkbox" class="txt-cb" id="tscb-${bid}" checked title="Include SUB in spawned cels">
            <span class="txt-lbl">SUB</span>
            <input class="txt-in" id="ts-${bid}" type="text" placeholder="Subtitle…">
          </div>
          <div class="txt-row" style="align-items:flex-start">
            <input type="checkbox" class="txt-cb" id="tbcb-${bid}" checked title="Include BODY in spawned cels" style="margin-top:6px">
            <span class="txt-lbl" style="margin-top:3px">BODY</span>
            <textarea class="txt-in" id="tb-${bid}" placeholder="Content…"></textarea>
          </div>
          <div class="drag-row" id="dr-${bid}" draggable="true">
            <span class="drag-ico">⠿⠿</span>
            <span class="drag-prev" id="dp-${bid}">Drag text block to canvas</span>
          </div>
        </div>
      </div>
      ${allowCSV?`
      <!-- csv zone (hybrid only) -->
      <div id="csv-zone-${bid}" style="${(initMode!=='csv'&&initMode!=='csv2'&&initMode!=='csv3')?'display:none':''}">
        <textarea class="csv-zone-ed" id="csv-${bid}" spellcheck="false" placeholder="Paste CSV or TSV…"></textarea>
        <div class="csv-zone-info" id="csvi-${bid}">No data</div>
        <div class="csv-zone-row">
          <button class="sbb" id="csvu-${bid}">UPLOAD</button>
          <input type="file" accept=".csv,.tsv,.txt" id="csvf-${bid}" style="display:none">
          <span style="flex:1"></span>
          <button class="sbb" id="csvz-out-${bid}" title="Shrink tables from this source 5%">−</button>
          <span class="zoom-pct-wrap" title="Table scale for this source (dbl-click to type)"><input class="zoom-pct csvz-pct" id="csvz-pct-${bid}" type="number" min="25" max="400" step="5" value="100" readonly>%</span>
          <button class="sbb" id="csvz-in-${bid}" title="Enlarge tables from this source 5%">+</button>
          <span style="flex:1"></span>
          <button class="sbb" id="csvr-${bid}">UPDATE</button>
        </div>
        <div class="drag-row" id="csvdr-${bid}" draggable="true" style="margin-top:4px">
          <span class="drag-ico">⠿⠿</span>
          <span class="drag-prev" id="csvpv-${bid}">Drag table block to canvas</span>
        </div>
      </div>`:''}
    </div>`;
  bw.appendChild(div);
  wireBox(bid,tabId);
  // Apply prefill values if provided
  if(prefill.label){const el=$('tl-'+bid);if(el)el.value=prefill.label;}
  if(prefill.labelColor){const el=$('tlc-'+bid);if(el)el.value=prefill.labelColor;}
  if(prefill.title){const el=$('tt-'+bid);if(el)el.value=prefill.title;}
  if(prefill.sub){const el=$('ts-'+bid);if(el)el.value=prefill.sub;}
  if(prefill.body){
    const el=$('tb-'+bid);
    if(el){
      el.value=prefill.body;
      // Trigger auto-grow after DOM settles
      setTimeout(()=>{el.style.height='0';el.style.height=el.scrollHeight+'px';},10);
    }
  }
  if(prefill.csv && allowCSV){
    const el=$('csv-'+bid);
    if(el){ el.value=prefill.csv; updateCSVBoxInfo(bid); }
  }
  /* v0.3.9: include-checkbox states. Each defaults to checked; only
     explicitly-false values flip the checkbox off. Coercing with !==
     false keeps backwards-compat with old packs (no value → still
     checked → original behavior). */
  const _setCb=(id,val)=>{ const cb=$(id); if(cb && val===false) cb.checked=false; };
  _setCb('tlcb-'+bid, prefill.includeLabel);
  _setCb('ttcb-'+bid, prefill.includeTitle);
  _setCb('tscb-'+bid, prefill.includeSub);
  _setCb('tbcb-'+bid, prefill.includeBody);
  return bid;
}

/* Read the CSV box's textarea and update the row count line under it. Also
   updates the drag-preview text so the user knows what they're dragging. */
function updateCSVBoxInfo(bid){
  const csv=$('csv-'+bid)?.value||'';
  const info=$('csvi-'+bid);
  const pv=$('csvpv-'+bid);
  if(!info) return;
  const lines=csv.trim()?csv.trim().split(/\r?\n/).filter(l=>l.trim()):[];
  if(!lines.length){
    info.textContent='No data';
    if(pv) pv.textContent='Drag table block to canvas';
    return;
  }
  // Quick title detection for preview label
  const rows=parseCSV(csv);
  const firstNonEmpty=rows[0]?rows[0].filter(c=>c.trim()!=='').length:0;
  if(firstNonEmpty===1 && rows.length>1){
    const ttl=rows[0].find(c=>c.trim()!=='');
    info.textContent=`${rows.length-1} rows · titled`;
    if(pv) pv.textContent='['+(ttl||'').slice(0,28)+'] '+(rows.length-1)+' rows';
  } else {
    info.textContent=`${rows.length} rows · ${(rows[0]||[]).length} cols`;
    if(pv) pv.textContent='Table · '+rows.length+' rows';
  }
}

/* Create a source box from a dropped OS file. `hint` controls which mode
   the box opens in — 'image' (default, raster path) or 'vec' (SVG-only
   vector path). Delegates the full markup to createBox so we don't end
   up with a parallel codebase for the two paths (the old fast-path
   missed the VEC toggle button in its header, and would silently lose
   any features added to createBox afterward). The dropzone is populated
   afterward via setDZ. */
function createBoxFromFile(tabId,file,url,hint='image'){
  const bid=createBox(tabId,hint);
  if(!bid) return null;
  /* Update the header title to the file name */
  const titleEl=$('sb-'+bid)?.querySelector('.sb-hd-title');
  if(titleEl) titleEl.textContent=file.name.slice(0,14).toUpperCase();
  /* Move to the top of the source list (where drop sources have always
     appeared — newer-first ordering). */
  const bw=$('bw-'+tabId), boxEl=$('sb-'+bid);
  if(bw && boxEl && bw.firstChild!==boxEl) bw.insertBefore(boxEl,bw.firstChild);
  /* Populate the correct dropzone based on the hint */
  if(hint==='vec'){
    const vdz=$('vdz-'+bid);
    if(vdz){ setDZ(vdz,url); vdz.dataset.src=url; vdz.dataset.origSrc=url; }
  } else {
    const dz=$('dz-'+bid);
    if(dz){ setDZ(dz,url); dz.dataset.src=url; dz.dataset.origSrc=url; }
  }
  return bid;
}

function wireBox(bid,tabId){
  const div=$('sb-'+bid);
  const dz=$('dz-'+bid), fi=$('fi-'+bid);
  const dzdrag=$('dzdrag-'+bid);
  const dr=$('dr-'+bid), dprev=$('dp-'+bid);

  /* 300dpi-aware default for this box's table scale. Doesn't override a
     scale that was already set (e.g. via ZIP import or earlier user input);
     just supplies an initial value so a fresh CSV dropped at print res
     immediately renders at the larger size. */
  if(!div.dataset.tblScale){
    const _tab=state.tabs.find(t=>t.id===tabId);
    div.dataset.tblScale = _tab?.res==='print' ? '3.2' : '1';
  }

  /* mode toggle — dropdown variant (v0.3.1). The body zones are toggled
     show/hide on the select's change event; div.dataset.mode tracks the
     authoritative current mode (used by the import path and the OS-drop
     handler to know how to materialise a cel). */
  const _sel=$('sb-sel-'+bid);
  if(_sel){
    _sel.addEventListener('change',()=>{
      const m=_sel.value;
      div.dataset.mode=m;
      $('img-zone-'+bid).style.display=m==='image'?'':'none';
      const vecZ=$('vec-zone-'+bid);
      if(vecZ) vecZ.style.display=m==='vec'?'':'none';
      $('txt-zone-'+bid).style.display=m==='text'?'':'none';
      const csvZ=$('csv-zone-'+bid);
      if(csvZ) csvZ.style.display=(m==='csv'||m==='csv2'||m==='csv3')?'':'none';
    });
  }

  /* del */
  div.querySelector('[data-del]').addEventListener('click',()=>{
    div.remove();
    /* cels spawned from this source keep their existing z-index — order is
       owned by the LAYERS panel now, not the SOURCES list */
  });

  /* image upload */
  if(fi){
    dz?.addEventListener('click',()=>{ if(!dz.dataset.src) fi.click(); });
    fi.addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f) return;
      const url=URL.createObjectURL(f); applyImageToDZ(dz,bid,url);
    });
    dz?.addEventListener('dragover',e=>{ e.preventDefault(); dz.classList.add('over'); });
    dz?.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz?.addEventListener('drop',e=>{
      e.preventDefault(); dz.classList.remove('over');
      const f=e.dataTransfer.files[0];
      if(f&&f.type.startsWith('image/')){
        const url=URL.createObjectURL(f); applyImageToDZ(dz,bid,url);
      }
    });
    /* v0.3.2: BG-transparent checkbox lives on each image CEL now (in
       its etb toolbar). The source box no longer auto-punches, so the
       wireup that previously listened to bgt-${bid} is removed. */
    /* If created with a pre-existing image (createBoxFromFile), record it as the original */
    if(dz.dataset.src&&!dz.dataset.origSrc) dz.dataset.origSrc=dz.dataset.src;
    /* image drag to canvas — via dz-drag strip */
    if(dzdrag){
      dzdrag.addEventListener('dragstart',e=>{
        if(!dz.dataset.src){ e.preventDefault(); return; }
        e.dataTransfer.setData('cel-type','image');
        e.dataTransfer.setData('cel-src',dz.dataset.src);
        e.dataTransfer.setData('cel-sourcebid',String(bid));
      });
    }
    /* also whole dz drag when has image */
    dz?.addEventListener('dragstart',e=>{
      if(!dz.dataset.src||e.target===dzdrag) return; // let dzdrag handle its own
      if(dz.dataset.src){
        e.dataTransfer.setData('cel-type','image');
        e.dataTransfer.setData('cel-src',dz.dataset.src);
        e.dataTransfer.setData('cel-sourcebid',String(bid));
      }
    });
  }

  /* ── VEC dropzone wiring ──
     Parallels the IMG wiring but for SVG-only sources. Crucially DIFFERENT:
     • Never calls applyImageToDZ (no white-punch processor — that's the
       raster pipeline that was garbling our logos).
     • Stores the SVG URL directly on the dz dataset, no roundtrip.
     • The dragged cel-type is 'vec' so the canvas drop handler routes to
       the vec branch of addCel, which uses `<img>` without object-fit
       so the browser keeps the SVG vector and scales it crisp. */
  const vdz=$('vdz-'+bid), vfi=$('vfi-'+bid), vdzdrag=$('vdzdrag-'+bid);
  if(vfi){
    const acceptSvg=(f)=>{
      if(!f) return;
      const looksSvg=/svg/i.test(f.type)||/\.svg$/i.test(f.name);
      if(!looksSvg){
        alert('VEC source accepts SVG files only.\nFor PNG / JPG use the IMG mode instead.');
        return;
      }
      /* Read the SVG text and run it through ensureSvgSized so viewBox-only
         SVGs (no width/height) still render inside the <img>. Reading as
         text first also lets us re-encode a sized version into the blob,
         which is what every downstream consumer (cel, export, thumb) uses. */
      const rdr=new FileReader();
      rdr.onload=ev=>{
        const url=svgTextToSizedBlobUrl(String(ev.target.result||''));
        setDZ(vdz,url);
        vdz.dataset.src=url;
        vdz.dataset.origSrc=url;
        /* Push the new URL into every canvas cel spawned from this source
           so swapping the SVG updates the live canvas without re-dragging. */
        refreshVecCelsForSource(bid,url);
      };
      rdr.onerror=()=>{
        /* Fall back to a raw object URL if text read fails for any reason */
        const url=URL.createObjectURL(f);
        setDZ(vdz,url); vdz.dataset.src=url; vdz.dataset.origSrc=url;
        refreshVecCelsForSource(bid,url);
      };
      rdr.readAsText(f);
    };
    vdz.addEventListener('click',()=>{ if(!vdz.dataset.src) vfi.click(); });
    vfi.addEventListener('change',e=>acceptSvg(e.target.files[0]));
    vdz.addEventListener('dragover',e=>{ e.preventDefault(); vdz.classList.add('over'); });
    vdz.addEventListener('dragleave',()=>vdz.classList.remove('over'));
    vdz.addEventListener('drop',e=>{
      e.preventDefault(); vdz.classList.remove('over');
      acceptSvg(e.dataTransfer.files?.[0]);
    });
    /* Drag VEC source to canvas — via the dz-drag strip OR the whole dz
       once it has an SVG loaded. Two listeners so the strip can capture
       inside the dropzone reliably. */
    const startVecDrag=(e)=>{
      if(!vdz.dataset.src){ e.preventDefault(); return; }
      e.dataTransfer.setData('cel-type','vec');
      e.dataTransfer.setData('cel-src',vdz.dataset.src);
      e.dataTransfer.setData('cel-sourcebid',String(bid));
    };
    vdzdrag?.addEventListener('dragstart',startVecDrag);
    vdz.addEventListener('dragstart',e=>{
      if(!vdz.dataset.src||e.target===vdzdrag) return;
      startVecDrag(e);
    });
    /* v0.3.9: built-in primitive tiles. Each .vec-prim is a draggable
       mini-preview; on dragstart we just set the 'cel-prim' key and
       the canvas drop handler does the rest (generates SVG, creates
       a VEC cel). They live in this source box but don't belong to it
       — primitives are stand-alone shapes, so no sourceBid is sent. */
    $('vec-zone-'+bid)?.querySelectorAll('.vec-prim').forEach(tile=>{
      tile.addEventListener('dragstart',ev=>{
        ev.dataTransfer.setData('cel-type','vec-prim');
        ev.dataTransfer.setData('cel-prim',tile.dataset.prim||'rect');
      });
    });
  }

  /* text drag */
  const upd=()=>{
    if(!dprev) return;
    const lv=$('tl-'+bid)?.value;
    const t=$('tt-'+bid)?.value||$('ts-'+bid)?.value||$('tb-'+bid)?.value;
    dprev.textContent=(lv?'['+lv+'] ':'')+(t?t.slice(0,32):'Drag text block to canvas');
  };
  $('tl-'+bid)?.addEventListener('input',upd);
  $('tlc-'+bid)?.addEventListener('input',upd);
  $('tt-'+bid)?.addEventListener('input',upd);
  $('ts-'+bid)?.addEventListener('input',upd);
  $('tb-'+bid)?.addEventListener('input',upd);

  // Auto-grow body textarea to fit content
  function autoGrowTb(){
    const ta=$('tb-'+bid); if(!ta) return;
    ta.style.height='0';
    ta.style.height=ta.scrollHeight+'px';
  }
  $('tb-'+bid)?.addEventListener('input',autoGrowTb);
  // Initial grow on next tick (after DOM is ready)
  setTimeout(autoGrowTb,0);

  dr?.addEventListener('dragstart',e=>{
    e.dataTransfer.setData('cel-type','text');
    /* v0.3.9: respect the per-row INCLUDE checkboxes. An unchecked
       checkbox sends an empty string for that field, which makes
       cel construction skip rendering that sub-element (textContent
       remains empty; the existing display:none-when-empty handling
       hides the LABEL badge; title/sub/body lines collapse to zero
       height). Box content stays editable while excluded from spawn. */
    const ckL=$('tlcb-'+bid)?.checked!==false;
    const ckT=$('ttcb-'+bid)?.checked!==false;
    const ckS=$('tscb-'+bid)?.checked!==false;
    const ckB=$('tbcb-'+bid)?.checked!==false;
    e.dataTransfer.setData('cel-label',      ckL?($('tl-'+bid)?.value||''):'');
    e.dataTransfer.setData('cel-labelcolor', $('tlc-'+bid)?.value||'#C41E33');
    e.dataTransfer.setData('cel-title',      ckT?($('tt-'+bid)?.value||''):'');
    e.dataTransfer.setData('cel-sub',        ckS?($('ts-'+bid)?.value||''):'');
    e.dataTransfer.setData('cel-body',       ckB?($('tb-'+bid)?.value||''):'');
    e.dataTransfer.setData('cel-sourcebid',  String(bid));
  });

  /* CSV zone (hybrid tabs only) — paste/upload CSV, drag to canvas. The drag
     transfers the textarea content verbatim; the drop handler parses+renders. */
  const csvIn=$('csv-'+bid), csvU=$('csvu-'+bid), csvF=$('csvf-'+bid),
        csvR=$('csvr-'+bid), csvDr=$('csvdr-'+bid);
  if(csvIn){
    csvIn.addEventListener('input',()=>updateCSVBoxInfo(bid));
    csvR?.addEventListener('click',()=>{
      updateCSVBoxInfo(bid);
      // also push current CSV into any cels already spawned from this source
      refreshTableCelsForSource(bid, csvIn.value);
    });
    csvU?.addEventListener('click',()=>csvF?.click());
    csvF?.addEventListener('change',ev=>{
      const f=ev.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=e=>{ csvIn.value=e.target.result; updateCSVBoxInfo(bid); };
      r.readAsText(f);
    });
    csvDr?.addEventListener('dragstart',e=>{
      const csv=csvIn.value||'';
      if(!csv.trim()){ e.preventDefault(); return; }
      e.dataTransfer.setData('cel-type','table');
      e.dataTransfer.setData('cel-csv', csv);
      /* v0.4.0: CSV1 (single title) / CSV2 (two title bars) / CSV3 (main title
         + interspersed sub-title bars). */
      const _mode=$('sb-'+bid)?.dataset.mode;
      e.dataTransfer.setData('cel-csvvariant', _mode==='csv2'?'csv2':(_mode==='csv3'?'csv3':'csv1'));
      e.dataTransfer.setData('cel-sourcebid', String(bid));
    });
    /* Per-box table scale: each CSV source owns a tblScale stored on its
       .sb element. +/- step 5%, clamp 25%–400%. applyBoxTblScale walks
       every .cel-tbl whose sourceBid matches this box and re-applies. */
    const stepBoxScale=(delta)=>{
      const box=$('sb-'+bid);
      if(!box) return;
      let s=parseFloat(box.dataset.tblScale)||1;
      s=Math.min(4,Math.max(0.25,Math.round((s+delta)*20)/20));
      box.dataset.tblScale=String(s);
      applyBoxTblScale(bid);
    };
    $('csvz-in-'+bid)?.addEventListener('click',()=>stepBoxScale(0.05));
    $('csvz-out-'+bid)?.addEventListener('click',()=>stepBoxScale(-0.05));
    /* Dbl-click the percent display to type a value. Same readonly→edit→
       commit pattern as the LAYERS panel's alpha box, so the muscle memory
       is consistent. Enter commits, Escape reverts, blur commits. */
    const pctIn=$('csvz-pct-'+bid);
    if(pctIn){
      const commitPct=()=>{
        let v=parseInt(pctIn.value);
        if(isNaN(v)){
          const box=$('sb-'+bid);
          v=Math.round((parseFloat(box?.dataset.tblScale)||1)*100);
        }
        v=Math.max(25,Math.min(400,v));
        pctIn.value=v;
        const box=$('sb-'+bid);
        if(box){ box.dataset.tblScale=String(v/100); applyBoxTblScale(bid); }
        pctIn.setAttribute('readonly','');
        pctIn.blur();
      };
      pctIn.addEventListener('dblclick',()=>{
        pctIn.removeAttribute('readonly');
        pctIn.focus(); pctIn.select();
      });
      pctIn.addEventListener('blur',()=>{ if(!pctIn.hasAttribute('readonly')) commitPct(); });
      pctIn.addEventListener('keydown',e=>{
        if(e.key==='Enter'){ e.preventDefault(); commitPct(); }
        else if(e.key==='Escape'){
          e.preventDefault();
          const box=$('sb-'+bid);
          pctIn.value=Math.round((parseFloat(box?.dataset.tblScale)||1)*100);
          pctIn.setAttribute('readonly','');
          pctIn.blur();
        }
      });
      /* Initial value from the dataset — picks up the 320% default seeded
         above for print-res tabs. */
      const _initScale=parseFloat(div.dataset.tblScale)||1;
      pctIn.value=Math.round(_initScale*100);
    }
    updateCSVBoxInfo(bid);
  }

}

/* Apply a source box's tblScale to every table cel spawned from it, and
   sync the cel's outline (style.width/height) to the table's natural size
   × scale so the cel rectangle always wraps the visible content exactly.
   This is the single point of truth for table scaling now — both the
   per-box +/- and the per-cel +/- write tblScale onto the source box and
   call this function, so every UI stays in lockstep ("connected scale"). */
function applyBoxTblScale(bid){
  const box=$('sb-'+bid);
  const scale=parseFloat(box?.dataset.tblScale)||1;
  const sbid=String(bid);
  document.querySelectorAll('.cel-tbl').forEach(cel=>{
    if(cel.dataset.sourceBid!==sbid) return;
    syncTableCelToScale(cel,scale);
  });
  /* Source-box display: write .value (not textContent — it's an <input>).
     Skip if the user is mid-typing in the box to avoid clobbering the field. */
  const pct=$('csvz-pct-'+bid);
  if(pct && pct.hasAttribute('readonly')) pct.value=Math.round(scale*100);
}

/* Set ONE cel's table transform AND sync its bounding box to match the
   scaled content. Reads the table's natural (unscaled) width/height via
   offsetWidth/offsetHeight (transform-immune), then writes:
     - transform: scale(s) on .pub-tbl
     - cel.style.width  = natW * s + 1px (border)
     - cel.style.height = natH * s + 1px
   Also keeps the per-cel toolbar's percent display in sync.
   The cel's dataset.cellScale mirrors the box scale so older code paths
   that read it (PNG/SVG export, ZIP export) keep working. */
function syncTableCelToScale(cel,scale){
  const tblEl=cel.querySelector('.pub-tbl');
  if(!tblEl) return;
  /* Measure UNSCALED size first — clear transform, read, re-apply. The
     clear-and-read avoids any subpixel rounding from prior scales. */
  tblEl.style.transform='';
  const natW=tblEl.offsetWidth;
  const natH=tblEl.offsetHeight;
  tblEl.style.transform=scale===1?'':`scale(${scale})`;
  tblEl.style.transformOrigin='top left';
  if(natW>0 && natH>0){
    /* +2 to keep the 1px border on each side from clipping the table's edge */
    cel.style.width =Math.round(natW*scale+2)+'px';
    cel.style.height=Math.round(natH*scale+2)+'px';
  }
  cel.dataset.cellScale=String(scale);
  const lbl=cel.querySelector('.cell-zpct');
  if(lbl && lbl.hasAttribute('readonly')) lbl.value=Math.round(scale*100);
}

/* Push a new CSV string into every table cel that was spawned from this source
   box (data-source-bid match). Re-renders the table inside each cel so edits to
   the source CSV propagate without forcing the user to re-drag. */
function refreshTableCelsForSource(bid,newCsv){
  const sbid=String(bid);
  document.querySelectorAll('.cel-tbl').forEach(cel=>{
    if(cel.dataset.sourceBid===sbid){
      cel.dataset.csv=newCsv;
      const inner=cel.querySelector('.cel-tbl-inner');
      if(inner){ inner.innerHTML=csvToTableHTML(newCsv, cel.dataset.colAlign||'', cel.dataset.csvVariant); applyTblCelStyle(cel); }
    }
  });
  /* Re-apply this box's scale — refreshing inner.innerHTML wipes the inline
     transform on the <table>, so without this the cels would snap back to
     100% after every UPDATE click. */
  applyBoxTblScale(bid);
}

/* Push a new SVG URL into every VEC cel spawned from this source box.
   Image cels (.cel-img) use the IMG raster path; .cel-vec is the vector
   counterpart. Swapping the source SVG updates every spawned cel without
   forcing a re-drag. */
function refreshVecCelsForSource(bid,newUrl){
  const sbid=String(bid);
  document.querySelectorAll('.cel-vec').forEach(cel=>{
    if(cel.dataset.sourceBid===sbid){
      const img=cel.querySelector('img');
      if(img) img.src=newUrl;
    }
  });
}

function setDZ(dz,url){
  let img=dz.querySelector('img');
  if(!img){ img=document.createElement('img'); dz.appendChild(img); }
  img.src=url; dz.classList.add('has-img');
}

/* ══ SOURCE BOX REORDER ══
   One delegated handler set per tab's source-box container. Drag must
   originate from the `.sb-handle` element (other draggable children — the
   image dropzone, the dz-drag strip, the text drag-row — still drop onto
   the canvas as before). Drop indicator appears as a 2px bar on the
   top or bottom edge of the box being hovered. */
function enableBoxReorder(tabId){
  const bw=$('bw-'+tabId); if(!bw||bw._reorderWired) return;
  bw._reorderWired=true;
  let dragging=null;

  function clearIndicators(){
    bw.querySelectorAll('.sb-drop-before,.sb-drop-after')
      .forEach(el=>el.classList.remove('sb-drop-before','sb-drop-after'));
  }

  bw.addEventListener('dragstart',e=>{
    const tEl=e.target instanceof Element?e.target:e.target.parentElement;
    const handle=tEl&&tEl.closest?tEl.closest('.sb-handle'):null;
    if(!handle) return;                                  // not a reorder drag
    const box=handle.closest('.sb');
    if(!box||box.parentElement!==bw) return;
    dragging=box;
    e.dataTransfer.effectAllowed='move';
    try{ e.dataTransfer.setData('text/x-sb-reorder',box.id); }catch(_){}
    box.classList.add('sb-dragging');
  });

  bw.addEventListener('dragend',()=>{
    if(dragging){ dragging.classList.remove('sb-dragging'); dragging=null; }
    clearIndicators();
  });

  bw.addEventListener('dragover',e=>{
    if(!dragging) return;
    const tEl=e.target instanceof Element?e.target:e.target.parentElement;
    const target=tEl&&tEl.closest?tEl.closest('.sb'):null;
    if(!target||target===dragging||target.parentElement!==bw) return;
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    const rect=target.getBoundingClientRect();
    const after=(e.clientY-rect.top)>rect.height/2;
    clearIndicators();
    target.classList.add(after?'sb-drop-after':'sb-drop-before');
  });

  bw.addEventListener('drop',e=>{
    if(!dragging){ clearIndicators(); return; }
    const tEl=e.target instanceof Element?e.target:e.target.parentElement;
    const target=tEl&&tEl.closest?tEl.closest('.sb'):null;
    if(target&&target!==dragging&&target.parentElement===bw){
      e.preventDefault();
      const rect=target.getBoundingClientRect();
      const after=(e.clientY-rect.top)>rect.height/2;
      if(after) target.after(dragging); else target.before(dragging);
      /* No restackBySources — SOURCES drag is purely visual organisation.
         Layer order is owned by the LAYERS panel. */
    }
    clearIndicators();
  });
}

/* ══ LAYER ORDER (legacy SOURCES-driven restack, kept for ZIP import only) ══
   Walks the SOURCES list top→bottom and assigns descending z-index to all
   matching cels. We used to call this on every drop / SOURCES reorder /
   autoLayout, but the LAYERS panel now owns explicit layer order. The
   function is still invoked once at the end of ZIP import to give imported
   cels a sane initial stacking when the saved manifest lacks z-index
   information (older packs). */
function restackBySources(tabId){
  const bw=$('bw-'+tabId), cv=$('cv-'+tabId);
  if(!bw||!cv) return;
  const sources=Array.from(bw.querySelectorAll('.sb'));
  const cels   =Array.from(cv.querySelectorAll('.cel'));
  if(!cels.length) return;

  /* Compute z-index per cel.
     Strategy: top source gets the highest band; within a source the
     drop order in the DOM decides stacking (later drop → higher z). */
  const total=cels.length+sources.length+1;
  let z=total*10;
  const assigned=new WeakSet();

  sources.forEach(sb=>{
    const bid=sb.id.replace('sb-','');
    cels.forEach(c=>{
      if(c.dataset.sourceBid===bid){ c.style.zIndex=z--; assigned.add(c); }
    });
  });
  /* Orphans (no matching source) go to the back, in DOM order */
  cels.forEach(c=>{ if(!assigned.has(c)) c.style.zIndex=z--; });
}

/* ══════════════════════════════════════
   LAYERS PANEL — popup, per layout tab
══════════════════════════════════════
   Reads each cel's current style.zIndex / opacity / display and renders
   a row per cel. Top of list = front (highest z). Each row exposes:
     ⠿  drag-grip      → reorder writes new z-indexes
     thumb            → mini preview (image bitmap or "T" badge)
     name             → image label or text title (truncated)
     ◉ / ⊘            → toggle display:none
     0–100 slider     → cel.style.opacity
     ✕                → remove the cel (source box is left intact)
   Reordering writes new descending z-indexes to .cel.style.zIndex.
   Note: re-ordering SOURCES afterwards triggers restackBySources which
   will overwrite LAYERS-panel ordering. That's intentional — SOURCES is
   the bulk control, LAYERS is fine-tuning. */
function populateLayersPanel(tabId){
  const body=$('lyr-body-'+tabId);
  const cv  =$('cv-'+tabId);
  if(!body) return;
  body.innerHTML='';
  if(!cv){ body.innerHTML='<div class="lyr-empty">No canvas</div>'; return; }
  /* GRID pseudo-row — always at the top, doesn't participate in z-order
     reordering, just toggles the .cv-grid overlay visibility on this tab's
     canvas. It's not a real cel so dragging the grip is disabled. */
  body.appendChild(createGridLayerRow(tabId));
  const cels=Array.from(cv.querySelectorAll('.cel'));
  if(!cels.length){
    const empty=document.createElement('div');
    empty.className='lyr-empty';
    empty.textContent='No items on canvas';
    body.appendChild(empty);
    return;
  }
  // Highest z first → top of list (below the fixed GRID row)
  cels.sort((a,b)=>(parseInt(b.style.zIndex)||0)-(parseInt(a.style.zIndex)||0));
  cels.forEach(cel=>body.appendChild(createLayerRow(cel,tabId)));
}

/* Build the special non-cel layer row that toggles the 3×3 grid overlay.
   Shape matches createLayerRow visually but the grip is inert and there is
   no opacity or delete control — empty placeholders keep the right edge
   of the row aligned with the other rows below it. */
function createGridLayerRow(tabId){
  const cv=$('cv-'+tabId);
  const gridEl=cv?.querySelector('.cv-grid');
  /* Grid is OFF by default — the .off class on .cv-grid hides it. User
     toggles visibility from the LAYERS panel's pseudo-row at the top.
     Earlier builds shipped it visible; default-hidden keeps fresh canvases
     uncluttered and matches the eye-icon's "hidden" initial state below. */
  const isOn=!gridEl?.classList.contains('off');
  const row=document.createElement('div');
  row.className='lyr-row lyr-row-grid';
  row.style.background='var(--strip-bg)';
  row.innerHTML=
    `<span class="lyr-grip" draggable="false" style="opacity:.25;cursor:default" title="Grid is a fixed alignment layer">⠿</span>`+
    `<div class="lyr-thumb"><span class="lyr-thumb-txt" style="font-size:14px">▦</span></div>`+
    `<span class="lyr-name" style="font-weight:600">GRID 3×3</span>`+
    `<button type="button" class="lyr-eye ${isOn?'':'off'}" data-grid-eye title="Show / hide 3×3 alignment grid">${isOn?'◉':'⊘'}</button>`+
    `<span class="lyr-alpha" style="visibility:hidden">100</span>`+
    `<span style="width:18px"></span>`;
  row.querySelector('[data-grid-eye]').addEventListener('click',e=>{
    e.stopPropagation();
    if(!gridEl) return;
    const turnOn=gridEl.classList.contains('off');     // currently hidden → turn on
    gridEl.classList.toggle('off',!turnOn);             // present .off iff turning off
    const btn=e.currentTarget;
    if(turnOn){ btn.classList.remove('off'); btn.textContent='◉'; }
    else      { btn.classList.add('off');    btn.textContent='⊘'; }
  });
  return row;
}

function createLayerRow(cel){
  const row=document.createElement('div');
  row.className='lyr-row';
  /* Row itself is NOT draggable — only the ⠿ grip is. This avoids the
     browser starting a drag on tiny pointer movements while clicking
     the eye / number-box / delete controls, which was firing dragstart
     paths that could interfere with the click handlers. */
  row._cel=cel; // back-reference used by the reorder handler
  const hidden=cel.style.display==='none';
  if(hidden) row.classList.add('lyr-hidden');

  const isImg=cel.classList.contains('cel-img');
  const isVec=cel.classList.contains('cel-vec');
  const isTbl=cel.classList.contains('cel-tbl');
  const opVal=parseFloat(cel.style.opacity);
  const opPct=isNaN(opVal)?100:Math.round(opVal*100);

  let name, thumbInner;
  if(isImg){
    const img=cel.querySelector('img');
    name='IMAGE';
    thumbInner=img?.src?`<img src="${img.src}" draggable="false">`:'<span class="lyr-thumb-txt">?</span>';
  } else if(isVec){
    const img=cel.querySelector('img');
    name='VECTOR';
    thumbInner=img?.src?`<img src="${img.src}" draggable="false">`:'<span class="lyr-thumb-txt">V</span>';
  } else if(isTbl){
    /* Pull a short label from the CSV: title if titled-layout, else "TABLE Nx" */
    const csv=cel.dataset.csv||'';
    const rows=csv.trim()?parseCSV(csv):[];
    const firstNonEmpty=rows[0]?rows[0].filter(c=>c.trim()!=='').length:0;
    if(firstNonEmpty===1 && rows.length>1){
      name=(rows[0].find(c=>c.trim()!=='')||'TABLE').slice(0,28);
    } else {
      name=`TABLE ${rows.length}r`;
    }
    thumbInner='<span class="lyr-thumb-txt">▦</span>';
  } else {
    const t=cel.querySelector('.cel-title-el');
    const l=cel.querySelector('.cel-label-el');
    const raw=(t?.textContent.trim())||(l?.textContent.trim())||'TEXT';
    name=raw.slice(0,28);
    thumbInner='<span class="lyr-thumb-txt">T</span>';
  }
  /* Explicit layerName on the cel wins — set by the PAGE 6 template
     bootstrap so its row reads "TEMPLATE" rather than "VECTOR". Also a
     hook for any future named-cel features (e.g. "BACKGROUND", "HEADER")
     without needing yet another dataset flag. */
  if(cel.dataset.layerName) name=cel.dataset.layerName;
  const isTemplate=cel.dataset.isTemplate==='1';
  if(isTemplate) row.classList.add('lyr-template');
  /* v0.3.6: lock state. Locked cels cannot be selected, dragged,
     resized, rotated, deleted, or arrow-nudged from the canvas. The
     LAYERS panel itself still drives them (toggle lock, hide/show,
     opacity, delete, reorder) so the user always has an escape hatch. */
  const isLocked=cel.dataset.locked==='1';
  if(isLocked) row.classList.add('lyr-locked');

  row.innerHTML=
    `<span class="lyr-grip" draggable="true" title="Drag to reorder layer">⠿</span>`+
    `<div class="lyr-thumb">${thumbInner}</div>`+
    `<span class="lyr-name" title="${escXML(name)}">${escXML(name)}</span>`+
    `<button type="button" class="lyr-eye ${hidden?'off':''}" data-eye title="Show / hide">${hidden?'⊘':'◉'}</button>`+
    `<button type="button" class="lyr-lock ${isLocked?'on':''}" data-lock title="Lock / unlock">${isLocked?'⚿':'⚷'}</button>`+
    `<input class="lyr-alpha" type="number" min="0" max="100" value="${opPct}" readonly title="Opacity %  (double-click to edit)">`+
    `<button type="button" class="lyr-del" data-del title="Delete from canvas">✕</button>`;

  /* eye toggle */
  row.querySelector('[data-eye]').addEventListener('click',e=>{
    e.stopPropagation();
    const isHidden=cel.style.display==='none';
    cel.style.display=isHidden?'':'none';
    const btn=e.currentTarget;
    if(isHidden){ row.classList.remove('lyr-hidden'); btn.classList.remove('off'); btn.textContent='◉'; }
    else        { row.classList.add('lyr-hidden');    btn.classList.add('off');    btn.textContent='⊘'; }
  });

  /* lock toggle (v0.3.6) — flip dataset.locked, swap the row marker
     class, and update the button glyph. Selection-blocking is handled
     by a separate capture-phase mousedown listener; if the cel was
     currently selected when locked, we also deselect it so the visible
     handles don't keep responding to keyboard nudge. */
  row.querySelector('[data-lock]').addEventListener('click',e=>{
    e.stopPropagation();
    const nowLocked=cel.dataset.locked!=='1';
    if(nowLocked){
      cel.dataset.locked='1';
      cel.classList.remove('sel');
      row.classList.add('lyr-locked');
      e.currentTarget.classList.add('on');
      e.currentTarget.textContent='⚿';
    } else {
      delete cel.dataset.locked;
      row.classList.remove('lyr-locked');
      e.currentTarget.classList.remove('on');
      e.currentTarget.textContent='⚷';
    }
  });

  /* alpha number box: display-only by default, dblclick to edit,
     blur / Enter commits, Esc reverts. Apply opacity on commit only. */
  const alphaIn=row.querySelector('.lyr-alpha');
  function commitAlpha(){
    let v=parseInt(alphaIn.value);
    if(isNaN(v)) v=Math.round((parseFloat(cel.style.opacity)||1)*100);
    v=Math.max(0,Math.min(100,v));
    alphaIn.value=v;
    if(v>=100) cel.style.opacity='';            // remove inline opacity → fully opaque
    else       cel.style.opacity=(v/100).toString();
    alphaIn.setAttribute('readonly','');
    alphaIn.blur();
  }
  alphaIn.addEventListener('dblclick',()=>{
    alphaIn.removeAttribute('readonly');
    alphaIn.focus(); alphaIn.select();
  });
  alphaIn.addEventListener('blur',()=>{ if(!alphaIn.hasAttribute('readonly')) commitAlpha(); });
  alphaIn.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); commitAlpha(); }
    else if(e.key==='Escape'){
      e.preventDefault();
      alphaIn.value=Math.round((parseFloat(cel.style.opacity)||1)*100);
      alphaIn.setAttribute('readonly','');
      alphaIn.blur();
    }
  });

  /* TEMPLATE rows: double-click the name to swap the underlying SVG.
     Opens a hidden file picker (SVG-only). On pick we point the cel's
     <img> at the new blob URL and clear dataset.imgAspect so the resize
     handler recaptures the ratio from the new artwork. The cel dimensions
     are left untouched (the template is meant to fill the page; a new SVG
     of a different aspect will simply fill the same box — acceptable for a
     page-background template). */
  if(isTemplate){
    const nameEl=row.querySelector('.lyr-name');
    if(nameEl){
      nameEl.style.cursor='pointer';
      nameEl.title=name+' — double-click to replace SVG';
      nameEl.addEventListener('dblclick',e=>{
        e.stopPropagation();
        const fi=document.createElement('input');
        fi.type='file'; fi.accept='.svg,image/svg+xml';
        fi.style.display='none';
        document.body.appendChild(fi);
        fi.addEventListener('change',ev=>{
          const f=ev.target.files&&ev.target.files[0];
          fi.remove();
          if(!f) return;
          const looksSvg=/svg/i.test(f.type)||/\.svg$/i.test(f.name);
          if(!looksSvg){ alert('TEMPLATE accepts SVG files only.'); return; }
          /* Read + size the SVG so viewBox-only files render. */
          const rdr=new FileReader();
          const apply=(url)=>{
            const img=cel.querySelector('img');
            if(img){
              img.src=url;
              delete cel.dataset.imgAspect;     // recapture on load
            }
            const thumb=row.querySelector('.lyr-thumb');
            if(thumb) thumb.innerHTML=`<img src="${url}" draggable="false">`;
          };
          rdr.onload=re=>apply(svgTextToSizedBlobUrl(String(re.target.result||'')));
          rdr.onerror=()=>apply(URL.createObjectURL(f));
          rdr.readAsText(f);
        });
        fi.click();
      });
    }
  }

  /* delete */
  row.querySelector('[data-del]').addEventListener('click',e=>{
    e.stopPropagation();
    cel.remove(); row.remove();
  });
  return row;
}

function enableLayersReorder(tabId){
  const body=$('lyr-body-'+tabId);
  if(!body||body._reorderWired) return;
  body._reorderWired=true;
  let dragging=null;

  const clearIndicators=()=>body.querySelectorAll('.lyr-row.drop-before,.lyr-row.drop-after')
    .forEach(el=>el.classList.remove('drop-before','drop-after'));

  body.addEventListener('dragstart',e=>{
    /* Only the grip is draggable=true; reject drags that originate
       elsewhere as a defensive measure (some browsers will still try
       to drag selected text inside spans). */
    const tEl=e.target instanceof Element?e.target:null;
    const grip=tEl&&tEl.closest?tEl.closest('.lyr-grip'):null;
    if(!grip){ e.preventDefault(); return; }
    const row=grip.closest('.lyr-row');
    if(!row) return;
    dragging=row;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    try{ e.dataTransfer.setData('text/x-lyr-reorder','1'); }catch(_){}
  });
  body.addEventListener('dragend',()=>{
    if(dragging){ dragging.classList.remove('dragging'); dragging=null; }
    clearIndicators();
  });
  body.addEventListener('dragover',e=>{
    if(!dragging) return;
    const tEl=e.target instanceof Element?e.target:null;
    const target=tEl&&tEl.closest?tEl.closest('.lyr-row'):null;
    if(!target||target===dragging) return;
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    const r=target.getBoundingClientRect();
    const after=(e.clientY-r.top)>r.height/2;
    clearIndicators();
    target.classList.add(after?'drop-after':'drop-before');
  });
  body.addEventListener('drop',e=>{
    if(!dragging){ clearIndicators(); return; }
    const tEl=e.target instanceof Element?e.target:null;
    const target=tEl&&tEl.closest?tEl.closest('.lyr-row'):null;
    if(target&&target!==dragging){
      e.preventDefault();
      const r=target.getBoundingClientRect();
      const after=(e.clientY-r.top)>r.height/2;
      if(after) target.after(dragging); else target.before(dragging);
      applyLayersOrder(tabId);
    }
    clearIndicators();
  });
}

/* Walk the panel rows top→bottom and write descending z-indexes to the
   referenced cels. Top of list = highest z = front of canvas. */
function applyLayersOrder(tabId){
  const body=$('lyr-body-'+tabId);
  if(!body) return;
  const rows=Array.from(body.querySelectorAll('.lyr-row'));
  let z=(rows.length+5)*10;
  rows.forEach(row=>{ if(row._cel) row._cel.style.zIndex=z--; });
}

/* ══ UNDO HISTORY (Ctrl/Cmd+Z, 20 steps) ══ — v0.3.1
   Per-tab snapshot stacks. Each snapshot captures the canvas's cel
   geometry (position, size, transform, rotation, z, opacity, display).
   On undo: cels added since the snapshot are removed; cels deleted since
   are re-inserted. element.remove() detaches but preserves the JS object
   and its event listeners, so re-inserting just appendChild's the same
   node — drag/resize/etc. still work without re-wiring.

   What this captures: move, resize, rotate, delete cel, add cel, arrow
   nudge, drop-from-source. What it doesn't: text content edits inside a
   cel (contentEditable supports native Ctrl+Z while focused), FS / font
   changes, source-box edits.

   Trigger strategy: ONE capture-phase listener at document level for
   mousedown on anything inside a .cel — fires before any descendant
   handler, immune to stopPropagation. Plus explicit calls at known
   action sites (nudge, drop). */
const UNDO_LIMIT = 20;
const undoStacks = {}; // tabId -> [snapshot,…]

function captureUndoSnapshot(tabId){
  const cv=$('cv-'+tabId);
  if(!cv) return;
  if(!undoStacks[tabId]) undoStacks[tabId]=[];
  const snap=Array.from(cv.querySelectorAll('.cel')).map(cel=>({
    el:cel,
    parent:cel.parentNode,
    nextSibling:cel.nextSibling,
    left:cel.style.left,
    top:cel.style.top,
    width:cel.style.width,
    height:cel.style.height,
    transform:cel.style.transform,
    rotation:cel.dataset.rotation||'',
    zIndex:cel.style.zIndex,
    opacity:cel.style.opacity,
    display:cel.style.display,
  }));
  undoStacks[tabId].push(snap);
  if(undoStacks[tabId].length > UNDO_LIMIT) undoStacks[tabId].shift();
}

function performUndo(tabId){
  const cv=$('cv-'+tabId);
  if(!cv || !undoStacks[tabId] || !undoStacks[tabId].length) return;
  const snap=undoStacks[tabId].pop();
  const snapEls=new Set(snap.map(s=>s.el));
  /* Step 1: remove any cel currently in DOM that wasn't in the snapshot
     (these were added after the snapshot). element.remove() detaches but
     keeps the node in memory — if the user later redoes, it could come
     back. (Redo not implemented in v0.3.1.) */
  Array.from(cv.querySelectorAll('.cel')).forEach(cel=>{
    if(!snapEls.has(cel)) cel.remove();
  });
  /* Step 2: restore each snapshot entry — re-attach if detached, then
     write the captured style/dataset values back. */
  for(const s of snap){
    if(!s.el.parentNode){
      if(s.nextSibling && s.nextSibling.parentNode===s.parent){
        s.parent.insertBefore(s.el, s.nextSibling);
      } else if(s.parent){
        s.parent.appendChild(s.el);
      } else {
        cv.appendChild(s.el);
      }
    }
    s.el.style.left=s.left;
    s.el.style.top=s.top;
    s.el.style.width=s.width;
    s.el.style.height=s.height;
    s.el.style.transform=s.transform;
    if(s.rotation) s.el.dataset.rotation=s.rotation;
    else delete s.el.dataset.rotation;
    s.el.style.zIndex=s.zIndex;
    s.el.style.opacity=s.opacity;
    s.el.style.display=s.display;
    /* Keep the rot-deg badge in the etb visually in sync (the rotation
       handler updates it on every wheel/drag tick; without this nudge
     the undo would visually leave the badge showing the post-action
     value). */
    const rotBadge=s.el.querySelector('.rot-deg');
    if(rotBadge) rotBadge.textContent=Math.round(parseFloat(s.rotation)||0)+'°';
  }
}

/* Drop the per-tab stack when a tab closes so we don't leak. */
const _origRemoveTab=removeTab;
removeTab=function(id){
  delete undoStacks[id];
  return _origRemoveTab(id);
};

/* Trigger 1 — capture-phase mousedown anywhere inside a .cel. Fires
   strictly before any descendant handler (drag-start, resize handle,
   rotation grip, delete button), so the snapshot captures the
   pre-action state regardless of what the click does next. */
(function bindUndoMousedown(){
  if(window._undoMdBound) return;
  window._undoMdBound=true;
  document.addEventListener('mousedown',e=>{
    if(!state.active) return;
    const cv=e.target.closest('.cv');
    if(!cv) return;
    if(!e.target.closest('.cel')) return;
    /* Ignore clicks inside form fields embedded in a cel (FS input,
       contenteditable text). Those are text-level edits; native browser
       undo handles them. */
    if(e.target.closest('input, textarea, [contenteditable="true"]')) return;
    captureUndoSnapshot(state.active);
  }, true);
})();

/* Trigger 2 — drop-on-canvas (drag-from-source or OS file drop creates
   a new cel). Capture phase so the snapshot is taken before the drop
   handler builds the new cel. */
(function bindUndoDrop(){
  if(window._undoDropBound) return;
  window._undoDropBound=true;
  document.addEventListener('drop',e=>{
    if(!state.active) return;
    if(!e.target.closest('.cv')) return;
    captureUndoSnapshot(state.active);
  }, true);
})();

/* ══ LOCKED-CEL INTERACTION BLOCKER (v0.3.6) ══
   One capture-phase listener at document level. If the user mousedowns
   on anything inside a cel with dataset.locked='1', we kill the event
   before it reaches any of the cel-side handlers (select/drag in the
   cel root, resize-corner drag in .rc, rotate handle drag in .rot-h,
   etb buttons including DEL). The LAYERS panel's own lock/eye/del
   buttons live outside .cel so they remain interactive — that's the
   only path to unlock a cel. Bound once via idempotent guard. */
(function bindLockedCelBlocker(){
  if(window._lockedBlockBound) return;
  window._lockedBlockBound=true;
  document.addEventListener('mousedown',e=>{
    const cel=e.target.closest('.cel');
    if(!cel) return;
    if(cel.dataset.locked!=='1') return;
    e.stopPropagation();
    e.preventDefault();
  }, true);
  /* Click is fired AFTER mousedown/mouseup. We block it too so etb
     buttons (DEL, BG, ↺) can't fire on a locked cel via plain clicks
     either. */
  document.addEventListener('click',e=>{
    const cel=e.target.closest('.cel');
    if(!cel) return;
    if(cel.dataset.locked!=='1') return;
    e.stopPropagation();
    e.preventDefault();
  }, true);
})();

/* Ctrl/Cmd+Z handler. Skips when focus is in a text field so the
   browser's native undo wins there (preserves expected typing UX). */
(function bindUndoShortcut(){
  if(window._undoKbBound) return;
  window._undoKbBound=true;
  document.addEventListener('keydown',e=>{
    if(!((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z') && !e.shiftKey)) return;
    const a=document.activeElement;
    if(a && (a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.isContentEditable)) return;
    if(!state.active) return;
    e.preventDefault();
    performUndo(state.active);
  });
})();

/* ══ GROUP / UNGROUP (v0.3.9) ══
   Ctrl+G with ≥2 selected cels assigns them a shared dataset.groupId,
   making them a logical unit. Subsequent clicks on any group member
   select the WHOLE group; drags, alignments, deletions, etc. that
   read .cel.sel just see all members selected together.
   Ctrl+G when the current selection is already a single group: removes
   the groupId from those cels (ungroup).
   Implementation is purely via dataset — no wrapper element, no
   reparenting — so groups round-trip through every existing path
   (z-order is the cel's own zIndex, position is each cel's own left/top,
   serialization picks up groupId via the dataset capture). */
(function bindGroupShortcut(){
  if(window._groupKbBound) return;
  window._groupKbBound=true;
  document.addEventListener('keydown',e=>{
    if(!((e.ctrlKey||e.metaKey) && (e.key==='g'||e.key==='G'))) return;
    const a=document.activeElement;
    if(a && (a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.isContentEditable)) return;
    if(!state.active) return;
    const cv=$('cv-'+state.active);
    if(!cv) return;
    const sels=Array.from(cv.querySelectorAll('.cel.sel'));
    if(!sels.length) return;
    e.preventDefault();
    const existing=new Set(sels.map(c=>c.dataset.groupId).filter(Boolean));
    if(existing.size===1 && sels.every(c=>c.dataset.groupId)){
      /* All selected share one group → UNGROUP. Remove the attribute
         from every member (including any members NOT in current
         selection, since you ungroup by Ctrl+G on the group). */
      const gid=existing.values().next().value;
      cv.querySelectorAll('.cel[data-group-id="'+gid+'"]').forEach(c=>{
        delete c.dataset.groupId;
      });
    } else if(sels.length>=2){
      /* GROUP — mint a fresh id and assign to all selected. Pre-existing
         group memberships are overwritten (you can't be in two groups). */
      const gid='g'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
      sels.forEach(c=>{ c.dataset.groupId=gid; });
    }
  });
})();

/* When a click selects a cel in a group, the cel's own mousedown
   handler (in addCel) now expands the selection to every group member
   synchronously — see the v0.3.9 group-aware block there. The
   previous capture-phase microtask wrapper was removed because the
   microtask ran AFTER selCels was captured for drag, so the drag only
   moved the clicked cel even though selection visually expanded. The
   synchronous inline version makes click-and-drag move the entire
   group. */

/* Global outside-click dismiss for any open LAYERS panel. Registered
   once at script load (idempotent — checks before re-binding). The
   panels themselves stopPropagation on mousedown so clicks inside
   them never reach this handler. */
(function bindLayersOutsideClose(){
  if(window._lyrOutsideBound) return;
  window._lyrOutsideBound=true;
  document.addEventListener('mousedown',e=>{
    const opened=document.querySelectorAll('.lyr-panel.open');
    if(!opened.length) return;
    // Clicks on a LAYERS button toggle their own panel — leave them alone
    if(e.target.closest&&e.target.closest('[id^="lt-lyr-"]')) return;
    opened.forEach(p=>p.classList.remove('open'));
  });
})();

/* ══ ARROW-KEY NUDGE ══
   Arrow keys move the currently selected cel by 2px. Shift+Arrow does 10px
   for coarser positioning without forcing the user back to the mouse. Skips
   if focus is in an input/textarea/contenteditable so typing isn't hijacked.
   Bound once (idempotent guard). */
(function bindArrowNudge(){
  if(window._arrowNudgeBound) return;
  window._arrowNudgeBound=true;
  document.addEventListener('keydown',e=>{
    if(e.target.closest&&e.target.closest('input, textarea, [contenteditable="true"]')) return;
    /* Multi-select aware: nudge every selected cel by the same delta.
       v0.3.6: locked cels (dataset.locked='1') are skipped — they
       can't be selected from the canvas now, but they might still be
       in `.sel` if they were selected before being locked. */
    const sels=Array.from(document.querySelectorAll('.cel.sel'))
      .filter(c=>c.dataset.locked!=='1');
    if(!sels.length) return;
    const step=e.shiftKey?10:2;
    let dx=0, dy=0;
    if(e.key==='ArrowLeft')       dx=-step;
    else if(e.key==='ArrowRight') dx= step;
    else if(e.key==='ArrowUp')    dy=-step;
    else if(e.key==='ArrowDown')  dy= step;
    else return;
    e.preventDefault();
    /* Snapshot before the nudge writes any new positions, so Ctrl+Z
       reverses an arrow-key move (v0.3.1). */
    if(state.active) captureUndoSnapshot(state.active);
    sels.forEach(sel=>{
      sel.style.left=((parseInt(sel.style.left)||0)+dx)+'px';
      sel.style.top =((parseInt(sel.style.top) ||0)+dy)+'px';
    });
  });
})();

/* ══ COPY / PASTE ══
   Ctrl/Cmd+C copies every .cel.sel into an in-memory clipboard
   (window._pubsysClipboard). Ctrl/Cmd+V pastes those cels into the
   ACTIVE tab's canvas at their ORIGINAL (x,y) — explicit user request:
   "paste at exactly the same place where object copied".
   The clipboard lives on `window` so it survives tab switches: copy
   from Tab A, switch to Tab B, paste — works. Blob URLs for image
   sources are document-scoped, and PUBSYS keeps all tabs as DIVs in
   the same document, so image refs round-trip without re-encoding.
   Cels lose their sourceBid on paste (the source box is tab-local;
   pasted cels become orphans, which is fine — they keep their own
   image/csv/text data on the DOM node). */
function serializeCel(cel){
  const rec={
    x:parseInt(cel.style.left)||0,
    y:parseInt(cel.style.top)||0,
    w:cel.offsetWidth,
    h:cel.offsetHeight,
    rotation:parseFloat(cel.dataset.rotation)||0,
    opacity:(()=>{const o=parseFloat(cel.style.opacity);return isNaN(o)?1:o;})(),
    hidden:cel.style.display==='none',
    /* v0.3.8: preserve lock state across copy/paste. Without this the
       pasted cel was always unlocked even if the source was locked. */
    locked:cel.dataset.locked==='1',
    /* v0.3.9: preserve group membership. groupId is a per-cel marker
       (no wrapper element) so copy/paste of a single group member
       preserves the link to the rest of the group; copying ALL members
       at once re-creates a working group on paste. */
    groupId:cel.dataset.groupId||undefined,
  };
  if(cel.classList.contains('cel-img')){
    rec.type='image';
    const img=cel.querySelector('img');
    if(img) rec.src=img.src;
  } else if(cel.classList.contains('cel-vec')){
    rec.type='vec';
    const img=cel.querySelector('img');
    if(img) rec.src=img.src;
  } else if(cel.classList.contains('cel-tbl')){
    rec.type='table';
    rec.csv=cel.dataset.csv||'';
    rec.colAlign=cel.dataset.colAlign||'';
    rec.csvVariant=cel.dataset.csvVariant||'csv1';
    rec.tblFont=cel.dataset.tblFont||'';
    rec.titleFS=cel.dataset.titleFS||'';
    rec.cellPad=cel.dataset.cellPad||'';
    rec.cellScale=parseFloat(cel.dataset.cellScale)||1;
  } else {
    rec.type='text';
    const lbl=cel.querySelector('.cel-label-el');
    const t  =cel.querySelector('.cel-title-el');
    const s  =cel.querySelector('.cel-sub-el');
    const b  =cel.querySelector('.cel-body-el');
    /* Plain-text fields kept for backwards-compat — paste from old
       in-memory clipboards or anything that only reads these still
       works. innerText (not textContent) preserves contenteditable
       line breaks (v0.3.7). */
    rec.label     =lbl?.innerText||'';
    rec.labelColor=lbl?.style.background||'#C41E33';
    rec.title     =t?.innerText||'';

    opts.title=rec.title; opts.sub=rec.sub; opts.body=rec.body;
    opts.fontSize=rec.fontSize;

     (height=scrollHeight+12 in a RAF), which computed against the

     overrides. Result: the pasted cel often came out taller or
     shorter than the original because the auto-grow's metric was
     wrong. Setting height immediately handles non-text; the
     double-RAF re-pin below covers text once the auto-grow has
     fired. Mirrors the import-time pattern at importLayoutZip. */

      el.style.height=rec.h+'px';

     Old records (no *Html / *Style fields) fall back to addCel's
     default text-only path silently. */

      const lbl=el.querySelector('.cel-label-el');

      const b  =el.querySelector('.cel-body-el');
      if(rec.labelHtml!=null && lbl) lbl.innerHTML=rec.labelHtml;
      if(rec.titleHtml!=null && t  ) t.innerHTML  =rec.titleHtml;
      if(rec.subHtml!=null   && s  ) s.innerHTML  =rec.subHtml;
      if(rec.bodyHtml!=null  && b  ) b.innerHTML  =rec.bodyHtml;
      if(rec.labelStyle && lbl) lbl.setAttribute('style',rec.labelStyle);
      if(rec.titleStyle && t  ) t.setAttribute('style',rec.titleStyle);
      if(rec.subStyle   && s  ) s.setAttribute('style',rec.subStyle);
      if(rec.bodyStyle  && b  ) b.setAttribute('style',rec.bodyStyle);
      /* v0.3.8: restore the title-row's style (justify-content) so
         TITLE / SUB alignment survives paste. */

function pasteCels(){
  const cb=window._pubsysClipboard;
  if(!cb||!cb.length) return false;
  const tab=state.tabs.find(t=>t.id===state.active);
  if(!tab||(tab.type!=='layout'&&tab.type!=='hybrid')) return false;
  const cv=$('cv-'+tab.id);
  if(!cv) return false;

     cels (v0.3.1). */
  captureUndoSnapshot(tab.id);
  /* Deselect current selection so the newly-pasted cels are the only
     selected ones — matches the typical "what I just pasted is what's
     active" expectation from any other editor. */
  deselectAll();

/* v0.4.0: delete every selected cel on the active layout/hybrid canvas.
   Locked cels (e.g. the page TEMPLATE) are protected — they're filtered out
   so a stray Delete can't wipe them; unlock from LAYERS to remove. Returns
   true whenever there WAS a selection, so the caller consumes the keypress
   (stops Backspace from triggering browser back-navigation) even if every
   selected cel was locked. Snapshots undo first; refreshes the LAYERS panel. */
function deleteSelectedCels(){
  const tab=state.tabs.find(t=>t.id===state.active);
  if(!tab||(tab.type!=='layout'&&tab.type!=='hybrid')) return false;
  const cv=$('cv-'+tab.id); if(!cv) return false;
  const sel=Array.from(cv.querySelectorAll('.cel.sel'));
  if(!sel.length) return false;
  const del=sel.filter(c=>c.dataset.locked!=='1');
  if(del.length){
    captureUndoSnapshot(tab.id);
    del.forEach(c=>c.remove());
    try{ populateLayersPanel(tab.id); }catch(_){}
  }
  return true;
}
(function bindCopyPaste(){
  if(window._copyPasteBound) return;
  window._copyPasteBound=true;
  document.addEventListener('keydown',e=>{
    /* Ignore when typing in any text-entry field — Ctrl+C/V and Backspace
       there should do the normal browser thing (edit text in that field). */
    if(e.target.closest&&e.target.closest('input, textarea, [contenteditable="true"]')) return;
    /* v0.4.0: Delete / Backspace removes the selected cel(s) directly. Handled
       before the Ctrl/Meta gate since it needs no modifier. We always consume
       the key when there's a selection on a canvas — important for Backspace,
       whose default would otherwise navigate the browser back. */
    if(e.key==='Delete'||e.key==='Backspace'){
      if(deleteSelectedCels()) e.preventDefault();
      return;
    }
    if(!(e.ctrlKey||e.metaKey)) return;
    const k=e.key.toLowerCase();
    if(k==='c'){
      if(copySelectedCels()) e.preventDefault();
    } else if(k==='v'){
      if(pasteCels()) e.preventDefault();
    }
  });

(function bindImagePaste(){
  if(window._imgPasteBound) return;
  window._imgPasteBound=true;
  /* v0.4.0: paste an image from the system clipboard (print-screen, "copy
     image", a copied file) straight onto the active layout/hybrid canvas as an
     image cel. The internal cel-paste (Ctrl+V keydown) only preventDefaults
     when it actually has copied cels, so the browser's paste event still fires
     here for images — no conflict. Ignored while typing in a field. */
  document.addEventListener('paste',e=>{
    if(e.target.closest && e.target.closest('input, textarea, [contenteditable="true"]')) return;

    if(!items) return;
    let file=null;
    for(const it of items){ if(it.kind==='file' && /^image\//.test(it.type)){ file=it.getAsFile(); break; } }
    if(!file) return;
    const tab=state.tabs.find(t=>t.id===state.active);
    if(!tab || (tab.type!=='layout' && tab.type!=='hybrid')){
      /* Only layout/hybrid tabs have a canvas to drop onto. */
      return;
    }
    const cv=$('cv-'+tab.id);
    if(!cv) return;
    e.preventDefault();
    const rd=new FileReader();
    rd.onload=()=>{
      const src=String(rd.result||'');

        /* cap to 60% of the canvas, preserve aspect, centre it */

      img.onerror=()=>place(300,200);

function addCel(cv,opts){

     interacts badly with reflow), but rotation will round-trip through ZIP/SVG/HTML
     for any cel that has one set. */
