<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PUBSYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap');

/* ══ TOKENS ══ */
:root{
  --bg:#f0f0f0;--surface:#fff;--border:#d0d0d0;--border2:#aaa;
  --text:#111;--text2:#555;--text3:#999;
  --btn-bg:#111;--btn-txt:#fff;
  --strip-bg:#e6e6e6;--panel-bg:#ebebeb;--input-bg:#fafafa;
  --sel:#111;--sel-txt:#fff;
  --font:'Barlow Condensed','Arial Narrow',sans-serif;--fs:16px;
}
[data-theme=dark]{
  --bg:#0c0c0c;--surface:#181818;--border:#282828;--border2:#3e3e3e;
  --text:#e4e4e4;--text2:#888;--text3:#555;
  --btn-bg:#e4e4e4;--btn-txt:#0c0c0c;
  --strip-bg:#111;--panel-bg:#141414;--input-bg:#1a1a1a;
  --sel:#e4e4e4;--sel-txt:#0c0c0c;
}

/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;border-radius:0!important}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:var(--fs);line-height:1.4;color:var(--text);background:var(--bg);transition:background .15s,color .15s;text-transform:uppercase}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2)}
.hidden{display:none!important}
/* Lowercase exceptions */
.csv-ed,.cel-text-inner,.cel-title-el,.cel-sub-el,.cel-body-el,[contenteditable]{text-transform:none!important}
input[type="text"],input[type="number"],.cs-hex{text-transform:uppercase}

/* ══ APP SHELL ══ */
#app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}

/* S0 header */
#s0{display:none}
#s0 .logo{font-weight:700;letter-spacing:.16em;font-size:13px;text-transform:uppercase}
#s0 .meta{font-size:12px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}

/* S1 toolbar */
#s1{display:flex;align-items:center;gap:6px;padding:0 12px;height:31px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border)}
.tbtn{height:22px;padding:0 11px;background:var(--btn-bg);color:var(--btn-txt);
  font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid var(--btn-bg);transition:opacity .12s;white-space:nowrap}
.tbtn:hover{opacity:.7}
.tbtn.g{background:none;color:var(--text);border-color:var(--border2)}
.tbtn.g:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
/* v0.3.7: IMPORT accepts file drops. While the user is hovering files
   over the button, give it a strong outline so it reads as a drop
   target without re-styling the whole button. */
.tbtn.drag-over{outline:2px solid var(--accent,#C41E33);outline-offset:1px}
.sbb{height:22px;padding:0 8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .1s}
.sbb:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.vsep{width:1px;height:17px;background:var(--border);margin:0 2px;flex-shrink:0}
.zoom-pct{display:inline-flex;align-items:center;justify-content:center;
  min-width:42px;height:23px;padding:0 6px;border:1px solid var(--border);
  background:var(--input-bg);color:var(--text2);font-size:11px;letter-spacing:.04em;
  font-family:'Courier New',monospace}
#s1sp{flex:1}
#size-lbl{font-size:12px;color:var(--text3);letter-spacing:.06em;margin-right:5px}
.res-grp{display:flex}
.rbtn{height:22px;padding:0 8px;font-size:12px;font-weight:500;
  border:1px solid var(--border2);color:var(--text2);letter-spacing:.04em;transition:all .12s}
.rbtn+.rbtn{border-left:none}
.rbtn.active,.rbtn:hover{background:var(--sel);color:var(--sel-txt);border-color:var(--sel)}

/* TAB BAR */
#tab-bar{display:flex;align-items:flex-end;padding:0 10px;height:31px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);gap:0}
.tab{height:25px;padding:0 12px;font-size:12px;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;border:1px solid transparent;border-bottom:none;
  color:var(--text3);cursor:pointer;transition:all .12s;position:relative;top:1px;
  display:flex;align-items:center;gap:5px;white-space:nowrap;user-select:none}
.tab-fmt{font-size:11px;color:var(--text3)}
.tab.active{background:var(--surface);color:var(--text);
  border-color:var(--border);border-bottom-color:var(--surface)}
.tab.active .tab-fmt{color:var(--text2)}
.tab:not(.active):hover{color:var(--text);background:var(--strip-bg)}
.tab-x{font-size:11px;color:var(--text3);padding:0 1px;opacity:0;transition:opacity .12s}
.tab:hover .tab-x,.tab.active .tab-x{opacity:.5}
.tab-x:hover{opacity:1!important;color:var(--text)!important}
#tab-add{height:25px;padding:0 10px;font-size:17px;font-weight:300;color:var(--text3);
  cursor:pointer;position:relative;top:1px;display:flex;align-items:center;
  border:1px solid transparent;border-bottom:none;transition:color .12s}
#tab-add:hover{color:var(--text)}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden}
.tc{display:none;width:100%;height:100%}
.tc.active{display:flex}
.tc-layout{flex-direction:column;position:relative}  /* relative = anchor for LAYERS popup */
.tc-table{flex-direction:column}

/* ══ LAYERS PANEL (popup, anchored to topbar's right edge) ══ */
.lyr-panel{position:absolute;top:38px;right:8px;width:320px;max-height:65vh;
  background:var(--surface);border:1px solid var(--border);
  box-shadow:0 6px 22px rgba(0,0,0,.18);
  z-index:200;display:none;flex-direction:column;overflow:hidden}
.lyr-panel.open{display:flex}
.lyr-hd{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:var(--strip-bg);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text2);text-transform:uppercase}
.lyr-hd-actions{display:flex;gap:4px}
.lyr-hd-btn{cursor:pointer;background:none;border:1px solid var(--border2);color:var(--text3);
  padding:1px 7px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;line-height:1.4}
.lyr-hd-btn:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.lyr-body{flex:1;overflow-y:auto;padding:3px}
.lyr-empty{padding:22px 12px;color:var(--text3);font-size:11px;text-align:center;
  text-transform:uppercase;letter-spacing:.06em}

/* Alignment toolbar — six buttons (H trio + V trio) separated by a thin
   spacer. Lives inline in the layout-tab topbar, next to LAYERS, so it
   shares the topbar's height and vertical centering. No background/border
   of its own — the topbar already provides those. */
.lyr-align{display:inline-flex;align-items:center;gap:3px}
.lyr-align-btn{cursor:pointer;background:none;border:1px solid var(--border);
  color:var(--text2);padding:3px 5px;line-height:0;transition:all .1s;
  display:inline-flex;align-items:center;justify-content:center}
.lyr-align-btn svg{display:block}
.lyr-align-btn:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.lyr-align-sep{width:1px;height:14px;background:var(--border);margin:0 4px}

/* Position widget — shows X/Y of selection, dbl-click to edit. Visual
   pattern matches the zoom-pct-wrap chips: readonly looks like a value
   chip, edit mode flips background and adds a focus outline. */
.pos-info{display:inline-flex;align-items:center;gap:3px;font-size:11px;
  color:var(--text2);letter-spacing:.04em}
.pos-lbl{color:var(--text3);font-weight:600;font-size:10px;
  text-transform:uppercase;padding:0 1px 0 2px}
.pos-in{width:42px;height:22px;border:1px solid var(--border);
  background:var(--strip-bg);color:var(--text2);font-size:11px;text-align:right;
  padding:0 4px;font-family:'Courier New',monospace;font-variant-numeric:tabular-nums;
  -moz-appearance:textfield;outline:none}
.pos-in::-webkit-inner-spin-button,.pos-in::-webkit-outer-spin-button{
  -webkit-appearance:none;margin:0}

/* ══ TEXT-CEL TOOLBAR (v0.3.7) — `.txt-ctl` ══
   Appears in the layout topbar, to the right of the X/Y position widget,
   ONLY when a TXT cel is selected. Lets the user override font-family,
   font-size, and letter-spacing (tracking) on a per-sub-element basis
   (LABEL / TITLE / SUB / BODY can each carry their own values). The
   .txt-ctl-target pill indicates which sub-element the inputs currently
   act on; it updates automatically whenever the user clicks into a
   different sub-element while editing.

   Hidden by default — the JS toggles `display:flex` when a TXT cel
   is selected and `display:none` otherwise. */
.txt-ctl{display:none;align-items:center;gap:6px;padding:0 6px;
  border-left:1px solid var(--border);flex-shrink:0;white-space:nowrap}
.txt-ctl-lbl{font-size:9px;color:var(--text3);letter-spacing:.1em;
  font-weight:600;text-transform:uppercase;padding:0 1px 0 2px}
/* Pill showing which sub-element the inputs act on (LABEL / TITLE /
   SUB / BODY). Click to cycle through targets without having to enter
   contenteditable mode. */
.txt-ctl-target{height:22px;padding:0 8px;border:1px solid var(--border2);
  background:var(--input-bg);color:var(--text);font-size:10px;font-weight:700;
  letter-spacing:.12em;cursor:pointer;display:inline-flex;align-items:center;
  text-transform:uppercase;min-width:48px;justify-content:center;
  font-family:var(--font)}
.txt-ctl-target:hover{background:var(--btn-bg);color:var(--btn-txt)}
.txt-ctl-font{height:22px;border:1px solid var(--border);
  background:var(--strip-bg);color:var(--text2);padding:0 4px;font-size:11px;
  min-width:130px;max-width:160px;cursor:pointer;outline:none;
  font-family:var(--font);text-transform:none}
.txt-ctl-fs,.txt-ctl-tr{width:50px;height:22px;border:1px solid var(--border);
  background:var(--strip-bg);color:var(--text2);font-size:11px;text-align:right;
  padding:0 4px;font-family:'Courier New',monospace;font-variant-numeric:tabular-nums;
  -moz-appearance:textfield;outline:none}
.txt-ctl-fs::-webkit-inner-spin-button,.txt-ctl-fs::-webkit-outer-spin-button,
.txt-ctl-tr::-webkit-inner-spin-button,.txt-ctl-tr::-webkit-outer-spin-button{
  -webkit-appearance:none;margin:0}
/* v0.3.8 — alignment trio (L / C / R). One button per text-align value;
   exactly one is .act at a time, reflecting the focused sub-element's
   computed text-align. Identical visual idiom to the .etbb buttons so
   the toolbar feels uniform. */
.txt-ctl-align{height:22px;min-width:24px;padding:0 6px;border:1px solid var(--border2);
  background:var(--input-bg);color:var(--text);font-size:10px;font-weight:700;
  letter-spacing:.04em;cursor:pointer;font-family:var(--font);
  display:inline-flex;align-items:center;justify-content:center}
.txt-ctl-align:hover:not(:disabled){background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.txt-ctl-align.act{background:var(--text);color:var(--surface);border-color:var(--text)}
/* v0.3.8: alignment trio is hidden-disabled when target is LABEL.
   The label is a fixed inline-block badge (red pill in the screenshot)
   and text-align inside it has no visual effect, so the trio greys out
   to keep the UI honest. */
.txt-ctl-align:disabled{opacity:.3;cursor:not-allowed;background:var(--input-bg);
  color:var(--text);border-color:var(--border)}

/* v0.3.9: LAYERS lives at the far right of the lt-topbar. margin-left:
   auto pushes past anything in the middle (pos-info, txt-ctl, vec-ctl,
   etc.) without needing a flex-grow spacer. flex-shrink:0 prevents it
   from collapsing when the txt-ctl is wide. */
.lt-topbar-right{margin-left:auto;display:flex;align-items:center;gap:4px;
  flex-shrink:0;padding-left:8px;border-left:1px solid var(--border)}

/* ══ SAVE DROPDOWN (v0.3.2) ══
   Single SAVE button per tab toolbar; the dropdown holds the format
   choices (PNG/SVG/HTML/ZIP for layouts, PNG/SVG/HTML/PDF for tables).
   Anchored to the SAVE button's bottom edge; a document-level click
   handler closes any open menu on outside-click. */
.save-menu{position:relative;display:inline-flex;align-items:center}
.save-btn{height:22px;padding:0 11px;background:var(--btn-bg);color:var(--btn-txt);
  font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid var(--btn-bg);transition:opacity .12s;white-space:nowrap;cursor:pointer}
.save-btn:hover{opacity:.8}
.save-menu.open .save-btn{background:var(--text);border-color:var(--text)}
/* v0.3.4: the dropdown is position:FIXED (not absolute) so it escapes the
   .lt-topbar's `overflow-x:auto/overflow-y:hidden` clip — otherwise the
   flyout was being cut off at the toolbar's bottom edge and hidden behind
   the SOURCES panel (only its top border peeked out). wireSaveDropdown
   sets left/top from the button's rect on open. High z-index keeps it
   above the LAYERS popup (200) and DEV PANEL (299). */
.save-dd{display:none;position:fixed;left:0;top:0;
  background:var(--surface);border:1px solid var(--btn-bg);
  flex-direction:column;z-index:320;min-width:94px;
  box-shadow:0 2px 8px rgba(0,0,0,.18)}
.save-menu.open .save-dd{display:flex}
.save-dd-item{height:26px;padding:0 14px;font-size:11px;text-align:left;
  background:none;color:var(--text);cursor:pointer;text-transform:uppercase;
  letter-spacing:.08em;font-family:var(--font);font-weight:600;
  border:none;border-bottom:1px solid var(--border);transition:background .1s,color .1s}
.save-dd-item:last-child{border-bottom:none}
.save-dd-item:hover{background:var(--btn-bg);color:var(--btn-txt)}
.save-dd-item:disabled{opacity:.4;cursor:not-allowed}
.save-dd-item:disabled:hover{background:none;color:var(--text)}
.pos-in[readonly]{cursor:pointer}
.pos-in[readonly]:hover{border-color:var(--text3);color:var(--text)}
.pos-in:not([readonly]){background:var(--input-bg);color:var(--text);cursor:text;
  outline:1px solid var(--text)}
.pos-in::placeholder{color:var(--text3);opacity:.6}

.lyr-row{display:flex;align-items:center;gap:6px;padding:5px 6px;border:1px solid transparent;
  background:var(--surface);transition:background .1s}
.lyr-row+.lyr-row{margin-top:2px}
.lyr-row:hover{background:var(--strip-bg)}
.lyr-row.dragging{opacity:.4}
.lyr-row.drop-before{box-shadow:inset 0 2px 0 0 var(--text)}
.lyr-row.drop-after {box-shadow:inset 0 -2px 0 0 var(--text)}
.lyr-row.lyr-hidden .lyr-thumb,.lyr-row.lyr-hidden .lyr-name{opacity:.35}

.lyr-grip{color:var(--text3);font-size:13px;line-height:1;letter-spacing:-2px;
  flex-shrink:0;cursor:grab;user-select:none;padding:0 2px}
.lyr-grip:active{cursor:grabbing}
.lyr-grip:hover{color:var(--text)}
.lyr-thumb{width:26px;height:26px;flex-shrink:0;border:1px solid var(--border);
  background:linear-gradient(45deg,#e8e8e8 25%,transparent 25%,transparent 75%,#e8e8e8 75%),
             linear-gradient(45deg,#e8e8e8 25%,#fff 25%,#fff 75%,#e8e8e8 75%);
  background-size:8px 8px;background-position:0 0,4px 4px;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.lyr-thumb img{width:100%;height:100%;object-fit:contain}
.lyr-thumb-txt{font-size:13px;font-weight:700;color:var(--text2);
  background:var(--surface);width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.lyr-name{flex:1;min-width:0;font-size:11px;color:var(--text2);font-weight:500;
  text-transform:uppercase;letter-spacing:.04em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* TEMPLATE rows (PAGE 6 page-background SVG) get a subtle accent so they
   read as special / structural rather than ordinary content cels. */
.lyr-row.lyr-template .lyr-name{font-weight:700;color:var(--text)}
.lyr-row.lyr-template{border-left:2px solid var(--accent,#C41E33)}
.lyr-eye{cursor:pointer;background:none;border:none;padding:2px 4px;color:var(--text2);
  font-size:13px;line-height:1;flex-shrink:0;width:22px}
.lyr-eye:hover{color:var(--text)}
.lyr-eye.off{opacity:.32}

/* Alpha number box: readonly display by default, dblclick to edit.
   Spinner arrows hidden — feels like a value badge until activated. */
.lyr-alpha{width:38px;flex-shrink:0;font-size:11px;text-align:center;
  font-family:inherit;padding:2px 0;color:var(--text2);
  border:1px solid var(--border);background:var(--strip-bg);
  -moz-appearance:textfield;font-variant-numeric:tabular-nums}
.lyr-alpha::-webkit-inner-spin-button,.lyr-alpha::-webkit-outer-spin-button{
  -webkit-appearance:none;margin:0}
.lyr-alpha[readonly]{cursor:pointer}
.lyr-alpha[readonly]:hover{border-color:var(--text3);color:var(--text)}
.lyr-alpha:not([readonly]){background:var(--input-bg);color:var(--text);
  cursor:text;outline:1px solid var(--text)}

.lyr-del{cursor:pointer;background:none;border:1px solid var(--border2);color:#b00;
  font-size:11px;padding:1px 5px;line-height:1.4;flex-shrink:0}
.lyr-del:hover{color:#fff;background:#b00;border-color:#b00}

/* Lock button (v0.3.6): same footprint as .lyr-eye; toggles cel.dataset.locked.
   .on = locked. The lock symbol uses two unicode glyphs (🔒 / 🔓) but we
   render simple text to keep the panel font monochrome. */
.lyr-lock{cursor:pointer;background:none;border:none;padding:2px 4px;color:var(--text2);
  font-size:11px;line-height:1;flex-shrink:0;width:22px;font-weight:600}
.lyr-lock:hover{color:var(--text)}
.lyr-lock.on{color:#b00}
/* The locked cel itself shows a forbidden cursor on hover and a subtle
   dashed outline so locked items are visible at a glance on the canvas. */
.cel[data-locked="1"]{cursor:not-allowed!important}
.cel[data-locked="1"].sel,
.cel[data-locked="1"]:hover{outline:1px dashed #b00;outline-offset:1px}
.lyr-row.lyr-locked .lyr-name{opacity:.6}

/* ══════════════════════════════════════
   LAYOUT TAB — NEW DESIGN
   top bar | bottom (left panel + canvas)
══════════════════════════════════════ */
.lt-topbar{
  flex-shrink:0;height:34px;
  display:flex;align-items:center;gap:6px;
  padding:0 12px;
  background:var(--surface);border-bottom:1px solid var(--border);
  /* The toolbar is getting busy (import/export, three savers, auto-layout,
     LAYERS, six align buttons, X/Y widget). Allow horizontal scroll if a
     narrow window can't fit them all rather than pushing into the canvas. */
  overflow-x:auto;overflow-y:hidden;
}
.lt-topbar::-webkit-scrollbar{height:4px}
.lt-topbar::-webkit-scrollbar-thumb{background:var(--border2)}
.lt-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* Left source panel */
.lp{
  /* Wider default (was 264px) gives the source-box header room for the
     four-mode type toggle (IMG/VEC/TXT/CSV) without squishing buttons.
     Min is bumped too so the panel doesn't collapse below something
     usable when the user drags the resize handle. */
  width:340px;min-width:240px;max-width:480px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  background:var(--panel-bg);overflow:hidden;flex-shrink:0;
}
.lp-hd{
  padding:6px 11px;font-size:12px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border);
  background:var(--strip-bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.rh{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0}
.rh:hover{background:var(--border2)}
.boxes-wrap{flex:1;overflow-y:auto;padding:6px}

/* Canvas area */
.pw{flex:1;overflow:auto;background:var(--bg);
  display:flex;align-items:flex-start;justify-content:center;padding:29px}
.cv-sizer{position:relative;flex-shrink:0}
.cv{position:relative;background:var(--surface);
  border:1px solid var(--border);
  box-shadow:0 1px 10px rgba(0,0,0,.07);
  overflow:visible;flex-shrink:0;transform-origin:top left}

/* ── Canvas stays WHITE in DARK mode (v0.3.3) ──
   The DEV PANEL DARK theme flips the whole UI dark, but the canvas is the
   page preview — it should keep its printable (light) appearance, the same
   white paper + dark text the SVG/PNG/HTML exports already hardcode. We
   re-declare the light palette ONLY inside .cv, so the paper background
   (background:var(--surface)) and every cel's text (color:var(--text/2/3))
   resolve to their light values via custom-property inheritance. The work
   area around it (.pw → var(--bg)) and the rest of the UI stay dark. */
[data-theme=dark] .cv{
  --surface:#fff;
  --text:#111;--text2:#555;--text3:#999;
  --border:#d0d0d0;--border2:#aaa;
  --input-bg:#fafafa;
}

/* ── Counter-scale for cel controls ──
   Canvas is fit-shrunk via `transform: scale(fit)` so an A4 @ 300dpi fits
   the viewport; without help, the controls inside each cel (the floating
   edit toolbar, the resize corners, the rotation handle) would shrink with
   the canvas and become unclickable. We set --cv-inv-scale = 1/fit on .cv
   from fitCanvas(), then apply scale(var(--cv-inv-scale)) to those three
   control elements. Transform-origin is chosen so each control "grows away"
   from the cel edge it's pinned to:
     .etb (top toolbar)   → bottom-left  (expands up + right)
     .rc-tl/tr/bl/br      → each corner's own origin (set per-class above)
     .rot-h (rotate knob) → bottom-center (stays above cel center) */
.cv .cel .etb  { transform: scale(var(--cv-inv-scale,1)); transform-origin: bottom left;   }
.cv .cel .rc   { transform: scale(var(--cv-inv-scale,1));                                  }
.cv .cel .rot-h{ transform: scale(var(--cv-inv-scale,1)); transform-origin: bottom center; }
.cv-hint{position:absolute;inset:0;border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:13px;letter-spacing:.1em;text-transform:uppercase;
  pointer-events:none;opacity:0;transition:opacity .2s}
.cv.drag-over .cv-hint{opacity:1}

/* SOURCE BOX — image-only OR text-only, toggle via header */
.sb{border:1px solid var(--border);background:var(--surface);margin-bottom:6px;overflow:visible}
.sb-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;background:var(--strip-bg);border-bottom:1px solid var(--border);
  user-select:none;
}
.sb-hd-title{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.sb-type-tog{display:flex;gap:0;margin-left:5px}
.sb-ttbtn{font-size:11px;padding:0 8px;height:22px;line-height:22px;border:1px solid var(--border2);color:var(--text3);
  text-transform:uppercase;letter-spacing:.04em;transition:all .1s;cursor:pointer;display:inline-flex;align-items:center}
.sb-ttbtn+.sb-ttbtn{border-left:none}
.sb-ttbtn.act{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
/* v0.3.1: dropdown variant of the source-mode selector. Replaces the
   IMG / VEC / TXT / CSV segmented buttons. Chevron colour swaps with
   theme since the button background flips between dark and light. */
.sb-type-sel{margin-left:5px;height:22px;padding:0 18px 0 7px;font-size:11px;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:var(--btn-bg);color:var(--btn-txt);border:1px solid var(--btn-bg);
  font-family:var(--font);cursor:pointer;
  -webkit-appearance:none;-moz-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='white' stroke-width='1.4' fill='none'/></svg>");
  background-repeat:no-repeat;background-position:right 5px center;background-size:8px 5px}
[data-theme=dark] .sb-type-sel{
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='black' stroke-width='1.4' fill='none'/></svg>")}
.sb-type-sel:hover{opacity:.85}
.sb-type-sel option{background:var(--surface);color:var(--text)}
.sb-acts{display:flex;gap:4px;margin-left:auto}
.sbb{font-size:11px;padding:0 8px;height:22px;line-height:22px;border:1px solid var(--border2);color:var(--text3);
  text-transform:uppercase;letter-spacing:.04em;transition:all .1s;display:inline-flex;align-items:center}
.sbb:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.sb-body{padding:6px;display:flex;flex-direction:column;gap:5px}
/* sb-resize removed — height auto */

/* Image drop zone */
.dz{border:1px dashed var(--border2);min-height:65px;display:flex;align-items:center;
  justify-content:center;color:var(--text3);font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.dz:hover,.dz.over{border-color:var(--text);color:var(--text);background:var(--strip-bg)}
.dz img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;pointer-events:none}
.dz.has-img .dz-lbl{display:none}
/* drag handle strip at bottom of dz */
.dz-drag{
  position:absolute;bottom:0;left:0;right:0;height:19px;
  background:rgba(0,0,0,.4);color:#fff;font-size:10px;
  letter-spacing:.06em;text-transform:uppercase;
  display:none;align-items:center;justify-content:center;
  cursor:grab;
}
.dz.has-img .dz-drag{display:flex}

/* Text fields */
.txt-sections{display:flex;flex-direction:column;gap:4px}
.txt-row{display:flex;align-items:center;gap:5px}
/* v0.3.9: per-row include-checkboxes. Unchecking grays the row to
   make it clear that the field won't appear in spawned cels. */
.txt-cb{width:13px;height:13px;cursor:pointer;flex-shrink:0;margin:0;accent-color:var(--text)}
.txt-row:has(.txt-cb:not(:checked)) .txt-in,
.txt-row:has(.txt-cb:not(:checked)) .lbl-color-wrap,
.txt-row:has(.txt-cb:not(:checked)) .txt-lbl{opacity:.35}
.txt-lbl{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;
  width:50px;flex-shrink:0}
.txt-in{flex:1;border:1px solid var(--border);background:var(--input-bg);color:var(--text);
  padding:2px 6px;font-size:13px;line-height:1.4;resize:none}
textarea.txt-in{overflow:hidden;min-height:28px}
.txt-in:focus{border-color:var(--border2)}
.drag-row{
  border:1px dashed var(--border);padding:4px 8px;cursor:grab;
  display:flex;align-items:center;gap:6px;margin-top:2px;
  background:var(--input-bg);font-size:12px;color:var(--text2);
  user-select:none;transition:background .1s;
}
.drag-row:hover{background:var(--strip-bg);border-color:var(--border2)}
.drag-ico{color:var(--text3)}
.drag-prev{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}

/* CANVAS ELEMENTS */
.cel{position:absolute;border:1px solid transparent;cursor:move;overflow:visible;
  min-width:36px;min-height:24px}
.cel-img{z-index:1}
.cel-txt{z-index:10}
.cel-tbl{z-index:5}

/* ── 3×3 rule-of-thirds grid overlay ──
   Lives inside .cv, ON by default (toggleable via the GRID pseudo-row in
   the LAYERS panel). pointer-events:none so it never eats clicks destined
   for the cels underneath. z-index sits below snap guides so the magenta
   snap line is always more prominent than the yellow grid. */
.cv-grid{position:absolute;inset:0;pointer-events:none;z-index:9998;display:block}
.cv-grid.off{display:none}
.cv-grid-line{position:absolute;background:#ffd400}
.cv-grid-v1{left:33.3333%;top:0;width:1px;height:100%}
.cv-grid-v2{left:66.6666%;top:0;width:1px;height:100%}
.cv-grid-h1{top:33.3333%;left:0;height:1px;width:100%}
.cv-grid-h2{top:66.6666%;left:0;height:1px;width:100%}

/* ── Smart-guide snap lines ──
   Appear during a drag whenever the cel's left/right/center aligns with
   another cel's edge/center or the canvas centerline. Magenta is the
   conventional smart-guide colour (Sketch/Figma/InDesign), keeps it
   distinct from the blue rule-of-thirds grid. */
.snap-v,.snap-h{position:absolute;pointer-events:none;z-index:10000;
  background:#ff0080;display:none}
.snap-v{width:1px;top:0;bottom:0}
.snap-h{height:1px;left:0;right:0}
.snap-v.on,.snap-h.on{display:block}

.cel-tbl-inner{width:100%;height:100%;overflow:visible;background:transparent;
  text-transform:none;padding:0}
/* In layout-cel context the .pub-tbl drops the 100% width inherited from the
   main rule. Natural width means: SVG painter, HTML export, and live preview
   all see the same column widths, so exports match the screen pixel-for-pixel
   (rather than the painter shrinking text into a cel-constrained DOM and then
   clipping mid-word). The cel becomes a positioning anchor; resize handles
   still work but don't constrain the table itself. */
.cel-tbl-inner .pub-tbl{font-size:11px;background:#fff;width:auto}
.cel-tbl-inner .pub-tbl th{padding:4px 8px;font-size:10px}
.cel-tbl-inner .pub-tbl td{padding:3px 8px;font-size:10px;white-space:nowrap}
.cel-tbl-inner .pub-tbl .ttl-row{font-size:10px;padding:4px 8px}
.cel-tbl-inner .pub-tbl .ttl-row-1{font-size:12px;padding:5px 8px}
.cel-tbl-empty{padding:8px;color:var(--text3);font-size:11px;letter-spacing:.05em}

/* CSV source box: textarea + render + drag handle, sits in the same shell
   as the IMG and TXT source boxes. Compact so the panel stays scannable. */
.csv-zone-ed{width:100%;height:90px;resize:vertical;border:1px solid var(--border);
  background:var(--input-bg);color:var(--text);padding:5px 7px;
  font-family:'Courier New',monospace;font-size:11px;line-height:1.5;
  text-transform:none}
.csv-zone-ed:focus{border-color:var(--border2)}
.csv-zone-info{font-size:10px;color:var(--text3);padding:3px 0;letter-spacing:.04em;
  text-transform:uppercase}
.csv-zone-row{display:flex;gap:4px;align-items:center;margin-top:3px}
.csv-zone-row .sbb{font-size:10px;padding:0 6px;height:20px}
/* Editable zoom-pct: input wears the readonly-display look; the trailing
   '%' lives in the wrap as a static label. Dbl-click on the input flips
   readonly off so the user can type a value. Spinner arrows are hidden so
   it reads like a value chip until activated.
   Sizing matches the surrounding context: 10px/20px in the csv-zone-row
   (next to .sbb), 11px/auto inside the cel .etb (next to .etbb). */
.zoom-pct-wrap{display:inline-flex;align-items:center;
  border:1px solid var(--border);background:var(--input-bg);color:var(--text2);
  font-family:'Courier New',monospace;letter-spacing:.04em;
  padding:0 5px 0 0;cursor:pointer}
.csv-zone-row .zoom-pct-wrap{height:20px;font-size:10px}
.etb .zoom-pct-wrap{height:auto;font-size:11px;padding:1px 5px 1px 0;line-height:1.4}
.zoom-pct-wrap:hover{border-color:var(--text3);color:var(--text)}
.zoom-pct-wrap input{
  width:28px;border:0;background:transparent;color:inherit;
  font-family:inherit;font-size:inherit;text-align:right;padding:0 2px;outline:none;
  -moz-appearance:textfield;font-variant-numeric:tabular-nums}
.zoom-pct-wrap input::-webkit-inner-spin-button,
.zoom-pct-wrap input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.zoom-pct-wrap input[readonly]{cursor:pointer}
.zoom-pct-wrap input:not([readonly]){background:var(--input-bg);color:var(--text);cursor:text;outline:1px solid var(--text)}
.cel:hover,.cel.sel{border-color:var(--border2)}
.cel.sel{border-color:var(--text)}
.cel-img-inner{width:100%;height:100%;overflow:hidden}
.cel-img-inner img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}

/* ── VEC (vector) cel renderer ──
   Unlike IMG cels, VEC cels DON'T use object-fit:contain. The cel outline
   is aspect-correct by construction (set from the SVG's viewBox-derived
   natural dimensions), so the SVG should FILL the cel — no letterboxing.
   `display:block` and `width/height:100%` let the browser scale the SVG
   as vector at any output dpi (preview, SVG export, PNG export). */
.cel-vec{z-index:1}
.cel-vec-inner{width:100%;height:100%;overflow:hidden}
.cel-vec-inner img{width:100%;height:100%;display:block;pointer-events:none}

/* VEC source-box dropzone — same look as IMG dz but flagged with a dashed
   accent stripe so users can tell IMG from VEC at a glance in a busy panel. */
.vec-dz{border-style:dashed}
.vec-note{font-size:9px;color:var(--text3);padding:3px 0 0 2px;
  letter-spacing:.06em;text-transform:uppercase;font-weight:500}
/* v0.3.9: built-in primitive shapes in the VEC source box. Three
   draggable tiles for LINE / RECT / CIRCLE — drag one onto canvas and
   the existing canvas-drop handler creates a VEC cel with a generated
   SVG. .vec-prim's currentColor flows into the SVG strokes so the
   tile follows theme automatically. */
.vec-prims{display:flex;gap:5px;padding:2px 0 6px;flex-wrap:wrap}
/* v0.3.9: each tile is a 1:1 square so the three shapes share one
   geometric footprint — visually consistent, no implication that any
   shape is "wider" than another. Inner SVGs are sized to a common
   preview area (24×24 viewport) and centered. */
.vec-prim{display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;border:1px solid var(--border);background:var(--input-bg);
  color:var(--text);cursor:grab;flex-shrink:0}
.vec-prim:hover{border-color:var(--border2);background:var(--strip-bg)}
.vec-prim:active{cursor:grabbing}

/* v0.3.9: VEC-cel toolbar — color + stroke width controls.
   Same skeleton as .txt-ctl: hidden by default; shown when a single
   VEC cel is selected. The COLOR input drives both stroke and fill
   for primitives (line/rect/circle); for uploaded SVGs it does a
   best-effort attribute substitution on the SVG source. */
.vec-ctl{display:none;align-items:center;gap:6px;padding:0 6px;
  border-left:1px solid var(--border);flex-shrink:0;white-space:nowrap}
.vec-ctl-lbl{font-size:9px;color:var(--text3);letter-spacing:.1em;
  font-weight:600;text-transform:uppercase;padding:0 1px 0 2px}
.vec-ctl-color{width:24px;height:22px;border:1px solid var(--border);
  background:var(--strip-bg);padding:1px;cursor:pointer;outline:none}
.txt-ctl-color{width:24px;height:22px;border:1px solid var(--border);
  background:var(--strip-bg);padding:1px;cursor:pointer;outline:none}
.vec-ctl-sw{width:48px;height:22px;border:1px solid var(--border);
  background:var(--strip-bg);color:var(--text2);font-size:11px;text-align:right;
  padding:0 4px;font-family:'Courier New',monospace;font-variant-numeric:tabular-nums;
  -moz-appearance:textfield;outline:none}
.vec-ctl-sw::-webkit-inner-spin-button,.vec-ctl-sw::-webkit-outer-spin-button{
  -webkit-appearance:none;margin:0}
.vec-ctl-fill{height:22px;padding:0 8px;border:1px solid var(--border2);
  background:var(--input-bg);color:var(--text);font-size:10px;font-weight:700;
  letter-spacing:.04em;cursor:pointer;font-family:var(--font);
  display:inline-flex;align-items:center}
.vec-ctl-fill.act{background:var(--text);color:var(--surface);border-color:var(--text)}
.cel-text-inner{width:100%;height:100%;padding:6px;word-break:break-word}
.cel-label-el{display:inline-block;padding:2px 8px;font-size:12px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:#fff;background:#c41e33;
  margin-bottom:5px;line-height:1.5;text-transform:none;font-family:'Gotham HTF','Gotham','Montserrat','Arial',sans-serif}
.cel-label-el:empty{display:none!important}
.cel-title-row{display:flex;flex-direction:row;align-items:baseline;gap:8px;flex-wrap:wrap}
.cel-title-el{font-weight:700;font-size:18px;letter-spacing:.03em;color:var(--text);font-family:'Gotham HTF','Gotham','Montserrat','Arial',sans-serif}
.cel-sub-el{font-weight:500;font-size:14px;color:var(--text2);font-family:'Gotham Narrow','Gotham HTF','Montserrat','Arial Narrow','Arial',sans-serif}
.cel-body-el{font-weight:400;font-size:13px;color:var(--text2);margin-top:2px;white-space:pre-wrap;word-break:break-word;font-family:'Bahnschrift','DIN Alternate','Roboto Condensed','Arial Narrow','Arial',sans-serif}
[contenteditable=true]{outline:1px dashed var(--border2)!important;cursor:text}
.rc{position:absolute;width:10px;height:10px;background:var(--text);opacity:0;z-index:5}
.rc-tl{left:0;     top:0;     cursor:nw-resize;transform-origin:top left}
.rc-tr{right:0;    top:0;     cursor:ne-resize;transform-origin:top right}
.rc-bl{left:0;     bottom:0;  cursor:sw-resize;transform-origin:bottom left}
.rc-br{right:0;    bottom:0;  cursor:se-resize;transform-origin:bottom right}
.cel.sel .rc,.cel:hover .rc{opacity:.4}
.etb{position:absolute;top:-23px;left:-1px;display:none;align-items:center;gap:2px;
  background:var(--surface);border:1px solid var(--border);padding:2px 5px;
  white-space:nowrap;z-index:30}
/* v0.3.8: reveal the etb on hover too, not just on .sel. Mirrors the
   .cel:hover .rc rule one line up — hovering surfaces ALL the controls
   (resize corners + toolbar). The etb is a child of .cel, so even
   though it sits visually above the cel (top:-23px), hovering it
   keeps .cel:hover true (CSS :hover propagates from descendants to
   ancestors). That means moving the cursor from the cel body up to
   the toolbar doesn't drop the hover state — no flicker. Click into
   any etb button (DEL, EDIT, +/-, FS input) and the cel's existing
   mousedown handler picks selection up, same as before. */
.cel.sel .etb,.cel:hover .etb{display:flex}
.etbb{font-size:11px;padding:1px 6px;border:1px solid var(--border);color:var(--text2);
  text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .1s}
.etbb:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.etbb.xbtn{border-color:#b00;color:#b00}
.etbb.xbtn:hover{background:#b00;color:#fff;border-color:#b00}
/* Per-cel BG toggle (v0.3.2): inverted look when on, so users see
   transparency state without opening any panel. */
.etbb.bg-btn.act{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.etbb.bg-btn.act:hover{opacity:.85}
.fs-in{width:38px;border:1px solid var(--border);text-align:center;
  background:var(--input-bg);color:var(--text);font-size:12px;padding:1px 2px;
  -moz-appearance:textfield}
/* Strip the browser's native number-input spinner arrows on FS — v0.3.1
   per spec: free numeric entry (including values >72) without UI clutter. */
.fs-in::-webkit-inner-spin-button,
.fs-in::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

/* ══ TABLE TAB ══ */
.t2-toolbar{flex-shrink:0;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;padding:0 12px;height:34px;background:var(--surface)}
.t2-body{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0}
.t2-left{width:50%;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);min-height:0}
.t2-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:120px;min-height:0}
.t2-rz{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0}
.t2-rz:hover{background:var(--border2)}
.pane-hd{display:flex;align-items:center;gap:6px;padding:0 12px;height:30px;flex-shrink:0;
  background:var(--strip-bg);border-bottom:1px solid var(--border)}
.ph-ttl{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.ph-sp{flex:1}
.csv-ew{flex:1;overflow:hidden;padding:6px;display:flex;flex-direction:column;min-height:0}
.csv-ed{flex:1;min-height:0;width:100%;resize:none;background:var(--input-bg);color:var(--text);
  border:1px solid var(--border);padding:8px 11px;
  font-family:'Courier New',monospace;font-size:13px;line-height:1.6;overflow:auto}
.csv-ed:focus{border-color:var(--border2)}
.tbl-wrap{flex:1;overflow:auto;padding:10px 17px}
/* Scheme manager */
.cs-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:13px}
.cs-row:hover{background:var(--strip-bg)}
.cs-row-name{flex:1;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:13px}
.cs-row-swatches{display:flex;gap:2px}
.cs-swatch{width:16px;height:16px;border:1px solid var(--border)}
.cs-row-built{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.cs-field{display:flex;flex-direction:column;gap:2px}
.cs-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.cs-inp-row{display:flex;gap:2px;align-items:center}
.cs-col{width:29px;height:24px;padding:1px;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.cs-hex{flex:1;height:24px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);padding:0 5px;font-size:12px;font-family:var(--font);min-width:0}

/* TABLE SCHEMES */
.sch-mono {--th:#d8d8d8;--alt:#f4f4f4;--gc:#444;--gt:#fff;--sc:#888;--st:#fff;--bd:#ccc}
.sch-blue {--th:#c2d4e8;--alt:#edf3fa;--gc:#1a3a5c;--gt:#fff;--sc:#2e6099;--st:#fff;--bd:#b0c8e0}
.sch-red  {--th:#e0c8c8;--alt:#fdf0f0;--gc:#7a1a1a;--gt:#fff;--sc:#c03030;--st:#fff;--bd:#d0a8a8}
.sch-warm {--th:#e2d4b8;--alt:#faf5ec;--gc:#5c3a10;--gt:#fff;--sc:#9c6420;--st:#fff;--bd:#d4c0a0}
.sch-green{--th:#c4dcc4;--alt:#eef6ee;--gc:#1a4a1a;--gt:#fff;--sc:#2e7c2e;--st:#fff;--bd:#a8cca8}
.sch-dark {--th:#1e1e1e;--alt:#141414;--gc:#000;--gt:#e4e4e4;--sc:#222;--st:#aaa;--bd:#2a2a2a}

.pub-tbl{border-collapse:collapse;font-family:var(--font);font-size:13px;border:1px solid var(--bd)}
.pub-tbl th{background:var(--th);border:1px solid var(--bd);padding:5px 10px;
  font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:11px;
  text-align:left;white-space:nowrap;color:var(--th-txt,#333333)}
.pub-tbl td{border:1px solid var(--bd);padding:4px 10px;vertical-align:middle;text-transform:uppercase}
.pub-tbl tr:nth-child(even) td{background:var(--alt)}
.pub-tbl .gc{background:var(--gc)!important;color:var(--gt);
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:12px;
  writing-mode:vertical-lr;transform:rotate(180deg);
  text-align:center;width:24px;padding:7px 4px;border-right:2px solid var(--bd)}
.pub-tbl .sc{background:var(--sc)!important;color:var(--st);
  font-size:12px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;
  writing-mode:vertical-lr;transform:rotate(180deg);
  text-align:center;width:22px;padding:5px 4px}
.pub-tbl .nc{text-align:center;font-size:12px}
/* v0.4.0: right-aligned column class. Used for the 3rd column of titled
   (banner-header) tables — measurement/price-style values read cleaner
   flush-right. Applies in the live preview AND inside layout cels (the
   .cel-tbl-inner overrides don't set text-align, so this wins there too).
   NOTE: must NOT be named .rc — that's the global resize-corner class
   (position:absolute + inverse-scale + hidden-on-export). */
.pub-tbl .alnr{text-align:right}
/* v0.4.0: full per-column alignment set for CSV/table objects. alnl/alnc/alnr
   are explicit overrides set from the table-cel toolbar; they win over the
   legacy numeric-center (.nc) and titled-col defaults because the builder
   emits EITHER an override class OR a legacy class, never both. */
.pub-tbl .alnl{text-align:left}
.pub-tbl .alnc{text-align:center}
/* v0.4.0 TABLE-CEL TOOLBAR — `.tbl-ctl`. Same skeleton as .txt-ctl / .vec-ctl:
   hidden by default, shown (flex) when a single table cel is selected. Lets
   the user target a column (COL pill cycles 1..N) and set its alignment. */
.tbl-ctl{display:none;align-items:center;gap:6px;padding:0 6px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);height:100%}
.tbl-ctl-lbl{font-size:9px;color:var(--text3);letter-spacing:.1em;font-weight:600}
.tbl-ctl-col{height:22px;min-width:54px;padding:0 8px;border:1px solid var(--border2);
  background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:11px;
  font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .12s}
.tbl-ctl-col:hover{background:var(--btn-bg);color:var(--btn-txt)}
.tbl-ctl-al{height:22px;min-width:24px;padding:0 6px;border:1px solid var(--border2);
  background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:11px;
  font-weight:600;cursor:pointer;transition:all .12s}
.tbl-ctl-al:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.tbl-ctl-al.act{background:var(--text);color:var(--surface);border-color:var(--text)}
.tbl-ctl-font{height:22px;border:1px solid var(--border);background:var(--input-bg);
  color:var(--text);font-family:var(--font);font-size:11px;padding:0 4px;max-width:120px}
.tbl-ctl-fs{width:50px;height:22px;border:1px solid var(--border);background:var(--input-bg);
  color:var(--text);font-family:var(--font);font-size:11px;text-align:center;padding:0 4px}
.tbl-ctl-fs::-webkit-inner-spin-button,.tbl-ctl-fs::-webkit-outer-spin-button{opacity:.4}

/* Title-row layout: single banner header spanning all cols, case-preserving body.
   Matches the height of a regular .pub-tbl th so a titled table sits visually
   next to a column-headed one without a step in row height. */
.pub-tbl .ttl-row{text-align:center;font-size:11px;font-weight:600;letter-spacing:.1em;
  padding:5px 10px;color:var(--th-txt,#333333)}
.pub-tbl .ttl-row-1{font-size:13.2px;color:#FFFFFF;background:#6a6a6a}
.pub-tbl.ttl-mode td{text-transform:none}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;
  align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);width:384px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--strip-bg);border-bottom:1px solid var(--border)}
.modal-hd span{font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.modal-body{padding:14px}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.fr input,.fr select{width:100%;height:26px;border:1px solid var(--border);
  background:var(--input-bg);color:var(--text);padding:0 8px;font-size:13px;font-family:var(--font);text-transform:uppercase}
.fr2{display:flex;gap:8px}
.fr2 .fr{flex:1;margin-bottom:0}
.modal-ft{padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:6px}
.type-row{display:flex;gap:0;margin-bottom:11px}
.type-btn{flex:1;height:26px;border:1px solid var(--border2);font-size:12px;
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);
  transition:all .12s;cursor:pointer}
.type-btn+.type-btn{border-left:none}
.type-btn.active{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}

/* ══ TEMPLATE GRID (NEW TAB modal, v0.3) ══
   3×3 grid of square tiles. First three are filled (ONE PAGER / TABLE A /
   TABLE B); remaining slots are dashed-border empty placeholders, kept
   visible so future templates have an obvious home. */
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:4px}
.tpl-sq{aspect-ratio:1/1;border:1px solid var(--border2);background:var(--input-bg);
  color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:6px 4px;cursor:pointer;transition:background .12s,color .12s,border-color .12s;
  font-family:var(--font);text-align:center;text-transform:uppercase;overflow:hidden}
.tpl-sq:hover:not(.tpl-sq-empty){background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.tpl-sq.act{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.tpl-sq-ico{display:flex;align-items:center;justify-content:center;flex:1;min-height:0;width:100%}
.tpl-sq-ico svg{max-width:100%;max-height:32px;width:auto;height:auto}
.tpl-sq-name{font-size:11px;font-weight:700;letter-spacing:.06em;line-height:1.1;flex-shrink:0}
.tpl-sq-sub{font-size:9px;color:var(--text3);letter-spacing:.04em;line-height:1.1;flex-shrink:0}
.tpl-sq.act .tpl-sq-sub,.tpl-sq:hover:not(.tpl-sq-empty) .tpl-sq-sub{color:var(--btn-txt);opacity:.7}
.tpl-sq-empty{cursor:default;border-style:dashed;border-color:var(--border);background:transparent}
.tpl-sq-empty:hover{background:transparent;color:var(--text);border-color:var(--border)}

/* DEV PANEL */
#dp-tog{}/* inline in s1 */
#dp{position:fixed;top:18px;right:0;width:276px;background:var(--panel-bg);
  border-left:1px solid var(--border);border-bottom:1px solid var(--border);
  z-index:299;display:none;overflow-y:auto;max-height:calc(100vh - 18px)}
#dp.open{display:block}
.dp-hd{padding:6px 11px;background:var(--strip-bg);border-bottom:1px solid var(--border);
  font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.dp-sec{padding:8px 11px;border-bottom:1px solid var(--border)}
.dp-lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px}
.dp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.dp-row label{font-size:13px;color:var(--text2)}
.dp-sel{height:22px;padding:0 6px;font-size:13px;
  border:1px solid var(--border2);background:var(--input-bg);color:var(--text);font-family:var(--font)}
.dp-tbtns{display:flex}
.dp-tbtn{flex:1;height:22px;font-size:11px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .12s}
.dp-tbtn+.dp-tbtn{border-left:none}
.dp-tbtn.active,.dp-tbtn:hover{background:var(--btn-bg);color:var(--btn-txt);border-color:var(--btn-bg)}
.dp-color-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.dp-cswatch{height:24px;border:1px solid var(--border2);font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:opacity .12s;
  display:flex;align-items:center;justify-content:center}
.dp-cswatch:hover{opacity:.75}
.dp-cswatch.act{outline:2px solid var(--text);outline-offset:1px}
.dp-info{font-size:11px;color:var(--text3);line-height:1.7;letter-spacing:.03em}

/* Print / PDF — hide all UI, show only table */
@media print{
  #app,#dp-tog,#dp,.modal-bg{display:none!important}
  #print-frame{display:block!important}
}
#print-frame{display:none;position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto;padding:20px}
#print-frame table{border-collapse:collapse;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:11px;border:1px solid var(--bd)}
#print-frame th{background:var(--th,#d8d8d8);border:1px solid var(--bd,#ccc);padding:4px 8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:10px;text-align:left;white-space:nowrap;color:var(--th-txt,#333)}
#print-frame td{border:1px solid var(--bd,#ccc);padding:3px 8px;vertical-align:middle;text-transform:uppercase}
#print-frame tr:nth-child(even) td{background:var(--alt,#f4f4f4)}
#print-frame .gc{background:var(--gc,#444)!important;color:var(--gt,#fff);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:10px;writing-mode:vertical-lr;transform:rotate(180deg);text-align:center;width:20px;padding:6px 3px;border-right:2px solid var(--bd,#ccc)}
#print-frame .sc{background:var(--sc,#888)!important;color:var(--st,#fff);font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;writing-mode:vertical-lr;transform:rotate(180deg);text-align:center;width:18px;padding:4px 3px}
#print-frame .nc{text-align:center;font-size:10px}
#print-frame .alnr{text-align:right}
#print-frame .alnl{text-align:left}
#print-frame .alnc{text-align:center}
#print-frame .ttl-row{text-align:center;font-size:10px;letter-spacing:.1em;font-weight:600;padding:4px 8px}
#print-frame .pub-tbl.ttl-mode td{text-transform:none}
#print-frame-close{position:fixed;top:10px;right:10px;z-index:10000;background:#111;color:#fff;border:none;padding:6px 14px;font-family:var(--font);font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}

/* ══ BG-TRANSPARENT CHECKBOX (source box image zone) ══ */
.bgt-row{display:flex;align-items:center;gap:6px;padding:5px 6px 3px;font-size:10px;font-weight:500;
  letter-spacing:.07em;color:var(--text2);user-select:none;cursor:pointer;text-transform:uppercase}
.bgt-row input[type=checkbox]{cursor:pointer;width:11px;height:11px;margin:0;flex-shrink:0;accent-color:var(--btn-bg)}
.bgt-row:hover{color:var(--text)}
.bgt-row.busy{opacity:.5;pointer-events:none}
/* When the SVG-detection in applyImageToDZ locks the checkbox, the whole
   row dims and ignores clicks so the user can't fight it. The tooltip on
   the row explains why ("SVGs are vector — already transparent"). */
.bgt-row.disabled{opacity:.45;cursor:not-allowed}
.bgt-row.disabled input{cursor:not-allowed}

/* ══ SOURCE BOX REORDER (drag handle + drop indicators) ══ */
.sb-handle{cursor:grab;color:var(--text3);font-size:14px;line-height:1;
  padding:0 4px;user-select:none;letter-spacing:-2px;flex-shrink:0;transition:color .12s}
.sb-handle:hover{color:var(--text)}
.sb-handle:active{cursor:grabbing}
.sb.sb-dragging{opacity:.35}
.sb.sb-drop-before{box-shadow:inset 0 2px 0 0 var(--text)}
.sb.sb-drop-after {box-shadow:inset 0 -2px 0 0 var(--text)}

/* ══ IMAGE ROTATION HANDLE ══ */
.rot-h{position:absolute;top:-22px;left:50%;width:18px;height:18px;
  margin-left:-9px;background:var(--btn-bg);color:var(--btn-txt);
  display:none;align-items:center;justify-content:center;
  font-size:12px;line-height:1;cursor:crosshair;user-select:none;
  z-index:32;border-radius:50%;font-family:sans-serif}
.rot-h::before{content:'';position:absolute;top:18px;left:50%;width:1px;height:6px;
  background:var(--btn-bg);margin-left:-0.5px}
.cel.sel .rot-h{display:flex}
.rot-h:hover{background:var(--text);color:var(--surface)}
.rot-deg{display:inline-block;padding:1px 5px;margin-right:3px;font-size:10px;
  color:var(--text2);border:1px solid var(--border);min-width:32px;text-align:center;
  font-feature-settings:'tnum'}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body data-theme="light">

<div id="print-frame">
  <button id="print-frame-close" onclick="document.getElementById('print-frame').style.display='none'">✕ CLOSE</button>
  <div id="print-frame-content"></div>
</div>
<div id="app">

  <!-- S1 -->
  <div id="s1">
    <button class="tbtn g" id="btn-new">NEW</button>
    <button class="tbtn g" id="btn-export-all" title="Export every tab in every format (zip)">EXPORT ALL</button>
    <button class="tbtn g" id="btn-import" title="Import a .pubsys.zip, or drop an .svg to import it as editable objects in a new tab">IMPORT</button>
    <button class="tbtn g" id="btn-export" title="Export current tab as .pubsys.zip (layout/hybrid only)">EXPORT</button>
    <button class="tbtn g" id="btn-export-odf" title="Export every tab as one editable OpenDocument (.odt) — text and tables stay editable, images embedded">EXPORT ODF</button>
    <!-- v0.3.9: SCREEN SHOTS button removed — every PNG it produced is
         already in EXPORT ALL's `png/` folder (same captureLayoutAsPng
         pipeline since v0.3.7). The exportScreenshots function is left
         in place for any external integration. -->
    <input type="file" id="s1-impf" accept=".zip,.pubsys,.svg,image/svg+xml" multiple style="display:none">
    <div class="vsep"></div>
    <div id="s1sp"></div>
    <!-- v0.3.4: A DIGITAL / B PREVIEW / C PRINT 300DPI resolution buttons
         removed from the top bar per request. Resolution is still set per
         tab via the NEW and TAB SETTINGS modals; syncRes() degrades to a
         harmless no-op now that no .rbtn elements exist. -->
    <button id="dp-tog" title="Dev Panel" style="width:34px;height:34px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:4px">≡</button>
  </div>
  <!-- TAB BAR -->
  <div id="tab-bar">
    <div id="tab-add" title="Add tab">＋</div>
  </div>
  <div id="main"></div>
</div>

<!-- DEV PANEL -->
<div id="dp">
  <div class="dp-hd">DEV PANEL</div>
  <div class="dp-sec">
    <div class="dp-lbl">THEME</div>
    <div class="dp-tbtns">
      <button class="dp-tbtn active" data-tv="light">LIGHT</button>
      <button class="dp-tbtn" data-tv="dark">DARK</button>
    </div>
  </div>
  <!-- v0.3.3: DESIGN STYLE (font-size) and CANVAS (template/custom-size)
       sections removed from the DEV PANEL per request. The DEV PANEL now
       carries THEME + INFO only. Canvas template/size is still managed
       per-tab via the TAB SETTINGS modal. -->
  <div class="dp-sec">
    <div class="dp-lbl">INFO</div>
    <div class="dp-info" id="dp-info">PUBSYS v0.4.0</div>
  </div>
</div>

<!-- TAB EDIT MODAL -->
<div class="modal-bg" id="tab-edit-modal">
  <div class="modal-box" style="width:360px">
    <div class="modal-hd"><span>TAB SETTINGS</span><button class="sbb" id="te-close">✕</button></div>
    <div class="modal-body">
      <div class="fr"><label>Name</label><input type="text" id="te-name"></div>
      <div class="fr"><label>Template Size</label>
        <select id="te-size">
          <option value="a4">A4 (210 × 297 mm)</option>
          <option value="letter">Letter (216 × 279 mm)</option>
          <option value="1080x1350">1080 × 1350 px</option>
          <option value="1080x1920">1080 × 1920 px</option>
          <option value="1200x1200">1200 × 1200 px</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="fr fr2 hidden" id="te-cust">
        <div class="fr"><label>Width</label><input type="number" id="te-w" value="210"></div>
        <div class="fr"><label>Height</label><input type="number" id="te-h" value="297"></div>
        <!-- v0.4.0: unit selector for Custom sizes (mirrors the NEW modal). -->
        <div class="fr"><label>Units</label>
          <select id="te-unit">
            <option value="mm" selected>mm</option>
            <option value="inch">inch</option>
            <option value="px">px</option>
          </select>
        </div>
      </div>
      <div class="fr"><label>Resolution</label>
        <select id="te-res">
          <option value="digital">A — Digital (96dpi)</option>
          <option value="preview">B — Preview (150dpi)</option>
          <option value="print">C — Print 300dpi</option>
        </select>
      </div>
    </div>
    <div class="modal-ft">
      <button class="tbtn g" id="te-cancel">CANCEL</button>
      <button class="tbtn" id="te-apply">APPLY</button>
    </div>
  </div>
</div>

<!-- SCHEME MANAGER MODAL -->
<div class="modal-bg" id="cs-modal">
  <div class="modal-box" style="width:672px;max-height:90vh;display:flex;flex-direction:column">
    <div class="modal-hd">
      <span>SCHEME MANAGER</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="tbtn" id="cs-new-btn">+ NEW</button>
        <button class="sbb" id="cs-close">✕</button>
      </div>
    </div>
    <!-- scheme list -->
    <div id="cs-list" style="flex:1;overflow-y:auto;border-bottom:1px solid var(--border)"></div>
    <!-- editor panel -->
    <div id="cs-editor" style="display:none;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--strip-bg)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);width:48px;flex-shrink:0">NAME</span>
        <input type="text" id="cs-name" placeholder="Scheme name" maxlength="24"
          style="flex:1;height:24px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);padding:0 7px;font-size:13px;font-family:var(--font)">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px">
        <div class="cs-field"><span class="cs-lbl">HEADER BG</span>
          <div class="cs-inp-row"><input type="color" id="cs-th" value="#d8d8d8" class="cs-col"><input type="text" id="cs-th-hex" value="#d8d8d8" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">ALT ROW</span>
          <div class="cs-inp-row"><input type="color" id="cs-alt" value="#f4f4f4" class="cs-col"><input type="text" id="cs-alt-hex" value="#f4f4f4" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">GROUP BG</span>
          <div class="cs-inp-row"><input type="color" id="cs-gc" value="#444444" class="cs-col"><input type="text" id="cs-gc-hex" value="#444444" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">GROUP TXT</span>
          <div class="cs-inp-row"><input type="color" id="cs-gt" value="#ffffff" class="cs-col"><input type="text" id="cs-gt-hex" value="#ffffff" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">SUB BG</span>
          <div class="cs-inp-row"><input type="color" id="cs-sc" value="#888888" class="cs-col"><input type="text" id="cs-sc-hex" value="#888888" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">SUB TXT</span>
          <div class="cs-inp-row"><input type="color" id="cs-st" value="#ffffff" class="cs-col"><input type="text" id="cs-st-hex" value="#ffffff" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">BORDER</span>
          <div class="cs-inp-row"><input type="color" id="cs-bd" value="#cccccc" class="cs-col"><input type="text" id="cs-bd-hex" value="#cccccc" class="cs-hex"></div></div>
        <div class="cs-field"><span class="cs-lbl">PREVIEW</span>
          <div id="cs-prev-mini" style="height:46px;border:1px solid var(--border);overflow:hidden;font-family:var(--font);font-size:11px">
            <div id="cs-prev-hd" style="padding:2px 6px;font-weight:600">HEADER</div>
            <div id="cs-prev-r1" style="padding:1px 6px">Row 1</div>
            <div id="cs-prev-r2" style="padding:1px 6px">Row 2</div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="tbtn g" id="cs-discard">DISCARD</button>
        <button class="tbtn" id="cs-save-edit">SAVE</button>
      </div>
    </div>
    <div class="modal-ft">
      <button class="tbtn g" id="cs-cancel">CLOSE</button>
    </div>
  </div>
</div>

<!-- NEW MODAL -->
<div class="modal-bg" id="new-modal">
  <div class="modal-box">
    <div class="modal-hd"><span>NEW TAB</span><button class="sbb" id="nm-close">✕</button></div>
    <div class="modal-body">
      <div class="fr"><label>Tab Name</label><input type="text" id="nm-name" value="Page 1"></div>
      <div class="fr"><label>Type</label>
        <div class="type-row">
          <button class="type-btn" data-type="layout">LAYOUT</button>
          <button class="type-btn" data-type="table">TABLE</button>
          <button class="type-btn active" data-type="hybrid">HYBRID</button>
        </div>
      </div>
      <div class="fr"><label>Template Size</label>
        <select id="nm-size">
          <option value="a4">A4 (210 × 297 mm)</option>
          <option value="letter" selected>Letter (216 × 279 mm)</option>
          <option value="1080x1350">1080 × 1350 px</option>
          <option value="1080x1920">1080 × 1920 px</option>
          <option value="1200x1200">1200 × 1200 px</option>
          <option value="custom">Custom</option>
        </select>
      </div>

   stacks the existing element classes already reference and the user
   has settled on as the official PUBSYS font palette. Add new fonts by
   appending entries here; the dropdown picks them up automatically.

   To embed an entirely NEW custom font: add an @font-face block with
   base64 src above, then add the corresponding entry here. */
const PUBSYS_FONTS = [
  { label:'Barlow Condensed',  stack:"'Barlow Condensed','Arial Narrow',sans-serif" },
  { label:'Roboto Condensed',  stack:"'Roboto Condensed','Arial Narrow',sans-serif" },
  { label:'Gotham HTF',        stack:"'Gotham HTF','Gotham','Montserrat','Arial',sans-serif" },
  { label:'Gotham Narrow',     stack:"'Gotham Narrow','Gotham HTF','Montserrat','Arial Narrow','Arial',sans-serif" },
  { label:'Bahnschrift',       stack:"'Bahnschrift','DIN Alternate','Roboto Condensed','Arial Narrow','Arial',sans-serif" },
  { label:'Montserrat',        stack:"'Montserrat','Arial',sans-serif" },
];

let state = { tabs:[], active:null, boxSeq:0, tabSeq:0 };

/* ══ TABS ══ */
const newTabId = ()=>'T'+(++state.tabSeq);

function addTab(opts={}){
  const id  = newTabId();
  const tab = { id, name:opts.name||'Page', type:opts.type||'layout',
    fmt:opts.fmt||'a4', res:opts.res||'digital', cw:opts.cw||210, ch:opts.ch||297,
    /* v0.4.0: custom-size unit (mm default keeps every pre-0.4.0 tab/pack
       byte-identical in behaviour). Only meaningful when fmt==='custom'. */
    cunit:opts.cunit||'mm',
    /* v0.3.1: templates may suppress the default source boxes that
       buildLayoutTC normally seeds. The flag rides on the tab object so
       it's visible inside buildTC → buildLayoutTC. */
    noDefaultSources:!!opts.noDefaultSources };
  state.tabs.push(tab);
  buildTC(tab);
  renderTabBar();
  activateTab(id);
  return tab;
}

function removeTab(id){
  /* v0.3.6: allow closing every tab. The previous guard
     `if(state.tabs.length<=1) return;` prevented closing the last one
     to avoid landing on an empty UI; that empty state is now supported
     (init already boots zero-tabbed). The activateTab call needs an
     explicit length check since state.tabs[?] on an empty array would
     throw on `.id`. */
  const idx=state.tabs.findIndex(t=>t.id===id);
  if(idx<0) return;
  state.tabs.splice(idx,1);
  $('tc-'+id)?.remove();
  renderTabBar();
  if(state.tabs.length){
    activateTab(state.tabs[Math.min(idx,state.tabs.length-1)].id);
  } else {
    state.active=null;
    updateDevInfo();
  }
}

function activateTab(id){
  state.active=id;
  document.querySelectorAll('.tc').forEach(el=>el.classList.remove('active'));
  $('tc-'+id)?.classList.add('active');
  renderTabBar();
  const tab=state.tabs.find(t=>t.id===id);
  if(tab){ syncRes(tab.res); updateSizeLbl(tab); }
  /* Newly-visible canvas needs a fit-recalc — was display:none, now has a
     measurable .pw. requestAnimationFrame ensures layout has settled. */
  if(tab && (tab.type==='layout'||tab.type==='hybrid')){
    const cv=$('cv-'+tab.id);
    if(cv) requestAnimationFrame(()=>fitCanvas(cv));
  }
  updateDevInfo();
}

function fmtLabel(tab){
  if(tab.fmt==='custom') return `${tab.cw}×${tab.ch}${(tab.cunit||'mm').toUpperCase()}`;
  /* v0.4.0: px-native formats already read as e.g. 1080×1350; just uppercase
     the key (the 'x' becomes 'X'), which is fine for the compact tab pill. */
  return (SIZES[tab.fmt]?SIZES[tab.fmt].label:tab.fmt).toUpperCase();
}

function renderTabBar(){
  const bar=$('tab-bar');
  bar.querySelectorAll('.tab').forEach(el=>el.remove());
  const addBtn=$('tab-add');
  state.tabs.forEach(tab=>{
    const el=document.createElement('div');
    el.className='tab'+(tab.id===state.active?' active':'');
    el.innerHTML=`<span>${tab.name}</span><span class="tab-fmt">${fmtLabel(tab)}</span><span class="tab-x">✕</span>`;
    el.addEventListener('click',e=>{
      if(e.target.classList.contains('tab-x')){ removeTab(tab.id); return; }
      activateTab(tab.id);
    });
    el.addEventListener('dblclick',e=>{
      if(e.target.classList.contains('tab-x')) return;
      openTabEdit(tab.id);
    });
    bar.insertBefore(el,addBtn);
  });
}
$('tab-add').addEventListener('click',()=>openModal());

/* ── Tab Edit Modal ── */
let _teTabId=null;
function openTabEdit(id){
  const tab=state.tabs.find(t=>t.id===id); if(!tab) return;
  _teTabId=id;
  $('te-name').value=tab.name;
  const fmtVal=tab.fmt==='custom'?'custom':tab.fmt;
  $('te-size').value=fmtVal;
  $('te-cust').classList.toggle('hidden',fmtVal!=='custom');
  if(tab.fmt==='custom'){$('te-w').value=tab.cw||210;$('te-h').value=tab.ch||297;$('te-unit').value=tab.cunit||'mm';}
  $('te-res').value=tab.res||'digital';
  $('tab-edit-modal').classList.add('open');
}
$('te-close').addEventListener('click',()=>$('tab-edit-modal').classList.remove('open'));
$('te-cancel').addEventListener('click',()=>$('tab-edit-modal').classList.remove('open'));
$('tab-edit-modal').addEventListener('click',e=>{if(e.target===$('tab-edit-modal'))$('tab-edit-modal').classList.remove('open');});
$('te-size').addEventListener('change',function(){
  $('te-cust').classList.toggle('hidden',this.value!=='custom');
  /* v0.4.0: picking a pixel-native format forces Digital (96dpi). */
  if(PX_FORMATS.has(this.value)) $('te-res').value='digital';
});
$('te-apply').addEventListener('click',()=>{
  const tab=state.tabs.find(t=>t.id===_teTabId); if(!tab) return;
  tab.name=$('te-name').value.trim()||tab.name;
  tab.fmt=$('te-size').value;
  tab.res=$('te-res').value;
  if(tab.fmt==='custom'){tab.cw=parseInt($('te-w').value)||210;tab.ch=parseInt($('te-h').value)||297;tab.cunit=$('te-unit').value;}
  if(tab.type==='layout'||tab.type==='hybrid') applyCV('cv-'+tab.id,tab);
  syncRes(tab.res); updateSizeLbl(tab); renderTabBar(); updateDevInfo();
  $('tab-edit-modal').classList.remove('open');
});

/* ══ BUILD TAB ══ */
function buildTC(tab){
  /* Hybrid tabs reuse the layout chrome (canvas + sources + layers) and
     unlock the CSV source-box mode. createBox checks the tab type to
     decide whether to expose the third toggle button. */
  if(tab.type==='layout'||tab.type==='hybrid') buildLayoutTC(tab);
  else buildTableTC(tab);
}

/* ══════════════════════════════════════
   LAYOUT TAB
══════════════════════════════════════ */
function buildLayoutTC(tab){
  const tc=document.createElement('div');
  tc.className='tc tc-layout'; tc.id='tc-'+tab.id;

        <button class="lyr-align-btn" data-align="centerH" title="Align horizontal centers">

        <button class="lyr-align-btn" data-align="centerV" title="Align vertical centers">

        <button class="lyr-align-btn" data-align="bottom" title="Align bottom edges">
          <svg viewBox="0 0 16 16" width="14" height="14"><line x1="1" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="4" width="3" height="9" fill="currentColor"/><rect x="10" y="7" width="3" height="6" fill="currentColor"/></svg></button>
      </div>
      <div class="vsep"></div>
      <!-- Position widget: shows X/Y of the selected cel (or the bounding-
           box TL for a multi-selection). Dbl-click either field to type a
           new value; commit moves the whole selection by the delta. Updates
           live via a MutationObserver on the canvas. -->
      <div class="pos-info" data-tab="${tab.id}">
        <span class="pos-lbl">X</span><input class="pos-in" id="pos-x-${tab.id}" type="number" readonly placeholder="—">
        <span class="pos-lbl">Y</span><input class="pos-in" id="pos-y-${tab.id}" type="number" readonly placeholder="—">
      </div>
      <!-- v0.3.7 TEXT-CEL TOOLBAR: per-element FONT / SIZE / TRACKING controls.
           Hidden by default; shown when a TXT cel is selected. The TARGET pill
           (BODY/TITLE/SUB/LABEL) is the sub-element the inputs act on — click
           to cycle, or just click into the actual sub-element on canvas
           (in edit mode) and it updates automatically. Tracking is applied
           to the currently-selected character range when one exists inside
           the focused sub-element; otherwise applied to the whole sub-element. -->
      <div class="txt-ctl" id="txt-ctl-${tab.id}">
        <button class="txt-ctl-target" id="txt-ctl-target-${tab.id}" title="Click to cycle target sub-element">BODY</button>
        <span class="txt-ctl-lbl">FONT</span>
        <select class="txt-ctl-font" id="txt-ctl-font-${tab.id}" title="Font family — set the FONT registry in source code to extend"></select>
        <span class="txt-ctl-lbl">FS</span>
        <input class="txt-ctl-fs" id="txt-ctl-fs-${tab.id}" type="number" min="4" max="400" step="1" title="Font size (px)">
        <span class="txt-ctl-lbl">TRK</span>
        <input class="txt-ctl-tr" id="txt-ctl-tr-${tab.id}" type="number" step="any" title="Tracking / letter-spacing (in 1/1000 em — e.g. 50 ≈ 0.05em).&#10;Any number is accepted (negatives tighten, decimals allowed).&#10;If text is highlighted inside the sub-element, applies to that range only.&#10;Otherwise applies to the whole sub-element.">
        <span class="txt-ctl-lbl">ALIGN</span>
        <button class="txt-ctl-align" data-align="left"   id="txt-ctl-al-${tab.id}" title="Align left">L</button>
        <button class="txt-ctl-align" data-align="center" id="txt-ctl-ac-${tab.id}" title="Align center">C</button>
        <button class="txt-ctl-align" data-align="right"  id="txt-ctl-ar-${tab.id}" title="Align right">R</button>
        <span class="txt-ctl-lbl">COLOR</span>
        <input type="color" class="txt-ctl-color" id="txt-ctl-color-${tab.id}" value="#c41e33" title="Colour of the targeted element — LABEL sets the tag/pill colour; TITLE / SUB / BODY set text colour">
      </div>
      <!-- v0.3.9 VEC-CEL TOOLBAR: appears when a single VEC cel is
           selected. COLOR drives stroke (and fill when FILL is toggled
           on); STROKE-WIDTH sets the line thickness. For primitives
           (LINE/RECT/CIRCLE) the SVG is regenerated from dataset
           on every change; for uploaded SVGs a best-effort attribute
           substitution applies. -->
      <div class="vec-ctl" id="vec-ctl-${tab.id}">
        <span class="vec-ctl-lbl">COLOR</span>
        <input type="color" class="vec-ctl-color" id="vec-ctl-color-${tab.id}" value="#000000" title="Stroke colour (and fill when FILL is toggled on)">
        <span class="vec-ctl-lbl">SW</span>
        <input type="number" class="vec-ctl-sw" id="vec-ctl-sw-${tab.id}" min="0" step="0.5" value="2" title="Stroke width (px in SVG user units)">
      </div>
      <!-- v0.4.0 TABLE-CEL TOOLBAR: appears when a single table (CSV) cel is
           selected. COL pill cycles the target column (1..N); L/C/R set that
           column's text alignment. Stored on the cel's dataset.colAlign and
           re-rendered live; honoured by every export path. -->
      <div class="tbl-ctl" id="tbl-ctl-${tab.id}">
        <span class="tbl-ctl-lbl">COLUMN</span>
        <button class="tbl-ctl-col" id="tbl-ctl-col-${tab.id}" title="Click to target the next column">COL 1</button>
        <span class="tbl-ctl-lbl">ALIGN</span>
        <button class="tbl-ctl-al" data-al="l" id="tbl-ctl-al-${tab.id}" title="Align column left">L</button>
        <button class="tbl-ctl-al" data-al="c" id="tbl-ctl-ac-${tab.id}" title="Align column center">C</button>
        <button class="tbl-ctl-al" data-al="r" id="tbl-ctl-ar-${tab.id}" title="Align column right">R</button>
        <span class="tbl-ctl-lbl">FONT</span>
        <select class="tbl-ctl-font" id="tbl-ctl-font-${tab.id}" title="Font for the whole CSV object (PUBSYS font registry)"></select>
        <span class="tbl-ctl-lbl">TITLE</span>
        <input class="tbl-ctl-fs" id="tbl-ctl-fs-${tab.id}" type="number" min="6" max="120" step="1" title="Font size of the title / first section (px). Titled tables only.">
        <span class="tbl-ctl-lbl">MARGIN</span>
        <button class="tbl-ctl-al" id="tbl-ctl-mdec-${tab.id}" title="Decrease cell margins (text-to-edge padding)">−</button>
        <button class="tbl-ctl-al" id="tbl-ctl-minc-${tab.id}" title="Increase cell margins (text-to-edge padding)">+</button>
      </div>
      <!-- v0.3.9: LAYERS button at the far right of the topbar (was on
           the left). The margin-left:auto on the wrapper pushes it past
           any contextual controls (.txt-ctl, .vec-ctl) that appear in
           the middle, keeping LAYERS pinned to the right edge regardless
           of what's selected. -->
      <div class="lt-topbar-right">
        <button class="tbtn g" id="lt-lyr-${tab.id}">LAYERS</button>
      </div>
    </div>
    <!-- LAYERS popup — restored in v0.3.2. Collapsed by default; opens
         when the LAYERS toolbar button is clicked. -->
    <div class="lyr-panel" id="lyr-panel-${tab.id}">
      <div class="lyr-hd">
        <span>LAYERS</span>
        <div class="lyr-hd-actions">
          <button class="lyr-hd-btn" data-refresh title="Refresh list">↻</button>
          <button class="lyr-hd-btn" data-close title="Close">✕</button>
        </div>
      </div>
      <div class="lyr-body" id="lyr-body-${tab.id}"></div>
    </div>
    <!-- BOTTOM: left panel + canvas -->
    <div class="lt-body">
      <div class="lp" id="lp-${tab.id}">
        <div class="lp-hd">
          <span>SOURCES</span>
          <button class="sbb" id="lb-add-${tab.id}">+ ADD</button>
        </div>
        <div class="boxes-wrap" id="bw-${tab.id}"></div>
      </div>
      <div class="rh" id="rh-${tab.id}"></div>
      <div class="pw" id="pw-${tab.id}">
        <div class="cv-sizer">
          <div class="cv" id="cv-${tab.id}">
            <div class="cv-hint">DROP IMAGE OR TEXT HERE</div>
            <div class="cv-grid off"><div class="cv-grid-line cv-grid-v1"></div><div class="cv-grid-line cv-grid-v2"></div><div class="cv-grid-line cv-grid-h1"></div><div class="cv-grid-line cv-grid-h2"></div></div>
            <div class="snap-v"></div>
            <div class="snap-h"></div>
          </div>
        </div>
      </div>
    </div>`;
  $('main').appendChild(tc);

  applyCV('cv-'+tab.id, tab);

  /* left panel resize */
  const lp=tc.querySelector('.lp');
  $('rh-'+tab.id).addEventListener('mousedown',e=>{
    e.preventDefault();
    const onM=ev=>{ lp.style.width=Math.min(340,Math.max(160,ev.clientX-tc.getBoundingClientRect().left))+'px'; };
    const onU=()=>{ document.removeEventListener('mousemove',onM); document.removeEventListener('mouseup',onU); };
    document.addEventListener('mousemove',onM); document.addEventListener('mouseup',onU);
  });

  /* canvas drop */
  const cv=$('cv-'+tab.id);
  cv.addEventListener('dragover',e=>{ e.preventDefault(); cv.classList.add('drag-over'); });
  cv.addEventListener('dragleave',()=>cv.classList.remove('drag-over'));
  cv.addEventListener('drop',e=>{
    e.preventDefault(); cv.classList.remove('drag-over');
    const rect=cv.getBoundingClientRect();
    /* Visual→native: getBoundingClientRect returns the SCALED rect, so the
       clientX-rect.left delta is in visual px. Divide by the fit factor to
       land cels at the user's intended NATIVE coords. */
    const _s=cvScale(cv);
    const x=(e.clientX-rect.left)/_s, y=(e.clientY-rect.top)/_s;
    /* 300dpi-aware defaults: at print resolution, a 13px text or a 100%-
       scaled table is microscopic on a 300dpi page. Bump defaults so dropped
       content lands at a useful size out of the box. User can still adjust.
       (Earlier-dropped cels are NOT retroactively resized — only the new
       cel inherits these defaults.) */
    const isPrint=tab.res==='print';
    const defaultFs   = isPrint?36:13;
    const defaultScale= isPrint?3.2:1;
    // OS file drop — create the source box first, then a cel that points at it
    if(e.dataTransfer.files?.length){
      /* v0.3.6: multi-file support.
         - Image files: each one creates its own source box + cel,
           cascade-positioned so they don't stack exactly on top of
           each other. SVGs go through the VEC pipeline.
         - .zip / .pubsys files: each one creates its own NEW tab and
           imports into it (same path as the global IMPORT button).
           Other files: ignored. */
      const files=Array.from(e.dataTransfer.files);
      const zips=files.filter(f=>/\.(zip|pubsys)$/i.test(f.name));
      const imgs=files.filter(f=>f.type.startsWith('image/'));
      if(zips.length){
        for(const zf of zips){
          const newTab=addTab({name:'IMPORTING…',type:'layout',fmt:'a4',res:'digital'});
          importLayoutZip(newTab.id,zf);
        }
        /* If only zips were dropped, we're done. If there's a mix,
           still place the images on the CURRENT tab below. */
        if(!imgs.length) return;
      }
      if(imgs.length){
